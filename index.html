<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon GO PvP 攻略台</title>
<style>
  :root{
    --bg:#0e1016;--panel:#171a23;--panel2:#1f2330;--panel3:#272c3b;--line:#2c3142;
    --txt:#e9ebf2;--dim:#9aa1b4;--accent:#ffcb05;--accent2:#3b6cff;
    --good:#27c08a;--warn:#ff9f43;--bad:#ff5c72;
    --great:#e84f57;--ultra:#f6c945;--master:#9b6cff;--cup:#34c3a8;
    --lead:#3b6cff;--swap:#27c08a;--closer:#ff7a59;--flex:#7c84a0;
    --fast:#4aa3ff;--charged:#ffcb05;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 700px at 75% -15%,#1a2030,#0e1016);color:var(--txt);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  html{overflow-x:hidden}
  .top{padding:13px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    position:sticky;top:0;background:rgba(14,16,22,.92);backdrop-filter:blur(8px);z-index:20}
  .top h1{margin:0;font-size:18px;letter-spacing:.5px}.top h1 span{color:var(--accent)}
  .top .season{color:var(--dim);font-size:11px;flex:1;min-width:220px;line-height:1.4}
  .layout{display:grid;grid-template-columns:200px 1fr}
  @media(max-width:820px){.layout{grid-template-columns:1fr}}
  .side{border-right:1px solid var(--line);padding:14px 10px;display:flex;flex-direction:column;gap:5px;
    position:sticky;top:53px;align-self:start;max-height:calc(100vh - 53px);overflow-y:auto}
  @media(max-width:820px){.side{position:static;flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid var(--line)}}
  .navlbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin:4px 6px 2px;width:100%}
  .nav{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;font-size:13px;
    border:1px solid transparent;background:var(--panel);transition:.12s}
  .nav:hover{background:var(--panel2)}.nav.on{border-color:var(--accent);background:var(--panel3)}
  .nav .dot{width:9px;height:9px;border-radius:3px;flex:none}
  .nav small{display:block;color:var(--dim);font-size:10px;margin-top:1px}
  .dot-great{background:var(--great)}.dot-ultra{background:var(--ultra)}.dot-master{background:var(--master)}.dot-cup{background:var(--cup)}
  .main{padding:20px 24px 80px;max-width:1000px}
  .lg-head{display:flex;align-items:center;gap:11px;margin-bottom:8px;flex-wrap:wrap}
  .lg-head h2{margin:0;font-size:21px}
  .pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;color:#0e1016}
  .pill-great{background:var(--great)}.pill-ultra{background:var(--ultra)}.pill-master{background:var(--master)}.pill-cup{background:var(--cup)}
  details.meta{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin:8px 0 4px;padding:0 14px;font-size:12.5px}
  details.meta>summary{cursor:pointer;padding:10px 0;color:var(--dim);list-style:none}
  details.meta>summary::-webkit-details-marker{display:none}
  details.meta>summary::before{content:"▸ ";color:var(--accent)}
  details.meta[open]>summary::before{content:"▾ "}
  details.meta .rich{font-size:12.5px;line-height:1.7;color:#cdd2df;padding-bottom:12px}
  .rich strong{color:#fff}.rich code{background:var(--panel3);padding:1px 5px;border-radius:4px}
  .rich blockquote{border-left:3px solid var(--accent2);margin:6px 0;padding:2px 10px;color:var(--dim)}
  .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px;margin:14px 0 6px;gap:3px}
  .seg button{background:none;border:none;color:var(--dim);padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
  .seg button.on{background:var(--panel3);color:var(--accent)}
  .teams{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(300px,100%),1fr));gap:14px;margin-top:6px}
  .team{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
  .team .tt{font-size:13.5px;font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:7px}
  .team .tt .rank{background:var(--accent);color:#0e1016;font-size:11px;font-weight:800;border-radius:6px;padding:1px 7px;flex:none}
  .lineup{display:flex;align-items:stretch;gap:6px}
  .mem{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:8px 4px 7px;text-align:center;cursor:pointer;
    transition:.12s;position:relative;min-width:0}
  .mem:hover{border-color:var(--accent);transform:translateY(-2px)}
  .mem img{width:52px;height:52px;object-fit:contain;margin:0 auto;display:block}
  .mem .mc{font-size:11.5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mem .me{font-size:9px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rbadge{display:inline-block;font-size:9.5px;font-weight:700;border-radius:10px;padding:1px 7px;margin-top:4px;color:#0e1016}
  .r-lead{background:var(--lead);color:#fff}.r-swap{background:var(--swap)}.r-closer{background:var(--closer);color:#fff}.r-flex{background:var(--flex);color:#fff}
  .strat{margin-top:10px;font-size:11.5px;color:var(--dim);line-height:1.55;background:var(--panel2);border-radius:8px;padding:7px 10px}
  .strat b{color:var(--accent);font-weight:600}
  .secttl{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin:26px 0 10px;display:flex;align-items:center;gap:8px}
  .secttl::after{content:"";flex:1;height:1px;background:var(--line)}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(104px,100%),1fr));gap:9px}
  .pcard{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px 6px;text-align:center;cursor:pointer;transition:.12s}
  .pcard:hover{border-color:var(--accent);transform:translateY(-2px);background:var(--panel2)}
  .pcard img{width:58px;height:58px;object-fit:contain;margin:0 auto;display:block}
  .pcard .cn{font-size:12.5px;margin-top:3px}.pcard .en{font-size:9.5px;color:var(--dim)}
  .pcard .rb{margin-top:4px}
  .pcard .ivcol{position:absolute;top:6px;right:5px;display:flex;flex-direction:column;gap:2px;font-size:9px;font-weight:800;line-height:1;text-align:right}
  .pcard .ivcol b{font-weight:400;color:var(--dim);font-size:7.5px;margin-right:1px}
  .pcard .ivcol .a{color:#ff8f6b}.pcard .ivcol .d{color:#5ab0ff}.pcard .ivcol .h{color:#46d39a}
  .ov{position:fixed;inset:0;background:rgba(6,8,12,.74);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:30px 14px;overflow-y:auto}
  .ov.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;max-width:640px;width:100%;padding:20px;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .modal .x{position:absolute;top:12px;right:15px;font-size:22px;color:var(--dim);cursor:pointer;line-height:1}
  .mhead{display:flex;align-items:center;gap:15px}
  .mhead img{width:88px;height:88px;object-fit:contain;background:var(--panel2);border-radius:14px;border:1px solid var(--line)}
  .mhead .nm{font-size:21px;font-weight:700}
  .mhead .nm small{display:block;color:var(--dim);font-size:11.5px;font-weight:400;margin-top:3px}
  .mhead .meta-line{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:11px;padding:3px 9px;border-radius:13px;background:var(--panel3);color:var(--txt);white-space:nowrap}
  .chip.fast{background:rgba(74,163,255,.18);border:1px solid var(--fast);color:#bfe0ff}
  .chip.charged{background:rgba(255,203,5,.15);border:1px solid var(--charged);color:#ffe27a}
  .chip.stat{background:var(--panel2);border:1px solid var(--line);color:var(--dim)}
  .mrow{margin:13px 0}
  .mrow .k{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
  .moveline{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .moveline .plus{color:var(--dim)}
  .evo{display:flex;align-items:center;gap:2px;flex-wrap:wrap;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px}
  .evo .stage{text-align:center;min-width:66px;padding:0 4px}
  .evo .stage img{width:46px;height:46px;object-fit:contain}
  .evo .stage .c{font-size:11.5px}.evo .stage .e{font-size:9px;color:var(--dim)}
  .evo .arr{color:var(--accent);font-size:16px}
  details.more{margin-top:10px;border-top:1px dashed var(--line);padding-top:8px}
  details.more summary{cursor:pointer;color:var(--accent);font-size:12.5px;list-style:none}
  details.more summary::-webkit-details-marker{display:none}
  details.more summary::before{content:"▸ "}details.more[open] summary::before{content:"▾ "}
  details.more p{font-size:12.5px;line-height:1.7;color:#cdd2df;margin:8px 0}
  .calc{margin-top:14px;background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:14px}
  .calc .ct{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .ivrow{display:flex;align-items:center;gap:10px;margin:7px 0}
  .ivrow label{width:64px;font-size:12.5px;color:var(--dim)}
  .ivrow input[type=range]{flex:1;accent-color:var(--accent)}
  .ivrow .v{width:28px;text-align:center;background:var(--panel3);border-radius:6px;padding:2px 0;font-size:14px}
  .opt{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);margin:9px 0 4px}
  select{background:var(--panel3);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:4px 8px;font-size:12px}
  .res{display:flex;align-items:center;gap:13px;margin-top:8px;flex-wrap:wrap}
  .rankbig{font-size:32px;font-weight:800;letter-spacing:-1px}.rankbig small{font-size:13px;color:var(--dim);font-weight:500}
  .tier{font-size:12px;padding:3px 10px;border-radius:14px;font-weight:700;color:#0e1016}
  .kv{display:flex;gap:13px;flex-wrap:wrap;font-size:12px;color:var(--dim);margin-top:7px}.kv b{color:var(--txt)}
  details.t20 summary{cursor:pointer;color:var(--accent);font-size:12px;margin-top:9px;list-style:none}
  details.t20 summary::-webkit-details-marker{display:none}details.t20 summary::before{content:"▸ "}details.t20[open] summary::before{content:"▾ "}
  .t20 table{border-collapse:collapse;width:100%;font-size:11.5px;margin-top:7px}
  .t20 th,.t20 td{border:1px solid var(--line);padding:3px 5px;text-align:center}.t20 th{background:var(--panel3);color:var(--accent)}
  .muted{color:var(--dim);font-size:11.5px;line-height:1.5}
  .iqtable{border-collapse:separate;border-spacing:0 5px;width:100%}
  .iqtable th{font-size:11px;color:var(--dim);font-weight:600;padding:4px 8px;text-align:center;cursor:pointer;user-select:none;white-space:nowrap}
  .iqtable th:hover{color:var(--accent)}
  .iqtable .lgdot{display:inline-block;width:8px;height:8px;border-radius:3px;margin-right:5px;vertical-align:middle}
  .iqtable td{background:var(--panel);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:5px 8px;text-align:center}
  .iqtable td:first-child{border-left:1px solid var(--line);border-radius:10px 0 0 10px;text-align:left}
  .iqtable td:last-child{border-right:1px solid var(--line);border-radius:0 10px 10px 0}
  .iqtable .pname{cursor:pointer;display:flex;align-items:center;gap:9px}
  .iqtable .pname:hover{color:var(--accent)}
  .iqtable .pname img{width:36px;height:36px;object-fit:contain;flex:none}
  .iqtable .pname .pnm{display:flex;flex-direction:column;line-height:1.2;font-size:13px}
  .iqtable .pname small{color:var(--dim);font-size:9.5px}
  .iqtable .rk{display:inline-block;min-width:46px;padding:3px 8px;border-radius:8px;color:#0e1016;font-weight:800;font-size:13px;font-variant-numeric:tabular-nums}
  .lgbadges{display:inline-flex;gap:4px;flex-wrap:nowrap;align-items:center;white-space:nowrap}
  .lgb{display:inline-block;font-size:8px;font-weight:700;border-radius:9px;padding:1px 6px;line-height:1.5;white-space:nowrap}
  .lgb-great{background:var(--great);color:#fff}
  .lgb-ultra{background:var(--ultra);color:#0e1016}
  .lgb-master{background:var(--master);color:#fff}
  .lgb-cup{background:var(--cup);color:#06241d}
  .cbx{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--dim);cursor:pointer;white-space:nowrap}
  .cbx input{accent-color:var(--accent);margin:0}
  .lgtog{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--line);border-radius:14px;font-size:12px;cursor:pointer;background:var(--panel3);user-select:none}
  .lgtog.off{opacity:.38;filter:grayscale(1)}
  .basics-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px}
  .btab{padding:7px 13px;border-radius:9px;border:1px solid var(--line);background:var(--panel);cursor:pointer;font-size:12.5px}
  .btab.on{border-color:var(--accent);background:var(--panel3)}
  .rich h1,.rich h2,.rich h3,.rich h4{color:var(--accent);margin:14px 0 6px;line-height:1.3}
  .rich h1{font-size:17px}.rich h2{font-size:15px}.rich h3{font-size:13.5px}.rich h4{color:var(--txt);font-size:13px}
  .rich table{border-collapse:collapse;width:100%;margin:10px 0;font-size:12px}
  .rich th,.rich td{border:1px solid var(--line);padding:5px 8px;text-align:left;vertical-align:top}
  .rich th{background:var(--panel3);color:var(--accent)}
  .rich ul,.rich ol{margin:6px 0;padding-left:20px}.rich li{margin:3px 0;font-size:12.5px;line-height:1.6}
  .rich hr{border:none;border-top:1px dashed var(--line);margin:12px 0}.rich p{font-size:12.5px;line-height:1.7;color:#cdd2df}
  #iqres{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .rich{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .modal{overflow-x:hidden}
  @media(max-width:520px){.main{padding:16px 12px}.modal{padding:16px}}
  .hide{display:none}
</style>
</head>

<script>
const DATA = {"season":"GO Battle League「Forever Forward」(2026/6/2–9/8)。赛季编号文档内 S23/S27 不一致，以游戏内为准；Meta 时效性强，请以 pvpoke.com 当期为准。","basics":[{"title":"Pokemon GO PvP 属性相克系统完全指南","html":"<h2>一、18 种属性</h2><p>Pokemon GO 沿用主系列的 18 种属性（Type）：</p><p>``<code> 普通(Normal)  火(Fire)    水(Water)   电(Electric)  草(Grass)   冰(Ice) 格斗(Fighting) 毒(Poison)  地面(Ground) 飞行(Flying)  超能(Psychic) 虫(Bug) 岩石(Rock)    幽灵(Ghost) 龙(Dragon)   恶(Dark)     钢(Steel)   妖精(Fairy) </code>``</p><h2>二、相克的基础倍率</h2><p>Pokemon GO 与主系列最大的不同：<strong>没有\"完全无效\"(0x)</strong>。主系列里的免疫（如地面对飞行无效）在 GO 里被改成了\"双重抵抗\"。</p><table><thead><tr><th>关系</th><th>主系列倍率</th><th>GO 实际倍率</th><th>说明</th></tr></thead><tbody><tr><td>效果拔群（克制）</td><td>2x</td><td><strong>1.6x</strong></td><td>单层克制</td></tr><tr><td>一般</td><td>1x</td><td>1x</td><td>普通</td></tr><tr><td>效果不佳（抵抗）</td><td>0.5x</td><td><strong>0.625x</strong></td><td>单层抵抗</td></tr><tr><td>无效（免疫）</td><td>0x</td><td><strong>0.390625x</strong></td><td>GO 把 0 改成双抵</td></tr></tbody></table><h2>三、双属性叠加</h2><p>当防守方有两个属性时，攻击方的克制/抵抗倍率会<strong>相乘叠加</strong>：</p><table><thead><tr><th>叠加情况</th><th>计算</th><th>结果</th><th>俗称</th></tr></thead><tbody><tr><td>双倍克制</td><td>1.6 × 1.6</td><td><strong>≈ 2.56x</strong></td><td>双重克制</td></tr><tr><td>克制 + 抵抗（互相抵消）</td><td>1.6 × 0.625</td><td>= 1x</td><td>抵消归一</td></tr><tr><td>双倍抵抗</td><td>0.625 × 0.625</td><td><strong>≈ 0.39x</strong></td><td>双重抵抗</td></tr><tr><td>抵抗 + 免疫</td><td>0.625 × 0.390625</td><td>≈ 0.244x</td><td>极致抵抗</td></tr><tr><td>克制 + 免疫</td><td>1.6 × 0.390625</td><td>= 0.625x</td><td>净抵抗</td></tr></tbody></table><p><strong>关键点</strong>：双属性宝可梦既可能被\"双倍克制\"打成 2.56x 的爆炸伤害，也可能用\"双重抵抗\"把某系打到 0.39x 的隔靴搔痒。配队时要同时利用这两面。</p><h2>四、STAB 本系加成</h2><p><strong>STAB</strong>（Same Type Attack Bonus，本系一致加成）：当宝可梦使用与自身属性相同的招式时，伤害 <strong>× 1.2</strong>。</p><ul><li>主系列里 STAB 是 1.5x，<strong>GO 里是 1.2x</strong>。</li><li>双属性宝可梦的两个属性招式都享受 STAB。</li><li>STAB 与相克倍率<strong>独立相乘</strong>。</li></ul><p><strong>完整伤害公式（简化）</strong>： ``<code> 伤害 ≈ 招式威力 × (攻击/防御) × STAB(1.2) × 属性相克倍率 × 0.5 + 1 </code>``</p><p>举例：水系宝可梦用水招打火/地面双属性（如土台龟无此例，取火/岩的喷火驼）： <code>1.2(STAB) × 1.6(克火) × 1.6(克岩... 实际喷火驼是火/地面)</code> —— 总之双倍克制叠 STAB 可达 <code>1.2 × 2.56 ≈ 3.07</code> 倍的等效放大。</p><h2>五、PvP 与 PvE 倍率差异</h2><p>这是最容易踩坑的地方：<strong>PvP 和 PvE（道馆/团战/Raid）的相克倍率不同！</strong></p><table><thead><tr><th>关系</th><th>PvP 倍率</th><th>PvE 倍率</th></tr></thead><tbody><tr><td>克制</td><td>1.6x</td><td>1.6x</td></tr><tr><td>抵抗</td><td><strong>0.625x</strong></td><td>0.625x</td></tr><tr><td>免疫（双抵）</td><td><strong>0.390625x</strong></td><td>0.390625x</td></tr><tr><td>双倍克制</td><td>2.56x</td><td>2.56x</td></tr><tr><td>双倍抵抗</td><td>0.39x</td><td>0.39x</td></tr></tbody></table><blockquote>注：现版本 Niantic 已将 PvP 与 PvE 的<strong>相克倍率统一</strong>为上表（早期 PvP 曾用过 1.6/0.625 而 PvE 用 1.4/0.714 的差异，现已不再）。真正的差异在于：</blockquote><blockquote>- <strong>PvP</strong> 引入了能量条、护盾、出招前后摇等机制，且双方实时换宝可梦，属性博弈是动态的。</blockquote><blockquote>- <strong>PvE</strong> 是纯 DPS 竞赛，强调\"克制 + DPS + 续航\"，没有护盾博弈。</blockquote><blockquote>- <strong>CP/属性值计算</strong>：PvP 用 Great/Ultra/Master League 的 CP 上限（1500/2500/无上限），同一只宝可梦在 PvP 与 PvE 的最优 IV 取向不同（PvP 重防御/耐久，PvE 重攻击）。</blockquote><h2>六、相克速查的记忆方法</h2><h3>1. \"三角循环\"记忆（最核心）</h3><ul><li><strong>火 → 草 → 水 → 火</strong>（火烧草、草吸水、水灭火）经典三角。</li><li><strong>草 → 地面 → 电 → ...</strong>（电对地面无效是免疫，是个例外要单记）。</li><li><strong>格斗 → 恶 → 超能 → 格斗</strong>（心理战三角：超能怕恶、恶怕格斗、格斗怕超能）。</li></ul><h3>2. 现实直觉记忆</h3><ul><li><strong>水</strong> 克 火/地面/岩石（水能灭火、淹地、侵蚀岩石）。</li><li><strong>电</strong> 克 水/飞行（电流导水、雷击飞鸟）；电被<strong>地面</strong>双抵/免疫（接地）。</li><li><strong>冰</strong> 克 草/地面/飞行/龙（\"冰封四杀\"，是龙的天敌之一）。</li><li><strong>地面</strong> 克 火/电/毒/岩/钢（大地承载一切金属矿物），但<strong>打不到飞行</strong>。</li><li><strong>格斗</strong> 克 普通/冰/岩/恶/钢（硬碰硬），怕飞行/超能/妖精。</li></ul><h3>3. \"新系\"妖精记忆</h3><ul><li><strong>妖精</strong> 克 龙/恶/格斗（童话克制邪恶与暴力），是<strong>龙的克星</strong>。</li><li>妖精被 毒/钢 克制（铁与毒能伤害精灵）。</li></ul><h3>4. 钢系\"万金油防御\"</h3><ul><li><strong>钢</strong> 抵抗最多（10 种），是最好的防御属性；被 火/格斗/地面 克制。</li></ul><h2>七、实用\"谁克谁\"要点表</h2><table><thead><tr><th>攻击属性</th><th>克制（1.6x，打它们）</th><th>被谁克（被这些打）</th></tr></thead><tbody><tr><td>普通 Normal</td><td>无</td><td>格斗</td></tr><tr><td>火 Fire</td><td>草、冰、虫、钢</td><td>水、地面、岩石</td></tr><tr><td>水 Water</td><td>火、地面、岩石</td><td>电、草</td></tr><tr><td>电 Electric</td><td>水、飞行</td><td>地面</td></tr><tr><td>草 Grass</td><td>水、地面、岩石</td><td>火、冰、毒、飞行、虫</td></tr><tr><td>冰 Ice</td><td>草、地面、飞行、龙</td><td>火、格斗、岩石、钢</td></tr><tr><td>格斗 Fighting</td><td>普通、冰、岩石、恶、钢</td><td>飞行、超能、妖精</td></tr><tr><td>毒 Poison</td><td>草、妖精</td><td>地面、超能</td></tr><tr><td>地面 Ground</td><td>火、电、毒、岩石、钢</td><td>水、草、冰</td></tr><tr><td>飞行 Flying</td><td>草、格斗、虫</td><td>电、冰、岩石</td></tr><tr><td>超能 Psychic</td><td>格斗、毒</td><td>虫、幽灵、恶</td></tr><tr><td>虫 Bug</td><td>草、超能、恶</td><td>火、飞行、岩石</td></tr><tr><td>岩石 Rock</td><td>火、冰、飞行、虫</td><td>水、草、格斗、地面、钢</td></tr><tr><td>幽灵 Ghost</td><td>超能、幽灵</td><td>幽灵、恶</td></tr><tr><td>龙 Dragon</td><td>龙</td><td>冰、龙、妖精</td></tr><tr><td>恶 Dark</td><td>超能、幽灵</td><td>格斗、虫、妖精</td></tr><tr><td>钢 Steel</td><td>冰、岩石、妖精</td><td>火、格斗、地面</td></tr><tr><td>妖精 Fairy</td><td>龙、格斗、恶</td><td>毒、钢</td></tr></tbody></table><h3>速记结论</h3><ul><li><strong>最强进攻属性</strong>：地面（克 5 系且都是常见系）、格斗（克 5 系）。</li><li><strong>最强防御属性</strong>：钢（抵抗 10 系）、妖精/电（无致命弱点）。</li><li><strong>PvP 万能答案</strong>：带地面打钢/电/毒/火/岩；带妖精打龙/恶/格斗；带冰打龙/飞行/地面/草（\"冰封四杀\"）。</li><li><strong>双属性陷阱</strong>：草/地面（如土台龟）被冰系打成 <strong>2.56x</strong> 双倍克制——一发冰招秒杀；要避开这种\"四倍弱点\"组合。</li></ul><hr><p><strong>一句话总览</strong>：GO 相克 = 克制 1.6x / 抵抗 0.625x / 免疫 0.39x，双属性相乘（双克 2.56x、双抵 0.39x），本系招式额外 ×1.2 STAB；PvP 与 PvE 倍率已统一，差异在护盾、能量与 CP 上限的博弈层面。</p><hr><p>This is a knowledge question, not a coding task. I'll write the markdown directly.</p>"},{"title":"Pokemon GO IV 与 CP 计算完全指南","html":"<h2>一、核心概念：三个 IV + 物种基础值</h2><p>每只宝可梦有三项 IV（Individual Values，个体值），各自独立、范围 <strong>0–15</strong>：</p><ul><li><strong>攻击 IV（Attack）</strong></li><li><strong>防御 IV（Defense）</strong></li><li><strong>体力 IV（HP / Stamina）</strong></li></ul><p>它们叠加在该物种的<strong>基础属性（Base Stats）</strong>之上。最终参与战斗的有效数值为：</p><p>``<code> 有效攻击 = Base_Attack + IV_Attack 有效防御 = Base_Defense + IV_Defense 有效体力 = Base_Stamina + IV_Stamina </code>``</p><blockquote>关键：IV 的取值范围固定是 0–15，但物种之间 Base Stats 差异巨大。所以「+15 攻击 IV」对一只低基础攻击的宝可梦影响比例更大，对高基础攻击的影响比例更小。</blockquote><hr><h2>二、CP 公式与直觉</h2><p>CP（Combat Power，战斗力）是把三项有效属性揉成的<strong>一个标量</strong>，公式如下：</p><p>``` CP = floor( (Atk × Def^0.5 × Sta^0.5 × CPM^2) / 10 )</p><p>其中： Atk = Base_Attack  + IV_Attack Def = Base_Defense + IV_Defense Sta = Base_Stamina + IV_Stamina CPM = Combat Power Multiplier（由等级决定，1级≈0.094，40级≈0.7903，50级≈0.84029） ```</p><p>CP 下限为 10。</p><h3>直觉拆解</h3><ol><li><strong>攻击是线性权重（指数 1），防御和体力是平方根权重（指数 0.5）。</strong></li></ol><p>这意味着：在 CP 这个标量里，<strong>攻击「最贵」</strong>。攻击 +1 点，CP 涨得最多；防御 / 体力各 +1 点，因为开了根号，对 CP 的边际贡献小。</p><ol><li><strong>CPM 是等级的体现，且以平方进入公式。</strong></li></ol><p>同一只宝可梦，等级越高 CPM 越大，CP 越高。强化（喂糖 + 星尘）本质上就是在抬 CPM。</p><ol><li><strong>一句话理解 CP：</strong></li></ol><blockquote>CP 是「攻击权重最高的综合战力指标」，它把进攻、生存能力和等级压成一个数字，方便玩家直观比较。但正因为攻击权重最高，<strong>CP 高 ≠ 在限制联赛里强</strong>。</blockquote><hr><h2>三、为什么在 CP 上限联赛里「低攻击 IV 往往更优」</h2><p>PvP 的 <strong>GO Battle League</strong> 有 CP 上限：</p><ul><li><strong>超级联赛（Great League）：CP ≤ 1500</strong></li><li><strong>高级联赛（Ultra League）：CP ≤ 2500</strong></li><li><strong>大师联赛（Master League）：无上限</strong></li></ul><h3>核心机制：CP 上限把「攻击」换成了「防御 + 体力 + 等级」</h3><p>在有上限的联赛里，你不是在「最大化 CP」，而是在「<strong>CP 卡在上限以内的前提下，最大化实战属性总量 = 攻击 × 防御 × 体力（Stat Product，属性乘积）</strong>」。</p><p>回看公式：攻击在 CP 里权重最高（指数 1）。所以：</p><ul><li>如果一只宝可梦<strong>攻击 IV 很高</strong>，它会更快撞到 CP 上限，于是只能停在<strong>较低的等级</strong>（CPM 较低），导致防御和体力被压低。</li><li>如果一只宝可梦<strong>攻击 IV 很低</strong>，它「便宜」，可以爬到<strong>更高等级</strong>才撞到 CP 上限。更高的等级 = 更大的 CPM = <strong>防御和体力都被整体抬高</strong>。</li></ul><h3>用一个直觉模型说明</h3><p>``` 固定 CP ≈ 1500： 高攻 IV 的个体 → 停在 L20，攻击高一点，但防御/体力低 低攻 IV 的个体 → 爬到 L23，攻击低一点，但防御 + 体力 + 整体面板更高</p><p>PvP 里 → 多血多防 = 多扛伤害 = 多放招式 = 多积充能 = 通常赢 ```</p><p>PvP 是「回合制磨血 + 充能技博弈」，<strong>生存能力（体力 × 防御）= 能放更多招式 = 实际伤害输出更稳</strong>。而 CP 这个标量过度奖励了进攻面板，所以在限制联赛里，<strong>牺牲一点纸面攻击换取更高等级与更厚的防御血量，整体 Stat Product 反而更大</strong>——这就是「攻击 IV 越低（尤其防御/体力满）往往排名越靠前」的根本原因。</p><blockquote>注意是「往往」，不是绝对。有些对位需要攻击突破伤害阈值（damage breakpoint）一击带走对手，或抢先放招（move timing），此时高攻反而更优——见下一节「攻击向 IV」。</blockquote><h3>大师联赛例外</h3><p>Master League 无 CP 上限，无法靠低攻 IV 换等级（等级人人拉满 50）。此时 <strong>IV 越高越好，理想是 15/15/15</strong>，因为没有上限做「换算」，纯比谁面板大、谁满级。</p><hr><h2>四、PvP IV 评分：Rank 1 vs 攻击向</h2><p>PvPoke / 游戏内会给每个 IV 组合在某联赛下排一个名次（Rank）。两种常见的「最优」定义：</p><h3>1. Rank 1（Stat Product 最优 / 默认）</h3><ul><li>目标：在 CP 上限内<strong>最大化属性乘积（Atk × Def × Sta）</strong>。</li><li>特征：通常是<strong>攻击 IV 极低（常见 0 攻），防御与体力接近满</strong>。例如 <code>0/15/15</code>、<code>0/14/15</code> 这类。</li><li>适合：大多数「磨血型 / 坦克型」宝可梦，追求整体续航与综合强度。</li></ul><h3>2. 攻击向 IV（Attack-weighted / High-Attack）</h3><ul><li>目标：在 CP 上限内<strong>尽量保留高攻击</strong>，牺牲一点综合面板。</li><li>为什么需要：</li><li><strong>Breakpoint（伤害阈值）</strong>：攻击达到某临界值后，普攻 / 充能技对关键对手的伤害会跳一档（少打一下就能击杀）。</li><li><strong>CMP（Charged Move Priority，充能技先手判定）</strong>：两只同时放充能技时，<strong>有效攻击高的一方先放</strong>，可能直接决定对拼胜负（如对镜、对同速宝可梦）。</li><li>这类「先手抢节奏」「跨过伤害阈值」的场景，高攻 IV 价值超过多出来的那点血防。</li><li>特征：偏向 <code>15/x/x</code> 或高攻组合，PvPoke 里可切换到「Attack-weighted」排序查看。</li></ul><blockquote>实操结论：</blockquote><blockquote>- 大多数情况选 <strong>Rank 1 / 高 Stat Product</strong>（低攻、防血满）。</blockquote><blockquote>- 若该宝可梦的强势点在于「抢 CMP」或「卡 breakpoint」（PvPoke 的物种页会标注），优先<strong>攻击向 IV</strong>。</blockquote><hr><h2>五、如何找最优 IV：三套工具</h2><h3>1. PvPoke（pvpoke.com）—— 权威 PvP IV 排名</h3><ul><li>打开 <strong>Rankings</strong> 看某联赛的强势宝可梦榜。</li><li>进入某只宝可梦 → <strong>IV 列表</strong>：输入你的 IV，直接看它在该 CP 上限下的 <strong>Rank（名次）、对应等级、是否需要 XL 糖</strong>。</li><li>可切换排序：<strong>Default（Stat Product）</strong> vs <strong>Attack-weighted</strong>。</li><li>还能看 <strong>breakpoint / CMP 表</strong>，判断该不该走攻击向。</li></ul><h3>2. 游戏内「对战评分（PvP IV / Rank）」—— 最方便</h3><ul><li>在宝可梦详情页点 <strong>Appraise（评级）/ 属性</strong>，Niantic 已内置 <strong>GBL 三联赛的 PvP 排名提示</strong>：会告诉你这只在 Great / Ultra League 的最佳 IV 排名（第几名）以及要达到的等级。</li><li>优点：官方数据、零外部工具；缺点：信息没 PvPoke 全面（不细分攻击向 / breakpoint）。</li></ul><h3>3. CalcyIV（Android）/ 游戏内「评级」—— 快速扫 IV</h3><ul><li><strong>CalcyIV</strong>：截图自动算出 IV 范围、PvP rank、是否值得强化，适合<strong>批量筛仓库</strong>。</li><li><strong>游戏内 Appraise</strong>：教授对话给出三条横杠 + 星级，配合 PvP 排名提示做粗筛。</li><li>工作流建议：<strong>CalcyIV / 游戏内评级先粗筛 → PvPoke 精确定夺该不该练、练到几级、要不要 XL 糖。</strong></li></ul><hr><h2>六、等级、CPM、XL 糖与 50 级</h2><h3>等级与 CPM</h3><ul><li>等级从 <strong>1 → 40</strong>（普通糖 + 星尘），再 <strong>40 → 50</strong> 需要 <strong>XL 糖（XL Candy）+ 星尘</strong>。</li><li>CPM 随等级单调递增：<code>L40 ≈ 0.7903</code>，<code>L50 ≈ 0.84029</code>。等级每半级一档。</li></ul><h3>XL 糖（XL Candy）</h3><ul><li>是把宝可梦从 <strong>L40 推到 L50</strong> 的专用资源（每物种独立），获取慢（捕捉 / 孵蛋 / 行走伙伴 / 普通糖兑换等）。</li><li><strong>何时需要 XL 糖？</strong></li><li><strong>大师联赛</strong>：几乎必须拉满 L50，所以 XL 糖刚需。</li><li><strong>超级 / 高级联赛</strong>：取决于物种基础值。<strong>低基础攻击的物种</strong>可以爬到很高等级才撞上限——有些甚至需要 L50 + XL 糖才能在 1500/2500 内顶满 Stat Product。PvPoke 会直接标注「需要多少 XL 糖、目标等级是多少」。</li></ul><h3>强化等级目标如何「卡」</h3><p><strong>绝对不要无脑一路强化</strong>——会冲破 CP 上限或浪费资源。正确流程：</p><ol><li><strong>先在 PvPoke / 游戏内查目标等级</strong>：对你的具体 IV，算出在该联赛 CP 上限内的<strong>最高可达等级</strong>（即 CP 正好不超过 1500 / 2500 的那一级）。</li><li><strong>逐级强化并盯住 CP</strong>：每点一次强化前，预览 CP；一旦下一级会超过上限，就<strong>停在当前级</strong>。游戏会显示强化后的 CP，便于精确卡线。</li><li><strong>量力评估 XL 糖成本</strong>：若目标等级 &gt; 40，确认手头 XL 糖够；不够就先停在 L40 附近的可达级，后续补糖再推。</li><li><strong>Master League 直接拉满 L50</strong>（IV 越接近 15/15/15 越好，且需大量 XL 糖）。</li></ol><blockquote>一句话：<strong>限制联赛卡「CP 不超上限的最高等级」，大师联赛卡「满级 50」。</strong> 用 PvPoke / 游戏内 PvP 排名提示拿到「目标等级 + 需不需要 XL 糖」，再在游戏里逐级预览 CP 精确停手。</blockquote><hr><h2>七、速查总结</h2><table><thead><tr><th>场景</th><th>IV 偏好</th><th>等级目标</th><th>工具</th></tr></thead><tbody><tr><td>超级联赛 1500</td><td>低攻、防血满（Rank1）；特例走攻击向</td><td>CP 不超 1500 的最高级（可能需 XL）</td><td>PvPoke + 游戏内 PvP 排名</td></tr><tr><td>高级联赛 2500</td><td>低攻、防血满；特例攻击向</td><td>CP 不超 2500 的最高级（常需 XL）</td><td>PvPoke + 游戏内 PvP 排名</td></tr><tr><td>大师联赛 无上限</td><td>越高越好，理想 15/15/15</td><td>拉满 L50（需大量 XL 糖）</td><td>游戏内 / CalcyIV</td></tr><tr><td>PvE / Raid 输出</td><td><strong>攻击 IV 越高越好</strong>（无上限，纯比输出）</td><td>越高越好</td><td>CalcyIV / 游戏内评级</td></tr></tbody></table><p><strong>最易记的三条原则：</strong></p><ol><li>CP 公式里<strong>攻击最贵</strong>（指数 1），防/血开根号（指数 0.5）→ 高攻容易顶满 CP 但实战未必强。</li><li>限制联赛要的是 <strong>Stat Product 最大</strong>，所以<strong>低攻 IV 换更高等级、更厚防血</strong>通常更优；但 <strong>CMP 抢先手 / breakpoint 卡伤害</strong>时反选攻击向。</li><li><strong>限制联赛卡上限内最高等级，大师联赛卡满级 50</strong>；用 <strong>PvPoke / 游戏内 PvP 排名</strong>定目标等级与 XL 糖需求，强化时逐级预览 CP 精确停手。</li></ol><hr><p>This is a self-contained writing task. No tools needed.</p>"},{"title":"Pokemon GO PvP 实战决策完全指南","html":"<p>PvP（Trainer Battles，训练家对战）的胜负，往往不取决于阵容强弱，而取决于一连串瞬时决策的累积。下面把核心机制和实战决策逐项拆解。</p><hr><h2>一、护盾机制（Shields）</h2><p>每场对战双方<strong>各持 2 个护盾</strong>，护盾可以完全免疫一次充能技能（Charged Move，俗称\"大招\"）的伤害，无论那一招打多少伤害。这是 PvP 中最大的不对称资源。</p><p>护盾的关键性质：</p><ul><li><strong>护盾抵消的是伤害，不是技能本身</strong>。被盾挡的大招仍然会触发其附带的属性变化效果（attack/defense 的 buff/debuff），比如冰雾鸟的暴风雪虽然被挡住伤害，但若是带 debuff 的招式，效果照样生效。</li><li>护盾不能抵消快攻（Fast Move）伤害。</li><li>护盾数量是公开信息——你和对手都能看到双方剩余几个盾。这让护盾博弈成为<strong>完全信息下的心理战</strong>。</li></ul><p>护盾的价值评估法则：<strong>1 个护盾 ≈ 一次大招的伤害量</strong>。在 1500 联盟（Great League）里，一个护盾的\"价值\"经常等同于 35–60% 的血量。因此护盾用得好不好，常常直接决定整场。</p><hr><h2>二、何时开盾 / 何时硬吃（Shield vs. Tank）</h2><p>这是 PvP 最高频的决策点。核心问题：<strong>这一发大招，挡还是不挡？</strong></p><h3>应该开盾的情况</h3><ol><li><strong>大招会直接击杀或打到残血</strong>：你的精灵如果吃下这招就死，而它后续还有输出价值（比如已经攒到大招、或是关键克制位），那就开盾保命。</li><li><strong>对手是高伤害、慢周期的招式</strong>（如冲浪、暴风雪、十万伏特这类高能量招）：挡掉它等于让对手白攒了大量能量，能量收益巨大。</li><li><strong>诱盾失败你必须接的真招</strong>：当对手已经放过一次小招诱你（你没上当），紧接着的大招往往是真威胁，要果断挡。</li></ol><h3>应该硬吃的情况</h3><ol><li><strong>低伤害的诱盾招式</strong>（bait move，如蜻蜓的虫鸣、低能量招）：吃下去掉的血不多，省下护盾应对后面的真威胁。</li><li><strong>你这只精灵本来就要弃/血量已经不重要</strong>：让它当肉盾吸招，把盾留给后面的主力。</li><li><strong>你能在对手放招前先一步反杀</strong>（CMP 或能量领先）：根本不需要盾。</li><li><strong>对手大招打你是抵抗属性（resisted）</strong>：被抵抗后伤害减半甚至更低，硬吃完全可接受。</li></ol><p>实战心法：<strong>护盾是用来\"赢交换\"的，不是用来\"不掉血\"的</strong>。每次开盾前问自己——挡这一发，是不是这两个盾里性价比最高的用法？</p><hr><h2>三、诱盾（Baiting）与放空大招</h2><p><strong>诱盾</strong>是指故意放一个低能量、低伤害的充能技能，骗对手开盾，从而为后面的高伤害大招清空护盾。</p><p>典型操作：很多强力精灵带<strong>一快一慢两个大招</strong>——</p><ul><li><strong>快招（bait move）</strong>：能量需求低（35 能量级），用来诱盾。</li><li><strong>慢招（nuke move）</strong>：能量需求高（55–70 能量级），高伤害，是真正的杀招。</li></ul><p>诱盾流程：</p><ol><li>攒满低能量招 → 放出 → 对手若开盾，你\"骗到\"一个盾。</li><li>继续攒 → 放高能量真招 → 对手已无盾或不舍得开 → 打满伤害。</li></ol><p><strong>反诱盾（不上当 / 放空）</strong>：</p><ul><li>如果你判断对手放的是诱盾小招，<strong>故意不开盾硬吃</strong>，逼对手在你满血时浪费掉一个大招（\"放空\"），打乱他的能量节奏。</li><li>风险：判断错了（对方放的其实是真招），你就白白吃了大伤害。这是诱盾博弈的核心赌点。</li></ul><p>进阶：<strong>Double bait / 连续诱盾</strong>——连放两个小招，赌对手两个盾都交出去。也有 <strong>\"无盾诱\"</strong>——当双方都没盾时，诱盾招式失去意义，此时只看纯伤害与能量。</p><hr><h2>四、CMP（Charged Move Priority，充能技能优先级）</h2><p>当<strong>双方在同一回合同时放出大招</strong>时，由 <strong>CMP 规则</strong>决定谁先结算：</p><blockquote><strong>当前攻击力（Attack stat）数值更高的一方，大招先生效。</strong></blockquote><p>为什么这至关重要：在镜像对战或互相残血的局面，<strong>先放出的大招可能直接击杀对手</strong>，让对手的大招打在已经倒下的精灵上（即便对手也按了大招，也不会生效）。这就是所谓的\"<strong>CMP 抢杀</strong>\"。</p><p>CMP 的实战含义：</p><ul><li><strong>CP 接近时，attack IV 更高 / 等级微高的一方赢 CMP</strong>。这就是为什么很多顶级 PvP 玩家追求<strong>特定 IV</strong>——不只是为了血厚，有时是为了<strong>卡 CMP 阈值</strong>赢下镜像。</li><li>如果 attack 完全相等（如同物种同 IV），结果<strong>随机</strong>。</li><li>谋求 CMP 优势：选阵容时，针对常见镜像位刻意养一只 attack 略高的版本。</li></ul><p>实战决策：当你预判要和对手\"对拼大招\"时，先想清楚自己是否赢 CMP。<strong>输 CMP 就别去对拼</strong>——改为先开盾或换将，避免被抢杀。</p><hr><h2>五、快攻能量计算与对轴 / 抢轴</h2><h3>快攻（Fast Move）的三个参数</h3><p>每个快攻有：<strong>伤害（Damage）</strong>、<strong>能量获取（Energy Gain）</strong>、<strong>持续回合数（Turns）</strong>。PvP 的时间以\"回合\"为单位，<strong>1 回合 = 0.5 秒</strong>。</p><p>关键比值：</p><ul><li><strong>EPT（Energy Per Turn，每回合能量）</strong> = 能量 / 回合数 → 决定攒大招的速度。</li><li><strong>DPT（Damage Per Turn，每回合伤害）</strong> = 伤害 / 回合数 → 决定快攻本身的输出。</li></ul><p>不同快攻\"回合数\"不同（1、2、3、4 回合都有），这导致一个核心机制——<strong>对轴 / 抢轴</strong>。</p><h3>对轴与抢轴（Timing / Fast Move Alignment）</h3><p>由于快攻持续回合不同，双方放大招的时机会出现<strong>时间差</strong>。</p><ul><li><strong>抢轴</strong>：用更短回合的快攻 + 更快的能量积累，<strong>抢在对手放大招之前先放出自己的大招</strong>。在残血对拼时，抢轴 = 抢杀。</li><li><strong>对轴</strong>：理解自己快攻的\"节拍\"，计算精确到回合的攒招时间，预判对手第几回合能放大招，从而决定自己该硬吃、开盾还是换将。</li></ul><p>实战例子：2 回合快攻 vs 4 回合快攻，前者节奏快一倍，在能量赛跑中通常占优。<strong>短回合快攻在抢轴上天然有优势</strong>，这也是评价一只 PvP 精灵强度的重要维度（光看大招不够，要看快攻 EPT/DPT 和回合数）。</p><p>进阶细节：放大招时存在\"<strong>fast move timing window</strong>\"，在快攻动画结算的特定窗口插入大招，可以\"偷\"到额外一次快攻伤害（俗称\"卡快攻\"），高手会刻意利用。</p><hr><h2>六、何时换将（Switching）</h2><p>换将是把当前出战精灵收回、换上后备的操作。它是 PvP 第二大战略资源（仅次于护盾）。</p><p>应该换将的时机：</p><ol><li><strong>当前对位吃亏</strong>：你的精灵被对手强力克制，留着只会被白打，换上克制对手的精灵翻盘。</li><li><strong>对手即将放出致命大招</strong>：在对手大招砸下来之前换将，让上来的精灵去吃（或它能抵抗这一招）。</li><li><strong>逼出对手的关键精灵后反制</strong>：把对手的核心精灵骗出来，再换上专门克它的角色。</li><li><strong>保护残血核心</strong>：把血量吃紧但关键的精灵收回保命，留作后手。</li></ol><p>不该换将的时机：</p><ul><li>你正赢着对位、能量领先时，<strong>不要主动让出节奏</strong>。</li><li>你已经被对手换将\"卡\"住（见下节），盲目跟换只会更被动。</li></ul><hr><h2>七、换将的能量惩罚与诱导对手换将</h2><h3>换将的\"时间惩罚\"</h3><p>每次换将后，<strong>新上场的精灵会进入约 1 秒的硬直</strong>——这段时间内对手可以自由输出而你无法行动。这就是换将的隐性成本（注意：这是出场时间惩罚，并非扣除已攒能量；精灵自身的能量是保留的）。频繁换将会被对手用这段窗口持续白嫖伤害。</p><p>更重要的是 <strong>\"换将计时器（switch clock）\"</strong>：换将后<strong>有约 60 秒不能再次换将</strong>（被锁住）。所以换将是<strong>一次性的宝贵资源</strong>——一旦你换了，在计时器冷却前你就被\"锁\"在场上了。</p><h3>谁先换将谁吃亏（Switch Advantage）</h3><p>PvP 高端局有个铁律：<strong>先换将的一方通常处于劣势</strong>。原因：</p><ul><li>先换的人暴露了自己的后手，且锁住了自己的换将计时器。</li><li>后换的人掌握信息优势，可以<strong>针对性换上克制位</strong>，形成\"换将压制\"。</li></ul><h3>诱导对手先换（Shimmy / 逼换）</h3><p>高手会主动<strong>制造对位压力逼对手先换将</strong>：</p><ul><li>用一只能克制对手大半阵容的精灵当先锋，逼对手\"先换\"来解。</li><li>一旦对手先换，你就能后发制人，换上更精准的克制位，并且你的换将计时器还是好的。</li><li>这种\"<strong>晃（shimmy）</strong>\"——通过对位威胁逼对手交资源——是 PvP 的核心博弈。</li></ul><hr><h2>八、Lead / Safe Swap / Closer 三段式战术</h2><p>成熟的 3v3 阵容构建遵循<strong>三角色分工</strong>：</p><h3>1. Lead（先锋）</h3><p>开场出战的精灵。</p><ul><li>要求：<strong>对位广、不吃大亏</strong>，能在开局对线中稳住或占优。</li><li>通常是阵容里对线最稳、最\"无脑\"的一只。</li><li>Lead 的对决往往决定<strong>谁被迫先换将</strong>——赢 lead 战 = 抢到换将主动权。</li></ul><h3>2. Safe Swap（安全替补 / 中坚）</h3><p>第一个换上去的精灵，承担\"救火\"和\"建立优势\"的双重角色。</p><ul><li>要求：<strong>抗性好、对位面广、能安全上场</strong>——即不怕被针对，换上来不会立刻被克。</li><li>它的使命是在 lead 吃亏或需要应对时<strong>安全地接管战局</strong>，所以叫 \"safe\" swap。</li><li>选 safe swap 优先看<strong>抵抗属性和泛用性</strong>，而非极限输出。</li></ul><h3>3. Closer（收尾 / 后保）</h3><p>留到最后的精灵，负责终结对局。</p><ul><li>要求：<strong>能量管理强、能在残局清场</strong>，最好自带高伤害大招或克制大量主流收尾位。</li><li>它通常被<strong>藏到最后</strong>，避免过早暴露被针对。</li><li>残局（双方资源耗尽）时，closer 的对位和能量储备决定胜负。</li></ul><p>三者配合：<strong>Lead 抢主动 → Safe Swap 稳局/翻盘 → Closer 收尾</strong>。阵容强不强，看的是这三个位置能否覆盖当前环境的主流威胁，并在护盾/换将资源消耗后仍有解。</p><hr><h2>九、ABB 与 ABA 能量管理</h2><p>这是针对<strong>带双大招精灵</strong>的高级出招序列管理。设 <strong>A = 低能量招（bait/快招）</strong>，<strong>B = 高能量招（nuke/慢招）</strong>。</p><h3>ABB 模式</h3><p>序列：先放一个 A，再连放两个 B。</p><ul><li>逻辑：用第一个 <strong>A 诱盾</strong>，骗掉对手一个盾；之后攒能量连放 <strong>两个 B</strong> 打高伤害。</li><li>适用：对手护盾充足、你需要先清盾再爆发的场合。</li><li>风险：B 能量需求高，连放两个 B 之间有较长攒招期，节奏慢。</li></ul><h3>ABA 模式</h3><p>序列：A → B → A 交替。</p><ul><li>逻辑：<strong>A 诱盾 / 卡节奏，B 打伤害，再用 A 续压</strong>，保持持续的大招压制频率。</li><li>适用：需要<strong>高频率施压、持续逼盾</strong>的场合；A 能量低、回招快，能让你更频繁地丢出大招制造决策压力。</li><li>优点：施压节奏快，逼对手不断做开盾决策，容易诱使失误。</li></ul><h3>选择逻辑</h3><ul><li><strong>要爆发清盾 → 偏 ABB</strong>（牺牲频率换单次高伤）。</li><li><strong>要持续压制 / 诱盾 → 偏 ABA</strong>（牺牲单发伤害换施压频率）。</li><li>实战中并非死记序列，而是<strong>根据对手剩余护盾数、双方能量、对位关系动态决定下一发放 A 还是 B</strong>。核心始终是：<strong>用低能量招管理护盾博弈，用高能量招在对手无盾时打出最大化伤害</strong>。</li></ul><hr><h2>决策优先级速记</h2><p>实战中每一刻的思考顺序：</p><ol><li><strong>能量</strong> —— 谁能先放大招？我赢不赢抢轴 / CMP？</li><li><strong>护盾</strong> —— 双方各剩几个？这发该挡还是该吃？是真招还是诱盾？</li><li><strong>对位</strong> —— 当前克制关系如何？要不要换将？换将计时器好了吗？</li><li><strong>资源账</strong> —— 算总账：护盾 + 换将 + 能量，三种资源谁消耗得更划算，谁就赢。</li></ol><p>PvP 的本质是<strong>资源交换效率</strong>的较量：在护盾、换将、能量三大资源上，每一次交换都要力求\"我亏得比你少\"。把上面每个机制都内化成条件反射，胜率自然提升。</p><hr><p>This is a research/writing task about Pokemon GO PvP mechanics. I'll write the markdown directly from my knowledge.</p>"},{"title":"Pokémon GO PvP 招式特殊效果与机制全解","html":"<p>本文聚焦 PvP（对战联盟 / Trainer Battle）环境下那些\"阴人\"、有附带效果或容易被忽视的招式与机制。所有数值以 PvP（对战）数据为准，与 PvE（道馆/团战）不同。</p><hr><h2>一、会改变属性等级（Stat Stage）的大招</h2><p>PvP 里属性变化用 <strong>stage（等级）</strong> 表示，范围 -4 到 +4，每一级是固定的乘数表（攻击/防御各自独立）。常见乘数（近似）：</p><table><thead><tr><th>Stage</th><th>倍率</th></tr></thead><tbody><tr><td>+4</td><td>2.0x</td></tr><tr><td>+2</td><td>1.6x</td></tr><tr><td>+1</td><td>1.33x</td></tr><tr><td>0</td><td>1.0x</td></tr><tr><td>-1</td><td>0.75x</td></tr><tr><td>-2</td><td>0.625x</td></tr><tr><td>-4</td><td>0.5x</td></tr></tbody></table><p>关键点：<strong>stat change 在对方切换宝可梦（switch）后会重置</strong>，但在同一只宝可梦留场期间会持续叠加。这就是\"叠 buff 怪\"的核心逻辑。</p><h3>1. 升自身攻击（进攻型 buff）</h3><table><thead><tr><th>招式</th><th>效果</th><th>典型使用者</th><th>备注</th></tr></thead><tbody><tr><td><strong>Power-Up Punch</strong></td><td>100% 概率自身攻击 +1</td><td>Lucario、Machamp、Toxicroak</td><td>低能量（约 35 能量）高频，专门用来叠攻，越打越疼，经典\"滚雪球\"招</td></tr><tr><td><strong>Trailblaze</strong>（草系新招）</td><td>100% 自身攻击 +1</td><td>草系如 Meowscarada、Cherrim</td><td>类似 PuP 的草系版本，低能量叠攻</td></tr><tr><td><strong>Fell Stinger</strong></td><td>命中后自身攻击 <strong>+2</strong>（曾经是 +3，被削）</td><td>虫系如 Beedrill、Vespiquen</td><td>单次拉两级，爆发型叠攻</td></tr><tr><td><strong>Ancient Power / Silver Wind / Ominous Wind / Charge Beam</strong></td><td>概率（约 10–50%）自身攻防同时 +1</td><td>各杂项</td><td>概率型，不稳定但赚到就是赚到</td></tr></tbody></table><h3>2. 降对手防御（破防型）</h3><table><thead><tr><th>招式</th><th>效果</th><th>典型使用者</th><th>备注</th></tr></thead><tbody><tr><td><strong>Acid Spray</strong></td><td>100% 对手防御 <strong>-2</strong>（大降）</td><td>Nidoqueen、Drapion、Toxicroak、Overqwil</td><td>超低能量、低伤的\"开锁\"招，专门给后续大招放大伤害，配双大招怪极强</td></tr><tr><td><strong>Shadow Ball / Crunch / Lunge / Bubble Beam / Brutal Swing</strong></td><td>约 <strong>30% 概率</strong> 对手防御 -1</td><td>Mewtwo、Tyranitar、Gyarados 等</td><td>概率破防，运气好能滚雪球，但不可依赖</td></tr><tr><td><strong>Liquidation / Rock Tomb / Glaciate</strong> 等</td><td>概率/确定降对手防或速（PvP 里速无意义，只看攻防）</td><td>各种</td><td>—</td></tr></tbody></table><h3>3. 降对手攻击（防守/控制型）</h3><table><thead><tr><th>招式</th><th>效果</th><th>典型使用者</th><th>备注</th></tr></thead><tbody><tr><td><strong>Icy Wind / Mud-Slap(快攻不算)/ Bubble Beam</strong></td><td>概率或确定降对手攻击</td><td>Lapras、各冰系</td><td>削弱对手输出，拖后期</td></tr><tr><td><strong>Aurora Beam / Mud Bomb / Psychic</strong> 等</td><td>概率对手攻击 -1</td><td>各杂项</td><td>—</td></tr><tr><td><strong>Lunge / Play Rough / Moonblast / Draco Meteor / Overheat</strong></td><td>见下\"自降\"，部分降对手攻</td><td>—</td><td>—</td></tr></tbody></table><h3>4. 降自身属性（高伤换代价）—— \"一炮流\"</h3><p>这类招伤害极高但会自废属性，<strong>适合作为收尾/换血</strong>，不适合留场硬刚：</p><table><thead><tr><th>招式</th><th>效果</th><th>典型使用者</th></tr></thead><tbody><tr><td><strong>Superpower</strong></td><td>高伤，自身 <strong>攻 -1、防 -1</strong></td><td>Conkeldurr、Heracross、Buzzwole</td></tr><tr><td><strong>Wild Charge</strong></td><td>高伤，自身 <strong>防 -2</strong></td><td>Zekrom、Magnezone、Raikou</td></tr><tr><td><strong>Close Combat</strong></td><td>高伤，自身 <strong>防 -2</strong></td><td>Lucario、Machamp、Conkeldurr、Terrakion</td></tr><tr><td><strong>Overheat / Draco Meteor / Leaf Storm / Psycho Boost</strong></td><td>极高伤，自身 <strong>攻 -2</strong></td><td>Charizard、Dragonite/Salamence、Roserade、Deoxys</td></tr><tr><td><strong>V-create</strong></td><td>极高伤，自身 <strong>攻/防/速 -1</strong></td><td>Victini</td></tr><tr><td><strong>Make It Rain</strong></td><td>高伤，自身 <strong>攻 -1</strong></td><td>Gholdengo</td></tr></tbody></table><blockquote>实战提醒：放完 Overheat / Draco Meteor 后这只宝可梦后续大招会软很多，老手会在你放完一发后立刻换上克制怪硬吃你\"残废\"状态。</blockquote><hr><h2>二、能量曲线：高能量低伤 vs 低能量高频</h2><p>PvP 大招按\"每点能量造成的伤害（DPE, Damage Per Energy）\"和\"能量门槛\"区分两种风格：</p><ul><li><strong>高能量、高 DPE（爆发型）</strong>：如 <strong>Sky Attack(45)</strong>、<strong>Wild Charge(45)</strong>、<strong>Crunch(45)</strong>、<strong>Earthquake(65)</strong>、<strong>Hydro Cannon(40, 极高DPE)</strong>。攒得慢、一发肉疼，常用于打盾/收尾。</li><li><strong>低能量、低 DPE（高频骗盾型）</strong>：如 <strong>Body Slam(35)</strong>、<strong>Power-Up Punch(35)</strong>、<strong>Acid Spray(45但低伤)</strong>、<strong>Aqua Tail(35)</strong>、<strong>Ice Punch(40)</strong>。攒得快、用来<strong>逼对手开盾（baiting shields）</strong>。</li></ul><p><strong>Bait（骗盾）核心战术</strong>：先用低能量大招逼对手交盾，再用高能量大招打脸。理想配招是 <strong>一个低能量招 + 一个高能量招</strong>（如 Swampert 的 Hydro Cannon + Earthquake；Lucario 的 Power-Up Punch + Aura Sphere）。</p><p><strong>Hydro Cannon / Frenzy Plant / Blast Burn</strong>（御三家社区日招）是 PvP 神招：能量低（约 40）且 DPE 高，等于\"又便宜又疼\"，几乎打破了 bait 的取舍，是很多 meta 怪的核心。</p><hr><h2>三、快攻（Fast Move）的能量与伤害权衡</h2><p>快攻分两条路线，选哪条决定整只怪的对战风格：</p><ul><li><strong>高能量快攻（充能型）</strong>：每回合产能高但伤害低。代表 <strong>Counter、Mud Shot、Thunder Shootp/Volt Switch、Dragon Breath、Lock On、Charm（高伤特例）、Psywave、Incinerate(慢但高产能)</strong>。目标是尽快放大招，靠大招输出。</li><li><strong>Lock On</strong>：伤害几乎为 0，但能量产出爆炸，专门给 Magnezone/Registeel 这种\"快速攒大招\"流派。</li><li><strong>Mud Shot</strong>：超快、产能高、伤害低 —— Swampert、Whiscash 的灵魂。</li><li><strong>高伤快攻（DPT 型）</strong>：快攻本身伤害高，但产能一般。代表 <strong>Dragon Tail、Fire Fang、Razor Leaf、Snarl、Mud-Slap(还降攻)、Confusion、Charm</strong>。靠快攻本身磨血，不太依赖大招。</li><li><strong>Charm</strong>：高伤 + 妖系，但产能极低，纯靠快攻砸脸（妖系克龙），是著名的\"龙杀手\"。</li></ul><p>权衡口诀：<strong>想靠大招爆发 → 选高能量快攻；想靠快攻磨血、不轻易给盾价值 → 选高伤快攻。</strong> 评价快攻看 <strong>DPT（每回合伤害）</strong> 和 <strong>EPT（每回合能量）</strong> 两个数。</p><hr><h2>四、影子宝可梦（Shadow）在 PvP</h2><ul><li>影子宝可梦：<strong>攻击 ×1.2，防御 ×0.83</strong>（约）。净效果是<strong>更高输出、更脆</strong>。</li><li>PvP 里通常是<strong>正收益</strong>：因为对战看的是\"换血效率\"，更高攻击意味着更快放出更疼的大招、更快滚雪球；防御降低的损失常被进攻收益盖过。</li><li>典型强力影子：<strong>Shadow Machamp、Shadow Swampert、Shadow Gyarados、Shadow Victreebel、Shadow Alolan Sandslash、Shadow Snorlax</strong>。</li><li>例外：以<strong>坦/续航</strong>为定位的怪（如某些 wall）影子化可能得不偿失。</li><li><strong>Frustration（郁闷）</strong> 是影子专属垃圾大招，必须用 TM 移除事件清掉，否则等于只有一个大招槽。</li></ul><hr><h2>五、Mega / Primal 进化在 PvP <strong>不可用</strong></h2><ul><li><strong>Mega 进化与 Primal 进化目前不能用于 Trainer Battle（PvP）</strong>，只能用于道馆、团体战、Max 战等 PvE 内容。</li><li>原因是平衡性：Mega 的属性增幅太大，会破坏 PvP 联盟（Great/Ultra/Master League）的 CP 与平衡体系。</li><li>因此构筑 PvP 队伍时<strong>不要把 Mega 算进去</strong>；同一只怪的 Mega 形态强度不影响它在 PvP 的表现，看的是其普通形态。</li><li>（注：<strong>Dynamax / Gigantamax</strong> 同样不参与传统 PvP 联盟，只在 Max 战相关玩法里。）</li></ul><hr><h2>六、容易被忽视的机制：\"多段/连续\"与隐藏判定</h2><h3>1. 大招是<strong>单次结算</strong>，没有真正的\"连击多段\"</h3><p>PvO 主系列里 Bullet Seed/Fury Swipes 是多段，但 <strong>Pokémon GO PvP 把所有大招都做成一次性伤害</strong>，没有多段判定。容易误以为\"连续段\"——实际不存在。真正要注意的是：</p><h3>2. 快攻的\"回合长度（turns）\"差异（最易被忽视）</h3><p>快攻有不同的<strong>持续回合数（1–4 回合 / 0.5s 一回合）</strong>。这是 PvP 节奏的隐藏核心：</p><ul><li><strong>单回合快攻</strong>（如 Lock On、Mud Shot、Counter 多为 2 回合）vs <strong>多回合快攻</strong>（Dragon Tail、Razor Leaf 等占 2–3 回合）。</li><li>回合数决定<strong>何时能插入大招</strong>与<strong>CMP（见下）判定时机</strong>，也决定\"throw priority\"。慢快攻在对拼时可能慢半拍。</li></ul><h3>3. CMP（Charge Move Priority）—— 同回合双方都要放大招时</h3><p>当两边在同一回合都要放大招，<strong>攻击力（Attack 数值）高的一方先放</strong>，先放的那一发可能直接 KO 对手、让对手大招打空。这叫 <strong>CMP tie</strong>。所以高 IV 攻击、影子化、叠了攻击 buff 的一方在 CMP 对拼里占优——这是\"阴人\"细节。</p><h3>4. 盾的判定与\"骗盾\"</h3><ul><li>每只队伍开局有 <strong>2 个盾</strong>，护盾<strong>完全免疫该次大招伤害</strong>（不管多疼），但<strong>不挡属性变化效果</strong>（例如挡了 Acid Spray 的伤害，但对手防御该降还是降？——实际上盾只挡伤害，stat debuff 仍然生效，所以 Acid Spray 即使被盾挡也成功破防，极其阴）。</li><li>这使得 <strong>Acid Spray、Power-Up Punch</strong> 这类\"低伤+效果\"招<strong>骗盾价值为负</strong>：对手通常<strong>不会</strong>为它们开盾，于是 buff/debuff 白嫖。</li></ul><h3>5. 快攻能量在切换时的处理</h3><ul><li><strong>大招已攒的能量在切换宝可梦后保留</strong>（每只怪独立记能量），所以\"养能量再换回来一炮\"是合法战术。</li><li>但 <strong>stat stage（buff/debuff）在切换后清零</strong>，叠 buff 怪一旦被逼下场，前面叠的攻击 buff 全没——这是叠攻流的致命弱点。</li></ul><hr><h2>七、当前 Meta 最常见的\"阴人招\"与应对</h2><table><thead><tr><th>阴人招 / 机制</th><th>代表怪</th><th>为什么阴</th><th>应对</th></tr></thead><tbody><tr><td><strong>Acid Spray 破防</strong></td><td>Nidoqueen、Overqwil、Drapion、Toxicroak</td><td>盾挡不住 debuff，越往后你越脆，配第二个大招直接打爆</td><td>别在它叠到 -2/-4 后硬留；尽早<strong>换人重置</strong>你的防御 debuff</td></tr><tr><td><strong>Power-Up Punch / Trailblaze 叠攻</strong></td><td>Lucario、Toxicroak、Meowscarada</td><td>不值得开盾，放任它越打越疼，滚雪球</td><td><strong>逼它下场重置 buff</strong>；或在它叠 1–2 层时就换克制怪硬换</td></tr><tr><td><strong>Hydro Cannon / 御三家社日招</strong></td><td>Swampert、Blastoise、Sceptile、Charizard</td><td>低能量+高伤，bait 与爆发兼得，没有取舍</td><td>留盾给它的\"便宜大招\"，预判节奏挡关键一发</td></tr><tr><td><strong>Charm 快攻</strong></td><td>Alolan Ninetales、Granbull、Togekiss</td><td>妖系高伤快攻，纯磨血克龙，几乎不靠大招也能赢</td><td>别用龙系硬上；用钢/毒/火系换</td></tr><tr><td><strong>Wild Charge / Close Combat 自降防一炮</strong></td><td>Zekrom、Lucario、Machamp</td><td>一发巨疼但放完自己变脆</td><td><strong>吃下这发后立刻换</strong>克制怪，趁它防御 -2 反打</td></tr><tr><td><strong>CMP 抢手</strong></td><td>高攻/影子怪</td><td>同回合对拼时它先放、你大招打空</td><td>注意自己 IV 攻击与是否影子；必要时错开放招时机或先开盾</td></tr><tr><td><strong>概率破防（Crunch/Shadow Ball 30%）</strong></td><td>Tyranitar、Mewtwo、Gyarados</td><td>运气好就滚雪球</td><td>当作正常大招对待，运气债没法防，重点别让它白叠</td></tr><tr><td><strong>Frustration 没清</strong></td><td>任意影子怪</td><td>等于只有一个有效大招，无法 bait</td><td>自己构筑时务必用 TM 清掉 Frustration</td></tr></tbody></table><hr><h2>八、构筑与实战要点速记</h2><ol><li><strong>理想大招配置 = 一个低能量(骗盾) + 一个高能量(打脸)</strong>；御三家社日招(Hydro Cannon 等)是少数\"既便宜又疼\"的破例神招。</li><li><strong>debuff 招（尤其 Acid Spray）盾挡不住效果</strong>，对手一般不交盾，破防几乎必中——这是当前最值钱的\"阴\"。</li><li><strong>buff/debuff 切人即清零</strong>，对付叠攻怪就是逼它下场；保护自己叠攻怪别被逼换。</li><li><strong>自降招（Overheat/Close Combat/Wild Charge）放完即虚</strong>，老手会\"诱使你放完再换克制\"。</li><li><strong>Mega/Primal/Dynamax 不进 PvP</strong>，构筑只看普通形态。</li><li><strong>影子化通常是 PvP 正收益</strong>（攻+20%/防-17%），换血流的最爱；坦克定位除外。</li><li><strong>CMP 看攻击数值</strong>，高攻/影子/叠攻方在同回合对拼里先手。</li><li><strong>快攻选型</strong>：要爆发用高能量快攻(Lock On/Mud Shot/Counter)，要磨血用高伤快攻(Charm/Dragon Tail/Razor Leaf)。</li></ol><blockquote>数据提示：本文为机制与 meta 框架说明，具体招式能量/伤害数值会随 Niantic 平衡补丁调整，实战前建议用 PvPoke 或 GO Stadium 等工具核对当季最新数值与排名。</blockquote><hr>"},{"title":"GBL 对战联盟 奖励机制","html":"<h1>GBL 对战联盟 奖励机制</h1><blockquote>对应当前 <strong>Season 27「Forever Forward」</strong>（2026/6/2–9/8）。具体奖励随赛季调整，以游戏内为准。</blockquote><h2>一、段位系统（Rank 1–24）</h2><ul><li><strong>Rank 1–20</strong>：靠<strong>胜场数</strong>升级——打就有进度，<strong>赢得快、输也算一点</strong>，所以多打必上。</li><li><strong>Rank 21–24</strong>：靠<strong>评分（Rating）</strong>，要真打赢高分对手才升（Ace→Veteran→Expert→Legend）。</li><li><strong>每赛季重置</strong>回 Rank 1，重新爬。</li></ul><h2>二、每日对战</h2><ul><li>每天最多 <strong>10 组 × 5 场 = 50 场</strong>。</li><li>想拿满奖励，每天尽量<strong>打够有星尘加成的那几组</strong>。</li></ul><h2>三、奖励来源</h2><ol><li><strong>单场胜利</strong>：有几率掉<strong>星尘 / 道具 / 宝可梦遭遇</strong>。</li><li><strong>每组结算</strong>：按这一组的<strong>战绩</strong>给奖励（赢越多给越多）。</li><li><strong>遭遇奖励</strong>：每组首胜等节点触发宝可梦遭遇；<strong>升到 Rank 20 后</strong>，可遇到当前<strong>五星团战的传说/究极异兽</strong>（每赛季每只一次）。</li><li><strong>段位奖励</strong>：升到特定段位发一次性奖励——星尘、TM、<strong>菁英 TM</strong>、稀有糖、姿势/服装、传说遭遇等。</li><li><strong>赛季末</strong>：所有升过段的玩家按<strong>最终段位</strong>发 Premium Pass + 星尘。</li></ol><h2>四、高级对战通行证（Premium Battle Pass）</h2><ul><li>开启后该组<strong>奖励翻倍</strong>：星尘最高可达 <strong>4×</strong>、更多道具、额外遭遇。</li><li>想高效攒星尘/刷遭遇，<strong>优先在开 Premium Pass 时多打</strong>。</li></ul><h2>五、实用建议</h2><ul><li>每天先把<strong>星尘加成组</strong>打完（性价比最高的日常星尘来源之一）。</li><li>目标先冲 <strong>Rank 20</strong> 解锁传说遭遇，之后再视情况冲评分段。</li><li>菁英 TM 这种稀缺奖励，攒着给真正需要专属招的宝可梦。</li></ul>"}],"leagues":[{"id":"lg0","name":"Great League","cap":1500,"capLabel":"超级 1500","fullHeader":"Great League（超级联盟，CP 上限 1500）","pokemon":[{"cn":"巨锤铁砧","en":"Tinkaton","dex":959,"base":{"a":155,"d":196,"h":198},"role":"首发（lead）","moves":"妖精之风（Fairy Wind）+ 巨力锤（Gigaton Hammer）/ 重踏（Bulldoze）","iv":"Rank 1 约 0/15/15（或 0/14/15）；需 L50 + XL 糖果，低攻高耐久分布。","evo":[{"cn":"小铁砧","en":"Tinkatink","dex":957},{"cn":"大铁砧","en":"Tinkatuff","dex":958},{"cn":"巨锤铁砧","en":"Tinkaton","dex":959}],"getText":"妖精+钢双属性的第九世代（帕底亚）宝可梦，本体非地区形态。主要靠进化：野外/团战/调查任务捕捉最初阶小铁砧，再依次进化。小铁砧出现于野外随机刷新、田野调查奖励、活动限定刷新及孵蛋池，妖精/钢系主题活动与社群日期间出现率提升。部分时段 Tinkaton 本体作为团战头目出现，可直接团战捕获（IV 下限较高且无需糖果即得最终形态）。","trainText":"进化消耗 小铁砧→大铁砧 25 颗 + 大铁砧→巨锤铁砧 100 颗，全线约 125 颗糖果。糖果可经捕捉（配 Pinap/银色谬榛果翻倍）、传送换糖、伙伴步行、孵蛋及妙妙蛋获得。XL 糖果（训练家 31 级起）用于突破至 L50。PvP 优先强化一只高 IV 个体并投 XL 拉满等级。","sh":null,"needsXL":false,"elite":{"en":"Gigaton Hammer","cn":"巨力锤"}},{"cn":"大舌舔","en":"Lickilicky","dex":463,"base":{"a":161,"d":181,"h":242},"role":"收尾（closer）","moves":"滚动（Rollout）+ 泰山压顶（Body Slam）/ 暗影球（Shadow Ball）","iv":"Rank 1 约 0/15/14（低攻高耐久）；L50 + XL 糖果。纯泰山压顶（Body Slam-only）配置亦可行。","evo":[{"cn":"大舌头","en":"Lickitung","dex":108},{"cn":"大舌舔","en":"Lickilicky","dex":463}],"getText":"普通系，无法直接野外捕获或孵化，只能进化初阶「大舌头」获得。大舌头在野外住宅区等地点自然刷新，也可能出现在 raid、研究任务奖励或孵蛋中。进化条件：100 个大舌头糖果 + 1 颗神奥之石（Sinnoh Stone）。神奥之石主要来自连续 7 天的实地研究突破奖励、PvP 对战联盟每周奖励或部分限时活动。","trainText":"进化前先确认有一只高 IV 大舌头再消耗珍贵的神奥之石。糖果来源：捕捉（每只 3 颗）、转移换糖、伙伴步行（每 3 公里 1 颗）、Pinap 翻倍。XL 糖果（31 级以上获得）用于强化到 Lv.50。PvP 玩家应卡在联盟 CP 上限附近精确强化，优先堆体力/防御。","sh":null,"needsXL":false,"elite":{"en":"Body Slam","cn":"泰山压顶"}},{"cn":"胖嘟嘟","en":"Jellicent","dex":593,"base":{"a":159,"d":178,"h":225},"role":"安全切换（safe swap）","moves":"祸不单行（Hex）+ 暗影球（Shadow Ball）/ 冲浪（Surf）","iv":"Rank 1 约 0/15/15 低攻分布；L50 + XL 糖果。","evo":[{"cn":"轻飘飘","en":"Frillish","dex":592},{"cn":"胖嘟嘟","en":"Jellicent","dex":593}],"getText":"水/幽灵系（第五代/合众地区），无法直接捕捉，需由「轻飘飘」进化。轻飘飘为临水宝可梦，常出现在海边、河流、湖泊、港口、码头、运河附近，雨天加成时刷新率更高；GO 对战联盟升至 Rank 20 等高段位有机会获得遭遇奖励；活动/团战期间偶尔登场。轻飘飘与胖嘟嘟均有雌雄外观差异，均已实装闪光。","trainText":"收集 50 个轻飘飘糖果即可进化。糖果来源：捕捉（每只 3 颗）、孵蛋、伙伴步行、Pinap 翻倍、转移换糖。XL 糖果用于 40 级以上强化。胖嘟嘟为高耐久肉盾型，优先强化 IV 接近满防御/耐久、且符合联盟 CP 上限的个体；先确认联盟再投糖，避免浪费稀有 XL 糖果。","sh":null,"needsXL":false},{"cn":"毛球","en":"Jumpluff","dex":189,"base":{"a":118,"d":183,"h":181},"role":"首发（lead）","moves":"妖精之风（Fairy Wind）+ 杂技（Acrobatics）/ 能量球（Energy Ball）","iv":"Rank 1 约 0/15/14 低攻高耐久；L50 + XL 糖果。","evo":[{"cn":"毽子草","en":"Hoppip","dex":187},{"cn":"毽子花","en":"Skiploom","dex":188},{"cn":"毛球","en":"Jumpluff","dex":189}],"getText":"草/飞行系，一般不直接野外出现，主要靠进化。基础物种毽子草可经：野外随机遭遇（草地/晴天加成提升）、火箭队小兵战斗（暗影毽子草）、2 公里蛋孵化（活动期间）、玩家交换、社区日等限定活动（大量刷新并可遇闪光）。","trainText":"进化消耗 毽子草→毽子花 25 颗 + 毽子花→毛球 100 颗，共 125 颗。40 级以上强化需 XL 糖果。攒糖建议：大量捕捉配 Pinap/银色 Pinap、转移换糖、设最佳伙伴步行、抓 31 级以上个体/孵蛋/远距离交换提升 XL 掉率、善用社区日与聚光时刻双倍糖果。毛球种族值偏低（尤其攻击），价值在 PvP 超级/高级联盟作草系/飞行系切入手，优先培养低攻高防 IV 个体到联盟 CP 上限。","sh":{"n":90.8,"s":89.7,"self":false},"needsXL":true,"elite":{"en":"Acrobatics","cn":"Acrobatics"}},{"cn":"玛力露丽","en":"Azumarill","dex":184,"base":{"a":112,"d":152,"h":225},"role":"安全切换（safe swap）","moves":"吐泡泡（Bubble）+ 冰冻光束（Ice Beam）/ 嬉闹（Play Rough）","iv":"Rank 1 约 0/15/15（最大耐久）；约 L40–L43 即可达成，一般无需 XL。","evo":[{"cn":"露力丽","en":"Azurill","dex":298},{"cn":"玛力露","en":"Marill","dex":183},{"cn":"玛力露丽","en":"Azumarill","dex":184}],"getText":"水/妖精系，最终阶。主要靠培养前两阶：用 25 个糖进化 Marill；Marill 偶在水边/雨天野生；Azumarill 本体野外少见但水系活动/雨天加成时提升；最初阶露力丽可由 2 km 蛋孵出（稳定攒糖来源）；活动期间可能作团战 Boss 或实地调查奖励，水系节日/社区日提升刷新率与闪光率。","trainText":"整条进化链共享同一糖果。进化成本 露力丽→玛力露 25 + 玛力露→玛力露丽 25。攒糖：孵 2 km 蛋、捕捉（每只 +3，Pinap 翻倍至 +6）、伙伴步行、转移 +1。40 级以上需 XL（捕捉/孵蛋/好友赠蛋/100:1 兑换）。GL 中是强力坦克，优先培养高防御/高耐久 IV（低攻利于卡上限堆耐久）；推荐双盾配置，先到接近 1500 CP 再解锁第二招式。","sh":null,"needsXL":true},{"cn":"沼王","en":"Quagsire","dex":195,"base":{"a":152,"d":143,"h":216},"role":"首发（lead）","moves":"泥巴射击（Mud Shot）+ 尖石攻击（Stone Edge）/ 地震（Earthquake）","iv":"Rank 1 约 0/14/15 低攻分布；L50 + XL 糖果。酸液炮（Acid Spray）可作骗盾替代。","evo":[{"cn":"乌波","en":"Wooper","dex":194},{"cn":"沼王","en":"Quagsire","dex":195}],"getText":"乌波的进化体。乌波常出现在水域、湖泊、河流、沼泽附近，雨天/晴天加成提升刷新率；用 50 个乌波糖果进化（最稳定途径）；活动期间沼王可作一/三星团战头目；乌波曾出现在 2km/5km 蛋；社区日期间野外大量刷新、提升闪光率并解锁特殊招式。注意：普通乌波进化为沼王（#195），帕底亚乌波则进化为土王。","trainText":"进化需 50 个乌波糖果。糖果：捕捉每只 3 颗（Pinap 翻倍）、最佳伙伴步行、转移换糖。40 级以上需乌波 XL 糖果。沼王凭水/地面双属性覆盖好、仅草系一个双重弱点，适合作安全切换。GL PvP 优先用普通糖果+星沙强化到接近 1500 CP，再补 XL 微调；暗影沼王输出更高，进攻向阵容投入价值更高。","sh":{"n":92.3,"s":92.4,"self":false},"needsXL":false},{"cn":"土王","en":"Clodsire","dex":980,"base":{"a":127,"d":151,"h":277},"role":"安全切换（safe swap）","moves":"泥巴射击（Mud Shot）+ 尖石攻击（Stone Edge）/ 地震（Earthquake）","iv":"Rank 1 约 0/15/15 最大耐久分布；L50 + XL 糖果。对抗 草/恶 可换用 Megahorn（突刺）。","evo":[{"cn":"乌波","en":"Wooper","dex":194},{"cn":"土王","en":"Clodsire","dex":980}],"getText":"帕底亚地区形态乌波的进化型。主要靠进化——先捕捉帕底亚乌波（毒/地面），积累 50 颗乌波糖果后进化（注意只有帕底亚形态乌波才能进化成土王）。帕底亚乌波可野外随机遇见、孵蛋、实地调查奖励，及社区日/活动期间提升出现率获得；土王本身野外几乎不直接出现。","trainText":"进化需 50 颗乌波糖果；40 级以上需 XL 糖果。糖果：捕捉（每只 3 颗起，Pinap/Silver Pinap 翻倍）、孵蛋、远距离交换、伙伴步行、普通糖果转换 XL。毒/地面，HP 极高、双防不俗、攻击偏低，PvP 中是强力耐久型墙壁。建议优先投资 PvP 个体，选 IV 偏防御/HP，并按联盟 CP 上限决定强化目标等级。","sh":null,"needsXL":false},{"cn":"小碎钻","en":"Carbink","dex":703,"base":{"a":95,"d":285,"h":137},"role":"安全切换（safe swap）","moves":"落石（Rock Throw）+ 岩崩（Rock Slide）/ 月亮之力（Moonblast）","iv":"Rank 1 约 0/15/15（极肉，rank 间差距极小）；多为 L50 + XL 糖果。","evo":[{"cn":"小碎钻","en":"Carbink","dex":703} const LEVELS=Object.keys(CPM).map(Number).sort((a,b)=>a-b);
function cpOf(a,d,s,m){return Math.max(10,Math.floor(a*Math.sqrt(d)*Math.sqrt(s)*m*m/10));}
// CP & SP both increase monotonically with level → binary-search the highest level under the CP cap
function bestFor(b,ia,id,is,cap,maxL){
  const A=b.a+ia,D=b.d+id,S=b.h+is;
  let hi=LEVELS.length-1; while(hi>=0&&LEVELS[hi]>maxL)hi--;
  let lo=0,ans=-1;
  while(lo<=hi){const mid=(lo+hi)>>1;const c=cpOf(A,D,S,CPM[LEVELS[mid]]);if(c<=cap){ans=mid;lo=mid+1;}else hi=mid-1;}
  if(ans<0)return{L:0,CP:0,SP:0};
  const L=LEVELS[ans],m=CPM[L];
  return{L,CP:cpOf(A,D,S,m),SP:A*m*D*m*Math.floor(S*m)};
}
function rankAll(b,cap,maxL){const arr=[];for(let a=0;a<=15;a++)for(let d=0;d<=15;d++)for(let s=0;s<=15;s++){const r=bestFor(b,a,d,s,cap,maxL);arr.push({a,d,s,SP:r.SP,L:r.L,CP:r.CP});}arr.sort((x,y)=>y.SP-x.SP);return arr;}
// rank-1 (optimal) IV for a pokemon in a league, cached by (dex|en, cap)
const _bestIvCache={};
function bestIv(p,lg){
  if(!p||!p.base)return null;
  const cap=lg.cap===null?Infinity:lg.cap;
  const k=(p.dex||p.en)+'_'+cap;
  if(k in _bestIvCache)return _bestIvCache[k];
  const r=rankAll(p.base,cap,50)[0];
  const v=r?{a:r.a,d:r.d,s:r.s}:null;
  _bestIvCache[k]=v;return v;
}
// fast single-IV rank by counting (no sort/alloc) — for the bulk reverse-lookup table
function spOnly(b,ia,id,is,cap,hiCap){const A=b.a+ia,D=b.d+id,S=b.h+is;let lo=0,hi=hiCap,ans=-1;while(lo<=hi){const mid=(lo+hi)>>1;if(cpOf(A,D,S,CPM[LEVELS[mid]])<=cap){ans=mid;lo=mid+1;}else hi=mid-1;}if(ans<0)return[0,0,0];const m=CPM[LEVELS[ans]];return[A*m*D*m*Math.floor(S*m),LEVELS[ans],cpOf(A,D,S,m)];}
function fastRank(b,cap,maxL,ia,id,is){let hiCap=LEVELS.length-1;while(hiCap>=0&&LEVELS[hiCap]>maxL)hiCap--;const mine=spOnly(b,ia,id,is,cap,hiCap);const my=mine[0];let gt=0,mx=0;for(let a=0;a<=15;a++)for(let d=0;d<=15;d++)for(let s=0;s<=15;s++){const sp=spOnly(b,a,d,s,cap,hiCap)[0];if(sp>mx)mx=sp;if(sp>my)gt++;}return{rank:gt+1,L:mine[1],CP:mine[2],pct:mx>0?my/mx*100:0,master:cap===null};}

    if(q && !(p.cn.toLowerCase().includes(q)||p.en.toLowerCase().includes(q)||(''+p.dex).includes(q))) return false;
    const bs=new Set(p.where.map(w=>shortLeague(DATA.leagues[w[0]])));
    return BADGES.some(b=>iq.badge[b]&&bs.has(b));
  }).map(p=>{const o={p};for(const [key,cap] of act)o[key]=rankCell(p.base,cap);return o;});
  const key=iq.sort;
  rows.sort((x,y)=>{const a=key==='dex'?(x.p.dex||9999):x[key].rank,b=key==='dex'?(y.p.dex||9999):y[key].rank;return iq.asc?a-b:b-a;});
  const arrow=k=>iq.sort===k?(iq.asc?' ▲':' ▼'):'';
  let t=`<table class="iqtable"><thead><tr><th onclick="sortIq('dex')" style="text-align:left">宝可梦${arrow('dex')}</th>`;
  for(const [key,cap,label,color] of act) t+=`<th onclick="sortIq('${key}')"><span class="lgdot" style="background:${color}"></span>${label}${arrow(key)}</th>`;
  t+=`</tr></thead><tbody>`;
  for(const r of rows){
    const w=r.p.where[0];
    t+=`<tr><td class="pname" onclick="openPoke(${w[0]},${w[1]})"><img loading="lazy" src="${sprite(r.p.dex)}" onerror="this.src=FB"><span class="pnm"><span class="pcn">${esc(r.p.cn)}</span><small>${esc(r.p.en)} #${r.p.dex}</small></span><span class="lgbadges">${leagueBadges(r.p.where)}</span></td>`;
    for(const [key] of act) t+=cellHtml(r[key]);
    t+=`</tr>`;
  }
  t+=`</tbody></table>`;
  if(!rows.length)t='<div class="muted">没有匹配的宝可梦</div>';
  $("iqres").innerHTML=t;
}

let curBasics=0;
function renderBasics(){
  let h='<div class="lg-head"><h2>机制速查</h2></div><div class="basics-tabs">';
  DATA.basics.forEach((b,i)=>{h+=`<div class="btab${i===curBasics?' on':''}" onclick="selB(${i})">${esc(b.title.replace(/Pokemon GO |Pokémon GO |PvP |完全指南|全解|指南/g,'').trim()||('章节'+(i+1)))}</div>`;});
  h+='</div>';
  DATA.basics.forEach((b,i)=>{h+=`<div class="rich${i===curBasics?'':' hide'}" id="bdoc${i}">${b.html}</div>`;});
  $("main").innerHTML=h;
}
function selB(i){curBasics=i;DATA.basics.forEach((_,k)=>$("bdoc"+k).classList.toggle("hide",k!==i));document.querySelectorAll(".btab").forEach((e,k)=>e.classList.toggle("on",k===i));}

$("season").textContent=DATA.season;renderSide();renderLeague();
</script>
<script>
function _gotoHash(){var mm=(location.hash||"").match(/^#m(\d+)/);if(!mm)return;var dex=+mm[1];
 var bLi=-1,bPj=-1,bR=1e9;
 for(var li=0;li<DATA.leagues.length;li++){var arr=DATA.leagues[li].pokemon||[];for(var pj=0;pj<arr.length;pj++){if(arr[pj].dex===dex){var r=arr[pj].rank||999;if(r<bR){bR=r;bLi=li;bPj=pj;}}}}
 if(bLi<0)return;try{selLeague(bLi);}catch(e){}setTimeout(function(){try{openPoke(bLi,bPj);}catch(e){}},90);}
addEventListener("hashchange",_gotoHash);addEventListener("load",_gotoHash);
</script>
