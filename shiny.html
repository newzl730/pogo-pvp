<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pokémon GO 异色图鉴（中文）</title><style>
:root{--bg:#0e1016;--panel:#171a23;--panel2:#1f2330;--line:#2c3142;--txt:#e9ebf2;--dim:#9aa1b4;--accent:#3b6cff;--shiny:#ffd54a}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(1100px 600px at 70% -12%,#1a1630,#0e1016);color:var(--txt);font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
.top{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;background:rgba(14,16,22,.94);backdrop-filter:blur(8px);z-index:20}
.top h1{margin:0;font-size:17px}.top h1 b{color:var(--shiny)}
.top nav{display:flex;gap:10px;font-size:12px;flex-wrap:wrap}.top nav a{color:var(--accent);text-decoration:none;white-space:nowrap}
.main{max-width:900px;margin:0 auto;padding:12px 12px 80px}
.bar{display:flex;gap:10px;align-items:center;margin:6px 0 12px;flex-wrap:wrap;position:sticky;top:54px;background:rgba(14,16,22,.96);padding:8px 0;z-index:10}
.bar input{flex:1;min-width:160px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:9px 13px;font-size:14px}
.bar .tot{font-size:12px;color:var(--dim)}
details.gen{background:var(--panel);border:1px solid var(--line);border-radius:13px;margin-bottom:10px;overflow:hidden}
details.gen>summary{cursor:pointer;padding:13px 15px;font-size:15px;font-weight:700;list-style:none;display:flex;align-items:center;gap:8px}
details.gen>summary::-webkit-details-marker{display:none}
details.gen>summary::before{content:"▸";color:var(--accent)}details.gen[open]>summary::before{content:"▾"}
.cnt{font-size:11.5px;color:var(--dim);font-weight:400;background:var(--panel2);border-radius:8px;padding:2px 8px;margin-left:auto}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(124px,100%),1fr));gap:9px;padding:4px 12px 14px}
.sc{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:8px 5px;text-align:center;transition:.12s}.sc:hover{border-color:var(--shiny)}
.imgs{display:flex;gap:3px;justify-content:center}.imgs figure{margin:0;flex:1;min-width:0}
.imgs img{width:100%;max-width:54px;height:54px;object-fit:contain}
.imgs figcaption{font-size:8.5px;color:var(--dim);margin-top:1px}
.imgs .sh{background:radial-gradient(circle at 50% 40%,rgba(255,213,74,.16),transparent 70%);border-radius:9px}.imgs .sh figcaption{color:var(--shiny)}
.nm{font-size:12.5px;font-weight:700;margin-top:4px;line-height:1.3}.sub{font-size:9.5px;color:var(--dim)}.dt{font-size:9px;color:var(--dim);opacity:.7;margin-top:2px}
.note{font-size:11px;color:var(--dim);text-align:center;margin-top:22px;line-height:1.6}.hide{display:none!important}
</style></head><body>
<div class="top"><h1>Pokémon GO <b>✨异色图鉴</b></h1>
<nav><a href="index.html">⚔️ PvP</a><a href="pve.html">🏟 团战</a><a href="dmax.html">💥 极巨</a><a href="cal.html">📅 日历</a><a href="rocket.html">🚀 火箭队</a><a href="search.html">🔍 搜索</a><a href="db.html">🗄️ 数据库</a><a href="pvpoke/src/rankings/">🧮 PvPoke</a></nav></div>
<div class="main">
<div class="bar"><input id="q" placeholder="搜中文名…" oninput="flt(this.value)"><span class="tot" id="tot">加载中…</span><button onclick="allG(1)" style="background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer">展开</button><button onclick="allG(0)" style="background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer">收起</button></div>
<div id="out"></div>
<div class="note">数据源 <b>pokemon.db</b>（统一库，sql.js 浏览器查询）· 普通 vs 异色立绘含<b>地区形态/Mega/原始/起源</b> · 中文名 简体+繁体</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script>
var DB=null,GENS=[[1,"关都"],[2,"城都"],[3,"丰缘"],[4,"神奥"],[5,"合众"],[6,"卡洛斯"],[7,"阿罗拉"],[8,"伽勒尔/洗翠"],[9,"帕底亚"]];
function esc(s){return (""+(s==null?"":s)).replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function rows(sql){var st=DB.prepare(sql),o=[];while(st.step())o.push(st.getAsObject());st.free();return o;}
function card(p){return '<div class="sc" style="cursor:pointer" onclick="pokeModal('+p.dex+')" data-n="'+esc((p.name_cn+(p.name_tw||"")).toLowerCase())+'"><div class="imgs"><figure><img loading="lazy" src="'+esc(p.sprite)+'" onerror="this.style.opacity=.2"><figcaption>普通</figcaption></figure><figure class="sh"><img loading="lazy" src="'+esc(p.sprite_shiny)+'" onerror="this.style.opacity=.2"><figcaption>✨异色</figcaption></figure></div><div class="nm">'+esc(p.name_cn)+'</div><div class="sub">'+(p.name_tw&&p.name_tw!==p.name_cn?esc(p.name_tw)+" · ":"")+'#'+p.dex+'</div>'+(p.shiny_date?'<div class="dt">实装 '+esc(p.shiny_date)+'</div>':'')+'</div>';}
function render(){
  var total=0,html="";
  GENS.forEach(function(g,i){
    var lo=g[0],hi=g[0],names=g[1];
    // gen ranges by dex
    var ranges=[[1,151],[152,251],[252,386],[387,493],[494,649],[650,721],[722,809],[810,905],[906,1025]];
    var r=ranges[i];
    var list=rows("SELECT dex,name_cn,name_tw,sprite,sprite_shiny,shiny_date,form FROM pokemon WHERE shiny_released=1 AND is_shadow=0 AND dex BETWEEN "+r[0]+" AND "+r[1]+" ORDER BY dex, (form='normal') DESC, form");
    total+=list.length;
    html+='<details class="gen"'+(i===0?" open":"")+'><summary>第'+"一二三四五六七八九"[i]+'世代 · '+names+' <span class="cnt">'+list.length+' 只异色</span></summary><div class="sgrid">'+list.map(card).join("")+'</div></details>';
  });
  document.getElementById("out").innerHTML=html;
  document.getElementById("tot").innerHTML="共 <b>"+total+"</b> 只异色";
}
function flt(v){v=(v||"").trim().toLowerCase();document.querySelectorAll("details.gen").forEach(function(g){var sh=0;g.querySelectorAll(".sc").forEach(function(c){var m=!v||c.getAttribute("data-n").indexOf(v)>=0;c.classList.toggle("hide",!m);if(m)sh++;});g.style.display=sh?"":"none";if(v)g.open=true;});}
function allG(o){document.querySelectorAll("details.gen").forEach(function(g){g.open=!!o;});}
window.flt=flt;window.allG=allG;
initSqlJs({locateFile:function(f){return "https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/"+f;}}).then(function(SQL){
  return fetch("pokemon.db?v=20260618-67576").then(function(r){return r.arrayBuffer();}).then(function(b){DB=new SQL.Database(new Uint8Array(b));render();});
}).catch(function(e){document.getElementById("tot").innerHTML='<span style="color:#ff7a8f">加载失败：'+esc(e.message)+'</span>';});
</script>
<script src="pokedex-modal.js?v=3"></script><script src="site-nav.js?v=2"></script></body></html>
