<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pokémon 统一数据库</title><style>
:root{--bg:#0e1016;--panel:#171a23;--panel2:#1f2330;--line:#2c3142;--txt:#e9ebf2;--dim:#9aa1b4;--accent:#3b6cff;--gold:#ffcb05;--grn:#46d39a}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(1100px 600px at 70% -12%,#16203a,#0e1016);color:var(--txt);font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
.top{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;background:rgba(14,16,22,.94);backdrop-filter:blur(8px);z-index:20}
.top h1{margin:0;font-size:17px}.top h1 b{color:var(--grn)}
.top nav{display:flex;gap:10px;font-size:12px;flex-wrap:wrap}.top nav a{color:var(--accent);text-decoration:none;white-space:nowrap}
.main{max-width:860px;margin:0 auto;padding:14px 12px 80px}
.bar{position:sticky;top:54px;background:rgba(14,16,22,.96);padding:8px 0 12px;z-index:10}
.bar input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:13px 16px;font-size:16px;outline:none}
.bar input:focus{border-color:var(--grn)}
.meta{font-size:11.5px;color:var(--dim);margin:4px 2px}
.r{display:flex;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:9px 12px;margin-bottom:8px;cursor:pointer}
.r:hover{border-color:var(--grn)}
.r img{width:50px;height:50px;object-fit:contain;flex:none}
.rn{font-weight:700;font-size:15px}.rn small{color:var(--dim);font-weight:400;font-size:11px;margin-left:5px}
.tp{font-size:9px;font-weight:700;color:#0e1016;border-radius:5px;padding:1px 6px;margin-right:3px}
.detail{background:var(--panel);border:1px solid var(--grn);border-radius:13px;padding:13px 15px;margin:6px 0 12px}
.detail h3{margin:0 0 8px}.kv{font-size:13px;line-height:1.9}.kv b{color:var(--gold)}
.mv{font-size:12.5px;line-height:1.8}.mv .el{color:var(--gold)}
.sqlbox{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}
.sqlbox textarea{width:100%;height:60px;background:#0b0d13;border:1px solid var(--line);border-radius:9px;color:#cde;padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px}
.sqlbox button{margin-top:6px;background:var(--grn);color:#06281c;border:0;border-radius:8px;padding:7px 14px;font-weight:700;cursor:pointer}
table{border-collapse:collapse;width:100%;font-size:12px;margin-top:10px;overflow:auto;display:block}
th,td{border:1px solid var(--line);padding:4px 7px;text-align:left;white-space:nowrap}
th{color:var(--grn)}
.note{font-size:11px;color:var(--dim);text-align:center;margin-top:24px;line-height:1.7}
.tag{font-size:10px;color:var(--dim)}
</style></head><body>
<div class="top"><h1>Pokémon <b>统一数据库</b></h1>
<nav><a href="index.html">⚔️ PvP</a><a href="pve.html">🏟 团战</a><a href="rocket.html">🚀 火箭队</a><a href="shiny.html">✨ 异色</a><a href="search.html">🔍 搜索</a><a href="pvpoke/src/rankings/">🧮 PvPoke</a></nav></div>
<div class="main">
<div class="bar"><input id="q" placeholder="搜索：中文 / 繁中 / 英文 / 图鉴号 / species_id…" autofocus oninput="search(this.value)">
<div class="meta" id="meta">数据库加载中…</div></div>
<div id="detail"></div>
<div id="res"></div>
<div class="sqlbox">
  <div class="tag">⚙️ 原始 SQL 查询（高级）— 表：pokemon / moves / pokemon_moves</div>
  <textarea id="sql">SELECT dex,cn,en,type1,type2,atk,def,hp FROM pokemon WHERE type1='dragon' ORDER BY atk DESC LIMIT 20;</textarea>
  <button onclick="runSQL()">运行</button>
  <div id="sqlout"></div>
</div>
<div class="note">单一权威数据源：<b>pokemon.db</b>（SQLite，浏览器内 sql.js 查询）· 1724 宝可梦 / 331 招式<br>本站各页面的宝可梦信息统一以此库为准</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script>
var DB=null;
var TC={normal:"#9099a1",fire:"#ff6b3d",water:"#4f9fff",electric:"#ffd23d",grass:"#5fbf52",ice:"#7fd6d6",fighting:"#d3425f",poison:"#a95fc9",ground:"#d9ab55",flying:"#92a8ff",psychic:"#ff5f8f",bug:"#9fb336",rock:"#c8b681",ghost:"#6f5b9e",dragon:"#5a78e0",dark:"#5a5468",steel:"#5a8fa0",fairy:"#f08fc7"};
var TN={normal:"一般",fire:"火",water:"水",electric:"电",grass:"草",ice:"冰",fighting:"格斗",poison:"毒",ground:"地面",flying:"飞行",psychic:"超能力",bug:"虫",rock:"岩石",ghost:"幽灵",dragon:"龙",dark:"恶",steel:"钢",fairy:"妖精"};
function esc(s){return (""+(s==null?"":s)).replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function art(d){return "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/"+d+".png";}
function tchip(t){return t?'<span class="tp" style="background:'+(TC[t]||"#666")+'">'+(TN[t]||t)+'</span>':"";}
function rows(sql,params){var st=DB.prepare(sql);if(params)st.bind(params);var o=[];while(st.step())o.push(st.getAsObject());st.free();return o;}
function detail(sid){
  var p=rows("SELECT * FROM pokemon WHERE species_id=?",[sid])[0];if(!p)return;
  var fast=rows("SELECT m.cn,m.en,m.type,pm.elite FROM pokemon_moves pm JOIN moves m ON m.move_id=pm.move_id WHERE pm.species_id=? AND pm.slot='fast'",[sid]);
  var chg=rows("SELECT m.cn,m.en,m.type,pm.elite FROM pokemon_moves pm JOIN moves m ON m.move_id=pm.move_id WHERE pm.species_id=? AND pm.slot='charged'",[sid]);
  function mvl(a){return a.map(function(m){return '<span'+(m.elite?' class="el"':'')+'>'+(m.elite?'🔑':'')+esc(m.cn)+' / '+esc(m.en)+' ['+(TN[m.type]||m.type)+']</span>';}).join("、")||"—";}
  document.getElementById("detail").innerHTML='<div class="detail"><h3>'+esc(p.cn)+' <small style="color:var(--dim);font-weight:400">'+esc(p.tw)+' · '+esc(p.en)+' · #'+p.dex+'</small></h3>'+
    '<div style="display:flex;gap:14px;align-items:center"><img src="'+art(p.dex)+'" style="width:80px;height:80px;object-fit:contain" onerror="this.style.opacity=.15"><div class="kv">'+
    '属性：'+tchip(p.type1)+tchip(p.type2)+'<br>种族值：<b>攻 '+p.atk+'</b> / <b>防 '+p.def+'</b> / <b>体 '+p.hp+'</b><br>species_id：<code>'+esc(p.species_id)+'</code>　进化自：'+esc(p.family_parent||"—")+'</div></div>'+
    '<div class="mv" style="margin-top:10px">⚡ <b style="color:#bfe0ff">快速招式</b>：'+mvl(fast)+'<br>💥 <b style="color:#ffc59c">充能招式</b>：'+mvl(chg)+'</div></div>';
  window.scrollTo({top:0,behavior:"smooth"});
}
window.detail=detail;
function search(q){
  if(!DB)return;q=(q||"").trim();
  var res=document.getElementById("res");document.getElementById("detail").innerHTML="";
  if(!q){res.innerHTML="";return;}
  var like="%"+q.toLowerCase()+"%";
  var r=rows("SELECT species_id,dex,cn,tw,en,type1,type2 FROM pokemon WHERE lower(cn) LIKE ? OR lower(tw) LIKE ? OR lower(en) LIKE ? OR lower(species_id) LIKE ? OR dex=? ORDER BY dex LIMIT 80",[like,like,like,like,(/^\d+$/.test(q)?+q:-1)]);
  res.innerHTML=r.length?r.map(function(p){return '<div class="r" onclick="detail(\''+p.species_id+'\')"><img loading="lazy" src="'+art(p.dex)+'" onerror="this.style.opacity=.15"><div><div class="rn">'+esc(p.cn)+'<small>'+esc(p.tw)+' · '+esc(p.en)+' · #'+p.dex+'</small></div><div style="margin-top:4px">'+tchip(p.type1)+tchip(p.type2)+'</div></div></div>';}).join(""):'<div class="note">没找到「'+esc(q)+'」</div>';
}
window.search=search;
function runSQL(){
  if(!DB)return;var out=document.getElementById("sqlout");
  try{var r=rows(document.getElementById("sql").value);
    if(!r.length){out.innerHTML='<div class="note">无结果</div>';return;}
    var cols=Object.keys(r[0]);
    out.innerHTML='<table><tr>'+cols.map(function(c){return '<th>'+esc(c)+'</th>';}).join("")+'</tr>'+r.map(function(row){return '<tr>'+cols.map(function(c){return '<td>'+esc(row[c])+'</td>';}).join("")+'</tr>';}).join("")+'</table>';
  }catch(e){out.innerHTML='<div class="note" style="color:#ff7a8f">SQL 错误：'+esc(e.message)+'</div>';}
}
window.runSQL=runSQL;
initSqlJs({locateFile:function(f){return "https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/"+f;}}).then(function(SQL){
  return fetch("pokemon.db").then(function(r){return r.arrayBuffer();}).then(function(buf){
    DB=new SQL.Database(new Uint8Array(buf));
    var n=rows("SELECT COUNT(*) c FROM pokemon")[0].c, m=rows("SELECT COUNT(*) c FROM moves")[0].c;
    document.getElementById("meta").innerHTML="✅ 已加载 <b>"+n+"</b> 宝可梦 · <b>"+m+"</b> 招式（pokemon.db）";
  });
}).catch(function(e){document.getElementById("meta").innerHTML='<span style="color:#ff7a8f">加载失败：'+esc(e.message)+'</span>';});
</script></body></html>
