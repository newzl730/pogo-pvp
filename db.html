<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"><link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Pokémon 统一数据库</title><style>
:root{--bg:#0e1016;--panel:#171a23;--panel2:#1f2330;--line:#2c3142;--txt:#e9ebf2;--dim:#9aa1b4;--accent:#3b6cff;--gold:#ffcb05;--grn:#46d39a}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(1100px 600px at 70% -12%,#16203a,#0e1016);color:var(--txt);font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
.top{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;background:rgba(14,16,22,.94);backdrop-filter:blur(8px);z-index:20}
.top h1{margin:0;font-size:17px}.top h1 b{color:var(--grn)}
.top nav{display:flex;gap:10px;font-size:12px;flex-wrap:wrap}.top nav a{color:var(--accent);text-decoration:none;white-space:nowrap}
.main{max-width:860px;margin:0 auto;padding:14px 12px 80px}
.bar{position:sticky;top:54px;background:rgba(14,16,22,.96);padding:8px 0 12px;z-index:10}
.bar input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:13px 16px;font-size:16px;outline:none}
.bar input:focus{border-color:var(--grn)}
.meta{font-size:11.5px;color:var(--dim);margin:4px 2px}
.r{display:flex;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:9px 12px;margin-bottom:8px;cursor:pointer}
.r:hover{border-color:var(--grn)}
.r img{width:50px;height:50px;object-fit:contain;flex:none}
.rn{font-weight:700;font-size:15px}.rn small{color:var(--dim);font-weight:400;font-size:11px;margin-left:5px}
.tp{font-size:9px;font-weight:700;color:#0e1016;border-radius:5px;padding:1px 6px;margin-right:3px}
.detail{background:var(--panel);border:1px solid var(--grn);border-radius:13px;padding:13px 15px;margin:6px 0 12px}
.detail h3{margin:0 0 8px}.kv{font-size:13px;line-height:1.9}.kv b{color:var(--gold)}
.mv{font-size:12.5px;line-height:1.8}.mv .el{color:var(--gold)}
.sqlbox{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}
.sqlbox textarea{width:100%;height:60px;background:#0b0d13;border:1px solid var(--line);border-radius:9px;color:#cde;padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px}
.sqlbox button{margin-top:6px;background:var(--grn);color:#06281c;border:0;border-radius:8px;padding:7px 14px;font-weight:700;cursor:pointer}
table{border-collapse:collapse;width:100%;font-size:12px;margin-top:10px;overflow:auto;display:block}
th,td{border:1px solid var(--line);padding:4px 7px;text-align:left;white-space:nowrap}
th{color:var(--grn)}
.note{font-size:11px;color:var(--dim);text-align:center;margin-top:24px;line-height:1.7}
.tag{font-size:10px;color:var(--dim)}
</style></head><body>
<div class="top"><h1>Pokémon <b>统一数据库</b></h1>
<nav><a href="index.html">⚔️ PvP</a><a href="pve.html">🏟 团战</a><a href="rocket.html">🚀 火箭队</a><a href="shiny.html">✨ 异色</a><a href="search.html">🔍 搜索</a><a href="pvpoke/src/rankings/">🧮 PvPoke</a></nav></div>
<div class="main">
<div class="bar"><input id="q" placeholder="搜索：中文 / 繁中 / 英文 / 图鉴号 / species_id…" autofocus oninput="search(this.value)">
<div class="meta" id="meta">数据库加载中…</div></div>
<div id="detail"></div>
<div id="res"></div>
<div class="sqlbox">
  <div class="tag">⚙️ 原始 SQL 查询（高级）— 表：pokemon / moves / pokemon_moves / default_ivs / type_effectiveness / shadow_purification / shiny / evolution / cpm / weather_boost / obtain</div>
  <textarea id="sql">SELECT dex,name_cn,name_en,type1,type2,atk,def,hp FROM pokemon WHERE type1='dragon' ORDER BY atk DESC LIMIT 20;</textarea>
  <button onclick="runSQL()">运行</button>
  <div id="sqlout"></div>
</div>
<div class="note">单一权威数据源：<b>pokemon.db</b>（SQLite，浏览器内 sql.js 查询）· 1724 宝可梦 / 331 招式<br>本站各页面的宝可梦信息统一以此库为准</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script>
var DB=null;
var TC={normal:"#9099a1",fire:"#ff6b3d",water:"#4f9fff",electric:"#ffd23d",grass:"#5fbf52",ice:"#7fd6d6",fighting:"#d3425f",poison:"#a95fc9",ground:"#d9ab55",flying:"#92a8ff",psychic:"#ff5f8f",bug:"#9fb336",rock:"#c8b681",ghost:"#6f5b9e",dragon:"#5a78e0",dark:"#5a5468",steel:"#5a8fa0",fairy:"#f08fc7"};
var TN={normal:"一般",fire:"火",water:"水",electric:"电",grass:"草",ice:"冰",fighting:"格斗",poison:"毒",ground:"地面",flying:"飞行",psychic:"超能力",bug:"虫",rock:"岩石",ghost:"幽灵",dragon:"龙",dark:"恶",steel:"钢",fairy:"妖精"};
function esc(s){return (""+(s==null?"":s)).replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function art(d){return "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/"+d+".png";}
function tchip(t){return t?'<span class="tp" style="background:'+(TC[t]||"#666")+'">'+(TN[t]||t)+'</span>':"";}
function rows(sql,params){var st=DB.prepare(sql);if(params)st.bind(params);var o=[];while(st.step())o.push(st.getAsObject());st.free();return o;}
function genderStr(g){if(g===null||g===undefined)return '';if(g<0)return '⚲无性别';if(g===0)return '♂100%';if(g===8)return '♀100%';var fp=Math.round(g/8*100);return '♂'+(100-fp)+'% / ♀'+fp+'%';}
function detail(sid){
  var p=rows("SELECT * FROM pokemon WHERE species_id=?",[sid])[0];if(!p)return;
  function mv(slot){return rows("SELECT m.*,pm.is_elite FROM pokemon_moves pm JOIN moves m ON m.move_id=pm.move_id WHERE pm.species_id=? AND pm.slot=?",[sid,slot]);}
  function mvl(a){return a.map(function(m){var bf=m.pvp_buffs?' <span style="color:#ffcb05">±buff</span>':'';return '<div style="padding:2px 0">'+(m.is_elite?'🔑':'')+'<b style="cursor:pointer;color:#8fb0ff" onclick="moveDetail(\''+m.move_id+'\')">'+esc(m.name_cn)+'</b> / '+esc(m.name_en)+' '+tchip(m.type)+' <span class="tag">PvP '+m.pvp_power+'威 '+m.pvp_energy+'能'+bf+' · PvE '+m.pve_power+'威 '+(m.pve_duration_ms?(m.pve_duration_ms/1000)+'s':'')+'</span></div>';}).join("")||"—";}
  var ivs=rows("SELECT * FROM default_ivs WHERE species_id=?",[sid]);
  var pur=rows("SELECT * FROM shadow_purification WHERE species_id=? AND stardust IS NOT NULL",[sid])[0];
  function _nm(s){var r=rows("SELECT name_cn,dex FROM pokemon WHERE species_id=?",[s])[0];return r||{name_cn:s,dex:0};}
  var _root=sid,_seen={};while(true){var pr=rows("SELECT family_parent FROM pokemon WHERE species_id=?",[_root])[0];if(pr&&pr.family_parent&&!_seen[pr.family_parent]){_seen[pr.family_parent]=1;_root=pr.family_parent;}else break;}
  function _chain(node){var me=_nm(node);var tag='<span style="cursor:pointer;'+(node===sid?"color:var(--gold);font-weight:800":"color:var(--accent)")+'" onclick="detail(\''+node+'\')">'+esc(me.name_cn)+'</span>';var kids=rows("SELECT evolves_to,candy,condition FROM evolution WHERE species_id=?",[node]);if(!kids.length)return tag;if(kids.length===1)return tag+' <span class="tag">→'+(kids[0].candy?kids[0].candy+'糖':'')+(kids[0].condition?'·'+esc(kids[0].condition):'')+'</span> '+_chain(kids[0].evolves_to);return tag+'<div style="padding-left:16px;border-left:1px solid var(--line);margin:3px 0">'+kids.map(function(k){return '<span class="tag">→'+(k.candy?k.candy+'糖':'')+(k.condition?'·'+esc(k.condition):'')+'</span> '+_chain(k.evolves_to);}).join("<br>")+'</div>';}
  var evoHtml=_chain(_root);
  var hasEvo=rows("SELECT 1 FROM evolution WHERE species_id=? OR evolves_to=? LIMIT 1",[sid,sid]).length;
  var wb=rows("SELECT DISTINCT weather FROM weather_boost WHERE type=? OR type=?",[p.type1,p.type2||p.type1]);
  var ob=rows("SELECT method,detail FROM obtain WHERE dex=?",[p.dex]);
  var flags=[];if(p.is_legendary)flags.push("传说");if(p.is_mythical)flags.push("幻");if(p.is_ultrabeast)flags.push("究极异兽");if(p.is_mega)flags.push("超级进化");if(p.is_regional)flags.push("地区限定");if(p.shadow_eligible)flags.push("可暗影");if(p.gl_ineligible)flags.push("超联不可用");
  var ivmap={great:"超联1500",ultra:"高联2500",master:"大师"};
  var ivh=ivs.map(function(v){return '<span class="tag" style="margin-right:8px">'+(ivmap[v.league]||v.league)+': L'+v.level+' '+v.iv_atk+'/'+v.iv_def+'/'+v.iv_sta+'</span>';}).join("")||"—";
  var WN={"sunny/clear":"☀️晴","rainy":"🌧雨","partly_cloudy":"⛅多云","cloudy":"☁️阴","windy":"🌬风","snow":"❄️雪","fog":"🌫雾"};
  document.getElementById("detail").innerHTML='<div class="detail"><h3>'+esc(p.name_cn)+' <small style="color:var(--dim);font-weight:400">'+esc(p.name_tw)+' · '+esc(p.name_en)+' · #'+p.dex+'</small></h3>'+
    '<div style="display:flex;gap:14px;align-items:flex-start"><img src="'+(p.sprite||art(p.dex))+'" onerror="this.src=\''+art(p.dex)+'\'" style="width:90px;height:90px;object-fit:contain" onerror="this.style.opacity=.15"><div class="kv">'+
    '属性：'+tchip(p.type1)+tchip(p.type2)+'　第'+p.gen+'世代·'+esc(p.region)+(p.genus_cn?'　'+esc(p.genus_cn):'')+'<br>种族值：<b>攻 '+p.atk+'</b> / <b>防 '+p.def+'</b> / <b>体 '+p.hp+'</b>　L25满CP '+(p.level25cp||"?")+(p.height_m?'　📏'+p.height_m+'m '+p.weight_kg+'kg':'')+'<br>'+
    (flags.length?'<span style="color:var(--gold)">'+flags.join(" · ")+'</span><br>':'')+
    '✨异色：'+(p.shiny_released?'已实装 '+(p.shiny_date||""):'未实装')+'　糖果距离 '+(p.buddy_km||"?")+'km　'+genderStr(p.gender_rate)+'<br>'+
    'species_id：<code>'+esc(p.species_id)+'</code> 进化自：'+esc(p.family_parent||"—")+'</div></div>'+(p.flavor_cn?'<div class="kv" style="font-style:italic;color:#bcd;margin-top:8px">📖 '+esc(p.flavor_cn)+'</div>':'')+
    '<div class="kv" style="margin-top:10px"><b style="color:var(--gold)">🏆 PvP 最佳IV（rank-1）</b>：'+ivh+'</div>'+
    (pur?'<div class="kv">🌀 <b style="color:var(--gold)">净化成本</b>：'+pur.stardust+' 星尘 + '+pur.candy+' 糖果（暗影攻x1.2/防x0.83；净化去「祈愿」得「报恩」）</div>':'')+
    (wb.length?'<div class="kv">🌦 <b style="color:var(--gold)">天气加成</b>：'+wb.map(function(x){return WN[x.weather]||x.weather;}).join(" / ")+'</div>':'')+
    (ob.length?'<div class="kv">🎯 <b style="color:var(--gold)">当前获取</b>：'+[...new Set(ob.map(function(o){var M={raid:"团战",egg:"蛋",research:"调查"};return (M[o.method]||o.method)+(o.detail?'('+esc(o.detail)+')':'');}))].slice(0,8).join(" · ")+'</div>':'')+
    ('<div class="kv">📥 <b style="color:var(--gold)">获取来源</b>：'+[(ob.length?'当前活动/团战(见上)':null),(p.family_parent?'由'+esc((rows("SELECT name_cn FROM pokemon WHERE species_id=?",[p.family_parent])[0]||{}).name_cn||p.family_parent)+'进化':null),(p.shadow_eligible?'火箭队暗影':null),(!ob.length&&!p.family_parent?'野外/团战/活动':null)].filter(Boolean).join(' · ')+'</div>')+
    (hasEvo?'<div class="kv">🔄 <b style="color:var(--gold)">进化链</b>：'+evoHtml+'</div>':'')+
    '<div class="mv" style="margin-top:10px">⚡ <b style="color:#bfe0ff">快速招式</b><br>'+mvl(mv("fast"))+'</div>'+
    '<div class="mv" style="margin-top:8px">💥 <b style="color:#ffc59c">充能招式</b><br>'+mvl(mv("charged"))+'</div></div>';
  window.scrollTo({top:0,behavior:"smooth"});
}
function moveDetail(mid){
  var m=rows("SELECT * FROM moves WHERE move_id=?",[mid])[0];if(!m)return;
  var users=rows("SELECT p.dex,p.name_cn,p.sprite,p.species_id,pm.slot,pm.is_elite FROM pokemon_moves pm JOIN pokemon p ON p.species_id=pm.species_id WHERE pm.move_id=? AND p.is_shadow=0 ORDER BY pm.is_elite, p.dex",[mid]);
  var slotcn=m.slot==="fast"?"快速招式":"充能招式";
  var bf=m.pvp_buffs?'<br>⚡ <b>PvP buff</b>：'+esc(m.pvp_buffs):'';
  var chips=users.map(function(u){return '<span onclick="detail(\''+u.species_id+'\')" style="cursor:pointer;display:inline-flex;align-items:center;gap:3px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:2px 7px;margin:2px;font-size:11.5px">'+(u.is_elite?"🔑":"")+'<img src="'+esc(u.sprite)+'" style="width:20px;height:20px;object-fit:contain" onerror="this.style.display=\'none\'">'+esc(u.name_cn)+'</span>';}).join("");
  document.getElementById("detail").innerHTML='<div class="detail"><h3>'+esc(m.name_cn)+' <small style="color:var(--dim);font-weight:400">'+esc(m.name_en)+' · '+slotcn+'</small></h3>'+
    '<div class="kv">属性：'+tchip(m.type)+'　类型：'+slotcn+'<br>'+
    '<b style="color:#bfe0ff">PvP</b>：威力 '+m.pvp_power+' · 能量 '+m.pvp_energy+bf+'<br>'+
    '<b style="color:#ffc59c">PvE</b>：威力 '+m.pve_power+' · 能量 '+m.pve_energy+' · 时长 '+(m.pve_duration_ms?m.pve_duration_ms/1000+"s":"-")+'</div>'+
    '<div class="kv" style="margin-top:10px">📚 <b style="color:var(--gold)">会此招式的宝可梦（'+users.length+' 只，🔑=传承/精英）</b></div><div style="margin-top:6px">'+chips+'</div></div>';
  window.scrollTo({top:0,behavior:"smooth"});
}
window.moveDetail=moveDetail;
window.detail=detail;
function search(q){
  if(!DB)return;q=(q||"").trim();
  var res=document.getElementById("res");document.getElementById("detail").innerHTML="";
  if(!q){res.innerHTML="";return;}
  var like="%"+q.toLowerCase()+"%";
  var r=rows("SELECT species_id,dex,name_cn cn,name_tw tw,name_en en,type1,type2,sprite FROM pokemon WHERE lower(name_cn) LIKE ? OR lower(name_tw) LIKE ? OR lower(name_en) LIKE ? OR lower(species_id) LIKE ? OR dex=? ORDER BY dex LIMIT 80",[like,like,like,like,(/^\d+$/.test(q)?+q:-1)]);
  res.innerHTML=r.length?r.map(function(p){return '<div class="r" onclick="detail(\''+p.species_id+'\')"><img loading="lazy" src="'+(p.sprite||art(p.dex))+'" onerror="this.onerror=null;this.src=\''+art(p.dex)+'\'"><div><div class="rn">'+esc(p.cn)+'<small>'+esc(p.tw)+' · '+esc(p.en)+' · #'+p.dex+'</small></div><div style="margin-top:4px">'+tchip(p.type1)+tchip(p.type2)+'</div></div></div>';}).join(""):'<div class="note">没找到「'+esc(q)+'」</div>';
  // also match moves
  var mq="%"+q.toLowerCase()+"%";
  var mv=rows("SELECT move_id,name_cn,name_en,type,slot FROM moves WHERE lower(name_cn) LIKE '"+q.toLowerCase().replace(/'/g,"")+"%' OR lower(name_en) LIKE '"+q.toLowerCase().replace(/'/g,"")+"%' LIMIT 12");
  if(mv.length){res.innerHTML+='<div class="meta" style="margin-top:12px">🎯 招式（点击看会此招式的宝可梦）</div>'+mv.map(function(m){return '<div class="r" onclick="moveDetail(\''+m.move_id+'\')"><div style="width:50px;text-align:center">'+(m.slot==="fast"?"⚡":"💥")+'</div><div><div class="rn">'+esc(m.name_cn)+'<small>'+esc(m.name_en)+'</small></div><div style="margin-top:4px">'+tchip(m.type)+'</div></div></div>';}).join("");}
}
window.search=search;
function runSQL(){
  if(!DB)return;var out=document.getElementById("sqlout");
  try{var r=rows(document.getElementById("sql").value);
    if(!r.length){out.innerHTML='<div class="note">无结果</div>';return;}
    var cols=Object.keys(r[0]);
    out.innerHTML='<table><tr>'+cols.map(function(c){return '<th>'+esc(c)+'</th>';}).join("")+'</tr>'+r.map(function(row){return '<tr>'+cols.map(function(c){return '<td>'+esc(row[c])+'</td>';}).join("")+'</tr>';}).join("")+'</table>';
  }catch(e){out.innerHTML='<div class="note" style="color:#ff7a8f">SQL 错误：'+esc(e.message)+'</div>';}
}
window.runSQL=runSQL;
function _goHash(){if(!DB)return;var mm=(location.hash||"").match(/^#m(\d+)/);if(!mm)return;var r=rows("SELECT species_id FROM pokemon WHERE dex=? AND is_shadow=0 ORDER BY length(species_id) LIMIT 1",[+mm[1]]);if(r.length)detail(r[0].species_id);}
window.addEventListener("hashchange",_goHash);
initSqlJs({locateFile:function(f){return "https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/"+f;}}).then(function(SQL){
  return fetch("pokemon.db?v20260624-41456").then(function(r){return r.arrayBuffer();}).then(function(buf){
    DB=new SQL.Database(new Uint8Array(buf));
    var n=rows("SELECT COUNT(*) c FROM pokemon")[0].c, m=rows("SELECT COUNT(*) c FROM moves")[0].c;
    document.getElementById("meta").innerHTML="✅ 已加载 <b>"+n+"</b> 宝可梦 · <b>"+m+"</b> 招式（pokemon.db）";
    _goHash();
  });
}).catch(function(e){document.getElementById("meta").innerHTML='<span style="color:#ff7a8f">加载失败：'+esc(e.message)+'</span>';});
</script><script src="site-nav.js?v=4"></script></body></html>
