<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d6dff"/>
      <stop offset="1" stop-color="#8a5cff"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.32" cy="0.26" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7ecf6"/>
    </linearGradient>
    <radialGradient id="btn" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="1" stop-color="#ffcb05"/>
    </radialGradient>
  </defs>
  <!-- app-icon background -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#sheen)"/>
  <!-- poké ball as battle emblem -->
  <g>
    <circle cx="32" cy="32" r="20" fill="#0e1016"/>
    <!-- top hemisphere -->
    <path d="M12 30 A20 20 0 0 1 52 30 Z" fill="url(#top)"/>
    <!-- lower hemisphere: translucent so the gradient glows through -->
    <path d="M12 34 A20 20 0 0 0 52 34 Z" fill="#ffffff" fill-opacity="0.10"/>
    <!-- equator band -->
    <rect x="12" y="30" width="40" height="4" fill="#0e1016"/>
    <!-- center button -->
    <circle cx="32" cy="32" r="8.5" fill="#0e1016"/>
    <circle cx="32" cy="32" r="6.2" fill="url(#btn)"/>
    <!-- 4-point spark inside the button (site spark motif) -->
    <path d="M32 27.4 L33.1 31 L36.6 32 L33.1 33 L32 36.6 L30.9 33 L27.4 32 L30.9 31 Z" fill="#0e1016" fill-opacity="0.85"/>
  </g>
</svg>
