":["Grass","Flying"],"evo":[{"dexNumber":492,"cnName":"谢米","enName":"Shaymin"}],"moveset":"天空形态(Sky Forme,草/飞,通用 PvE 最强):快攻 Magical Leaf(魔法叶) + 大招 Grass Knot(草缚),约 15.6 DPS / 315 TDO,S 级草系输出，晴天加成。陆地形态(Land Forme,纯草):快攻 Hidden Power(觉醒力量,选草属性) + 大招 Solar Beam(日光束)或 Energy Ball(能量球);整体弱于天空形态。结论:打团/刷草系伤害选天空形态 Magical Leaf + Grass Knot。","get":"幻之宝可梦，仅限活动获取。常见途径:GO 嘉年华(GO Fest)或特定付费/限时 Special Research(特殊研究)任务线奖励,完成任务可获得陆地形态谢米。天空形态需要用 Gracidea(葛拉西蒂亚花)在白天将陆地形态切换而来(活动限定道具,夜晚或冰冻状态会变回陆地形态)。不会野生遇见、不孵蛋、不在常规团战出现。","train":"单阶幻兽,无进化,糖果只能靠任务奖励/与好友远距离行走(伙伴)/Rare Candy(神奇糖果)转换,极其稀有。XL 糖果同样靠 Rare Candy XL、伙伴行走和满级喂养掉落，非常稀缺。培养建议:作为团战草系炮台优先堆攻击向 IV(攻击 14-15),用 Rare Candy 集中喂一只到 L40,有充足 XL 糖果再视情况推到 L50;由于糖果获取门槛高,普通玩家做到 L40 + 解锁第二大招(Magical Leaf + Grass Knot)即可满足绝大多数团战需求,L50 仅推荐糖果富余的硬核玩家。","formNote":"谢米没有暗影形态(非火箭队/团战来源),也没有 Mega/Primal 超进化。可选形态只有陆地形态(纯草)与天空形态(草/飞)。团战通用输出明确推荐天空形态:它攻击面板更高,且最佳配招 Magical Leaf + Grass Knot 的 DPS/TDO 都优于陆地形态,是 S 级草系攻击手。陆地形态更偏防御/PvP 大师联盟使用。所以打 Raid 选天空形态。"},"zarude":{"cn":"札仔熊 / 札游格（官方简体译名：札游格）","en":"Zarude","dex":893,"types":["Dark","Grass"],"evo":[{"dexNumber":893,"cnName":"札游格","enName":"Zarude"}],"moveset":"快攻 Vine Whip（藤鞭，草系）/ 大招 Power Whip（强力鞭打，草系，主输出）。作为暗/草双属性，草系输出组合最实用；若想打暗系输出可用 Bite（咬住）+ Dark Pulse（恶之波动）。综合 PvE 推荐 Vine Whip + Power Whip 当草系输出位。","get":"截至目前（2026 年中），Zarude 尚未在 Pokemon GO 中正式实装/可获取。它是幻之宝可梦（Mythical），此类通常通过限定特殊调查（Special Research）、付费活动门票或限时活动发放，野外、蛋、团战中均无法获得。请留意 Niantic 官方活动公告，届时多半以「特殊调查任务线」形式发放，且通常每账号仅 1 只。","train":"幻之宝可梦糖果稀缺：完成调查任务给予的少量糖果 + 用神秘糖果/XL 神秘糖果（Rare Candy / Rare Candy XL）转化，搭配「最爱伙伴」散步刷糖。团战用应优先堆攻击型 IV（高 ATK），强化到 L40 即可应付绝大多数团本；追求极限输出/PvP 大师联盟再用 XL 糖果推到 L50。由于只能拥有 1 只，建议谨慎确认 IV 后再投入 XL 糖果满级。","formNote":"Zarude 没有 Mega（超进化）或 Primal（原始回归）形态，也尚无暗影（Shadow）形态（幻之宝可梦不会出现在火箭队手中）。因此团战只有普通本体形态可用，无需在形态间取舍——直接练满普通形态的高攻个体即可。"},"rillaboom":{"cn":"轰擂金刚猩","en":"Rillaboom","dex":812,"types":["Grass"],"evo":[{"dexNumber":810,"cnName":"敲音猴","enName":"Grookey"},{"dexNumber":811,"cnName":"啪咚猴","enName":"Thwackey"},{"dexNumber":812,"cnName":"轰擂金刚猩","enName":"Rillaboom"}],"moveset":"快攻 Razor Leaf(飞叶快刀) + 大招 Frenzy Plant(疯狂植物，社区日专属招式)。这是最高 DPS 的纯草属性输出组合，约 14.6 DPS。备选大招 Drum Beating(鼓击) 或 Grass Knot(打草结)。Frenzy Plant 须在敲音猴社区日(或用精英充能TM)期间进化才能习得，强烈优先获取。","get":"主要通过捕捉野生敲音猴(Grookey)后进化获得：敲音猴→啪咚猴需 25 颗糖果，啪咚猴→轰擂金刚猩需 100 颗糖果。敲音猴最初为社区日/活动限定，目前可在野外、卡牌、5 公里蛋及活动团战中遇到。也可能作为团战 Boss 直接捕捉到本体。","train":"团战定位是高攻输出，主要看进攻面。每只进化需 25+100=125 颗敲音猴糖果，外加强化所需糖果与星尘；冲到 L40 以上需要 XL 糖果(L40→50)。建议先把一只配上 Razor Leaf + Frenzy Plant 强化到 L40 用于通用草系团战；若资源充足且常打受草系克制的团战(水/地/岩 Boss)，再投 XL 糖果推到 L45-50。优先用 XL 糖果强化暗影形态(若已拥有)而非普通体，性价比更高。","formNote":"团战推荐用「暗影 轰擂金刚猩」(Shadow Rillaboom)。它没有 Mega/超进化或 Primal 形态，所以形态选择只在普通体与暗影体之间。暗影形态攻击约提升 20%(伤害乘以 1.2)，是顶级暗影草系输出之一，DPS 明显高于普通体，缺点是更脆且需消耗暗影石/紫色道具除暗影。若追求最大输出选暗影体并配 Razor Leaf + Frenzy Plant；若只想要稳健省资源的通用草系，普通体已是 A+ 级别足够用。"},"roserade":{"cn":"罗丝雷朵","en":"Roserade","dex":407,"types":["Grass","Poison"],"evo":[{"dexNumber":406,"cnName":"含羞苞","enName":"Budew"},{"dexNumber":315,"cnName":"毒蔷薇","enName":"Roselia"},{"dexNumber":407,"cnName":"罗丝雷朵","enName":"Roserade"}],"moveset":"PvE 草系输出首选: 快攻 Magical Leaf (魔法叶 / 草系，能量充能快) + 大招 Grass Knot (草缚 / 草系)。这是当前最高 DPS 的草系配招。若打需要毒系输出的团战(如妖精/草系 Boss)，可改用 Poison Jab (毒击) + Sludge Bomb (污泥炸弹) 走纯毒系。备选大招 Solar Beam (日光束) DPS 略低但单次伤害高、适合躲招型团战。","get":"主要靠进化获取: 抓 Roselia(毒蔷薇，野生常见、可在草系/毒系活动与天气加成下刷)或孵 5km 蛋出 Budew(含羞苞)。Budew 用 25 糖且为搭档/白天高心情时进化成 Roselia，Roselia 再用 100 糖 + 1 个 Sinnoh Stone(神奥之石)进化成 Roserade。Sinnoh Stone 来自连续 7 天的研究突破、对战联盟奖励、或击败火箭队 Leader。暗影版 Roselia/Roserade 通过击败火箭队普通手下并救回获得。偶尔在社区日/活动中野生出现 Roselia 闪光。","train":"团战定位是脆皮高攻草系炮台，IV 优先 15 攻击(防御/HP 次要)。糖果来源: 抓 Roselia/Budew、走路糖果伙伴(3km/糖)、转移多余个体、Pinap 莓加倍。强化到 Roserade 共需 125 糖(25 进化 Budew→Roselia + 100 进化 Roselia→Roserade)，之后每次强化继续吃糖。要打满 L40 需约 250+ 糖；L41-50 需 XL 糖果(L40 后每级吃 XL，满 L50 累计约 296 XL 糖 + 654 普通糖)。XL 糖来自高级抓捕、走路、对战联盟与团战奖励。建议至少养一只满 L40 的好 IV(或闪光)主力，资源充裕再冲 L50 用于大型 Mega/草系团战。","formNote":"Roserade 没有 Mega 进化也没有 Primal 形态(主系列与 GO 中均不存在)，因此无需考虑超进化形态。可考虑的是暗影形态(Shadow Roserade): 暗影版攻击提升 20%(防御降 20%)，作为纯输出炮台在团战中 DPS 明显高于普通形态，是更优选择——团战推荐优先培养暗影 Roserade 并配 Magical Leaf + Grass Knot。普通形态续航/掉血更耐打但输出更低；若只为最大化伤害选暗影，若想兼顾稳定循环可用普通形态。"},"kyurem":{"cn":"酋雷姆","en":"Kyurem","dex":646,"types":["Dragon","Ice"],"evo":[{"dexNumber":646,"cnName":"酋雷姆","enName":"Kyurem"}],"moveset":"快攻 龙之吐息 (Dragon Breath) + 大招 寒冰冲压 (Glaciate)。这是本体酋雷姆的最高 DPS 组合，能同时吃到龙系与冰系的属性加成（STAB）。若专打非龙系目标当纯冰系输出，也可考虑龙之吐息 + 寒冰冲压；当作龙系输出打则龙之吐息 + 真气弹/十万伏特等取决于对手。本体定位约 A+ 级冰系攻击手。","get":"仅能通过五星传说团战 (5-star Raid) 捕获，团战结束后进入捕捉环节，用普通/超级球加树果（金/银帕帕亚果、菠萝果）提高捕获率。也会在特定活动（如 Kyurem Fusion Raid Day、GO Tour: Unova 等）作为团战 Boss 重新上线。无法野外遇见，无法孵蛋。捕到后即为本体酋雷姆。","train":"本体每次强化消耗 酋雷姆糖果 + 星尘；冲到 L40 以上需要 酋雷姆XL糖果 (Candy XL)。糖果来源：团战捕捉(每只约3颗)、用糖果转换器(Rare Candy/XL)、与好友赠送的伙伴礼物、设为伙伴步行(每5km一颗)。团战主用，建议优先拉满 IV 偏高(尤其攻击)的个体，强化到 L40，预算充足且常打高难团战/末日团战(Master League级别需求)再用XL糖果推到 L50 以提高血量与续航。无须刻意刷防御。","formNote":"团战首选融合形态而非本体或暗影。两种融合形态均为 S 级冰系攻击手：白酋雷姆 (White Kyurem，瑞希拉姆融合，配 冰息+酷寒冲击/Ice Burn) 是当前冰系第1的纯输出王，专打龙系冰弱目标(如烈咬陆鲨、暴飞龙、化石翼龙)首选；黑酋雷姆 (Black Kyurem，捷克罗姆融合，配 龙尾+冰冻伏特/Freeze Shock) 冰系第2且兼任龙系第8，更全能。融合需 1000 融合能量 + 30 酋雷姆糖果 + 30 对应传说糖果。暗影形态暂未在游戏内提供(2026年初仍未上线 Shadow Kyurem)，故无法用暗影增伤；如未来开放暗影本体，暗影加成会高于普通本体但仍不及融合形态。结论：能融合就融合，纯冰系打输出选白酋雷姆，要兼顾龙系/更稳选黑酋雷姆。"},"mamoswine":{"cn":"象牙猪","en":"Mamoswine","dex":473,"types":["Ice","Ground"],"evo":[{"dexNumber":220,"cnName":"小山猪","enName":"Swinub"},{"dexNumber":221,"cnName":"长毛猪","enName":"Piloswine"},{"dexNumber":473,"cnName":"象牙猪","enName":"Mamoswine"}],"moveset":"冰系输出（最佳通用）: 粉雪 Powder Snow（快攻）+ 雪崩 Avalanche（大招）。粉雪能量积攒快、雪崩性价比极高，是冰系 PvE DPS 最优组合。地面系输出（覆盖打法）: 玩泥巴 Mud-Slap（快攻）+ 十万马力 High Horsepower（大招），STAB 地面输出强力。建议主练冰系配招，地面打法可用第二大招（解锁双大招技能机器）。","get":"1) 由长毛猪 Piloswine 进化而来：需 100 颗象牙猪糖果 + 进化时需已学会上古之力（Ancient Power，长毛猪的特殊技能），因此通常要先用进化道具/技能机或在长毛猪状态下学会上古之力。2) 小山猪 Swinub 主要来源：野外刷新（雪天/晴天天气加成）、2km 蛋孵化、Field Research 任务奖励、社区日（曾作过社区日宝可梦，可学独占技能）。3) 长毛猪/象牙猪偶尔作为团战 Boss 出现，可直接捕获。暗影象牙猪通过击败火箭队头目/手下后捕获暗影小山猪/长毛猪再进化获得。可遇闪光。","train":"团战定位为高攻速攻型脆皮，优先堆攻击。糖果：进化全链共需 25（小山猪→长毛猪）+ 100（长毛猪→象牙猪）颗糖果；强化到高等级另需大量糖果。XL 糖果：从 L40 强化到 L50 需消耗 XL 糖果（约 296 颗 XL 糖果从 L40→L50），团战推荐冲到 L40 即可获得绝大部分收益，追求满级再投 XL。IV 建议优先高攻击（团战 DPS 取向，不必追 100%，攻击高即可）。糖果来源：捕捉/进化/步行伙伴/Pinap 树果加倍/与 Lucky/社区日加成。建议练 1-2 只高攻冰系配招用于冰系团战，必要时再练地面配招版本。","formNote":"没有 Mega/超进化也没有 Primal 形态，因此形态选择只在普通 vs 暗影之间。团战强烈推荐暗影象牙猪 Shadow Mamoswine：暗影提供约 +20% 攻击加成（伤害乘以 1.2），代价是受到伤害 +20%，但象牙猪本就是高攻脆皮速攻型，团战追求 DPS，暗影版是冰系/地面系输出的明显升级，是冰系顶级 attacker 之一。若不在意承伤、能快速复活换人，暗影优先；普通版更省回复道具、适合长时间续航。"},"glalie":{"cn":"冰鬼护","en":"Glalie","dex":362,"types":["Ice"],"evo":[{"dexNumber":361,"cnName":"雪童子","enName":"Snorunt"},{"dexNumber":362,"cnName":"冰鬼护","enName":"Glalie"},{"dexNumber":478,"cnName":"雪妖女","enName":"Froslass"}],"moveset":"快攻: 细雪 (Frost Breath / 冰系); 大招: 雪崩 (Avalanche / 冰系)。这是 Glalie 和 Mega Glalie 在 PvE 下的最优冰系输出组合 (Frost Breath + Avalanche)。","get":"主要途径: 捕捉雪童子 (Snorunt) 后用 100 颗糖果进化为冰鬼护 (注意: 同一只雪童子若为雌性且喂 100 糖 + 使用神奥之石可改进化成雪妖女, 想要冰鬼护直接用糖进化即可)。雪童子在野外 (尤其雪天 / 冬季活动)、5km 蛋、团本及限时活动中出现。暗影冰鬼护/暗影雪童子自 2024-01-27 \"Taken Treasures\" 活动起由火箭队头目掉落, 可通过击败 Cliff/Sierra/Arlo 等并净化获得。Mega 能量来自 Mega Glalie 团本。","train":"攒糖: 进化要 100 颗糖; 用奇异糖果、伙伴行走、捕捉雪童子家族、抓 Pokemon 时喂 Pinap 莓加倍出糖。XL 糖果: 仅在想冲到 L40-50 时才需要, 主要靠捕捉高等级个体、远距离孵蛋/抓捕和团战奖励掉落。培养优先选高攻 (Attack) IV 个体以最大化团战 DPS; 想压满则推到 L40-50。但需提醒: 冰鬼护本身是较弱的冰系输出 (F 级), 不建议为它砸大量星尘/XL 糖, 把资源留给更强冰系 (如急冻鸟、玛狃拉、Baxcalibur、Mamoswine 等) 更划算。","formNote":"团战 (PvE/团本) 中本体冰鬼护输出很弱, 不推荐认真培养。若一定要用, 形态优劣排序: Mega Glalie > 暗影冰鬼护 > 普通冰鬼护。Mega Glalie 攻击面板最高 (Frost Breath + Avalanche, DPS≈13.5), 且能给同场冰系/同属性队友加成, 是该家族在团战中的最佳形态——但它仍被诸多非传说冰系 (如 Baxcalibur) 超越, 属小众选择。暗影形态 (+20% 伤害, -20% 防御) 比普通版纯输出更高, 适合速刷; 但无法同时叠暗影与 Mega。综合: 想用就用 Mega Glalie 顶团/带队加成, 否则首选其他强力冰系。"},"baxcalibur":{"cn":"戟脊龙","en":"Baxcalibur","dex":998,"types":["Dragon","Ice"],"evo":[{"dexNumber":996,"cnName":"凉脊龙","enName":"Frigibax"},{"dexNumber":997,"cnName":"冰脊龙","enName":"Arctibax"},{"dexNumber":998,"cnName":"戟脊龙","enName":"Baxcalibur"}],"moveset":"通用 PvE 冰系输出（打龙/飞/地/草系团战）: 快攻 Ice Fang（冰之牙）+ 大招 Avalanche（雪崩）。这是 Baxcalibur 作为顶级冰系团战手的标配，Ice Fang 充能快、Avalanche 单棒伤害高。若打纯龙系 Boss（如烈咬陆鲨、暴飞龙、烈空坐等），用社区日限定大招 Glaive Rush（巨剑突击，龙系 105 威力，对龙系双倍效果）替换 Avalanche，把双重克制龙系的优势拉满。简言之：冰系万金油用 Ice Fang + Avalanche；专打龙就 Ice Fang + Glaive Rush。","get":"2023-09-05「帕底亚的冒险」活动随朱/紫初始组一同上线。日常途径：野外/卡通蛋偶尔刷出 Frigibax（凉脊龙），捕捉后用糖果进化为 Arctibax（25 糖）再进化为 Baxcalibur（100 糖）。最佳获取窗口就在眼前——2026-06-20（周六）14:00–17:00 本地时间为 Frigibax 社区日，大幅增加 Frigibax 刷新、3x 星尘、2x 捕捉糖果、闪光率约 1/20。活动期间或结束后 4 小时内进化出的 Baxcalibur 自带限定大招 Glaive Rush（巨剑突击）。可闪光。","train":"团战手优先堆攻击：本体基础攻击高，作为 S 级冰系输出值得投资。强化目标 L40，有 XL 糖足够再冲 L50（团战实战 L40 已够用，L50 为锦上添花）。糖果来源：社区日大量捕捉 Frigibax（2x 糖）、与好友交换得 XL 糖、用神奇糖果、走路伙伴。建议：社区日当天先囤够 100 普通糖 + 备用，进化出带 Glaive Rush 的个体后再强化；优先练高 IV（攻击拉满优先）的个体。社区日是攒糖和 XL 糖的最划算时机，建议多进化几只——一只走纯冰系（Ice Fang + Avalanche）、一只走打龙（Ice Fang + Glaive Rush）。","formNote":"游戏内目前没有暗影 Baxcalibur（社区日/火箭队均未投放），也尚未实装超进化/Mega（官方仅预告未来会有 Mega，截至 2026-06 未上线），更没有 Primal 形态。因此当前团战只能用普通本体，没有更优的特殊形态可选。要点：把投资重心放在带社区日限定大招 Glaive Rush 的普通个体上，这就是现阶段的最优解；待未来 Mega Baxcalibur 实装后，Mega 形态会进一步提升冰/龙系团战输出，届时再考虑超进化。"},"weavile":{"cn":"玛狃拉","en":"Weavile","dex":461,"types":["Dark","Ice"],"evo":[{"dexNumber":215,"cnName":"狃拉","enName":"Sneasel"},{"dexNumber":461,"cnName":"玛狃拉","enName":"Weavile"}],"moveset":"快攻：冰砾 (Ice Shard)；大招：劈瓦 (Avalanche)。这是 Weavile 作为冰系输出的最佳 PvE 配招组合，冰砾充能快、劈瓦伤害与效率高。若需要恶系输出/打灵系或恶系弱点，可改用 快攻 雪崩… 实际恶系建议快攻 暗冲 (Snarl) + 大招 噩梦冲击 (Foul Play)，但纯打输出（如打龙/飞/地/草）时冰砾+劈瓦更强。","get":"1) 野外捕捉狃拉 (Sneasel) 后进化；狃拉在夜间/寒冷生态更常见。2) 进化：玛狃拉需在「夜间」且背包持有「锐利之爪 (Sharp Claw)」道具，并消耗 100 颗狃拉糖果进化狃拉得到。3) 锐利之爪可通过完成「连续 7 天首次抓宝研究 (Field Research / 7-day streak)」、特殊调查、活动或随机道具途径获得。4) 团战 (Raid) 偶尔出现狃拉/玛狃拉作为团战 Boss；活动期间野外刷新率提升。5) 暗影玛狃拉可通过击败火箭队头目 (Giovanni) 或火箭队手下后捕捉暗影狃拉再进化获得。","train":"糖果用「狃拉糖果」，强化到高等级还需「狃拉 XL 糖果 (Candy XL)」。玛狃拉是高攻、脆皮的玻璃大炮输出，团战追求 DPS。培养建议：优先拉满 IV 中「攻击」高的个体（理想 15 攻），强化到 L40；若有充足 XL 糖果可推到 L45-50 提升续航与总输出。打团/道馆进攻才有意义，因防御和 HP 低，不建议用于防守。强化路径：等级提升消耗星之沙 + 狃拉糖果，L40 以上每级额外消耗 XL 糖果。建议同时配齐两套招式（冰系冰砾+劈瓦 用于打龙/飞/地/草；恶系用于打灵/超能/恶），用第二充能技能解锁双大招以灵活应对不同团战。","formNote":"玛狃拉无超进化 (Mega) 和原始回归 (Primal) 形态，因此只能在普通形态与暗影形态间选择。强烈推荐使用「暗影玛狃拉 (Shadow Weavile)」用于团战：暗影形态攻击力 +20%（防御 -20%），作为本就脆皮的玻璃大炮，它在团战中的额外攻击加成带来约 20% 的 DPS 提升，是顶级冰系输出之一。脆皮代价对快速团战影响不大，团战首选暗影形态；普通形态更耐久、适合需要少换人或对战 (PvP) 场景。综合结论：团战用暗影形态最优。"},"glaceon":{"cn":"冰精灵","en":"Glaceon","dex":471,"types":["Ice"],"evo":[{"dexNumber":133,"cnName":"伊布","enName":"Eevee"},{"dexNumber":471,"cnName":"冰精灵","enName":"Glaceon"}],"moveset":"快攻 Frost Breath(冰息)+ 大招 Avalanche(雪崩)。这是冰系输出的最佳通用 PvE 配招(约 12.7 DPS / 231 TDO)。备选快攻 Ice Shard(冰冻拳/细雪)也可用,但 Frost Breath 充能更快、整体 DPS 略高。雪天(Snow)天气加成下两招都会增伤。","get":"冰精灵无法在野外捕获,只能用伊布(Eevee)进化获得。两种方式:1)改名彩蛋——把伊布改名为「Rea」后进化,每账号仅生效一次;2)长期可重复方式——在贴有「冰冻诱饵模组(Glacial Lure Module)」的补给站范围内,花 25 个伊布糖果进化伊布(进化按钮会显示冰精灵的剪影);冰冻诱饵模组商店售价 200 金币,也可通过活动/任务获得。伊布本体可野外捕获、孵蛋或社区日活动大量获取。","train":"糖果与星尘来源:大量捕捉伊布积攒伊布糖果(伊布社区日是囤糖好时机),搭配「神奇糖果」补充。团战定位是冰系纯输出,优先培养高攻 IV 个体(理想 15 攻;防御/HP 次要)。强化目标:常规团战 PvE 拉到 L40 即可,有余力(XL 糖果充足、追求极限输出)可推到 L50。XL 糖果主要靠捕捉伊布、孵蛋、远程/团战及交换获得,留给最优 IV 个体再冲 L50,避免浪费。Lucky(幸运)个体强化星尘减半,优先升它。","formNote":"Pokemon GO 中冰精灵目前没有 Mega(超进化)/Primal 形态,也没有可获得的暗影(Shadow)形态,因此不存在更优替代形态,直接使用普通形态即可。即便未来若开放暗影形态,暗影会显著提升攻击(适合团战拼输出),但在此之前无需考虑。整体而言冰精灵是 A 级冰系输出,但弱于 Mamoswine(象牙猪)、Baxcalibur、伽勒尔火爆兽等顶级冰系,若已有这些则冰精灵仅作补位。"},"lucario":{"cn":"路卡利欧","en":"Lucario","dex":448,"types":["Steel","Fighting"],"evo":[{"dexNumber":447,"cnName":"利欧路","enName":"Riolu"},{"dexNumber":448,"cnName":"路卡利欧","enName":"Lucario"}],"moveset":"快攻: 真气拳 (Force Palm) / 大招: 波导弹 (Aura Sphere)。这是路卡利欧及超进化形态在 PvE 团战中公认的最佳配招——波导弹是其最强大招,搭配真气拳能量产出最优。备选大招可考虑闪光石 (Power-Up Punch) 仅在 PvP 续航场景,PvE 一律用波导弹。","get":"主要途径是先获得「利欧路 (Riolu)」再进化:利欧路目前从 10km 蛋孵化、部分调查任务 (Field/Special Research) 奖励、以及活动限定刷新中获得;部分活动期间野外/团战也会直接出现。集齐 50 颗利欧路糖果即可将利欧路进化为路卡利欧 (进化时若处于好友加成/特定活动可能附带特定招式)。超进化需要消耗「路卡利欧超能量 (Lucario Mega Energy)」,通过打超进化团战 (Mega Raid) 获取。","train":"团战定位是高攻输出,优先堆攻击面板。强化路径:1) 集齐 50 颗利欧路糖果先把利欧路进化成路卡利欧;2) 选 IV 时优先攻击 IV 高 (理想 15 攻),PvE 不在乎防御/HP,所以纯 PvE 可不追求完美 100%;3) 糖果与星尘强化到 L40,有 XL 糖果可续推到 L50 进一步抬高 CP/攻击;4) XL 糖果通过孵蛋、捕捉/转移利欧路系、以及最优好友赠蛋累积,数量需求大 (L40→L50 约需 296 颗 XL 糖果),建议优先把资源集中喂 1-2 只高攻个体,而不是平摊。日常拿来打格斗弱点团战 (钢/岩/冰/恶/普通系 Boss) 时,L40 已足够,L50 主要用于满级冲伤害排名。","formNote":"超进化 (Mega Lucario) 明显更优,是团战首选。Mega Lucario 是当前游戏内排名第一的格斗系攻击手 (S-Tier),输出远高于普通路卡利欧,且超进化期间还为同队所有格斗系队友提供伤害加成,价值极高——只要你有路卡利欧超能量,团战务必用 Mega 形态。暗影形态 (Shadow Lucario) 目前在 Pokémon GO 中尚不可获得 (利欧路/路卡利欧未作为火箭队暗影宝可梦投放),因此无需考虑;若未来开放,暗影版会比普通版高约 20% 输出但更脆,适合纯刷伤害。结论:能 Mega 就 Mega,无 Mega 能量时用普通满攻个体顶上。"},"keldeo":{"cn":"凯路迪欧","en":"Keldeo","dex":647,"types":["Water","Fighting"],"evo":[{"dexNumber":647,"cnName":"凯路迪欧","enName":"Keldeo"}],"moveset":"通用 PvE 最优: 快攻 Low Kick(踢倒/格斗) + 大招 Sacred Sword(圣剑/格斗)。这套以格斗 STAB 输出为核心，DPS 与 TDO 最高，作为格斗输出位用这套。若专门打弱水的目标(火/地/岩),可改大招为 Hydro Pump(水炮/水)吃水系 STAB。建议养一只用充电TM切换 Sacred Sword/Hydro Pump 两套以覆盖不同团战。注: Resolute Forme(觉悟形态)可学 Secret Sword,格斗输出更高(约19.57 DPS),若已解锁优先用觉悟形态。","get":"作为幻之宝可梦,主要通过限时特殊研究获取: \"Tales of Transformation\"(变身物语)赛季特殊研究于 2025-09-02 至 2025-12-02 提供普通形态 Keldeo,完成后可解锁 Resolute Forme(觉悟形态)。闪光 Keldeo 通过 Final Justice 活动的 \"Pony Tales\" 付费 Masterwork 大师研究获取(2025-11-25 起,US$7.99)。错过研究的玩家后续可通过团战(五星/传说团战轮换)获得,团战捕获 CP 约 2026-2113,天气加成 2533-2641。无野生/孵蛋/Rocket 阴影获取途径。","train":"团战定位为格斗(兼水)输出位,主打高攻。糖果通过研究奖励、团战捕获、好友赠礼旅行(远程)及用稀有糖果/稀有糖果XL转化获得。优先把第二大招解锁(20万星尘+若干糖果)以同时携带 Sacred Sword 与 Hydro Pump。强化路线: 先冲到 L40,够用于绝大多数团战;若要顶配并打高级/超极巨场景,推 L40-50(L50 需大量糖果XL与星尘),用稀有糖果XL补足 XL 缺口。攻击属性已强,无需追防御,直接拉满等级即可。","formNote":"Keldeo 没有 Mega/超进化,也没有 Primal 形态,作为幻之宝可梦同样不能被火箭队变成阴影形态,因此不存在\"暗影/Mega 更优\"的选择。唯一的形态升级是 Resolute Forme(觉悟形态),它能学习专属招式 Secret Sword,格斗输出明显高于普通(Ordinary)形态。团战推荐: 已通关 Tales of Transformation 研究的话,优先培养并使用觉悟形态 + Low Kick/Secret Sword;未解锁则用普通形态 Low Kick/Sacred Sword 即可。"},"heracross":{"cn":"赫拉克罗斯","en":"Heracross","dex":214,"types":["Bug","Fighting"],"evo":[{"dexNumber":214,"cnName":"赫拉克罗斯","enName":"Heracross"}],"moveset":"快攻 Counter（格斗）+ 大招 Close Combat（地震拳/真气拳，格斗）。这是赫拉克罗斯输出格斗系伤害的最佳组合：Counter 是全游戏最强快攻之一，Close Combat 单次能量伤害极高。若需虫系输出可用 Megahorn（巨角）做大招，但通用 PvE 团战首选 Counter + Close Combat。","get":"赫拉克罗斯是地区限定宝可梦，野生只出现在特定纬度区域（主要在拉丁美洲/南美地区，部分美国南部）。其他玩家可通过：1) 旅行到限定区域捕捉；2) 远程交换（Trade，需对方持有，且跨距离需较高星尘）；3) 限定活动（如某些远征/Go Tour、研究突破奖励或 5 星团战临时上架时）有机会获得；4) 偶尔作为活动期间的全球解锁或团战首领出现。它没有进化前/后形态，捕捉到即最终形态。","train":"赫拉克罗斯无进化链，所有糖果（普通糖果 + XL 糖果）全部用于强化。团战取向应优先把它升到高 CP / 高等级：用普通糖果 + 星尘升到 L40，再用 XL 糖果继续升到 L45–50（L50 为满级）。由于稀有不易刷糖，建议：选 IV 攻击接近满（15 攻）的个体优先培养，配合最佳幸运糖果（Pinap）捕捉、与好友交换刷距离糖果、用 Rare Candy / Rare Candy XL 集中补足。团战中赫拉克罗斯主要作为格斗系输出位，强化到至少 L40 即可有效参团，追求满级 L50 可最大化 DPS。","formNote":"Mega Heracross（超级赫拉克罗斯）是团战的明显最优选择，远胜普通和暗影形态：它拥有全游戏顶级的虫/格斗双系攻击，Mega 化期间为全队同属性宝可梦提供伤害加成，DPS 在格斗与虫系输出中名列前茅。推荐团战使用 Mega Heracross，配招 Counter + Close Combat（格斗输出）或 Struggle Bug/Megahorn 系（虫系输出）。Shadow（暗影）形态赫拉克罗斯目前在 Pokemon GO 中尚未实装，因此不作考虑；若未来上线，暗影会进一步提升输出但需额外暗影碎片解锁招式。常规结论：能 Mega 就上 Mega Heracross，平时养一只高攻本体作为 Mega 基底即可。"},"conkeldurr":{"cn":"修建老匠","en":"Conkeldurr","dex":534,"types":["Fighting"],"evo":[{"dexNumber":532,"cnName":"搬运小匠","enName":"Timburr"},{"dexNumber":533,"cnName":"铁骨土人","enName":"Gurdurr"},{"dexNumber":534,"cnName":"修建老匠","enName":"Conkeldurr"}],"moveset":"最佳通用 PvE 配招：快攻 Counter（音击/格斗系，能量积攒快、伤害高）+ 大招 Dynamic Punch（爆裂拳，格斗系，单条性价比最高、能量需求适中）。备选大招 Brutal Swing（恶之念波，Community Day 限定招式，可作为非格斗系覆盖招），Stone Edge（尖石攻击，覆盖飞行/虫/火等）。团战刷格斗弱点 Boss 时固定用 Counter + Dynamic Punch。","get":"无法在野外直接捕获 Conkeldurr 本体。途径：1) 捕捉初阶 Timburr（搬运小匠）——野外随机刷新、10km 蛋孵化，或活动/招募日（Community Day）大量出现；2) 用 50 个 Timburr 糖果把 Timburr 进化成 Gurdurr（铁骨土人）；3) Gurdurr 进化成 Conkeldurr 需要 200 个 Timburr 糖果「且」一名好友（交换进化的替代实现，GO 中为糖果+交换二选一：交换得到的 Gurdurr 进化不耗糖，或直接花 200 糖进化）。Gurdurr 也会在特定活动作为团战 Boss 出现，可省糖。","train":"团战定位是高输出格斗墙，优先堆攻击：进化/强化时尽量选高攻 IV（攻击 14-15 最佳，防御血量次要，因为 PvE 看 DPS×TDO）。糖果消耗大——进化到 Conkeldurr 总计需 50+200=250 普通糖，强化到 L40 后继续升级需要 Timburr XL 糖果（Candy XL），刷满 L50 约需 296 XL 糖。建议：把最高攻击 IV 的个体留作团战主力，先拉到 L40（满足绝大多数团战需求），有富余 XL 糖再冲 L50。XL 糖来源：捕捉 Timburr 系、孵蛋、交换、与好友赠送、L31+ 捕捉额外掉落。Community Day 期间进化可获得专属招式 Brutal Swing，建议活动期囤一只高 IV 进化。","formNote":"Conkeldurr 在 Pokemon GO 中没有 Mega 超进化也没有 Primal，因此形态选择只在「普通 vs 暗影(Shadow)」之间。暗影 Conkeldurr 攻击加成约 +20%（伤害乘数 1.2），是顶级格斗系输出之一，团战刷格斗弱点 Boss 时明显优于普通形态，强烈推荐用暗影形态做主力 DPS（注意暗影受到伤害也增加，配合道馆/团战换人吃伤策略）。暗影来源：击败火箭队头目/手下后净化前的暗影 Gurdurr/Conkeldurr。若没有暗影，普通满级高攻 Conkeldurr 仍是性价比极高的非传说格斗输出。整体推荐优先级：暗影 Conkeldurr > 普通 Conkeldurr。"},"terrakion":{"cn":"盖诺塞克特","en":"Terrakion","dex":639,"types":["Rock","Fighting"],"evo":[{"dexNumber":639,"cnName":"代拉基翁","enName":"Terrakion"}],"moveset":"快攻 Double Kick(二连踢) + 大招 Sacred Sword(圣剑)。这是 PvE 团战首选: Double Kick 充能极快, Sacred Sword 是其招牌专属招式, 伤害高且耗能低, 综合 DPS≈18.7。打岩属性 Boss 时也可考虑 Rock Slide(岩崩) 作为岩系大招以吃 STAB, 但纯输出仍以 Sacred Sword 最优。","get":"主要通过五星传说团战(Legendary Raid)获取, 也会在传说团战日 / GO Battle 奖励轮换时回归。捕获后有概率为异色(Shiny)。无法通过孵蛋或野外遇敌获得; 需关注官方活动公告的团战 Boss 轮换。","train":"代拉基翁为传说 Pokemon, 仅靠团战捕获积累糖果, 配合 Rare Candy / Rare Candy XL 转化补足。培养目标为高攻击 IV(团战看重 Attack), 优先把 IV 攻击高的个体强化。普通团战练到 L40 即可; 若要打传说团战或追求 DPS 上限, 用 XL 糖果推到 L50。每只满级约需 296 普通糖果 + 296 XL 糖果(从 L40→L50), 建议多打几轮团战囤糖再集中培养 1-2 只。","formNote":"代拉基翁目前没有 Mega/超进化 或 Primal 形态, 因此只在普通形态与暗影形态之间二选一。强烈推荐暗影(Shadow)形态: 暗影提供 +20% 攻击加成, 对 PvE 团战极有价值, 是游戏内顶级岩系/格斗系输出之一, 唯一代价是承伤略增、需用紫黑糖果消除阴影招式。团战站桩冲伤时优先用暗影代拉基翁; 若没有暗影个体, 普通满级版本同样是优秀的格斗/岩系攻手。"},"urshifu":{"cn":"武道熊师","en":"Urshifu","dex":892,"types":["Fighting","Dark"],"evo":[{"dexNumber":891,"cnName":"熊徒弟","enName":"Kubfu"},{"dexNumber":892,"cnName":"武道熊师","enName":"Urshifu"}],"moveset":"一击流(Single Strike，格斗/恶)是最强PvE形态：快攻 Counter(音速拳，格斗) + 大招 Dynamic Punch(爆裂拳，格斗)，作为纯格斗输出 DPS≈14.87 / TDO≈319，是其最高伤害组合。若要打恶系输出位，可用 Sucker Punch(突袭) + Payback(后攻) 走恶系(DPS≈13.0)。连击流(Rapid Strike，格斗/水)同样以 Counter + Dynamic Punch 作格斗输出最佳，但水系本身缺乏强力快攻，水系定位偏弱。综合首选：一击流 Counter + Dynamic Punch。","get":"通过进化获得：先取得 Kubfu(熊徒弟)，再进化。Kubfu 主要来自特殊调查任务(如 Might and Mastery / Final Strike GO Battle Week 的 Fuzzy Fighter 调查)。进化为一击流需 200 Kubfu 糖果 + 以 Kubfu 为搭档时在团战/极巨战(Raids/Max Battles)中击败 30 只恶系；进化为连击流则需 200 糖果 + 击败 30 只水系。Kubfu 本体不必参战，只需作为搭档。武道熊师目前可极巨化(Dynamax)。","train":"糖果消耗大：进化需 200 Kubfu 糖果，满级强化约需 296 XL 糖果(冲到 L50)。团战定位看重高攻，IV 优先攻击拉满(理想 15 攻)；建议至少强化到 L40，资源充足且常打高级团/极巨战再推到 L50 以获得更高 CP 与续航。XL 糖果获取：L31+ 在团战时段(Raid Hour)抓五星团战 Boss 必给 1 个稀有 XL 糖果，交换宝可梦也可得 XL 糖果，Power Up Ticket 可额外多给团战/极巨战的 XL 糖果。鉴于 Kubfu 稀有、糖果难刷，优先把资源投在一只高攻一击流个体上。","formNote":"武道熊师在 Pokemon GO 中没有暗影(Shadow)形态，也没有超进化(Mega)或 Primal 形态，因此不存在“暗影/Mega 是否更优”的选择。真正的形态分支是进化方向：一击流(Single Strike，格斗/恶)和连击流(Rapid Strike，格斗/水)。两者基础种族值相同，差别只在副属性与可用招式——一击流的恶系副属性在 PvE 中覆盖面与输出更好，水系连击流缺乏优质快攻、定位偏弱。团战通用首选一击流(Single Strike)，配 Counter + Dynamic Punch 作纯格斗高 DPS 输出。"},"machamp":{"cn":"怪力","en":"Machamp","dex":68,"types":["Fighting"],"evo":[{"dexNumber":66,"cnName":"腕力","enName":"Machop"},{"dexNumber":67,"cnName":"豪力","enName":"Machoke"},{"dexNumber":68,"cnName":"怪力","enName":"Machamp"}],"moveset":"快攻：音速拳 / 拳击 (Counter)。大招：爆裂拳 (Dynamic Punch)，PvE 通用最佳，DPS≈13.6、TDO≈245。备选：十字劈 (Cross Chop) 充能更快但单发伤害低；若打飞行系 Boss 可带 落石 (Rock Slide) / 尖石攻击 (Stone Edge) 做补盲。纯通用刷格斗系输出仍以 Counter + Dynamic Punch 为准。","get":"1) 野外/巢穴抓腕力 (Machop) 后用糖果进化，豪力 (Machoke) 进化怪力需 交换 进化（与好友交换后进化免糖果，否则正常进化）。2) 团战奖励：怪力常作为 三星/四星团战 Boss 出现，可直接捕获。3) 蛋孵化、社区日 (腕力曾为社区日宝可梦，可获得带专属/特殊招式且高 IV 个体)。4) 暗影怪力 (Shadow) 通过击败并捕获火箭队头目/手下获得。","train":"怪力定位为格斗系核心输出，主吃高攻打手。培养建议：优先挑选 高攻向、IV 攻击接近满 的个体（团战 DPS 优先，可牺牲一点防/血）。糖果：腕力→豪力 25 糖、豪力→怪力 100 糖；XL 糖果用于把等级冲到 L40 以上、直至 L50（团战封顶可显著提升 CP 与单只输出，但更推荐多养几只 L40 凑满 6 只阵容而非单只硬肝 L50）。先把招式刷成 Counter + Dynamic Punch（必要时用 招式 TM 调招），再投糖强化。腕力社区日期间用 星尘/糖果加倍 批量培养性价比最高。","formNote":"怪力没有 Mega/超进化 也没有 Primal 形态，因此形态选择只在 普通 vs 暗影 之间。团战（打 Boss 输出）优先用 暗影怪力 (Shadow Machamp)：暗影使攻击约 +20%，DPS 明显高于普通形态，是最具性价比的格斗系暴力输出之一（代价是受到伤害也增加、需用紫尘解锁第二大招）。PvP/需要续航或留场时间长的场景才考虑普通形态。结论：团战推荐暗影怪力 + Counter + Dynamic Punch。"},"hariyama":{"cn":"铁掌力士","en":"Hariyama","dex":297,"types":["Fighting"],"evo":[{"dexNumber":296,"cnName":"幕下力士","enName":"Makuhita"},{"dexNumber":297,"cnName":"铁掌力士","enName":"Hariyama"}],"moveset":"快攻 Counter(踢倒/拳打) + 大招 Dynamic Punch(爆裂拳)。这是通用 PvE/团战最优配招(约 15.2 DPS / 432 TDO)。Counter 输出与充能俱佳,Dynamic Punch 是全游戏最高效的格斗系大招(90 威力、只需半条能量条),优于 Superpower(蛮力) 和 Close Combat(近身战)。次选 Counter + Close Combat。","get":"1) 野外捕捉 Makuhita(幕下力士)后用 50 颗糖果进化为 Hariyama;Makuhita 在晴天/晴朗天气加成时刷新率更高。2) Hariyama 本体也可在野外低概率直接遇到。3) 蛋孵化(Makuhita 曾出现在 2km/5km 蛋池,视当期活动而定)。4) 团战/活动 boss 战奖励与 Field/Special Research 任务偶有发放。5) 暗影版需击败火箭队头目/手下后捕捉暗影 Makuhita 再进化。","train":"进化需 50 颗 Makuhita 糖果。强化到 L40 约需 250 普通糖果 + 大量星尘;继续推到 L50 需要 296 颗 XL 糖果(L40→50 段全程吃 XL)。糖果获取:抓 Makuhita/Hariyama(每只 3+ 颗,搭配 Pinap 浆果翻倍)、糖果伙伴步行(本系约 3km/颗)、转移/孵蛋、Rare Candy 兑换。团战定位是高攻输出位,优先把 IV 选攻击高的个体拉满,星尘充足时直接冲 L40+;只有打高杯顶级团战或需要更高血量续航时才考虑投 XL 上 L50。","formNote":"团战首选「暗影 Hariyama(Shadow Hariyama)」:暗影加成令攻击提升约 20%,作为纯输出格斗手 DPS 明显高于普通形态,是当前格斗系性价比极高的暗影输出之一(代价是承伤更高、需 Charged TM 洗掉 Frustration 换 Dynamic Punch)。Hariyama 没有 Mega/Primal 形态,因此无超进化可选。普通形态适合刚入坑或星尘紧张时使用;追求团战伤害上限就练暗影版。配招同为 Counter + Dynamic Punch。"},"eternatus":{"cn":"无极汰那","en":"Eternatus","dex":890,"types":["Poison","Dragon"],"evo":[{"dexNumber":890,"cnName":"无极汰那","enName":"Eternatus"}],"moveset":"快攻 Dragon Tail（龙尾，龙系）+ 大招 Dynamax Cannon（极巨炮，龙系）。若无极巨炮则用 Cross Poison（十字毒刃，毒系）作为低能耗输出，或 Shadow Ball/Flamethrower 作为覆盖面。主推 Dragon Tail + Dynamax Cannon 作为通用 PvE 龙系攻击手配置。","get":"截至 2026 年中，无极汰那在 Pokémon GO 中尚未正式实装。它属于伽勒尔地区传说宝可梦，作为剑盾压轴 Boss，预期将通过限定团战（Raid，很可能是特殊形态/活动团战）或活动剧情任务首次登场。实装后预计为五星团战可捕获，无法孵蛋/进化获得。无极汰那无法成为闪光/异色（传说初登场通常不带闪光）。","train":"无极汰那作为传说宝可梦，使用「无极汰那糖果」+ 通用星尘强化；高 CP 个体还需「无极汰那 XL 糖果」才能升到 40 级以上（L40–50）。糖果来源：团战捕获、好友赠送幸运蛋/交换获得、与同种或同进化链（本物种无进化链）伙伴行走（设为伙伴每 20 km 得 1 颗糖）、Pinap/银色 Pinap 莓提升捕获糖果产出。XL 糖果主要靠团战捕获掉落、L40+ 玩家随机活动掉落与交换。团战培养建议：优先选 15/15/15（满 IV）或至少高攻个体；为最大化输出可走「高攻」路线（攻刷满，防/血次要），把它培养到 L40 起步、有 XL 糖再推到 L50 以拉高 DPS。配双龙招（Dragon Tail + Dynamax Cannon）作为顶级龙系输出位。","formNote":"无极汰那本体无暗影（Shadow）形态，也没有 Mega 进化或 Primal 形态——它只有原始形态与剧情专属的「无极汰那（极巨化/Eternamax）」形态，而 Eternamax 在主系列中不可用于常规对战，GO 也不会作为可培养形态。因此团战只能也只需使用其本体（普通形态），无更优替代形态可选。若未来 GO 推出暗影版，暗影形态攻击更高、适合纯输出团战（搭配怒火/激励减伤），但目前不存在，推荐就用普通本体满级高攻配置。"},"gengar":{"cn":"耿鬼","en":"Gengar","dex":94,"types":["Ghost","Poison"],"evo":[{"dexNumber":92,"cnName":"鬼斯","enName":"Gastly"},{"dexNumber":93,"cnName":"鬼斯通","enName":"Haunter"},{"dexNumber":94,"cnName":"耿鬼","enName":"Gengar"}],"moveset":"最佳通用 PvE 配招: 快攻 Shadow Claw(影子爪) + 大招 Shadow Ball(暗影球)。Shadow Ball 每能量伤害(DPE)极高、配合耿鬼超高攻击与 STAB 输出爆表，对绝大多数目标至少打中性伤害。备选快攻 Lick(舌舔) 也常被列为伤害更高的选项(Lick + Shadow Ball),与 Shadow Claw 差距很小，两套都属顶级。打特定属性 boss 时可换 Sludge Bomb(污泥炸弹/毒系大招) 或 Focus Blast(真气弹) 应对克制关系。","get":"1) 野外/天气加成(多云会提升幽灵与毒系)较低概率直接遇到耿鬼，更常见的是抓鬼斯、鬼斯通。2) 用 25 糖把鬼斯进化成鬼斯通，再用 100 糖把鬼斯通进化成耿鬼(GO 内进化不需要交换)。3) 耿鬼常作为团战/突袭(Raid)Boss 出现，胜利后可挑战捕捉，并有几率为异色。4) 万圣节(Halloween)等活动期间鬼斯系大量刷新，是囤糖和刷异色的最佳窗口。5) Mega Gengar 通过完成 Mega Raid(超级团战)获得 Mega 能量后对已有耿鬼进行超级进化。","train":"耿鬼定位是高攻脆皮纯输出，培养以攻击为核心: 进化需累计 25(鬼斯→鬼斯通)+100(鬼斯通→耿鬼)=共 125 糖。强化建议直接拉满: 团战(Raid)环境用 L40 起步、有资源就走 L50(需 XL 糖果, 从 L40 到 L50 约需 296 个 XL 糖 + 大量普通糖与星尘)，XL 糖主要靠捕捉/孵蛋/远征/交换获得。由于耿鬼血量低、属于玻璃大炮，建议多养几只用于车轮战(被秒后快速换上)，并优先解锁第二大招(Shadow Ball 必带)以便灵活切换。日常刷糖优先在万圣节活动期，用糖果机/伙伴行走/异色交换补足 XL 糖。","formNote":"团战推荐优先用 Mega Gengar(超级耿鬼)。Mega 形态伤害远超普通和暗影形态，是游戏内顶级(S+ 级)幽灵/毒系输出，且作为 Mega 还能给同队幽灵/毒系队友加攻击加成,团战首选用它。其次是 Shadow Gengar(暗影耿鬼): 它是全游戏输出最高的幽灵系之一、纯 DPS 极猛，但血极薄需要精准闪避、容错低，适合追求极限通关速度的玩家短时爆发。普通耿鬼性价比最高(无需 Mega 能量、不掉好感)，作为日常车轮战/凑队很够用。结论: 资源充足且能开 Mega 时用 Mega Gengar；要堆纯输出且会闪避用 Shadow Gengar；日常/省资源用普通耿鬼。所有形态都带 Lick/Shadow Claw + Shadow Ball。"},"beedrill":{"cn":"大针蜂","en":"Beedrill","dex":15,"types":["Bug","Poison"],"evo":[{"dexNumber":13,"cnName":"独角虫","enName":"Weedle"},{"dexNumber":14,"cnName":"铁壳蛹","enName":"Kakuna"},{"dexNumber":15,"cnName":"大针蜂","enName":"Beedrill"}],"moveset":"Poison Jab (毒击) + Sludge Bomb (污泥炸弹)。这是大针蜂作为毒系输出的最佳组合。若需虫系输出可用 Bug Bite (虫咬) + X-Scissor (十字剪),但 DPS 明显低于毒系配招。","get":"野外可直接捕捉(草丛/常见生成),也可孵蛋(2km/5km 蛋曾出独角虫)。捕捉独角虫(Weedle)用糖果进化:独角虫→铁壳蛹(12 糖)→大针蜂(再 50 糖)。活动期间(如虫类活动、社区日)生成率提高,部分活动可能出现闪光独角虫。","train":"普通进化路线性价比极高:独角虫糖果获取容易(进化全套仅需 62 糖),建议囤独角虫糖配合 Pinap/银色 Pinap 莓加倍。培养时优先挑高攻击 IV 个体(团战看重输出),用星尘+独角虫糖强化到 L40,有 XL 糖果(L40 后捕捉/进化高 CP 个体获得)可推到 L50。XL 糖较难刷,因大针蜂 PvE 定位偏低,普通玩家强化到 L35-40 已够用,不必为它专门攒 XL。","formNote":"超进化(Mega Beedrill)远优于本体和暗影形态,是大针蜂唯一值得团战投入的形态。Mega 大针蜂虫/毒双属性、攻击极高,是顶级的虫系 Mega 输出之一(打草/超能/恶系团战),且性价比高(进化材料便宜)。本体普通/暗影形态 PvE 数值太低、不耐打,基本不进团战。推荐:团战用 Mega Beedrill;若有暗影独角虫可保留作 Mega 前体(Mega 进化无视暗影但暗影本体攻击更高),但不必特意刷暗影。"},"nihilego":{"cn":"虚吾伊德","en":"Nihilego","dex":793,"types":["Rock","Poison"],"evo":[{"dexNumber":793,"cnName":"虚吾伊德","enName":"Nihilego"}],"moveset":"快攻：毒击 (Poison Jab) ；大招：污泥炸弹 (Sludge Bomb)。这是它作为毒系输出的最佳通用 PvE 配招——快攻能量获取快、STAB 加成且大招 DPE 高。注意它本体不是顶级团战输出（多数毒系/岩石系都有更强替代），更多是收集/PvP（毒系大师同盟）向。","get":"仅通过五星团战 (5-Star Raid / Ultra Beast 团战) 获得：组 3-5 名高练度训练家击败后，用奖励的高级球 (Premier Balls) 捕捉。它是究极异兽，只在限时活动期间轮换上线（2026 年 5 月曾作为五星团战 Boss 出现，5/6–5/12），平时不可野生遇见，需等待官方再次安排团战或活动（如 GO Fest）。可闪光 (Shiny) 已实装，团战小时为最佳刷闪窗口。","train":"糖果只能靠团战奖励、用稀有糖果转换、或好友远距离赠蛋（无法野外抓同种刷糖）。每次团战胜利保证给糖 + 必出 XL 糖果，且可用稀有 XL 糖果补足。培养优先堆 IV 高攻击的个体；若主要用于团战/PvP 进攻，按高攻路线满级强化（L40，能力足够则推到 L50 上限），缺 XL 糖果时优先把一只练满而非分散多只。","formNote":"Pokemon GO 中虚吾伊德目前没有暗影 (Shadow)、超进化 (Mega) 或 Primal 形态——究极异兽不可被火箭队暗影化，也无 Mega 进化，因此团战只有普通形态可用，谈不上哪种更优。它本体在团战里并非强力输出（岩/毒双弱地面，进攻面也被更强毒系/岩系盖过），建议把资源留给真正的团战主力（如帮打它自己的 Primal 固拉多 / Mega 烈咬陆鲨 / 暗影顶级地面系）；虚吾伊德更值得练的是 PvP 毒系大师联盟用途。"},"naganadel":{"cn":"四颚针龙","en":"Naganadel","dex":804,"types":["Poison","Dragon"],"evo":[{"dexNumber":803,"cnName":"毒贝比","enName":"Poipole"},{"dexNumber":804,"cnName":"四颚针龙","enName":"Naganadel"}],"moveset":"快攻 Poison Jab(毒击) + 大招 Sludge Bomb(污泥炸弹)。这是它最强的纯毒系输出配招(DPS≈14.8),靠毒系 STAB 加成,专打草系与妖精系团战 Boss。备选大招为 Acid Spray(强酸喷雾)在 PvP 更常用,但 PvE 输出仍以 Sludge Bomb 为主。注意:它虽然是龙系,但作为「龙系输出手」很弱(F 级),不要拿它打需要龙系克制的团战。","get":"只能通过特殊研究/限时研究获得 Poipole(毒贝比),例如 World of Wonders 系列特殊研究、Wonder Ticker Part 3 等;Poipole 与其进化体是唯二无法从团战(Raid)中直接捕获的究极异兽。拿到 Poipole 后,需满足两个条件才能进化成 Naganadel:1) 累积 200 个 Poipole 糖果;2) 把 Poipole 设为搭档,并在其作为搭档期间捕捉 20 只龙系宝可梦。赛季特殊研究通常会直接奖励大量 Poipole 糖果(约 125+100),所以糖果一般不用刻意刷,难点在于凑齐 20 只龙系捕捉。","train":"Naganadel 攻击种族值极高(323),是顶级毒系输出手(S 级,约毒系第 8),团战培养思路就是堆攻击、拉满等级。建议优先选高攻击 IV 个体(尤其攻击 15),为打团把等级强化到 L40,有富裕的星尘/XL 糖果可推到 L50 以进一步提高 DPS 与续航。强化需要 Poipole 糖果(普通 + XL 糖果);由于无法刷蛋/团战,糖果来源主要靠研究奖励、搭档行走与 Rare/XL Rare Candy,XL 糖果尤其稀缺,建议把 XL 资源留给确实要冲 L50 的那一只。配招用上面的毒击 + 污泥炸弹。","formNote":"Naganadel 在 Pokemon GO 中没有暗影(Shadow)形态,也没有超进化(Mega)或 Primal 形态——它属于究极异兽(Ultra Beast),整个类别目前都不存在 Shadow / Mega / Primal 变体,因此不存在「换形态打团更强」的选择。团战就用普通形态、堆满攻击与等级即可;它的定位是高攻脆皮纯毒系输出手,只在打草系/妖精系 Boss 时值得上场。"},"victreebel":{"cn":"大食花","en":"Victreebel","dex":71,"types":["Grass","Poison"],"evo":[{"dexNumber":69,"cnName":"喇叭芽","enName":"Bellsprout"},{"dexNumber":70,"cnName":"口呆花","enName":"Weepinbell"},{"dexNumber":71,"cnName":"大食花","enName":"Victreebel"}],"moveset":"PvE 草系输出推荐: 快攻 Razor Leaf(飞叶快刀) + 大招 Leaf Blade(叶刃)。这是当前最稳的纯草系 DPS 组合，专克水/岩/地三系。备选: 快攻 Magical Leaf(魔法叶) + 大招 Solar Beam(日光束)/Sludge Bomb(污泥炸弹)，其中 Solar Beam 单次伤害更高但能量消耗大、放招慢，实战 Leaf Blade 更顺手；Sludge Bomb 用于打需要毒系覆盖的场景(如妖精系)。综合首选 Razor Leaf + Leaf Blade。","get":"主要靠进化获得: 野外/田野调查/团战抓 Bellsprout(喇叭芽)，用 25 颗糖果进化成 Weepinbell(口呆花)，再用 100 颗糖果进化成 Victreebel(大食花)。Bellsprout 是常驻野生宝可梦(草地/晴天天气加成时刷新率提升)，也可孵蛋、出现在活动与 Spotlight Hour。可遇闪光(Shiny)。暗影形态需通过击败并净化/收服火箭队头目掉落的暗影 Bellsprout/Weepinbell 再进化。","train":"团战定位是高攻速攻型草系打手，优先堆攻击。糖果: 进化全程共需 125 颗(25+100)Bellsprout 糖果；强化到高等级还需大量普通糖果 + 星尘，建议用 Pinap Berry(蓝莓)抓捕翻倍出糖，并设为伙伴步行刷糖。XL 糖果: 仅在冲 L40 以上(L41-50)时需要，纯团战不必须冲满级 —— 想要更高 HP 续航和触发更多大招循环可考虑，但性价比上 L40 已足够打绝大多数团本。建议: 留一只高 IV(攻击优先)个体专门强化，刷出 Razor Leaf + Leaf Blade 配招，先到 L40 即可上场，有富余 XL 糖果再缓慢冲级。","formNote":"团战首选超进化形态 Mega Victreebel(超级大食花)。Mega 形态大幅拉高攻击，是当前游戏内顶级草系 Mega 输出之一，且出场还能给同队草/毒系队友提供伤害加成(Mega 加成光环)，团本里价值远超本体。暗影形态(Shadow Victreebel)伤害也明显高于普通本体(攻击加成、承伤略增)，在没有 Mega 能量或不想消耗时是极佳的高性价比平替。结论: 有 Mega 能量优先开 Mega Victreebel 当核心输出；日常刷团或缺能量时用 Shadow Victreebel；普通本体仅作过渡。"},"toxicroak":{"cn":"毒骷蛙","en":"Toxicroak","dex":454,"types":["Poison","Fighting"],"evo":[{"dexNumber":453,"cnName":"不良蛙","enName":"Croagunk"},{"dexNumber":454,"cnName":"毒骷蛙","enName":"Toxicroak"}],"moveset":"快攻 Counter(音速拳/格斗) + 大招 Dynamic Punch(爆裂拳/格斗)。这是通用 PvE 最强配招(格斗输出、总伤约 323),用来打恶/普通/钢/冰/岩等弱格斗的团本。若想当毒系输出对付草/妖精,可改用 Poison Jab(毒击)+ Sludge Bomb(污泥炸弹),但毒骷蛙作为毒系攻击手并不顶尖,格斗向才是它的定位。","get":"主要靠进化:捕捉/孵化 不良蛙(Croagunk),用 50 颗不良蛙糖果进化为 毒骷蛙。不良蛙在野外可遇(沼泽/特定生态、雨天天气加成时刷新率更高),也可从 5km 蛋孵化,以及在相关活动/聚焦时刻出现。毒骷蛙本体偶尔在野外低概率出现或作为活动/团本/调查奖励登场,但稳定来源仍是抓不良蛙后进化。可闪光(Shiny 已实装)。","train":"糖果:从不良蛙进化需 50 糖,后续强化每级消耗糖果/星尘随等级递增。XL 糖果:要把毒骷蛙练到 L40 以上(直至 L50)必须使用 XL 糖果,获取方式包括捕捉/孵化/进化不良蛙系、用 100 普通糖果换 1 颗 XL、以及与好友交换。培养建议:团战取高攻 IV(优先 15 攻击,防御/HP 次之);若有充裕资源把它顶到 L40-50 可在格斗团本里多扛一两轮、增加 DPS 续航。资源有限时优先把糖果/星尘投给更主流的格斗输出(如路卡利欧、超梦带集中拳击、铁臂枪虾、凯西霸王龙等),毒骷蛙作为补位即可。","formNote":"暗影形态(Shadow Toxicroak)对团战更优:暗影加成提供约 +20% 攻击,带 Counter + Dynamic Punch 时的格斗 DPS 明显高于普通形态,作为团本\"玻璃大炮\"性价比更好(代价是更脆、回血消耗灵药)。毒骷蛙没有 Mega/超进化或 Primal 形态,因此可选只有普通与暗影两种。推荐:有暗影版就优先练暗影(高攻冲伤害);若是固定阵容/想省灵药则用普通形态。无论哪种,毒骷蛙都只是格斗团本里的二线补位,不是顶级首选。"},"overqwil":{"cn":"万针鱼","en":"Overqwil","dex":904,"types":["Dark","Poison"],"evo":[{"dexNumber":211,"cnName":"千针鱼（洗翠的样子）","enName":"Qwilfish (Hisuian)"},{"dexNumber":904,"cnName":"万针鱼","enName":"Overqwil"}],"moveset":"毒针 (Poison Sting) 或 毒击 (Poison Jab) 作快攻 + 污泥炸弹 (Sludge Bomb) 作大招。作为毒系输出的最佳组合是 Poison Jab + Sludge Bomb（DPS 约 12.95）。Poison Sting 充能更快、配合 Sludge Bomb 在某些场景循环更顺。恶系输出建议用 抓 (Snarl) + 暗影球/咬碎，但其恶系输出仅 F 级，不推荐当恶系打手。","get":"没有野生 Overqwil。需先获得「洗翠的样子」千针鱼（Hisuian Qwilfish）——通常通过限定活动（如洗翠/起源相关活动）的野外遭遇、团战奖励或 7km 蛋孵化获得。再满足进化条件即可进化为万针鱼。","train":"进化条件：把洗翠千针鱼设为搭档，并在其作为搭档期间「赢得 10 场团战」（Raid，不要求实际用它出战），同时消耗 50 颗千针鱼糖果即可进化。糖果来源：捕捉千针鱼、孵蛋、搭档散步、用 Pinap Berry 捕捉双倍糖果。培养建议：团战要堆攻击，建议高攻 IV（攻击 13+，PvE 不在乎防御/HP）。L40 最大 CP 约 2946，L50 约 3330；XL 糖果用于从 L40 强化到 L50。它是 A+ 级毒系打手（约排第 13），值得练一只满级用于打毒系弱点（草/妖精）的团战。","formNote":"该进化线没有 Mega（超进化）或 Primal 形态，所以无需考虑。存在「暗影（Shadow）万针鱼」：暗影形态攻击加成约 ×1.2，PvE 团战输出明显高于普通体，是更优选择——若能拿到暗影千针鱼，推荐培养暗影万针鱼，并用精英解锁/TM 教会污泥炸弹。综上：团战首选暗影万针鱼（毒系输出），普通体次之；不存在 Mega/Primal 可选。"},"garchomp":{"cn":"烈咬陆鲨","en":"Garchomp","dex":445,"types":["Dragon","Ground"],"evo":[{"dexNumber":443,"cnName":"圆陆鲨","enName":"Gible"},{"dexNumber":444,"cnName":"尖牙陆鲨","enName":"Gabite"},{"dexNumber":445,"cnName":"烈咬陆鲨","enName":"Garchomp"}],"moveset":"通用最佳 PvE 配招：快攻 Mud Shot(地震拳/泥巴射击)+ 大招 Earth Power(大地之力)，作地面输出主力；若要打龙系输出则用 Dragon Tail(龙尾)+ Breaking Swipe(攻击破坏)。Earth Power 充能更快、DPS/能量循环优秀，是首选；Outrage(逆鳞)/Fire Blast(大字爆炎)为旧版/特定克制选项。一般推荐：Mud Shot + Earth Power。","get":"主要靠进化获得：捕捉圆陆鲨(Gible)后用糖果进化为尖牙陆鲨→烈咬陆鲨。圆陆鲨较稀有，主要来源：野外随机刷新(出率低)、社区日/活动期间大量出现、1星/3星团战(活动限定)、远/特殊任务奖励、孵蛋(10km蛋池中曾出现)。暗影形态烈咬陆鲨需击败并净化火箭队头目(Giovanni)给的暗影圆陆鲨获取(仅限活动轮换登场)。","train":"进化路径糖果：圆陆鲨→尖牙陆鲨 25 糖，尖牙陆鲨→烈咬陆鲨 100 糖。团战定位高攻输出，优先培养高攻 IV(攻击 14-15)，CP/IV 不必苛求满防。强化到 L40 即可胜任绝大多数团战；若有充足星尘和 XL 糖果，练到 L50 进一步提升 DPS/续航。XL 糖果通过捕捉/孵蛋/远征任务/交换/糖果转换(普通糖换 XL)累积。建议先把一只高攻个体推到 L40，余力再上 L50。圆陆鲨可用糖果伙伴+稀有糖果补足进化所需糖果。","formNote":"团战强烈推荐使用超进化形态 Mega Garchomp(超烈咬陆鲨)：它是顶级地面(S级，约 #2)和龙系(S级，约 #3)输出，Mega 期间还给同属性队友加成。建议先用普通烈咬陆鲨吃下 Mega 能量临场超进化打团。暗影烈咬陆鲨(Shadow)攻击更高、单体 DPS 略优于普通形态，适合冲刺型快速清团(代价是更脆、需购买暗影紫雾解锁额外大招)，但若能 Mega 则 Mega 优先。综合建议：能 Mega 用 Mega(超烈咬陆鲨)；否则用暗影形态最大化 DPS。"},"excadrill":{"cn":"达地876","en":"Excadrill","dex":530,"types":["Ground","Steel"],"evo":[{"dexNumber":529,"cnName":"螺钉地鼠","enName":"Drilbur"},{"dexNumber":530,"cnName":"龙头地鼠","enName":"Excadrill"}],"moveset":"快攻 Mud-Slap（泥巴射击，地面系）+ 大招 Drill Run（直冲钻，地面系）。这是最佳通用 PvE 地面系输出组合；若需要钢系输出可用 Metal Claw + Iron Head，但纯DPS仍以地面系配招为优。","get":"主要靠捕捉/孵化 Drilbur（螺钉地鼠，2km/5km 蛋曾出过）后用 50 糖果进化为 Excadrill；野外可低概率直接遇到 Drilbur，沙尘暴/晴天天气加成会提升出现率与等级；活动期间（如相关社区日、突袭、调查任务奖励）也可获得。没有官方简体中文译名时以宝可梦官方译名「达地876」为准（部分地区译作其本名，进化前为螺钉地鼠/Drilbur）。","train":"团战定位是高攻地面系/钢系输出，优先强化。糖果来源：捕捉/进化 Drilbur（每次捕捉3颗，进化得1颗）、与伙伴同行获得糖果、神奇糖果转化、Pinap莓加倍。进化需 50 普通糖果。强化到 L40 需要可观的星尘+糖果，冲 L50 额外需要 296 颗 XL 糖果（XL 糖果来自 31 级以上玩家捕捉、孵化、同行与神奇 XL 糖果）。建议选高个体（攻击IV尽量满，团战优先攻击面板）的个体，先拉满到 L40 即可胜任绝大多数团战；追求顶级输出再用 XL 糖果推到 L45-50。","formNote":"Excadrill 没有 Mega/超进化，也没有 Primal 形态，因此只在普通形态与暗影形态之间选择。暗影 Excadrill（Shadow）攻击面板提升约20%，作为地面系/钢系纯输出（团战、攻击型道馆/突袭）明显更强，强烈推荐用暗影形态打团；代价是防御略降、且需要消耗 TM 抹掉「捉弄/Frustration」。若没有暗影个体或想要更耐久的稳定输出，普通形态也完全够用。总结：团战优先暗影 Excadrill。"},"landorus":{"cn":"土地云","en":"Landorus","dex":645,"types":["Ground","Flying"],"evo":[{"dexNumber":645,"cnName":"土地云","enName":"Landorus"}],"moveset":"灵兽形态(Therian Forme, 推荐使用): 快攻 Mud Shot(打带泥) + 大招 Sandsear Storm(烫沙风暴, 招牌大招)。这是当前最强的非Mega/非暗影地面系输出。化身形态(Incarnate Forme): 快攻 Mud Shot + 大招 Sandsear Storm(纯地面输出)或 Earth Power(大地之力); 二号大招可带 Stone Edge(尖石攻击)补盲。注意: 灵兽形态攻击远高于化身形态, 团战优先练灵兽。","get":"仅能通过五星头目战(5-Star Raid)击败后捕获。土地云属于第五代「化身三神」之一, 会周期性轮换登场(例如灵兽形态曾在 2024年1月、2025年2月「通往合众之路」活动作为五星团战头目出现)。两种形态在 GO 内独立投放, 化身形态与灵兽形态分别在不同活动周期作为团战头目, 目前不可在游戏内用道具自由切换形态——需分别打到。可遇闪光(Shiny)。本体没有进化, 也不能由其他宝可梦进化得来。","train":"糖果与XL糖果只能通过团战捕获奖励、与好友交换(传说宝可梦交换消耗大量星尘且每天限次)以及用神奇糖果/XL神奇糖果获得; 没有进化链所以糖果全部用于强化。团战定位是高攻爆发型脆皮, 应优先堆攻击: 个体值优先看攻击(理想 15攻, 防御/HP 可放宽), 配双大招(主 Sandsear Storm + 副 Stone Edge 补盲)。强化目标按账号等级与XL糖果存量推进: Lv40 已是高质量团战配置, 有充足XL糖果可继续推到 Lv45-50 进一步提升输出与续航。建议先满级一只灵兽形态作为主力地面输出, 化身形态可作为备用或 PvP 大师联盟用途。","formNote":"土地云在所有正传游戏中都没有 Mega 进化, 也没有 Primal 形态, 因此 GO 里不存在 Mega/Primal 土地云, 无需考虑。团战最优是「灵兽形态(Therian Forme)」: 它是目前游戏内最强的非Mega、非暗影地面系攻击手, 强于固拉多、烈咬陆鲨、土龙弟弟, 推荐首选并满级培养。暗影形态(Shadow): 化身/灵兽的暗影版本若推出, 攻击会再高约20%, 理论 DPS 超过普通灵兽形态, 但暗影土地云目前未在 GO 上线; 若日后开放暗影灵兽形态, 它将成为更强的地面爆发输出(代价是更脆、需暗影碎片洗招)。综合: 现阶段练「灵兽形态」最稳, 关注未来是否上线暗影灵兽形态。"},"rhyperior":{"cn":"钻角犀兽","en":"Rhyperior","dex":464,"types":["Ground","Rock"],"evo":[{"dexNumber":111,"cnName":"独角犀牛","enName":"Rhyhorn"},{"dexNumber":112,"cnName":"钻角犀兽","enName":"Rhydon"},{"dexNumber":464,"cnName":"钻角犀兽","enName":"Rhyperior"}],"moveset":"PvE 通用最佳: 快攻 Smack Down(岩石属性, 落石/盖钟落石) + 大招 Rock Wrecker(岩石巨弹) —— 这是当前最强的纯岩石输出组合, 用于打岩石弱点(虫/飞/火/冰/钢)Boss。地面属性输出则用 Mud-Slap(泥巴射击) + Earthquake(地震)。注: Smack Down 比 Mud-Slap 在岩石线上 DPS 略高但充能慢, 综合首选岩石套 Smack Down + Rock Wrecker。Rock Wrecker 需要用精英大招学习器(Elite TM)或社区日等活动教学。","get":"1) 野外捕捉/孵蛋获得独角犀牛(Rhyhorn), 用 25 糖果进化到钻角犀, 再用 100 糖果 + 1 个辛纳believe石(Sinnoh Stone) 进化为钻角犀兽; 2) 直接捕捉钻角犀(部分团战/野外/巢穴), 同样路线进化; 3) 暗影形态来自火箭队头目 Giovanni 或盾牌兵(Grunt)对战后捕捉暗影独角犀牛再进化; 4) 偶尔作为团战/调查任务奖励出现。Sinnoh Stone 来源: 研究突破奖励、训练家对战(GO Battle League/对战好友)、特殊调查。","train":"作为团战输出, 优先堆攻击: 用平时积累的星尘 + 普通糖果先拉到 L40。若要在更高 CP 上限团战/Master League 冲顶, 收集 XL 糖果强化到 L50。建议 IV 优先攻击拉满(团战看攻击, 不那么在乎血量), 但暗影版本天生攻击高、防御低, IV 影响相对次要。Rock Wrecker 是活动限定专属大招, 平时学不到, 建议保留一只带 Smack Down + Rock Wrecker 的(或暗影)专门吃精英大招学习器。糖果获取: 用犀牛系当伙伴行走、Pinap 浆果捕捉、Rare Candy 转换。","formNote":"Rhyperior 在 Pokémon GO 中没有 Mega/超进化, 也没有 Primal 形态, 因此不存在该选项。团战首选 暗影钻角犀兽(Shadow Rhyperior): 它是顶级(S 级)岩石/地面输出, 暗影加成把攻击拉满, DPS 显著高于普通版, 是目前最强的非传说岩石攻击手之一(岩石输出排名约第 2, 地面约第 8)。代价是受到伤害更高、更易倒, 配合多只轮换与回血道具即可。若没有暗影或想省精英学习器, 普通带 Smack Down + Rock Wrecker 的版本依然是 A/S 级可用。结论: 有暗影优先练暗影, 配 Smack Down + Rock Wrecker。"},"rayquaza":{"cn":"烈空坐","en":"Rayquaza","dex":384,"types":["Dragon","Flying"],"evo":[{"dexNumber":384,"cnName":"烈空坐","enName":"Rayquaza"}],"moveset":"快攻: Dragon Tail (龙之尾); 大招: Dragon Ascent (画龙点睛/破坏空气). Dragon Tail + Dragon Ascent 是综合最强 PvE 配招 (约 19.7 DPS / 387 TDO)。注意 Dragon Ascent 只能通过陨石 (Meteorite) 教学，无法用充能 TM 习得，且自带防御自降 debuff，但作为收尾爆发极强、对妖精系几乎可秒。若没有陨石/想要纯龙输出，退而求其次用 Dragon Tail + Outrage (逆鳞) 或 Breaking Swipe (破坏锐爪)。","get":"主要通过五星团战 (5-star Raid) 捕获，烈空坐会周期性轮换回归团战池 (常在龙系活动/超古代相关活动期间)；也可在远程团战券打 Raid。Shiny (异色) 形态已实装，可在团战后捕捉环节闪光。日常并非常驻，需关注活动公告。Dragon Ascent 所需的 Meteorite (陨石) 通常在烈空坐相关限时活动/特殊调查中发放。","train":"团战定位是顶级龙系/对龙输出手，主攻高，优先拉满。培养路线: 优先攒满 Rayquaza Candy 与 Candy XL，因为它仅团战获取、不易刷糖，建议用 Rare Candy/Rare Candy XL 补足。强化到至少 Level 40；若有充足 XL 糖 (每只到 50 级约需 296 个 XL 糖) 可推到 Level 50 提高 DPS 与生存。IV 优先看攻击 (15 Atk 最佳)，团战纯输出可接受防御/体力略低。务必先用陨石教 Dragon Ascent 再考虑 Mega 进化所需 400 Mega Energy。","formNote":"团战首选 Mega Rayquaza (超级烈空坐)。前提是已用陨石教会 Dragon Ascent 并集齐 400 Mega 能量——Mega 烈空坐是游戏内最强龙系攻击手之一，攻击爆表，团战伤害与队伍 Mega 加成 (同属性额外伤害+捕捉/糖果加成) 都远超普通形态，是带团/速通的最优选。普通 (非 Mega) 形态作为日常常备龙系输出已足够强。Shadow Rayquaza (暗影烈空坐) 目前在 Pokemon GO 中尚未实装，因此当前无法选用；若未来实装，暗影形态理论上 DPS 会高于普通形态但生存更脆，仍不及 Mega。综合结论: 能 Mega 就上 Mega，否则用普通形态。"},"moltres":{"cn":"火焰鸟","en":"Moltres","dex":146,"types":["Fire","Flying"],"evo":[{"dexNumber":146,"cnName":"火焰鸟","enName":"Moltres"}],"moveset":"快攻 Fire Spin（火焰旋涡）+ 大招 Overheat（过热）；纯火属性输出最高，也是火系传说鸟。若需要飞行系阵容则用快攻 Wing Attack（翅膀攻击）+ 大招 Sky Attack（神鸟猛击），但 PvE 团战通常优先火系组合（Fire Spin + Overheat）打输出。","get":"主要通过五星传说团战（Legendary Raid）获得，火焰鸟会在轮换期回归团战；战胜后有几率以原始/闪光形态捕获。暗影火焰鸟（Shadow Moltres）通过击败火箭队首领 Giovanni（用 Super Rocket Radar 罗盘）后捕获。Mega 能量（Mega Energy for Moltres）则需在 Mega Moltres 团战中获取（如该形态已上线时）。此外历史活动/Daily Adventure Incense（每日探险熏香）也曾可遇到野生 Galarian/Kantonian 鸟，但 PvE 用的是关都火焰鸟。","train":"作为传说宝可梦，火焰鸟糖果（Moltres Candy）主要靠团战奖励、抓捕、用它作伙伴步行（约 20km/糖）、以及 Rare Candy / Rare Candy XL 转换获得；XL 糖果（Candy XL）来自抓捕掉落和 Rare Candy XL 转换，用于把等级从 L40 推到 L50。培养建议：火焰鸟是高攻型（攻击 251，远高于防御/耐久），团战定位是纯输出 glass cannon，应优先尽量拉高 CP / 等级以最大化 DPS。若资源充足，先把一只高 IV（尤其高攻击 IV）的练到 L40，团战足够用；追求极限 DPS 或要在最高级别团战/对战道馆站桩时再用 XL 糖果推到 L50。先点满最佳配招（解锁第二大招留 Wing Attack/Sky Attack 备用），再逐级强化。","formNote":"团战首选「暗影火焰鸟（Shadow Moltres）」：暗影形态攻击加成约 1.2 倍，作为高攻 glass cannon 能显著提升团战 DPS，是目前最强的火系输出之一（仅次于个别顶级火系），适合追求圈数/快速通关。代价是防御降低、更易被秒，需注意闪避与续命。Mega Moltres 若已在游戏中上线，则在场时为全队火系（及飞行系）攻击提供团战增益光环，且自身也是顶级火系输出，团战推荐放一只 Mega Moltres 吃增益 +其余位用暗影火焰鸟堆 DPS。若无暗影或不想承担脆皮风险，用普通火焰鸟也完全够用。综合：极限输出选暗影火焰鸟，带队增益选 Mega，稳健省心选普通形态。"},"salamence":{"cn":"暴飞龙","en":"Salamence","dex":373,"types":["Dragon","Flying"],"evo":[{"dexNumber":371,"cnName":"宝贝龙","enName":"Bagon"},{"dexNumber":372,"cnName":"甲壳龙","enName":"Shelgon"},{"dexNumber":373,"cnName":"暴飞龙","enName":"Salamence"}],"moveset":"通用 PvE 最佳配招：快攻 Dragon Tail（龙尾）+ 大招 Draco Meteor（流星群）——纯龙属性输出，DPS≈15.8，TDO≈311，是打龙系团战的主力配招。若想兼顾飞行属性输出（打草/格斗/虫系团战），用 Dragon Tail（龙尾）+ Fly（飞翔），DPS 更高（≈17.8）。综合推荐：龙系本职用 Dragon Tail + Draco Meteor。","get":"主要靠抓宝贝龙(Bagon)后进化：宝贝龙→甲壳龙(25糖)→暴飞龙(100糖)。宝贝龙是稀有野生宝可梦，也会出现在 1星团战、卵孵化和活动中。直接获取暴飞龙的途径包括：3星团战头目（不定期上线）、Field Research 调查奖励、以及活动期间的野生/团战刷新。可遇闪光(Shiny)。超级进化体需先拥有普通暴飞龙，再用 Mega Energy 进行 Mega 进化（Mega Energy 来自 Mega Salamence 超级团战）。","train":"暴飞龙是高攻型攻击手，适合堆 PvE 团战输出。糖果消耗：宝贝龙→甲壳龙 25 糖，甲壳龙→暴飞龙 100 糖；强化到 L40 需要约 296 普通糖（不含进化），L40→L50 额外需约 296 XL 糖 + 250 普通糖。团战培养建议：优先做一只 IV 高攻（攻击 14-15）的个体，强化到 L40 即可应付绝大多数团战；若追极限输出/打高难 Mega 或传说团战，再用 XL 糖推到 L50。建议先解锁第二充能招式（用糖+星沙）以便同时带 Draco Meteor（龙系）和 Fly（飞行系）切换打不同团战。多攒 Bagon 糖（用龙系朋友、Pinap 树果、糖果伴侣）以备 XL 培养。","formNote":"团战首选 Mega Salamence（超级进化）：它是 S 级团战攻击手，同时位列顶级龙系(#6 左右)和顶级飞行系(#4 左右)输出，开 Mega 期间还为全队同属性攻击提供伤害加成，DPS/TDO 明显高于普通体（Dragon Tail+Fly 约 19.8 DPS / 567 TDO；Dragon Tail+Draco Meteor 约 17.9 DPS / 512 TDO）。其次是 Shadow Salamence（暗影暴飞龙）：暗影加成让它成为游戏中最强的纯龙系攻击手之一，单体输出极高（但承伤也更高、强化更费星沙糖果）。结论：能 Mega 就上 Mega Salamence 当团战核心（且只需一只就能反复 Mega）；若要常驻、不占 Mega 槽的高输出龙系打手，则练一只 Shadow Salamence。普通形态仅作过渡。Salamence 没有 Primal 形态。"},"yveltal":{"cn":"死神鸟","en":"Yveltal","dex":717,"types":["Dark","Flying"],"evo":[{"dexNumber":717,"cnName":"死神鸟","enName":"Yveltal"}],"moveset":"作为飞系输出（最佳通用 PvE 角色）：快攻 Gust（暴风/气旋，飞系）+ 大招 Oblivion Wing（死亡之翼，飞系，常为传承/限时招式）。作为恶系输出：快攻 Snarl（咆哮，恶系）+ 大招 Dark Pulse（恶之波动，恶系）。团战推荐优先飞系 Gust + Oblivion Wing；缺死亡之翼时用 Snarl + Dark Pulse 作恶系替补。","get":"仅通过五星传说团战（Legendary Raid）获取，会在限定活动期间轮换登场（例如 Kalos 系列活动/Tour 期间作为压轴登场）。团战胜利后获得捕捉机会，野外不可遇。平时不在团战池中时只能等待官方公告其回归。","train":"每只死神鸟糖果，团战捕获时获得；由于是传说且无进化，没有进化糖果消耗。强化到高等级需大量星尘 + 糖果，并需要死神鸟 XL 糖果（Level 41-50 阶段强制需要 XL 糖果）。XL 糖果来源：团战捕获、抓取/转移、与好友交换、以及普通糖果不足时用糖果换 XL（需玩家等级 40+）。团战定位是高攻输出，建议把 IV 优先看攻击，能拉到 L40 即足够主力，预算充足再用 XL 糖果推到 L45-50 以提升耐久/输出上限。配两套大招（飞系 + 恶系）以应对不同团战。","formNote":"Yveltal 在正传与 Pokemon GO 中均没有 Mega 超进化，也没有 Primal 形态，所以这两类不适用。可选的增强形态只有暗影（Shadow）。暗影死神鸟攻击力大幅提升、DPS 明显高于普通版，是团战最强变体，推荐优先培养暗影形态（暗影飞系 Gust + Oblivion Wing 输出最高；恶系用 Snarl + Dark Pulse）。代价是受到伤害略增、且需暗影碎片去除迷雾才能学专属招式；若追求纯粹输出选暗影，若想要更高耐久或暂无暗影则用普通版即可。"},"articuno":{"cn":"急冻鸟","en":"Articuno","dex":144,"types":["Ice","Flying"],"evo":[{"dexNumber":144,"cnName":"急冻鸟","enName":"Articuno"}],"moveset":"快攻 Frost Breath(冰冻气息) + 大招 Triple Axel(三连冰锥)。这是当前最佳 PvE 输出组合(约 DPS 10.6 / TDO 276)。备选大招为 Ice Beam(冰冻光束),续航略高但爆发稍逊;旧的 Blizzard(暴风雪)与 Hurricane(暴风)能量消耗过大,不推荐做主力。冰系单一克制时直接用 Frost Breath + Triple Axel。","get":"作为传说鸟之一,主要通过五星团战(Raid)获得,不定期轮换登场;团战胜利后可挑战捕捉。也曾通过远程团战入场券、GO Fest / 特殊活动、以及部分研究/门票活动出现。野外不会自然出现。Shadow(暗影)急冻鸟则来自击败 GO 火箭队头目(如 Giovanni)后救出。","train":"主要靠 急冻鸟糖果 + 星尘 强化;团战捕捉、设为最佳伙伴步行(每 20km 一颗糖)、用神奇糖果(Rare Candy)转化获得普通糖果。XL 糖果(L41-50 强化必需)来自团战捕捉掉落、神奇糖果XL转化、以及 40 级后步行/捕捉概率掉落。培养思路:传说鸟在 PvE 里偏弱,优先选高个体值(攻击越高越好,理想 15 攻)的来练;若主打团战输出,可冲到 L40 即可,追求极限再用 XL 推到 L50;PvP(超级联盟)则反而要低攻高耐的个体并配合卡级。","formNote":"团战(PvE)推荐用 Shadow(暗影)急冻鸟:暗影形态攻击提升约 20%,在已经偏弱的输出上能明显拉高 DPS,是急冻鸟做冰系输出时的首选(代价是更脆、强化耗糖多,需先用 Elite/普通 TM 去掉 Frustration 换 Triple Axel)。Articuno 在 Pokémon GO 中没有 Mega/超进化或 Primal 形态,因此不存在 Mega 选项。整体而言即便用暗影版,急冻鸟在冰系里仍不是顶级——Mamoswine、伽勒尔达摩狒狒、Baxcalibur、Glaceon、Kyurem、Weavile 等都更强;Articuno 更适合作为收藏/凑队或对双重冰弱 Boss 的补位。"},"alakazam":{"cn":"胡地","en":"Alakazam","dex":65,"types":["Psychic"],"evo":[{"dexNumber":63,"cnName":"凯西","enName":"Abra"},{"dexNumber":64,"cnName":"勇基拉","enName":"Kadabra"},{"dexNumber":65,"cnName":"胡地","enName":"Alakazam"}],"moveset":"快攻: 念力 (Confusion，超能系) / 大招: 精神强念 (Psychic) 或 未来视 (Future Sight)。社区日招式 精神突进 (Psychic) 表现也很强；纯爆发取 精神强念，更平均的能量循环可考虑 未来视。Mega 胡地同样用 念力 + 精神强念。","get":"凯西 (Abra) 是常见野外刷新宝可梦，可在野外捕捉后用糖果进化为勇基拉再进化为胡地；也可能作为 7km 蛋孵化、Field Research 调查奖励出现。胡地的超进化需要「胡地超级能量 (Mega Energy)」，通过完成胡地的 Mega Raid (超级团战) 获得。暗影胡地来自击败并净化火箭队首领/手下的暗影凯西线 (取决于当期阵容)。","train":"超能系玻璃大炮，主打高攻速攻输出。建议把糖果/XL 糖果集中投到 1 只高攻 IV (攻击接近满)、CP 较高的个体上，强化到 L40，PvE 团战追求 DPS 可继续用 XL 糖果推到 L50。凯西/勇基拉/胡地通用糖果，进化链长但凯西刷新多易攒糖；Mega 进化不消耗糖果只消耗 Mega Energy，平时养 1 只满级本体即可在团战时临时超进化。由于防御血量低，团战中容易被秒，建议多备几只轮换上场，靠快速循环大招打输出。","formNote":"团战推荐用「超级胡地 (Mega Alakazam)」：它是游戏中最高攻击力的超能系输出之一，超进化期间还能给同属性队友加成，是超能系 Mega Raid 的首选。暗影胡地输出略高于普通本体但更脆 (受到伤害 +20%)，且无法与 Mega 叠加，作为补充输出可用。结论：能用 Mega 就上 Mega 胡地；没有 Mega Energy 时用暗影胡地堆 DPS，普通本体作为常规替补。"},"gallade":{"cn":"艾路雷朵","en":"Gallade","dex":475,"types":["Psychic","Fighting"],"evo":[{"dexNumber":280,"cnName":"拉鲁拉丝","enName":"Ralts"},{"dexNumber":281,"cnName":"奇鲁莉安","enName":"Kirlia"},{"dexNumber":475,"cnName":"艾路雷朵","enName":"Gallade"}],"moveset":"快攻 Confusion(精神冲击) + 大招 Leaf Blade(叶刃)。打格斗输出走 Charm/Confusion + Close Combat(近身战),但纯格斗 DPS 角色更推荐用 Lucario;Gallade 的最佳定位是高攻草系/格斗双形态——草系大招 Leaf Blade 覆盖水/地/岩,格斗大招 Close Combat(近身战)打钢/恶/冰/普/岩。常用通用配:Confusion + Leaf Blade(广谱)或 Confusion + Close Combat(纯格斗输出)。","get":"由 Kirlia(奇鲁莉安,需先从 Ralts 拉鲁拉丝进化)使用一块 Sinnoh Stone(神奥之石)将雄性个体进化而来;雌性个体进化为 Gardevoir(沙奈朵)。Ralts 可在野外、孵蛋、调查任务及活动中获得;Sinnoh Stone 主要来自 7 天连续研究突破奖励、对战联盟奖励、GO 火箭队头目及活动。","train":"进化链共用糖果:用 Ralts(拉鲁拉丝)糖果。进化总消耗 25(→Kirlia)+100(→Gallade)=125 颗糖,外加 1 块 Sinnoh Stone。团战推荐高攻 IV(优先 Attack 接近 15),强化到 L40 即可应付绝大多数团战;若资源充足且常打高难度/Master 联盟,可用 XL 糖果(Rare Candy XL / 抓 Ralts 系积累)推到 L50 拉满 CP 与输出。建议同时养一只草系配招、一只纯格斗配招(用第二招 TM),应对不同团战。","formNote":"Gallade 没有 Mega/Primal 形态(Pokemon GO 中暂未推出 Mega Gallade)。可获得的特殊形态是 Shadow Gallade(暗影艾路雷朵),来自击败 GO 火箭队后净化前的暗影个体。团战推荐用 Shadow 暗影形态:暗影宝可梦攻击加成约 +20%,DPS 明显高于普通形态,是团战刷伤害的更优选择(代价是承伤更高、需消耗精英 TM 才能更换暗影专属招式 Frustration)。日常通用/省资源可用普通形态;追求最高输出选 Shadow。"},"gardevoir":{"cn":"沙奈朵","en":"Gardevoir","dex":282,"types":["Psychic","Fairy"],"evo":[{"dexNumber":280,"cnName":"拉鲁拉丝","enName":"Ralts"},{"dexNumber":281,"cnName":"奇鲁莉安","enName":"Kirlia"},{"dexNumber":282,"cnName":"沙奈朵","enName":"Gardevoir"}],"moveset":"通用最强 PvE 配招：快攻 Confusion(精神强念) + 大招 Psychic(精神强念/精神波)，纯超能系最高 DPS（约 13.4 DPS）。若专打龙系团战或需要妖精输出，则用 Charm(撒娇) + Dazzling Gleam(魔法闪耀) 的妖精系配招（约 12.7 DPS），妖精双倍克制龙系。建议两套都备：超能系打 Psychic 通用场景，妖精系专精打龙。","get":"主要途径：野外捕捉拉鲁拉丝(Ralts)后进化——拉鲁拉丝→奇鲁莉安(25 糖)→沙奈朵(100 糖)。拉鲁拉丝也常作为 2km 蛋孵化、社区日/聚焦时刻特色宝可梦出现。暗影沙奈朵来自击败火箭队头目/手下后捕捉的暗影拉鲁拉丝(2019-08 已上线)，进化即可（暗影/普通奇鲁莉安均可进化成沙奈朵，无性别限制）。注意：沙奈朵与艾路雷朵(Gallade)共享拉鲁拉丝进化链，奇鲁莉安任意个体都可进化为沙奈朵。","train":"进化共需 125 颗拉鲁拉丝糖果(25+100)。糖果获取：捕捉时用菠萝果(Pinap)翻倍、转移多余个体、走路伙伴、Rocket 奖励、Mega 进化加成同属性糖果。XL 糖果用于强化到 L40 以上(L41-50 需大量 XL 糖)，团战追求高攻则优先选高攻 IV(尤其攻击 15)且 CP 高的个体满级强化；若资源有限，L40 已足够主力。建议主力练满级超能系配招用于通用团战，再额外培养一只妖精系配招专打龙系团战。","formNote":"团战首选「超进化沙奈朵 Mega Gardevoir」——它是当前游戏内顶级超能系输出之一，Confusion/Psychic 约 18 DPS、TDO 约 379，远超普通形态，且 Mega 在场为全队同属性(超能/妖精)队友提供伤害加成，团战性价比最高。妖精系 Charm/Dazzling Gleam 的 Mega 也是顶级妖精攻击手(S 级)，专打龙系团战极强。暗影沙奈朵(Shadow)输出高于普通形态、低于 Mega，且承伤更脆，适合作为非 Mega 时段的高 DPS 替补。总结：优先用 Mega（通用超能配 Psychic，打龙配 Dazzling Gleam）；无 Mega 能量时用 Shadow 替补。"},"latios":{"cn":"拉帝欧斯","en":"Latios","dex":381,"types":["Dragon","Psychic"],"evo":[{"dexNumber":381,"cnName":"拉帝欧斯","enName":"Latios"}],"moveset":"通用最佳 PvE：快攻 龙之吐息 (Dragon Breath) + 大招 波导弹 (Aura Sphere)，综合 DPS/TDO 最高。纯龙系输出可选 龙之吐息 + 龙爪 (Dragon Claw)，伤害略低但全程龙系、能量循环更顺，适合打需要龙系的团战。光明净化 (Luster Purge) 能量消耗高、收益差，不推荐 PvE。","get":"传说宝可梦，仅通过五星团体战 (5-star Raid) 在其轮换上线期间获得；也曾作为 GO 火箭队 Giovanni 头目奖励发放暗影形态。平时无法在野外、孵蛋或抓现获取，需等官方安排的团战/活动周期。日常没有上线时无法获得。","train":"糖果来源主要是打团战时的奖励糖果、与好友的远距离/极好友团战奖励、Latios 专属糖果及稀有糖果转换、以及 Mega 进化后获得的额外 Mega 糖果加成。XL 糖果用于把等级从 L40 推到 L50（满级），来自 L31+ 团战奖励、玩家等级 40+ 抓捕掉落、稀有 XL 糖果转换。培养思路：传说级团战吃手只投在攻击向高 IV 个体（优先 14-15 攻击）；普通团战推满 L40 即可，硬核刷分/极限输出再上 L50。先备好 296 普通糖 + 296 XL 糖（L40→L50 单只满级成本）再决定是否冲满级。","formNote":"团战首选 超进化 Mega Latios：开 Mega 后 DPS 约 19.3、TDO 约 473，远超本体 (DPS≈15.8/TDO≈342)，且能给同行队友提供同属性伤害加成，是最强龙系/超能系团战形态之一。若没有 Mega 能量，则暗影 Latios (Shadow) 是次优——比普通本体输出更高（高攻、吃伤害），适合纯堆 DPS 速刷；但脆、续航差。结论：有 Mega 能量优先 Mega；无 Mega 但追求极限输出用暗影；要稳健续航用普通满级体。Latios 无 Primal 形态。"},"metagross":{"cn":"巨金怪","en":"Metagross","dex":376,"types":["Steel","Psychic"],"evo":[{"dexNumber":374,"cnName":"铁哑铃","enName":"Beldum"},{"dexNumber":375,"cnName":"金属怪","enName":"Metang"},{"dexNumber":376,"cnName":"巨金怪","enName":"Metagross"}],"moveset":"快攻: Bullet Punch(子弹拳, 钢系) / 大招: Meteor Mash(彗星拳, 钢系)。Bullet Punch + Meteor Mash 是巨金怪最强的全能 PvE 组合, 也是当前游戏内顶级的钢系输出之一。Meteor Mash 需要通过精英催化(Elite TM)或特定活动学得。","get":"主要通过进化获得: 抓铁哑铃(Beldum, 25糖)进化成金属怪(Metang), 再用100糖进化成巨金怪。铁哑铃野外较稀有, 常在社区日(Community Day)、活动或一星团战中出现; 金属怪偶尔作为团战奖励或在卵中孵化。社区日期间进化可直接习得特殊招式 Meteor Mash。也可通过远程/线下团战、田野调查等活动获取。","train":"团战(Raid)定位为高攻输出钢系打手, 应优先培养高攻击 IV(理想 14-15 攻)。巨金怪进化总共需要 125 颗糖(25 进 Metang + 100 进 Metagross), 强化到高等级还需大量糖和星尘。建议: 普通玩家强化到 L40 即可胜任绝大多数团战; 追求极限输出/PvP 的玩家可用 XL 糖果(Candy XL)推到 L45-50。XL 糖果通过抓捕、孵蛋、好友赠送、用普通糖兑换(每 100 普通糖换 1 XL)等方式积累。务必确保已通过精英催化器把大招换成 Meteor Mash 后再投入星尘强化。","formNote":"团战推荐使用「暗影巨金怪(Shadow Metagross)」: 暗影形态攻击力提升约 20%(承伤也增加 16.7%), 在以爆发输出为目标的团战中 DPS 明显高于普通形态, 是钢系/超能系团战的顶级选择。注意暗影巨金怪需要消耗大量星尘和糖才能解锁/移除「沮丧」并换上 Meteor Mash。Pokemon GO 中目前没有巨金怪的 Mega 进化或 Primal 形态可用, 因此本体形态里暗影版即为团战最优; 若无暗影版, 普通版同样非常强力。"},"hoopa":{"cn":"胡帕","en":"Hoopa","dex":720,"types":["Psychic","Ghost"],"evo":[{"dexNumber":720,"cnName":"胡帕","enName":"Hoopa"}],"moveset":"惩戒形态(Confined, 超能力/幽灵): 快攻 念力 Confusion + 大招 精神强念 Psychic (PvE 最佳, Confusion+Psychic 约 14.6 DPS / 258 TDO, 大风天气加成)。解放形态(Unbound, 超能力/恶): 快攻 念力 Confusion + 大招 精神强念 Psychic 打超能力输出 (约 17.2 DPS / 311 TDO, 全游戏最高攻击之一); 若需恶属性输出可用 惊吓 Astonish + 暗影球 Shadow Ball。综合: 团战首选解放形态 + 念力/精神强念。","get":"幻之宝可梦, 无法在野外/蛋/团战中遇到。仅通过限时活动获取: 最初在「恶作剧季 (Season of Mischief, 2021)」的特殊调查「神秘的发现 Misunderstood Mischief」最终奖励中获得惩戒形态胡帕; 之后通过 GO Fest / 恶作剧相关限时活动与付费门票调查发放, 并通过特定调查/活动解锁惩戒↔解放形态切换 (Prison Bottle 机制)。当前 (2026) 主要靠周期性回归的限时调查或活动门票获取, 平时不可捕捉。","train":"幻之宝可梦糖果稀少: 主要靠完成活动调查发放的胡帕糖果, 以及用神奇糖果(Rare Candy / Rare Candy XL)转换; 缺少户外捕捉来源, 所以 XL 糖果尤其难攒。团战定位为高攻输出型, 优先把攻击 IV 高(理想 15 攻)的个体练满。建议: PvE 不需关注防御/HP IV, 优先攻击; 资源充足时强化到 L40, 行有余力可继续到 L50(需大量 XL 糖果与星尘), 性价比上 L40 即可胜任绝大多数团战。配招用 TM 调到 念力/精神强念。","formNote":"胡帕本体即为幻之宝可梦, 通常没有暗影(Shadow)形态可用, 也没有 Mega/Primal 超进化。可对团战产生差异的是它自身的两种形态: 惩戒形态(Confined, 超能力/幽灵)与解放形态(Unbound, 超能力/恶)。团战推荐解放形态——它攻击种族值显著更高(解放是全游戏最高攻击的宝可梦之一), 同样用 念力+精神强念 时输出明显优于惩戒形态; 惩戒形态更偏均衡/耐久, PvE 纯输出不占优。结论: 团战优先练解放形态 (Hoopa Unbound) + 超能力配招。"},"pinsir":{"cn":"凯罗斯","en":"Pinsir","dex":127,"types":["Bug"],"evo":[{"dexNumber":127,"cnName":"凯罗斯","enName":"Pinsir"}],"moveset":"快攻 Fury Cutter(虫咬术/连斩)+ 大招 X-Scissor(十字剪)。这是凯罗斯当前 PvE 最佳虫系配招:Fury Cutter 充能极快、好躲招，X-Scissor 是高性价比 STAB 大招。次选快攻 Bug Bite(虫咬),效果接近。注意凯罗斯没有强力的非虫系大招,所以它基本只作为纯虫系输出使用。","get":"主要来源:野外随机刷新(草地/林地栖息地概率偏高)、5km 蛋孵化、Field Research 调查任务奖励、突袭(常作为一星/三星 Boss 出现)。社区日或活动期间刷新率会大幅提升,并可能开启 Mega 凯罗斯团战。亚洲/澳洲为其地区性偏多区域,北美/欧洲相对偏少但仍可获得。糖果可通过捕捉、孵蛋、与伙伴同行(每 3km 一颗糖)以及 Pinap 莓提升捕捉糖果获取。","train":"凯罗斯是高攻型纯虫系输出,作为团战(突袭)虫系打手培养,优先吃高攻个体。个体值建议尽量接近满攻(Attack IV 14-15),HP/防御次要。强化路线:用普通糖果 + 星之沙强化到 L40,有 XL 糖果可继续推到 L45-50 进一步提升 DPS(虫系本身缺顶级输出,凯罗斯的高攻在满级后收益明显)。XL 糖果来源:高 CP 捕捉、孵蛋、与伙伴长距离同行(伙伴等级越高、距离越远越易出 XL)、糖果转换(普通糖果按 100:1 兑换 XL)。团战不建议为它点 PvP 联盟,纯做 PvE 输出即可。","formNote":"团战首选「超进化 Mega 凯罗斯」——它是当前游戏内顶级虫系攻击手(Fury Cutter + X-Scissor,S 级,DPS 在所有虫系中最高之一),且 Mega 在场会给同队伍同属性(虫系)攻击加成,团战收益远超本体。本体普通凯罗斯只是 A 级虫系打手,适合在没解锁 Mega 能量或缺虫系输出时凑数。暗影(Shadow)凯罗斯在普通本体里 DPS 最高(暗影 +20% 攻击),若你有暗影凯罗斯,纯本体输出选它优于普通本体;但只要能 Mega,优先 Mega 凯罗斯。综合推荐:能 Mega 就上 Mega 凯罗斯;退而求其次用暗影凯罗斯做高 DPS 虫系输出。"},"scizor":{"cn":"巨钳螳螂","en":"Scizor","dex":212,"types":["Bug","Steel"],"evo":[{"dexNumber":123,"cnName":"飞天螳螂","enName":"Scyther"},{"dexNumber":212,"cnName":"巨钳螳螂","enName":"Scizor"}],"moveset":"通用 PvE 团战(虫属性输出)推荐: 快攻「连斩 Fury Cutter」+ 大招「十字剪 X-Scissor」。若想当钢属性使用则用「子弹拳 Bullet Punch」+「铁头 Iron Head」,但钢属性输出偏弱不推荐。团战首选虫系配招 Fury Cutter + X-Scissor。","get":"飞天螳螂(Scyther)野外刷怪、田野调查、活动及团战可获得;进化巨钳螳螂需要 50 个飞天螳螂糖果 + 1 个「金属外衣(Metal Coat)」道具(可在 PokéStop/补给站随机获得,或活动中获取)。巨钳螳螂偶尔也作为团战 Boss、Mega 团战出现。可孵蛋(飞天螳螂)或交换获取。","train":"团战吃高攻,优先培养个体值(IV)攻击高的个体(理想 15 攻)。先进化后再强化以节省星尘;储备 50 飞天螳螂糖果 + 金属外衣用于进化。强化至 L40 即可应付绝大多数团战;若要打满输出/Master 联盟以外的极限 PvE,可用 XL 糖果继续推到 L50(L40→L50 每只需大量 XL 糖果与星尘,性价比一般,普通玩家停在 L40 足够)。Mega 进化不消耗等级强化资源,而是消耗 Mega 能量。","formNote":"团战强烈推荐用「超级巨钳螳螂(Mega Scizor)」而非普通或暗影形态。Mega Scizor 是 S 级顶级虫属性攻击手(虫系输出排名约第 3),配 Fury Cutter + X-Scissor 时 DPS≈14.57、TDO≈336,远超普通巨钳螳螂(虫系仅 A 级约第 26 名,钢系为 F 级不推荐)。Mega 还能在团战中为队友提供同属性伤害加成。暗影巨钳螳螂(Shadow Scizor)输出高于普通形态、可作为没有 Mega 时的高性价比备选,但单只投放仍不及 Mega。结论: 有 Mega 能量就上 Mega Scizor;否则用 Shadow Scizor 顶替。"},"vikavolt":{"cn":"锹农炮虫","en":"Vikavolt","dex":738,"types":["Bug","Electric"],"evo":[{"dexNumber":736,"cnName":"弱丁虫","enName":"Grubbin"},{"dexNumber":737,"cnName":"虫电宝","enName":"Charjabug"},{"dexNumber":738,"cnName":"锹农炮虫","enName":"Vikavolt"}],"moveset":"快攻 Spark (电) + 大招 Discharge (电/放电)；作为电系输出时这套电系全力组合最优。若需要虫系输出，可用 Bug Bite (虫咬) + X-Scissor (十字剪)，但锹农炮虫的特长是电系，通常推荐 Spark + Discharge。","get":"主要途径：1) 野外捕捉 Grubbin (弱丁虫) 后用糖果进化；2) 从 Charjabug (虫电宝) 进化为 Vikavolt 需要 100 颗糖果 + 处于「磁力线圈」诱饵模组(Magnetic Lure Module)覆盖范围内才能进化(与同代道具进化机制一致)；3) 偶尔作为团战奖励/调查任务奖励/活动稀有刷新出现；4) 天气加成：雨天(电)和晴天(虫)提升出现率与捕捉等级。Vikavolt 本身野外极罕见，通常靠进化获得。","train":"糖果链：Grubbin->Charjabug 需 25 糖，Charjabug->Vikavolt 需 100 糖(且需磁力诱饵)，合计每只成品约 125 糖 + 路上捕捉/孵化/伙伴行走积累。XL 糖果用于将其强化到 L40 以上(L50 满级)，对纯 PvE 团战可优先冲高 CP。培养建议：团战要高攻输出，优先把个体值挑「攻击 15」的高攻个体满强化；它作为电系攻击手定位不错但并非顶级(逊于 Electivire/Zekrom/Xurkitree/Therian Thundurus 等)，因此若资源有限，建议把 XL 糖果留给更强的电系，Vikavolt 作为预算/凑队选择强到 L40 即够用。先确保 Spark + Discharge 配招，再投入星尘/糖果强化。","formNote":"Vikavolt 在 Pokémon GO 中没有超进化(Mega)也没有 Primal 形态。理论上若拥有暗影形态(Shadow)，暗影版攻击加成约 +20%，对纯输出团战会更优——推荐优先使用暗影锹农炮虫(若可获得)。不过目前游戏内并未实装锹农炮虫的暗影形态，所以实际只有普通形态可用；正常以普通形态培养即可。无论哪种形态，它都不属于第一梯队电系，仅作为预算/凑数攻击手。"},"volcarona":{"cn":"火神蛾","en":"Volcarona","dex":637,"types":["Bug","Fire"],"evo":[{"dexNumber":636,"cnName":"燃烧虫","enName":"Larvesta"},{"dexNumber":637,"cnName":"火神蛾","enName":"Volcarona"}],"moveset":"虫属性团战(最优用途): 快攻 虫咬 (Bug Bite) + 大招 虫鸣 (Bug Buzz)。火属性团战: 快攻 喷火 (Fire Spin) + 大招 过热 (Overheat)。火神蛾整体是 S 级虫系攻击手(约 14.15 DPS / 286.6 TDO),做虫系输出优于火系。","get":"只能通过孵蛋获得:燃烧虫 (Larvesta) 从 2km / 5km / 10km 蛋孵化,且孵化率极低,是游戏内最难入手的宝可梦之一。野外不会出现。可闪光。孵到后用糖果进化成火神蛾。","train":"进化需要 400 个燃烧虫糖果(全游戏最高进化糖果消耗之一)。糖果来源:多孵燃烧虫蛋(每只约 +20-25 糖果)、把燃烧虫设为伙伴(每 5km 拿 1 颗)、以及 Mega 进化期间糖果加成。团战定位要堆攻击,优先把强 IV(高攻)个体培养到 L40,有足够 XL 糖果时推到 L50 提高耐久/输出上限。先点满虫系大招做主力配招,XL 糖果同样稀缺,集中培养一只高 IV 即可。","formNote":"火神蛾目前没有 Mega/Primal 形态,也没有暗影形态(只能孵蛋无法被火箭队捕获,故无暗影版)。因此团战直接用普通本体即可,无需纠结形态选择;若未来上线暗影形态,暗影版攻击更高会成为更优的纯输出选择(代价是耐久略低)。"},"diancie":{"cn":"蒂安希","en":"Diancie","dex":719,"types":["Rock","Fairy"],"evo":[{"dexNumber":719,"cnName":"蒂安希","enName":"Diancie"}],"moveset":"快攻 Rock Throw（岩石封锁）+ 大招 Rock Slide（岩崩）。这是蒂安希作为岩属性输出的最优配招；若用于妖精向打法则可考虑 Moonblast（月亮之力），但 PvE 主用岩系。","get":"通过免费特殊调查「Glitz and Glam」（魅力四射）获得，该任务于 2024-05-01 全球上线、永久可领（登录游戏后自动触发对话即可解锁）。完成后获得 1 只蒂安希。若此前已在 GO Fest 2023 领取过专属调查，则改为获得 25 颗蒂安希糖果。注意：蒂安希是幻兽 Pokemon，每个账号通常仅能获得 1 只。","train":"蒂安希为幻兽，无法野外/团战重复捕获刷糖，糖果主要来自调查奖励、用它作为同伴行走（每行走一定距离得糖）、以及 Rare Candy / Rare Candy XL 转化。培养思路：团战要高 CP/高攻，IV 优先攻击拉满，强化到 L40（普通糖+星尘）乃至 L50（需 XL 糖果+大量星尘）。但由于本体岩系 DPS 偏低（与 Glimmet、Klawf 同档），把宝贵的 XL 糖果全砸满级性价比不高——除非你追求满图鉴/收藏。实战价值几乎全部体现在 Mega 形态，所以优先把蒂安希 Mega 能量攒够（活动期 Field Research 给 Mega 能量），本体只需练到能稳定开 Mega 即可。","formNote":"团战强烈推荐使用「超进化 Mega Diancie（超级蒂安希）」，而非本体。Mega Diancie 配 Rock Throw + Rock Slide 是当前游戏内顶级（S 级、岩属性排名 #1）的岩系团战输出，约 18.4 DPS / 265 TDO，同时也是不错的妖精系输出。本体蒂安希岩系 DPS 很低，不建议直接进团战，哪怕面对克制的龙/飞 Boss 也别用本体。Diancie 没有暗影（Shadow）形态，也没有 Primal 形态，因此唯一值得为团战投入的就是 Mega 形态——平时本体练到可开 Mega，开团前进化成 Mega Diancie 即可。"},"tyranitar":{"cn":"班基拉斯","en":"Tyranitar","dex":248,"types":["Rock","Dark"],"evo":[{"dexNumber":246,"cnName":"幼基拉斯","enName":"Larvitar"},{"dexNumber":247,"cnName":"沙基拉斯","enName":"Pupitar"},{"dexNumber":248,"cnName":"班基拉斯","enName":"Tyranitar"}],"moveset":"通用 PvE 首选「咬住 Bite(快攻)+ 暴力旋转 Brutal Swing(大招)」,作为顶级恶系输出,克制超能力系/幽灵系团战首领;岩石系打法用「岩石封锁 Smack Down(快攻)+ 尖石攻击 Stone Edge(大招)」,适合打火/飞/虫/冰系首领。两套都建议解锁第二大招以便切换。","get":"主要来自进化:抓野生幼基拉斯(沙漠/岩石栖息地、活动期间野外刷新增多)或孵 5km 蛋,12 颗糖进化成沙基拉斯,再 100 颗糖进化成班基拉斯。班基拉斯本身偶尔作为 4 星团战首领出现(可用稀有糖直接喂),社区日/活动期间幼基拉斯大量刷新且可遇闪光。暗影班基拉斯需从火箭队头目(Giovanni)处击败暗影沙基拉斯后获得并净化前保留。","train":"团战定位是高攻恶系炮台,优先堆攻击面板:抓到后选高 IV(尤其攻击项,理想 14-15 攻),用星尘+普通糖强化。进化全程共需约 112 颗幼基拉斯系糖(12+100),建议在社区日/糖果加倍活动囤糖,并用糖果伴走(Buddy)和神奇糖果补足。L40 已足够日常团战;若追求满输出且有 XL 糖,可推到 L50(需大量幼基拉斯 XL 糖,主要靠 L31+ 抓捕、孵蛋、伴走里程和远程团战兑换获取)。先把一只练满再考虑第二只。","formNote":"超进化 Mega Tyranitar(超级班基拉斯)是当前最强的恶系团战输出之一,且超进化期间会为全场恶系/岩石系队友提供伤害增益,本体更肉、续航更久,综合最优,首推。暗影班基拉斯单体 DPS 略高于 Mega(约 17.66 vs 17.78,差距极小)但更脆、TDO 低很多;若没有 Mega 能量或已有别的 Mega 占用,暗影班基拉斯是次选的高爆发恶系炮台。结论:能 Mega 就用 Mega(尤其作为指挥 Mega 给队友加成);否则用暗影形态吃高输出,普通形态用于日常/凑队。"},"aerodactyl":{"cn":"化石翼龙","en":"Aerodactyl","dex":142,"types":["Rock","Flying"],"evo":[{"dexNumber":142,"cnName":"化石翼龙","enName":"Aerodactyl"}],"moveset":"快攻 Rock Throw(岩石封锁) + 大招 Rock Slide(岩崩)。这是化石翼龙作为岩属性输出的最佳纯岩配招,全程岩属性可吃到 STAB 加成。备选大招可考虑 Ancient Power(原始之力)用于打中飞行/冰/虫,但综合 DPS/TDO 仍以 Rock Throw + Rock Slide 为最优。","get":"主要途径:孵蛋(常见于 10km 蛋,部分活动也进入较低距离蛋池)、野外随机刷新(出现率较低)、Field Research 调查任务奖励、以及活动/团战(常作为一星或三星 Boss 出现)。Mega 形态需在 Mega Raid(超级团战)中击败 Mega Aerodactyl 获取 Mega Energy(化石翼龙能量)后,用能量进行 Mega 进化。原作中它由「Old Amber(古代琥珀化石)」复原,GO 中无化石复原机制,以上述途径为准。","train":"化石翼龙是单阶段宝可梦,无需进化,糖果直接全部用于强化(没有进化分流的浪费)。培养思路:团战追求高攻,优先把个体值挑高攻(攻击 IV 尽量 15,血量/防御次要),强化到 Level 40;若有足够 XL 糖果(L40+ 需要 XL Candy),可推到 Level 41-50 进一步抬高 CP 与输出,适合需要最大化伤害的高难团战。普通通关团战 L40、攻击 IV 高即可,XL 投资优先级低于真正的顶级岩系输出手(如超级班基拉斯、超级钻角犀兽、拉帝亚斯/超级化石翼龙本身)。日常喂巨型糖果(Rare/XL Candy)+ 星之沙强化,缺糖时可用 Pinap Berry(凤梨果)抓捕翻倍出糖。","formNote":"超进化(Mega Aerodactyl)远优于普通体和暗影体,是团战首选。Mega 化石翼龙配 Rock Throw + Rock Slide 时 DPS 约 15.3、TDO 约 328,稳居岩系顶级(S 级,约第 6 名)输出梯队,并能为同场所有训练师提供岩/飞属性团战加成。普通化石翼龙基础攻击不算高、防御血量偏脆,纯团战实战只算「缺顶级岩系手时的替补」。暗影形态(若可获得)会提升输出但更脆,生存性差且需要暗影碎片漂白,性价比一般。综合推荐:有 Mega Energy 就上 Mega Aerodactyl;否则把资源优先投给更强的岩系输出(超级班基拉斯/超级钻角犀兽等),把普通化石翼龙作为补位即可。"},"rampardos":{"cn":"战槌龙","en":"Rampardos","dex":409,"types":["Rock"],"evo":[{"dexNumber":408,"cnName":"头盖龙","enName":"Cranidos"},{"dexNumber":409,"cnName":"战槌龙","enName":"Rampardos"}],"moveset":"快攻 Smack Down(岩石属性，岩石系)+ 大招 Rock Slide(岩崩，岩石系)。这是双 STAB 组合，DPS 约 14.8、TDO 约 200，是非 Mega/非暗影的最高岩石系 DPS 配招。备选大招 Outrage(逆鳞，龙系)只在需要打龙系时用，否则 Rock Slide 通用最强。","get":"主要靠进化获得：捕捉/孵化头盖龙(Cranidos)后用 50 颗糖果进化成战槌龙。头盖龙来源：(1) 7km / 远征蛋孵化；(2) 1星团本(头盖龙曾作为团战 boss 出现，含闪光机会)；(3) 化石/远古宝可梦相关活动与社区活动日(Cranidos 曾做过社区日，速学招式即为 Smack Down)；(4) 偶尔的野外刷新/调查任务奖励。战槌龙本体几乎不在野外自然刷出，基本都靠头盖龙进化。","train":"头盖龙糖果用于进化(50 颗)与强化；强化到高等级需要大量普通糖果 + 战槌龙XL糖果(L40 以上必需 XL)。培养建议：战槌龙是典型\"玻璃大炮\"，攻击极高、防御和血量很脆，所以优先堆攻击、追求最高 DPS 输出而非耐久。建议练一只刷满攻击 IV(尤其攻击 15)、强化到 L40，有 XL 糖果再冲 L50 用于高级团战(如5星/Mega团)输出位。由于太脆，实战中要主动闪避大招以延长存活、维持 DPS。XL 糖果可通过孵蛋、与头盖龙/战槌龙交换、捕捉头盖龙、Pinap/银 Pinap 增产等方式积累。","formNote":"战槌龙没有 Mega/超进化形态，也没有 Primal 形态，因此不存在\"超进化更优\"的选择。它有暗影形态(Shadow Rampardos)。团战追求最大输出时，暗影形态明显更优：暗影加成使攻击进一步提升，DPS 超过普通形态，是顶级岩石系输出之一(代价是受到伤害更高、更脆)。结论：通用培养选普通战槌龙即可，但若要刷高级团战做极限输出位，优先练暗影战槌龙(Shadow Rampardos)，配招同为 Smack Down + Rock Slide。"},"gigalith":{"cn":"庞岩怪","en":"Gigalith","dex":526,"types":["Rock"],"evo":[{"dexNumber":524,"cnName":"石丸子","enName":"Roggenrola"},{"dexNumber":525,"cnName":"地幔岩","enName":"Boldore"},{"dexNumber":526,"cnName":"庞岩怪","enName":"Gigalith"}],"moveset":"快攻 Smack Down(落石) + 大招 Meteor Beam(流星光束)。这是岩系最强 PvE 组合,两招均吃 STAB(本系加成),Smack Down 充能效率高、Meteor Beam 单发伤害极高。备选快攻为 Lock-On(锁定),但 Smack Down 因 STAB 与高 DPS 更优,几乎所有岩系团战/道馆场景都首选 Smack Down + Meteor Beam。","get":"主要通过进化获得:野外捕捉/孵蛋得到 石丸子(Roggenrola),用 50 糖进化成 地幔岩(Boldore),再花 200 糖进化成 庞岩怪(Gigalith)。石丸子常见于山地/采石场类生态,也会在岩系相关团战日、社区活动、5km 蛋中出现。注意正传系列里 Boldore→Gigalith 需交换进化,但 Pokemon GO 中只需糖果即可,无需交换。亦可遇到其闪光(Shiny)及暗影(火箭队头目掉落 Roggenrola 时)形态。","train":"作为岩系团战输出,庞岩怪定位是高攻(攻击 226)的\"廉价/平民\"岩系打手,优先把强化资源投在它身上以提升团战 DPS,而非堆防御。培养建议:1) 先确保拿到 Smack Down + Meteor Beam 配招(必要时用技能机/精英技能机解锁 Meteor Beam);2) 满级目标 L40(满 3228 CP)即可胜任绝大多数团战,有富余的 XL 糖再推到 L50(约 3650 CP)榨取最后约 13% 强化收益;3) IV 优先攻击拉满,团战输出向;4) 糖果来源:石丸子线吃糖伙伴/孵蛋/捕捉糖,巨型(XL)糖主要靠 L31+ 捕捉、孵蛋与交换。投入多只满级用于团战车队(同属性堆叠)。","formNote":"庞岩怪没有 Mega/超进化也没有 Primal 形态,所以形态选择只在\"普通\"与\"暗影(Shadow)\"之间。团战首选暗影庞岩怪:暗影形态攻击约 ×1.2,作为纯输出岩系打手能显著提高 DPS/总输出,代价是更脆(防御 ×0.83)和强化需双倍尘土/糖果。结论——追求团战输出请优先培养暗影形态(Shadow Gigalith),并配 Smack Down + Meteor Beam;普通形态仅作为糖果/资源不足时的过渡。即便如此,庞岩怪整体仍属岩系中游打手,被 Mega 班基拉斯、超甲狂犀、Mega 大尾立等更强岩系输出压制,适合作为平民车队成员。"},"tyrantrum":{"cn":"暴飞龙","en":"Tyrantrum","dex":697,"types":["Rock","Dragon"],"evo":[{"dexNumber":696,"cnName":"化石翼龙","enName":"Tyrunt"},{"dexNumber":697,"cnName":"暴飞龙","enName":"Tyrantrum"}],"moveset":"快攻: 岩石封锁 (Rock Throw) / 大招: 流星光束 (Meteor Beam)。这是当前最佳通用 PvE 配招——双 STAB 岩属性输出、Rock Throw 充能高、Meteor Beam 每点能量伤害(DPE)极高。作为岩属性输出约 14.1 DPS / 286 TDO，位列 A+ 梯队的岩系攻击手。若打龙系副本可考虑龙属性大招(逆鳞 Outrage / 龙爪),但通用首选岩系组合。","get":"主要途径: (1) 野外随机刷出 Tyrunt(化石翼龙),捕捉后用糖果进化; (2) 孵化普通 10km 蛋(注意不在 Adventure Sync 同步 10km 蛋池中); (3) 特定活动/调查任务奖励或团战(若当期作为团本头目出现)。可闪光(Shiny 已实装)。Tyrunt 进化为 Tyrantrum 需 50 颗糖果且必须在游戏内白天进行。","train":"糖果来源: 捕捉 Tyrunt(每只约 3 颗,可叠加 Pinap/活动加成)、转移多余个体、设为 Buddy 步行获得、孵蛋一次性获得大量糖果。XL 糖果通过捕捉/转移/孵蛋(等级 31+ 后开始掉落)及 Buddy 步行积累。培养建议: 团战看重高攻,优先选攻击 IV 高(尽量 14-15)、整体 IV 偏高的个体强化; 资源充足时直接拉满 L40,有富余 XL 糖果再推到 L50 以最大化 DPS/TDO; 进化前先确认是白天,否则无法进化成 Tyrantrum。","formNote":"Tyrantrum 没有 Mega/超进化或 Primal 形态(游戏内不存在),所以这条线唯一的强化形态是「暗影 Tyrantrum (Shadow)」。对团战而言暗影形态明显更优: 暗影版攻击加成约 1.2 倍,作为岩系输出手排在 Mega Diancie、暗影戟龙(Rampardos)、暗影超甲狂犀(Rhyperior)之后、是次一档的强力岩系攻击手,DPS 显著高于普通形态(代价是承伤略增、并需精英解锁招式/紫色糖果消除阴气来用 Frustration 之外的招式)。推荐: 副本/进攻流首选「暗影 Tyrantrum + 岩石封锁/流星光束」; 只做收藏或缺暗影资源时普通形态也够用。"},"necrozma":{"cn":"奈克洛兹玛","en":"Necrozma","dex":800,"types":["Psychic"],"evo":[{"dexNumber":800,"cnName":"奈克洛兹玛","enName":"Necrozma"}],"moveset":"本体(纯超能力)最佳 PvE 配招: 快攻 Psycho Cut(精神利刃) + 大招 Future Sight(预知未来)。这是本体唯一拿得出手的超能力输出组合(约 13.2 DPS),但只能算 B 级超能力攻击手,实战价值有限。注意: 真正强力的是它的融合形态(见 formNote),本体单独打团并不推荐。","get":"奈克洛兹玛于 2024-05-30 Pokémon GO Fest 2024: Sendai 期间实装,主要通过五星团战(Raid)捕获本体。它不在野外刷新,也不孵蛋,只能靠团战。融合形态无法直接捕捉: 需先拥有本体 Necrozma + 对应的 Solgaleo(索尔迦雷欧)或 Lunala(露奈雅拉),再用融合能量进行融合 — 融合 Dusk Mane(黄昏之鬃)需 1000 太阳融合能量 + 30 奈克洛兹玛糖果 + 30 科斯莫古糖果;融合 Dawn Wings(拂晓之翼)需 1000 月亮融合能量 + 30 奈克洛兹玛糖果 + 30 科斯莫古糖果。Ultra Necrozma(究极奈克洛兹玛)截至 2026-06 尚未实装。","train":"团战定位需高攻满级。建议把本体 IV 选高攻个体(攻击 14-15),用星沙+糖果先强化到 L40,后续解锁 XL 后逐级冲 L50(L40→L50 全程消耗 XL 糖果,合计约 296 XL 糖果 + 大量星沙)。本体作为传说团战 BOSS,糖果获取靠团战奖励/二次捕捉、用神奇糖果(Rare Candy / XL)转化,以及融合后退融返还。实操要点: 把资源主要投在你打算长期使用的融合形态对应阵容上,而不是本体 — 因为本体打团偏弱,强化本体主要意义是为融合提供高基础属性。建议先囤够糖果与 XL,确定主玩 Dusk Mane 还是 Dawn Wings 后再集中满级。","formNote":"团战强烈推荐使用融合形态,本体纯超能力性能平庸。两大融合形态都是各属性顶级输出: Dawn Wings Necrozma(拂晓之翼,幽灵/超能力)配 Psycho Cut + Moongeist Beam(月华飞弹),约 22 DPS,是当前第一梯队(#1)幽灵系攻击手,综合最强、最推荐优先培养;Dusk Mane Necrozma(黄昏之鬃,钢/超能力)配 Metal Claw + Sunsteel Strike(炽日强袭),约 21 DPS,是 S 级钢系第一梯队(约 #3),打仙系/钢系弱点目标极强。暗影(Shadow)与 Mega/Primal 形态本体在 GO 中均未实装,因此无需考虑;若只能二选一,优先 Dawn Wings(更通用、且作为顶级幽灵手用途更广),其次按需补 Dusk Mane 作为钢系主力。"},"darkrai":{"cn":"达克莱伊","en":"Darkrai","dex":491,"types":["Dark"],"evo":[{"dexNumber":491,"cnName":"达克莱伊","enName":"Darkrai"}],"moveset":"快攻 Snarl(嘲讽) + 大招 Shadow Ball(暗影球)。这是 Darkrai 的最佳通用 PvE 配招：暗影球能量效率高、单发 100 伤害，整体 DPS≈16.7、TDO≈273。若没刷出暗影球（限定招式），Dark Pulse(恶之波动) 可作替代，但明显逊于暗影球，建议用精英 TM 锁定 Snarl + Shadow Ball。","get":"仅通过团战获取——Darkrai 是幻之宝可梦，野外不会出现、也无法孵化。它会定期作为五星团战头目轮换登场（含相关活动/纪念日复刻）。打团战胜利后进入抓捕环节捕获本体；建议组队 raid 多刷以累积糖果。注意：捕获后无法在大师球以外的常规途径稳定二次获得，主要靠 raid 期间反复参战。","train":"团战奖励里幻之宝可梦保底 2-3 颗 XL 糖果，且每次抓捕可用菠萝果(Pinap Berry)翻倍普通糖果；激活 3 级 Mega（恶系糖果加成）还能每抓 +2 糖并提升 25% XL 糖出率。强化到满级（L40 训练师上限 / L50 需 XL 糖）需约：520,000 星尘、304 普通糖果、296 XL 糖果。团战定位看重高攻，优先把一只高攻 IV（攻击项满或接近满）的个体直接拉满级，而非纠结整体 IV；多刷 raid 集中喂同一只是最划算的培养路线。","formNote":"团战优先用「暗影 Darkrai」(Shadow Darkrai)：配 Snarl + Shadow Ball 时 DPS≈17.8、明显高于普通形态(≈16.7)，是 Dark 系顶级输出之一，缺点是吃伤更高、需要解锁招式槽消除沮丧。Mega Darkrai 在主系列/对战里有提及，但截至目前 Pokemon GO 尚未正式上线可用的超进化形态，因此实战不可选；Darkrai 也没有 Primal 形态。结论：能用暗影就用暗影形态打团，没有暗影则用普通形态，Mega 暂不参与实战考量。"},"banette":{"cn":"诅咒娃娃","en":"Banette","dex":354,"types":["Ghost"],"evo":[{"dexNumber":353,"cnName":"怨影娃娃","enName":"Shuppet"},{"dexNumber":354,"cnName":"诅咒娃娃","enName":"Banette"}],"moveset":"快攻：影子爪 (Shadow Claw)；大招：暗影球 (Shadow Ball)。两招均为幽灵系，享受 STAB 加成，是 PvE 通用最佳配招。普通 Banette DPS 约 11.9，超进化 Mega Banette DPS 约 17。","get":"主要通过怨影娃娃 (Shuppet) 进化获得：野外捕捉/孵蛋/田野调查奖励/活动中遇到 Shuppet，攒够 50 个 Shuppet 糖果后进化即可得到 Banette。Banette 本身野外刷新率极低，通常靠进化获取。万圣节 (Halloween) 等幽灵主题活动期间 Shuppet/Banette 出现率与异色 (Shiny) 概率会大幅提升。","train":"糖果来源：捕捉 Shuppet、用 Shuppet 当伙伴行走 (Buddy Walk)、孵蛋、转移 (transfer) 给博士、与好友交换、用 Pinap 树果加倍。强化到高等级需要 Shuppet 糖果 + 星尘 (Stardust)，到 L40+ 还需 XL 糖果 (Candy XL，5 级以上训练家可获得，靠捕捉/行走/孵蛋/交换掉落)。团战定位建议：选高个体值 (IV) 个体，优先攻击 (Attack) 接近满的个体；想拉满 DPS 可强化到 L40，追求极限可上 L50 (需大量 XL 糖果)。但因 Banette 防御/血量偏脆，性价比通常做到 L40 即可，把资源更多投在超进化能量上。","formNote":"超进化形态 (Mega Banette) 对团战明显更优：S 级幽灵系输出，DPS 约 17、TDO 约 246，远超普通形态 (DPS≈11.9)，且团战中提供同属性伤害加成 (Mega 增益) 给队友。需 100 Mega Energy 触发超进化。推荐团战首选 Mega Banette。注意：Mega Gengar 整体强于 Mega Banette，若已有 Mega Gengar 可优先用它，Mega Banette 作为优秀的次选/双开补位。暗影形态 (Shadow) 目前游戏内不可获得 (无对应火箭队头目掉落)，故无需考虑暗影；现阶段最优解就是 Mega Banette + 影子爪/暗影球。"},"giratina":{"cn":"骑拉帝纳（起源形态）","en":"Giratina (Origin Forme)","dex":487,"types":["Ghost","Dragon"],"evo":[{"dexNumber":487,"cnName":"骑拉帝纳","enName":"Giratina"}],"moveset":"起源形态最佳 PvE 配招：快攻 Shadow Claw（暗影爪），大招 Shadow Force（暗影潜袭，需精英充能 TM 解锁）。这套是顶级幽灵系输出（约 21.8 DPS、~912 TDO）。若打龙系团战，可改快攻 Dragon Tail（龙尾）+ Shadow Force。没有 Shadow Force 时退而求其次用 Dragon Pulse（龙之波动）。注意：起源形态（攻击高）远优于别种形态（坐骑/Altered，偏肉），团战务必用起源形态。","get":"主要通过 5 星传说团战获取（Giratina 会周期性轮换回归团战，起源/别种形态分不同活动期上线）。形态切换：在游戏中用「Origin Forme / Altered Forme」道具（活动期间可领取的形态切换器/Platinum Orb 类道具）在两种形态间互换，无需重新捕捉。暗影形态需击败搭载暗影 Giratina 的火箭队头目（Giovanni，限活动期）后捕获暗影版本。捕获后均可超级幸运/异色（闪光）几率。","train":"团战定位是高攻输出，优先堆攻击：配招带暗影爪 + 暗影潜袭。糖果可在传说团战多打几只、用稀有糖果或与好友交换（特殊交易）获得；XL 糖果通过捕获、孵蛋、与铂金好友交换、稀有糖果XL转换获取。强化目标：常规账号练到 L40（节省 XL 糖果即可有强力团战输出）；追求满血量/分级团战或要顶满伤害可继续吃 XL 糖果推到 L50。建议养 2-3 只起源形态组队刷团。IV 上团战重攻击，不必强求 100%。","formNote":"团战首选「起源形态」(Origin Forme)：它攻击远高于别种形态(Altered)，是 S+ 级幽灵/龙系输出；别种形态偏防御坦克，PvE 不推荐。暗影起源形态(Shadow Origin)伤害更高(DPS 提升约 20%，可冲到 ~17+ DPS 的暗影潜袭龙系输出/更高幽灵输出)，但更脆、需要紫雾解锁充能且要消耗资源，追求极限 DPS 且能稳住的玩家选暗影起源形态，普通团战用常规起源形态即可。它没有 Mega / Primal 进化，因此形态选择就是「起源 > 别种」，以及是否上「暗影」。"},"lunala":{"cn":"露奈雅拉","en":"Lunala","dex":792,"types":["Psychic","Ghost"],"evo":[{"dexNumber":792,"cnName":"露奈雅拉","enName":"Lunala"}],"moveset":"通用最佳: 念力 (Confusion, 超能快攻) + 暗影球 (Shadow Ball, 超能/恶 通吃的招式池里它的招牌大招)。\n- 当超能系输出: 念力 (Confusion) + 精神强念/精神击 (Psychic) —— 约 14.95 DPS / 400+ TDO。\n- 当幽灵系输出: 暗影爪 (Shadow Claw) + 暗影球 (Shadow Ball) —— 约 15.21 DPS / 407 TDO,作为幽灵攻击手非常优秀且自身抗超能系。\n首选配 念力 + 暗影球 兼顾,或按打谁的需求二选一。","get":"通过 5 星团战 (5-Star Raid) 击败并捕捉。近期上架窗口: 2025-07-22 至 07-28、2026-02-21 至 03-04 (Road to Kalos 活动) 等。团战通关后用金色树莓 + 究极球 + 曲球提高捕捉率。捕到后可与奈克洛兹玛 (Necrozma) 融合成「拂晓之翼 奈克洛兹玛 (Dawn Wings Necrozma)」,后者 PvE 输出更高。","train":"作为传说宝可梦,糖果来源: 团战捕捉 (每只 3 颗+捕捉糖果)、设为搭档步行 (每 ~20km 1 颗)、交换、以及奇遇糖果/星之碎片加成活动; 用神秘糖果/稀有糖果可直接补。XL 糖果同样来自团战捕捉、L40+ 步行/捕捉随机掉落、交换。团战定位讲究高攻输出,优先把个体值偏攻击的个体强化; 一般 PvE 推到 L40 即可应对多数团战,若要冲刺最高 DPS/担当满破核心阵容可用 XL 糖果推到 L50。先点满两个招式(念力 + 暗影球)再逐级强化。","formNote":"Lunala 在 Pokemon GO 中没有暗影 (Shadow) 形态,也没有超进化 (Mega) 或原始回归 (Primal) 形态,因此团战只能用其本体常规形态,无需在形态间取舍。若追求该体系下最强 PvE 幽灵/超能输出,可把捕到的 Lunala 与 Necrozma 融合成「拂晓之翼 奈克洛兹玛 (Dawn Wings Necrozma)」,其面板与 TDO 高于裸 Lunala,是团战更优解; 单论 Lunala 本体则用念力 + 暗影球。"},"regidrago":{"cn":"瑞吉铎拉戈","en":"Regidrago","dex":894,"types":["Dragon"],"evo":[{"dexNumber":894,"cnName":"瑞吉铎拉戈","enName":"Regidrago"}],"moveset":"快攻: 龙息 (Dragon Breath) | 大招: 龙之波动 (Dragon Energy)。Dragon Energy 是 Regidrago 的独占大招，输出极高，是其招牌组合。备选大招可用 Outrage (逆鳞)，但 Dragon Energy 在血量满时伤害远超其他龙系大招，作为顶级龙系输出首选。","get":"仅限五星团战 (Elite Raid / 5-star Raid) 获取，无野生出现、无蛋孵化。瑞吉系列(Regi)在 GO 中通常通过限时团战日或特定团战轮换出现，需要现场或远程团战券组队击败后捕捉。捕捉的个体性格(IV)随机，无天气加成提升出现率(它本身可被晴天 Sunny 天气加成战斗力)。","train":"糖果通过捕捉/远程团战奖励、与好友交换获得，以及指定它为伙伴(Buddy)步行获得糖果。强化到高等级需要大量普通糖果 + 瑞吉铎拉戈 XL 糖果(L40 以上每级消耗 XL 糖果)。团战站锤(Raid 进攻)讲究高攻输出，IV 优先攻击拉满；防守/道馆并非其用途。建议: 锁定高攻 IV 个体，优先升到 L40，有充足 XL 糖果再冲 L45-50 以最大化龙系 DPS。多备份几只以组建龙系输出队伍。","formNote":"Regidrago 目前在 Pokemon GO 中没有 Mega 进化，也没有 Primal 形态，因此团战只能用普通本体形态。暗影(Shadow)形态目前游戏内尚未推出(它只来自团战，不来自火箭队头目)。结论: 团战推荐使用普通形态。理论上若未来上线暗影形态，凭借暗影约 1.2 倍攻击加成会成为更强的龙系站锤输出(代价是更脆、需吃更多伤害),届时纯输出环境优先选暗影形态。"},"dragonite":{"cn":"快龙","en":"Dragonite","dex":149,"types":["Dragon","Flying"],"evo":[{"dexNumber":147,"cnName":"迷你龙","enName":"Dratini"},{"dexNumber":148,"cnName":"哈克龙","enName":"Dragonair"},{"dexNumber":149,"cnName":"快龙","enName":"Dragonite"}],"moveset":"快攻 Dragon Tail（龙尾）+ 大招 Draco Meteor（流星群，最高单次爆发 DPS）；若想兼顾耐用与充能更快，大招也可用 Dragon Claw（龙爪）。打非龙系目标可视情况用 Hurricane（暴风）抗冰系反制者。","get":"野外可低概率遇到迷你龙/哈克龙/快龙；常见来源：进化迷你龙→哈克龙→快龙（共需 25+100=125 颗迷你龙糖果）；龙系/水边主题活动、社区日（迷你龙曾为社区日宝可梦，可学专属招式）、远/近郊团战、突袭蛋、Field/Special Research 奖励、伙伴行走刷糖。Mega 能量来源：完成超级蜂巢拉帝亚斯/拉帝欧斯等相关团战或活动获取 Mega Energy。","train":"团战定位为高攻输出位：优先把单只快龙强化满（建议 Level 40，富余资源可推到 Level 50），其余资源留给替补轮换。Level 40 满级约需积累星尘+糖果，从 L40→L50 额外需要大量星尘与 XL 糖果（约 296 颗 XL 糖果）。XL 糖果获取：用 L40+ 同族遇怪、孵蛋、伙伴行走、转化普通糖果（受 Candy XL 限制）。先凑齐一只满级主力，再考虑第二只用于双倍轮换；攻击 IV 优先（团战看输出），不必强求 100% IV。","formNote":"超进化（Mega Dragonite）显著优于普通和暗影形态：它是顶级龙系 Mega 攻击手之一，提供团队龙系/同属性伤害加成（boost），团战推荐优先上 Mega Dragonite。若没有 Mega 能量，则用暗影快龙（Shadow Dragonite）——暗影形态攻击更高、爆发 DPS 强于普通形态，是无 Mega 时的最佳输出选择（代价是更脆、需暗影碎片洗去阴气并培养）。普通满级快龙作为稳定替补。总体优先级：Mega &gt; Shadow &gt; 普通。"},"palkia":{"cn":"帕路奇亚","en":"Palkia","dex":484,"types":["Water","Dragon"],"evo":[{"dexNumber":484,"cnName":"帕路奇亚","enName":"Palkia"}],"moveset":"快攻 Dragon Tail（龙尾）+ 大招 Spacial Rend（空间裂断，本体专属大招）。若没解锁 Spacial Rend，备选 Dragon Tail + Draco Meteor（流星群）。Spacial Rend 比 Draco Meteor 输出更高、能量更省，是首选龙系大招；Hydro Pump（水炮）则作为水系输出方向的备选。","get":"仅通过 5 星传说团战（Legendary Raid）捕获，无法野生遇到或孵化。会在不定期的传说团战轮换中回归（通常每年若干次），团战胜利后进入捕获环节。其 Origin Forme（起源形态）需要专属道具 Adamant Orb（金刚宝玉）从普通帕路奇亚转换形态。野外通常抓不到，请留意当前活动/团战日程。","train":"帕路奇亚糖果通过团战捕获、与好友远足（每 20 公里 1 颗 Rare Candy 可转化）、以及用 Rare Candy / Rare Candy XL 转化获得。强化到团战实用需要大量普通糖果 + 星尘；要打满级（L40-50）必须积攒 296 颗 XL 糖果（L40→L50 段全靠 XL 糖果），XL 糖果主要靠捕获、远足和 Rare Candy XL 转化。团战定位是高攻输出，优先堆等级换更高攻击与续航；IV 上优先攻击值高的个体，PvE 不需要完美防御血量。先升到 L40，行有余力再用 XL 糖果冲 L50。","formNote":"团战推荐用 Origin Forme（起源形态）帕路奇亚：它保留 Water/Dragon 属性但攻击与综合强度更高，且拥有专属大招 Spacial Rend（空间裂断），Dragon Tail + Spacial Rend 是目前最强龙系输出组合（约 17.8 DPS，S 级龙系攻击手），明显优于普通形态的 Dragon Tail + Draco Meteor（约 15.9 DPS）。游戏中没有 Mega 帕路奇亚，Primal 形态也不存在；Shadow（暗影）帕路奇亚目前不可获取。结论：能转化就优先练 Origin Forme，作为顶级龙系团战输出；普通形态可保留备用，无需追暗影/超进化。"},"hydreigon":{"cn":"三首恶龙","en":"Hydreigon","dex":635,"types":["Dark","Dragon"],"evo":[{"dexNumber":633,"cnName":"单首龙","enName":"Deino"},{"dexNumber":634,"cnName":"双首暴龙","enName":"Zweilous"},{"dexNumber":635,"cnName":"三首恶龙","enName":"Hydreigon"}],"moveset":"最佳 PvE 配招：快攻 Bite(咬住) + 大招 Brutal Swing(粗暴翻滚)。作为恶系输出，咬住的属性一致(STAB)收益让其成为顶级恶系打手，整套 DPS 约 15.0、TDO 约 321。Brutal Swing 是社区日限定招式，错过的话需用进化绝招学习器(Elite Charged TM)补回。若没有粗暴翻滚，恶系替补大招用 Dark Pulse(恶之波动)；若要当龙系打手，可用快攻 Dragon Breath(龙息) + 大招 Draco Meteor(流星群)，但龙系输出整体不如恶系定位突出。","get":"主要靠进化获得：野外/活动捕捉单首龙(Deino)，攒糖进化。单首龙偶尔出现在野外、5km 蛋、活动及部分团战/调查任务中，平时较稀有，社区日(Deino Community Day / Classic)是集中刷取的最佳时机。暗影形态自 2025-09-16「Psychic Spectacular: Taken Over」起开放：击败火箭队头目可获暗影单首龙，再进化为暗影三首恶龙。","train":"进化糖果：单首龙→双首暴龙 25 颗，双首暴龙→三首恶龙 100 颗(总计 125 颗)。团战打手建议优先选高攻击 IV(攻击15最佳，防御/HP次要)。强化到 L40 已足够日常团战；若要拉满 L50 需大量 XL 糖果(L40→L50 约需 296 颗 XL 糖)，社区日捕捉时 XL 糖掉率翻倍，是囤 XL 糖的关键窗口。建议至少养 1-2 只满招(带 Brutal Swing)的高攻个体作为恶系核心输出。","formNote":"游戏内没有 Mega/超进化形态(也无 Primal)，因此形态选择在普通版与暗影版之间。团战推荐用暗影三首恶龙(Shadow Hydreigon)：暗影加成提升约 20% 攻击，纯输出 DPS 明显高于普通版，是当前最强的恶系团战打手之一，唯一代价是更脆(承伤略增)和需要进化绝招学习器才能上 Brutal Swing。若追求极限 DPS 选暗影版；若想省学习器/更耐久则用普通版满招个体。"},"absol":{"cn":"阿勃梭鲁","en":"Absol","dex":359,"types":["Dark"],"evo":[{"dexNumber":359,"cnName":"阿勃梭鲁","enName":"Absol"}],"moveset":"快攻：偷袭/咬咬(Snarl) —— Snarl 是最佳通用快攻，充能更快、PvE DPS 最高。大招：胡乱挥舞(Brutal Swing) —— 当前 PvE 最优大招，伤害效率高于 Megahorn。完整最佳配招：Snarl + Brutal Swing(胡乱挥舞)。若想要虫系覆盖打草/超能/恶系，可备一个 Megahorn(超级角击)作为第二大招。","get":"野外随机遭遇(较稀有)；多以 Raid 团战头目(常见三星)、各类活动/聚焦时刻(Spotlight Hour)登场；偶尔出现在每月研究突破或限时调查(Special/Timed Research)奖励中；天气加成为「云/多云」(Cloudy)时刻提升出现率与等级。配合 Mega 能量需先抓到普通 Absol 后用 Mega 能量进行超进化。","train":"糖果来源：捕捉(每只3颗)、走路伙伴(每5km一颗)、转移给博士、Pinap果加成。XL糖果：达到队伍40级后捕捉/孵化/转移随机掉落，也可用普通糖换取(教练员等级足够时)。团战定位是「高攻易碎」纯输出，建议优先把IV高攻个体强化到L40；若资源充裕(团战死磕/高级阵容)再用XL糖推到L50。由于防御血量低，实战必须配合闪避(dodge)保命，所以堆攻击属性、靠输出窗口收益最大；不建议为它囤太多XL，优先级低于队伍核心恶系输出(如超梦/达克莱/大嘴娃Mega等)。","formNote":"推荐用「超级进化形态 Mega Absol」打团战。Mega Absol(纯恶系)是顶级恶系输出之一(S级，约#5恶系攻击手)，配 Snarl + Brutal Swing，DPS≈17.9，明显高于普通形态(DPS≈14.1)，并且超进化期间还能给同属性队友加伤、提升捕捉糖果，性价比最高。暗影形态(Shadow Absol)目前并未在游戏中正式上线，无法获得；即便有，因 Absol 本身极其易碎，暗影的攻击加成虽高但生存更差，团战收益不如直接上 Mega。结论：能超进化就优先 Mega Absol；没有 Mega 能量时再用普通形态。Absol 无 Primal 形态。"}}};

function renderSide(){
  let h='<div class="navlbl">攻击属性</div>';
  DATA.types.forEach((t,i)=>{h+=`<div class="nav${i===cur&&mode==='type'?' on':''}" onclick="selType(${i})"><span class="dot" style="background:${TYPECOLOR[t.type]}"></span><div>${t.typeCn}系<small> ${(t.attackers||[]).length}只</small></div></div>`;});

  h+=`<div class="nav${mode==='bosses'?' on':''}" onclick="selBosses()"><span class="dot" style="background:var(--bad)"></span><div>当前 Boss<small>现役 boss 用啥打</small></div></div>`;

  $("side").innerHTML=h;
}
function selType(i){mode='type';cur=i;renderSide();renderType();scrollTo(0,0);}
function selBasics(){mode='basics';renderSide();renderBasics();scrollTo(0,0);}

function compRecHtml(bts){
  const b=cbBoss;if(!b||!b.mt||!b.mt.length)return '';
  const TW={'S+':1.3,'S':1.15,'A+':1.05,'A':1.0,'B':0.85};
  const cand=[];
  for(const t of DATA.types){
    const mult=bts.reduce((m,d)=>m*effOne(t.type,d),1);
    if(mult<1.6)continue;
    for(const a of (t.attackers||[])){
      const tp=a.tp||[];
      let worst=0;
      for(const mt of b.mt){const e=tp.length?tp.reduce((m,d)=>m*effOne(mt,d),1):1;if(e>worst)worst=e;}
      if(!b.mt.length)worst=1;
      const f=worst>=2.56?0.55:worst>=1.6?0.8:1.0;
      const bonus=(worst>0&&worst<=0.625)?1.12:1;
      cand.push({a,mult,tcn:t.typeCn,score:mult*(TW[a.tier]??0.9)*f*bonus,worst});
    }
  }
  const best={};
  for(const c of cand){const k=(c.a.name||'')+(c.a.form||'');if(!best[k]||c.score>best[k].score)best[k]=c;}
  const top=Object.values(best).sort((x,y)=>y.score-x.score).slice(0,8);
  if(!top.length)return '';
  const hint=c=>c.worst>=2.56?'<span style="color:var(--bad)">⚠️ 会被对面双倍克制(×2.56)，站不住</span>':c.worst>=1.6?'<span style="color:var(--warn)">⚠️ 会被对面克制(×1.6)，注意减员</span>':(c.worst>0&&c.worst<=0.625)?'<span style="color:var(--good)">🛡 抗对面招式，站得很稳</span>':'<span style="color:var(--dim)">中性承伤</span>';
  let h=`<div class="secttl">🎯 综合推荐（输出克制 × 承伤评估，已考虑对面招式属性）</div><div class="agrid">`;
  for(const c of top){
    h+=`<div class="acard" onclick='openMon(${JSON.stringify(c.a).replace(/'/g,"&#39;")})'>
      <img loading="lazy" src="${sprite(c.a.dex)}" onerror="this.src=FB">
      <div style="min-width:0">
        <div class="nm">${esc(c.a.cn||c.a.name)}${c.a.tw?` <small style="color:var(--dim);font-weight:400">${esc(c.a.tw)}</small>`:''}</div>
        <div class="badges"><span class="tier tier-${tierCls(c.a.tier)}">${esc(c.a.tier)}</span><span class="tbadge" style="background:var(--panel3);color:var(--dim)">${c.tcn}系打点 ×${c.mult.toFixed(2)}</span>${c.a.el?`<span class="form" style="background:#a878ff;color:#fff">🔑特殊招式</span>`:''}</div>
        <div class="mv">⚡${esc(c.a.fc||c.a.fast)} · ${esc(c.a.cc||c.a.charged)}</div>
        <div class="mv">${hint(c)}</div>
      </div></div>`;
  }
  h+='</div>';
  return h;
}
function renderCounterRes(){
  const bts=[cb1].concat(cb2&&cb2!==cb1?[cb2]:[]);
  const recs=DATA.types.map(t=>({type:t.type,cn:t.typeCn,mult:bts.reduce((m,d)=>m*effOne(t.type,d),1),atk:t.attackers||[]}))
    .filter(r=>r.mult>=1.6).sort((a,b)=>b.mult-a.mult);
  let h=compRecHtml(bts);
  if(!recs.length){h='<div class="muted" style="margin-top:14px">该组合没有明显克制属性（纯中性/高抗），建议用通用高 DPS 输出（如超梦、烈空坐、轰擂金刚猩等），或看具体 boss 的 Pokebattler。</div>';}
  for(const r of recs){
    h+=`<div class="secttl"><span class="pill" style="background:${TYPECOLOR[r.type]};color:#fff">${r.cn}系</span>&nbsp;×${r.mult.toFixed(2)}${r.mult>=2.56?' 🔥双倍克制':''}</div>`;
    h+=`<div class="agrid">${r.atk.slice(0,4).map(a=>attCard(Object.assign({},a,{_tcn:r.cn}))).join('')}</div>`;
  }
  $("cres").innerHTML=h;
}

let cb=0;
function renderBasics(){
  let h='<div class="lg-head"><h2>机制速查</h2></div><div class="basics-tabs">';
  DATA.basics.forEach((b,i)=>{h+=`<div class="btab${i===cb?' on':''}" onclick="selB(${i})">${esc(b.title.replace(/Pokémon GO |团战|\(PvE\)|\(Raid\)|完全指南|完全攻略|指南/g,'').trim()||('章节'+(i+1)))}</div>`;});
  h+='</div>';
  DATA.basics.forEach((b,i)=>{h+=`<div class="rich${i===cb?'':' hide'}" id="bd${i}">${b.html}</div>`;});
  $("main").innerHTML=h;
}
function selB(i){cb=i;DATA.basics.forEach((_,k)=>$("bd"+k).classList.toggle("hide",k!==i));document.querySelectorAll(".btab").forEach((e,k)=>e.classList.toggle("on",k===i));}

$("season").textContent='团战输出榜 · '+DATA.generated+' · 数据来源 GamePress/Pokebattler/DialgaDex，随版本变动';
renderSide();renderType();
</script>
