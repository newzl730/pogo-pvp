<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon GO 团战(PvE)攻略台</title>
<style>
  :root{
    --bg:#0e1016;--panel:#171a23;--panel2:#1f2330;--panel3:#272c3b;--line:#2c3142;
    --txt:#e9ebf2;--dim:#9aa1b4;--accent:#ff7a3c;--accent2:#3b6cff;
    --good:#27c08a;--warn:#ff9f43;--bad:#ff5c72;
    --sp:#ffcb05;--sS:#27c08a;--sA:#3b6cff;--sB:#7c84a0;
  }
  *{box-sizing:border-box}
  html{overflow-x:hidden}
  body{margin:0;background:radial-gradient(1200px 700px at 75% -15%,#2a1a14,#0e1016);color:var(--txt);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .top{padding:13px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;background:rgba(14,16,22,.92);backdrop-filter:blur(8px);z-index:20}
  .top h1{margin:0;font-size:18px;letter-spacing:.5px}.top h1 span{color:var(--accent)}
  .top .season{color:var(--dim);font-size:11px;flex:1;min-width:220px;line-height:1.4}
  .top a{color:var(--accent2);font-size:12px;text-decoration:none}
  .layout{display:grid;grid-template-columns:200px 1fr}
  @media(max-width:820px){.layout{grid-template-columns:1fr}}
  .side{border-right:1px solid var(--line);padding:14px 10px;display:flex;flex-direction:column;gap:4px;position:sticky;top:53px;align-self:start;max-height:calc(100vh - 53px);overflow-y:auto}
  @media(max-width:820px){.side{position:static;flex-direction:row;flex-wrap:wrap;border-right:none;border-bottom:1px solid var(--line)}}
  .navlbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin:4px 6px 2px;width:100%}
  .nav{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:9px;cursor:pointer;font-size:13px;border:1px solid transparent;background:var(--panel);transition:.12s}
  .nav:hover{background:var(--panel2)}.nav.on{border-color:var(--accent);background:var(--panel3)}
  .nav .dot{width:10px;height:10px;border-radius:3px;flex:none}
  .nav small{color:var(--dim);font-size:10px}
  .main{padding:20px 24px 80px;max-width:1000px}
  @media(max-width:520px){.main{padding:16px 12px}}
  .lg-head{display:flex;align-items:center;gap:11px;margin-bottom:6px;flex-wrap:wrap}
  .lg-head h2{margin:0;font-size:22px}
  .pill{font-size:11px;padding:3px 11px;border-radius:20px;font-weight:700;color:#0e1016}
  .se{font-size:12px;color:var(--dim);margin:8px 0 4px}.se b{color:var(--txt)}
  details.meta{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin:10px 0;padding:0 14px;font-size:12.5px}
  details.meta>summary{cursor:pointer;padding:10px 0;color:var(--dim);list-style:none}
  details.meta>summary::-webkit-details-marker{display:none}
  details.meta>summary::before{content:"▸ ";color:var(--accent)}details.meta[open]>summary::before{content:"▾ "}
  .secttl{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
  .secttl::after{content:"";flex:1;height:1px;background:var(--line)}
  .agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(160px,100%),1fr));gap:11px}
  .acard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px;cursor:pointer;transition:.12s;display:flex;gap:10px;align-items:center}
  .acard:hover{border-color:var(--accent);transform:translateY(-2px);background:var(--panel2)}
  .acard img{width:54px;height:54px;object-fit:contain;flex:none}
  .acard .nm{font-size:13.5px;font-weight:600;line-height:1.2}
  .acard .en{font-size:10px;color:var(--dim)}
  .acard .mv{font-size:10px;color:var(--dim);margin-top:3px;line-height:1.3}
  .badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;align-items:center}
  .tier{font-size:10px;font-weight:800;border-radius:5px;padding:1px 6px;color:#0e1016}
  .tier-Sp{background:var(--sp)}.tier-S{background:var(--sS)}.tier-A{background:var(--sA);color:#fff}.tier-B{background:var(--sB);color:#fff}
  .form{font-size:9.5px;font-weight:700;border-radius:5px;padding:1px 6px;color:#0e1016}
  .form-mega{background:#b06cff;color:#fff}.form-primal{background:#ff5c72;color:#fff}.form-shadow{background:#3a2c5a;color:#cbb6ff;border:1px solid #6a4caf}
  .tbadge{font-size:9px;font-weight:700;border-radius:5px;padding:1px 6px;color:#0e1016}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(6,8,12,.74);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:30px 14px;overflow-y:auto}
  .ov.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;max-width:640px;width:100%;padding:20px;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5);overflow-x:hidden}
  @media(max-width:520px){.modal{padding:16px}}
  .modal .x{position:absolute;top:12px;right:15px;font-size:22px;color:var(--dim);cursor:pointer;line-height:1}
  .mhead{display:flex;align-items:center;gap:15px}
  .mhead img{width:88px;height:88px;object-fit:contain;background:var(--panel2);border-radius:14px;border:1px solid var(--line)}
  .mhead .nm{font-size:21px;font-weight:700}
  .mhead .nm small{display:block;color:var(--dim);font-size:11.5px;font-weight:400;margin-top:3px}
  .mhead .meta-line{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .chip{font-size:11px;padding:3px 9px;border-radius:13px;background:var(--panel3);color:var(--txt);white-space:nowrap}
  .chip.fast{background:rgba(74,163,255,.18);border:1px solid #4aa3ff;color:#bfe0ff}
  .chip.charged{background:rgba(255,124,60,.16);border:1px solid var(--accent);color:#ffc59c}
  .mrow{margin:13px 0}.mrow .k{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
  .moveline{display:flex;align-items:center;gap:6px;flex-wrap:wrap}.moveline .plus{color:var(--dim)}
  .box{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:12.5px;line-height:1.6;color:#cdd2df}
  .evo{display:flex;align-items:center;gap:2px;flex-wrap:wrap;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px}
  .evo .stage{text-align:center;min-width:66px;padding:0 4px}.evo .stage img{width:46px;height:46px;object-fit:contain}
  .evo .stage .c{font-size:11.5px}.evo .stage .e{font-size:9px;color:var(--dim)}.evo .arr{color:var(--accent);font-size:16px}
  details.more{margin-top:10px;border-top:1px dashed var(--line);padding-top:8px}
  details.more summary{cursor:pointer;color:var(--accent);font-size:12.5px;list-style:none}
  details.more summary::-webkit-details-marker{display:none}details.more summary::before{content:"▸ "}details.more[open] summary::before{content:"▾ "}
  details.more p{font-size:12.5px;line-height:1.7;color:#cdd2df;margin:8px 0}
  .muted{color:var(--dim);font-size:11.5px;line-height:1.5}
  .basics-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px}
  .btab{padding:7px 13px;border-radius:9px;border:1px solid var(--line);background:var(--panel);cursor:pointer;font-size:12.5px}
  .btab.on{border-color:var(--accent);background:var(--panel3)}
  select{background:var(--panel3);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:5px 9px;font-size:13px}
  .sug{display:inline-block;padding:4px 9px;border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:12px;background:var(--panel3)}
  .sug:hover{border-color:var(--accent)}
  .rich h1,.rich h2,.rich h3,.rich h4{color:var(--accent);margin:14px 0 6px;line-height:1.3}
  .rich h1{font-size:17px}.rich h2{font-size:15px}.rich h3{font-size:13.5px}.rich h4{color:var(--txt);font-size:13px}
  .rich table{border-collapse:collapse;width:100%;margin:10px 0;font-size:12px}
  .rich th,.rich td{border:1px solid var(--line);padding:5px 8px;text-align:left;vertical-align:top}.rich th{background:var(--panel3);color:var(--accent)}
  .rich ul,.rich ol{margin:6px 0;padding-left:20px}.rich li{margin:3px 0;font-size:12.5px;line-height:1.6}
  .rich p{font-size:12.5px;line-height:1.7;color:#cdd2df}.rich hr{border:none;border-top:1px dashed var(--line);margin:12px 0}
  .rich strong{color:#fff}.rich code{background:var(--panel3);padding:1px 5px;border-radius:4px}.rich blockquote{border-left:3px solid var(--accent2);margin:6px 0;padding:2px 10px;color:var(--dim)}
  .rich{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .hide{display:none}
</style>
</head>

<script>
const DATA = {"generated":"2026-06","domain":"PvE 团战输出","basics":[{"title":"Pokémon GO 团战(PvE)属性相克与输出选系指南","html":"<h1>Pokémon GO 团战(PvE)属性相克与输出选系指南</h1><h2>一、属性相克倍率体系</h2><p>Pokémon GO 的相克倍率和主系列<strong>不同</strong>。它不用 2x/0.5x/0x，而是用一套基于 <strong>1.6 的幂次</strong>的乘法体系。\"无效\"也只是大幅减伤,<strong>不会归零</strong>。</p><table><thead><tr><th>关系</th><th>倍率</th><th>说明</th></tr></thead><tbody><tr><td>单重克制(超效)</td><td><strong>1.6x</strong></td><td>招式属性克制对方一个被动属性</td></tr><tr><td>双重克制(双倍超效)</td><td><strong>2.56x</strong></td><td>= 1.6 × 1.6,克制对方<strong>两个</strong>属性</td></tr><tr><td>中性(无相克)</td><td>1.0x</td><td>不克不抗</td></tr><tr><td>单重抵抗</td><td><strong>0.625x</strong></td><td>= 1 / 1.6,被对方一个属性抵抗</td></tr><tr><td>双重抵抗</td><td><strong>0.390625x</strong>(常写 0.39x)</td><td>= 0.625 × 0.625,被两个属性都抵抗</td></tr><tr><td>主系列里的\"免疫\"</td><td>等同单重抵抗 0.625x</td><td>在 GO 里<strong>不归零</strong>,只是当作一次抵抗处理</td></tr></tbody></table><blockquote>记忆要点:<strong>克制就 ×1.6,抵抗就 ×0.625</strong>,叠加两层就是平方。Boss 几乎都是双属性,所以你真正要追的是 <strong>2.56x 的双倍克制</strong>。</blockquote><hr><h2>二、STAB(本系加成)1.2x</h2><p><strong>STAB = Same Type Attack Bonus</strong>(本系招式加成)。</p><ul><li>当<strong>招式属性 = 使用宝可梦自身属性之一</strong>时,该招式伤害 ×<strong>1.2</strong>。</li><li>主系列是 1.5x,GO 里是 <strong>1.2x</strong>。</li><li>STAB 与相克倍率<strong>相乘叠加</strong>。</li></ul><h3>综合倍率示例(招式总倍率 = STAB × 相克)</h3><table><thead><tr><th>情形</th><th>计算</th><th>总倍率</th></tr></thead><tbody><tr><td>本系 + 双倍克制</td><td>1.2 × 2.56</td><td><strong>≈ 3.07x</strong></td></tr><tr><td>本系 + 单重克制</td><td>1.2 × 1.6</td><td><strong>1.92x</strong></td></tr><tr><td>非本系 + 双倍克制</td><td>1.0 × 2.56</td><td>2.56x</td></tr><tr><td>本系 + 中性</td><td>1.2 × 1.0</td><td>1.2x</td></tr><tr><td>本系 + 单抗</td><td>1.2 × 0.625</td><td>0.75x</td></tr></tbody></table><p><strong>结论:本系双倍克制(≈3.07x)是 PvE 输出的天花板。</strong> 一只\"本系正好双倍克制 Boss\"的攻击手,输出常常碾压更高 CP 但非本系的队员。</p><hr><h2>三、如何选「双倍克制」输出</h2><p>四步法:</p><h3>1. 看 Boss 的<strong>双属性</strong></h3><p>团战 Boss 几乎都是双属性(如水/飞、龙/飞、钢/超能)。</p><h3>2. 找一个能<strong>同时克制这两个属性</strong>的招式属性</h3><ul><li>例:Boss 是 <strong>水/飞</strong>(如暴鲤龙)→ <strong>电</strong> 系同时克制水 和 飞 → 2.56x 双倍克制。</li><li>例:Boss 是 <strong>龙/飞</strong>(如烈空坐)→ <strong>冰</strong> 系克制龙 和 飞 → 2.56x。</li></ul><h3>3. 让攻击手<strong>自身也是这个属性</strong>(吃 STAB 1.2x)</h3><ul><li>电系打水/飞 → 选电系宝可梦带电系招式(如电龙、超甲狂犀的电招、Xurkitree)→ 1.2 × 2.56 ≈ <strong>3.07x</strong>。</li></ul><h3>4. 同时避开<strong>自己被 Boss 反向克制</strong></h3><p>高输出 = 也要能站得住(尤其团战减伤/续航)。若 Boss 招式克制你的属性,虽不影响你的输出倍率,但你更易被打退、损失 DPS。</p><blockquote>速记口诀:<strong>“双系全克 + 自带同系”</strong> = 最高 DPS。</blockquote><hr><h2>四、「打某属性 Boss 用什么系」速查表</h2><p>下表给出<strong>单属性维度</strong>的克制系。Boss 是双属性时,<strong>找一个同时出现在两行的属性 = 双倍克制 2.56x</strong>。</p><table><thead><tr><th>Boss 属性</th><th>用什么系打(克制它)</th></tr></thead><tbody><tr><td>一般(普通)</td><td>格斗</td></tr><tr><td>火</td><td>水、地面、岩石</td></tr><tr><td>水</td><td>电、草</td></tr><tr><td>草</td><td>火、冰、飞行、毒、虫</td></tr><tr><td>电</td><td>地面</td></tr><tr><td>冰</td><td>火、格斗、岩石、钢</td></tr><tr><td>格斗</td><td>飞行、超能力、妖精</td></tr><tr><td>毒</td><td>地面、超能力</td></tr><tr><td>地面</td><td>水、草、冰</td></tr><tr><td>飞行</td><td>电、冰、岩石</td></tr><tr><td>超能力</td><td>虫、恶、幽灵</td></tr><tr><td>虫</td><td>火、飞行、岩石</td></tr><tr><td>岩石</td><td>水、草、格斗、地面、钢</td></tr><tr><td>幽灵</td><td>幽灵、恶</td></tr><tr><td>龙</td><td>冰、龙、妖精</td></tr><tr><td>恶</td><td>格斗、虫、妖精</td></tr><tr><td>钢</td><td>火、格斗、地面</td></tr><tr><td>妖精</td><td>毒、钢</td></tr></tbody></table><h3>双倍克制(2.56x)实战范例</h3><table><thead><tr><th>Boss(双属性)</th><th>选哪系</th><th>为什么双倍</th><th>推荐攻击手举例</th></tr></thead><tbody><tr><td>暴鲤龙(水/飞)</td><td><strong>电</strong></td><td>电克水 + 电克飞</td><td>Xurkitree、电龙、捷拉奥拉</td></tr><tr><td>烈空坐(龙/飞)</td><td><strong>冰</strong></td><td>冰克龙 + 冰克飞</td><td>玛狃拉、波克基斯(冰招)、伽勒尔达摩狒狒</td></tr><tr><td>喷火龙(火/飞)</td><td><strong>岩石</strong></td><td>岩克火 + 岩克飞</td><td>巨岩、爆音怪(岩招)、岩石坦克</td></tr><tr><td>班基拉斯(岩/恶)</td><td><strong>格斗</strong></td><td>格斗克岩 + 格斗克恶</td><td>路卡利欧、凯路迪欧、修建老师</td></tr><tr><td>巨钳螳螂(虫/钢)</td><td><strong>火</strong></td><td>火克虫 + 火克钢</td><td>烈焰猴、火神蛾、酋雷姆(火招)</td></tr><tr><td>钢铁(钢/?) 配地面属性弱点的钢系</td><td><strong>地面</strong></td><td>多数钢系兼吃地面双克</td><td>超甲狂犀、土地云、固拉多</td></tr><tr><td>怪力(纯格斗)</td><td><strong>超能力/飞行/妖精</strong></td><td>单克 1.6x(纯单属性无双倍)</td><td>超梦、急冻鸟、沙奈朵</td></tr></tbody></table><hr><h2>五、一句话总结</h2><ol><li><strong>倍率体系</strong>:克制 ×1.6、双克 ×2.56;抵抗 ×0.625、双抗 ×0.39;无免疫归零。</li><li><strong>STAB</strong>:本系招式 ×1.2,与相克相乘。</li><li><strong>最优输出</strong>:挑一个能<strong>同时克制 Boss 两个属性</strong>的招式属性(2.56x),并让攻击手<strong>自身就是该属性</strong>吃 STAB,综合 ≈ <strong>3.07x</strong>——这就是团战的最高伤害组合。</li></ol>"},{"title":"团战核心指标：DPS 与 TDO 的取舍与配招","html":"<h1>团战核心指标：DPS 与 TDO 的取舍与配招</h1><blockquote>适用范围:回合制 / 半即时制收集类对战游戏(以宝可梦 GO 团战机制为模板)。文中\"招式\"指快攻(普攻)与大招(蓄能技),\"能量\"指释放大招所需的蓄力值。</blockquote><hr><h2>一、两个核心指标到底在衡量什么</h2><table><thead><tr><th>指标</th><th>全称</th><th>含义</th><th>衡量的本质</th></tr></thead><tbody><tr><td><strong>DPS</strong></td><td>Damage Per Second(每秒伤害)</td><td>单位时间内的平均输出</td><td><strong>效率 / 爆发速度</strong></td></tr><tr><td><strong>TDO</strong></td><td>Total Damage Output(总输出 / 续航)</td><td>一只精灵从满血到倒下、整个生命周期内能打出的总伤害</td><td><strong>耐久 / 持续贡献</strong></td></tr></tbody></table><p>简化关系可以记成:</p><p>``<code> TDO ≈ DPS × 存活时间(Survival Time) 存活时间 ≈ 有效血量(HP × 防御折算) / 受到的 DPS </code>``</p><ul><li><strong>DPS 高</strong>:打得快,但不一定打得久。脆皮高攻往往 DPS 爆表,却容易被秒。</li><li><strong>TDO 高</strong>:总账漂亮,但单位时间可能不出彩。坦度高的精灵 DPS 平平,却能\"赖\"在场上把总伤堆起来。</li></ul><p>二者<strong>经常互相矛盾</strong>:堆攻击拉高 DPS,但血薄会压低存活时间从而拉低 TDO;堆血/防提高 TDO,却稀释了 DPS。所以没有\"最强指标\",只有\"匹配场景的指标\"。</p><hr><h2>二、为什么短时高 DPS 适合高伤队,长 boss 看 TDO</h2><p>核心变量是 <strong>战斗时长</strong> 与 <strong>是否会被打死(是否吃满存活时间)</strong>。</p><h3>1. 短时高伤场景 → 看 DPS</h3><p>典型情况:<strong>人多、高练度阵容、目标血量相对可控的 boss</strong>。</p><ul><li>战斗在几十秒内结束,<strong>没有一只精灵会被打到濒死</strong>,存活时间这一项根本\"用不满\"。</li><li>既然存活不是瓶颈,TDO 里的\"续航\"部分就是浪费,<strong>谁能在有限时间里打出更多伤害(DPS 高)谁就赢</strong>。</li><li>这也是\"高伤队/速通队\"的逻辑:用脆皮高攻精灵,在它被打死之前 boss 已经倒了,缺点(脆)永远暴露不出来。</li></ul><blockquote>一句话:<strong>时间是瓶颈、血量不是瓶颈时,选 DPS。</strong></blockquote><h3>2. 长 boss / 缺人 / 低练度场景 → 看 TDO</h3><p>典型情况:<strong>人少、练度不足、boss 血厚耐久战</strong>。</p><ul><li>战斗会拖很长,精灵<strong>会被反复打死、需要不断补位/复活再上</strong>。</li><li>此时谁能\"活得久、每次上场贡献更多总伤\"才是关键,<strong>被秒的高 DPS 脆皮反而打不出账面伤害</strong>(还没攒够大招就倒了)。</li><li>TDO 高的精灵能扛住 boss 的范围技能(尤其是会清场的强力大招),避免团灭、减少复活损失,<strong>把每一条命都换成更多伤害</strong>。</li></ul><blockquote>一句话:<strong>血量是瓶颈、能反复消耗时,选 TDO。</strong></blockquote><h3>3. 一张速查表</h3><table><thead><tr><th>场景</th><th>战斗时长</th><th>会不会被秒</th><th>看哪个指标</th><th>选什么精灵</th></tr></thead><tbody><tr><td>大群速通、高练度</td><td>短</td><td>不会</td><td><strong>DPS</strong></td><td>脆皮高攻、爆发流</td></tr><tr><td>满人正常打</td><td>中</td><td>偶尔</td><td>DPS 为主,兼顾 TDO</td><td>攻防均衡</td></tr><tr><td>少人 / 低练度 / 厚血 boss</td><td>长</td><td>经常</td><td><strong>TDO</strong></td><td>高耐久、抗大招</td></tr><tr><td>单人 / 极限挑战</td><td>很长</td><td>必然反复死</td><td><strong>TDO 压倒一切</strong></td><td>坦克 + 续航配招</td></tr></tbody></table><hr><h2>三、配招如何兼顾:三套思路</h2><p>大招的释放受 <strong>能量积累</strong> 制约,而能量来自快攻与受击。配招的核心矛盾是:<strong>伤害效率 ↔ 能量循环 ↔ 容错率</strong>。下面三套配招对应不同打法。</p><h3>1. 高伤快攻 + 高伤大招 —— \"高伤快攻流\"(纯堆 DPS/单次爆发)</h3><ul><li><strong>思路</strong>:快攻选<strong>单次伤害最高</strong>的,大招选<strong>单发威力最大</strong>的。</li><li><strong>优点</strong>:理论 DPS 天花板最高,单次爆发最强,<strong>适合短时速通</strong>。</li><li><strong>代价</strong>:高伤快攻往往攒能量慢,大招频率低;一旦被秒,蓄了一半的能量血本无归。</li><li><strong>何时用</strong>:你确定能站住、且追求最高伤害效率(高伤队、速通)。</li></ul><h3>2. 高能量快攻 + 大招 —— \"高能量快攻流\"(快循环)</h3><ul><li><strong>思路</strong>:快攻选<strong>单位时间产能最高</strong>的(哪怕单次伤害低一点),让大招<strong>频繁释放</strong>。</li><li><strong>优点</strong>:</li><li>大招循环快 → <strong>整体 DPS 往往不输甚至超过高伤快攻</strong>(因为大招通常是主要伤害来源);</li><li>抗\"被秒打断\"风险 → 能量攒得快,被打死前更可能已经放出大招,<strong>降低能量浪费</strong>,在容易减员的长战里反而稳;</li><li>对<strong>需要频繁触发大招效果</strong>(破盾、削防、debuff)的场景极强。</li><li><strong>何时用</strong>:大多数团战的<strong>通用最优解</strong>,尤其是会掉血/换人的环境。</li></ul><h3>3. 低能量大招 —— \"刷招流 / 喂招流\"</h3><ul><li><strong>思路</strong>:选<strong>所需能量最低</strong>的大招,牺牲单发威力,换取<strong>极高的释放频率</strong>。</li><li><strong>价值</strong>:</li><li><strong>PvP / 对战</strong>:快速逼盾、抢节奏,用低能耗大招骗对手交保护,再用第二发打脸;</li><li><strong>续航场景</strong>:即使中途倒下,损失的也只是一点点能量,<strong>容错率极高</strong>,适合低练度玩家;</li><li><strong>触发型大招</strong>:大招自带强力附加效果(加攻、清场、上 buff)时,刷得越勤收益越高。</li><li><strong>代价</strong>:总伤害效率通常不是最高,纯打桩(站桩输出)时略逊于高伤配招。</li></ul><h3>配招决策小结</h3><table><thead><tr><th>配招思路</th><th>快攻取向</th><th>大招取向</th><th>最佳场景</th><th>关键词</th></tr></thead><tbody><tr><td>高伤快攻流</td><td>单次高伤</td><td>单发高威力</td><td>短时速通、站得住</td><td>极限 DPS</td></tr><tr><td>高能量快攻流</td><td>高产能</td><td>中高威力</td><td>通用 / 易减员</td><td>快循环、稳</td></tr><tr><td>刷招流</td><td>高产能</td><td>低能耗</td><td>PvP 逼盾 / 低练度续航 / 触发型</td><td>容错、骗盾</td></tr></tbody></table><blockquote>实战常见组合:<strong>高能量快攻 + 高伤大招</strong>,兼顾\"循环快\"和\"单发疼\",是攻守平衡的黄金搭配。</blockquote><hr><h2>四、菁英 TM 与社区日专属招的价值</h2><h3>1. 菁英 TM(Elite TM)的价值</h3><p>普通 TM(招式学习器)只能<strong>随机</strong>洗招,菁英 TM 可以<strong>指定</strong>学任意一个该精灵能学的招式,包括:</p><ul><li><strong>已下架的限时招式</strong>(往年社区日专属招、活动招);</li><li><strong>被普通 TM 池排除的特殊招</strong>。</li></ul><p>它的价值本质是<strong>\"精准解锁稀缺 BIS(Best-in-Slot)配招\"</strong>:</p><ul><li>想给老精灵补上当年错过的<strong>社区日专属招</strong>,菁英 TM 几乎是唯一途径;</li><li>避免普通 TM 反复洗招的<strong>资源与运气损耗</strong>,直接一步到位;</li><li>属于<strong>稀缺硬通货</strong>,应优先留给\"专属招带来巨大强度提升 / 无法再获取\"的精灵,不要浪费在随便就能洗到的招式上。</li></ul><h3>2. 社区日专属招的价值</h3><p>社区日期间进化可习得的<strong>专属招(Legacy/Featured Move)</strong>,往往是该精灵的<strong>质变级 BIS</strong>:</p><ul><li><strong>强度跃升</strong>:专属招通常是<strong>特意设计的高强度招式</strong>(高伤大招或高产能快攻),一招就能把一只普通精灵拉进\"团战主力梯队\";</li><li><strong>时效稀缺</strong>:过了社区日(及返场)就<strong>无法常规获取</strong>,后续只能靠菁英 TM 找补,因此自带<strong>收藏 + 实战双重价值</strong>;</li><li><strong>指标双吃</strong>:</li><li>若专属招是<strong>高伤大招</strong>→ 直接拉高 DPS 和 TDO,服务高伤速通;</li><li>若是<strong>高产能 / 低能耗快攻或大招</strong>→ 改善能量循环,服务刷招流与续航。</li></ul><h3>一句话总结</h3><blockquote><strong>社区日专属招 = 限时领取的\"配招天花板\";菁英 TM = 错过后唯一的补票渠道。</strong> 二者共同决定一只精灵能否达到它的强度上限,是从\"能用\"迈向\"BIS\"的关键资源。</blockquote><hr><h2>五、总览:一条决策链</h2><p>``` 先看场景 ├─ 短时 / 高练度 / 不会被秒 ──► 重 DPS ──► 高伤快攻流(脆皮高攻也能用) ├─ 长 boss / 少人 / 易减员 ──► 重 TDO ──► 高耐久 + 高能量快攻流(抗秒、稳循环) └─ PvP / 逼盾 / 低练度续航 ──► 刷招流(低能耗大招、容错优先)</p><p>再看配招 └─ 通用黄金组合:高能量快攻 + 高伤大招(循环快 + 单发疼)</p><p>最后看资源 └─ 社区日抓质变专属招;错过了用菁英 TM 补回 BIS ```</p><p><strong>核心心法</strong>:DPS 与 TDO 不是\"谁更强\",而是\"血量和时间,哪个先成为瓶颈\"——瓶颈在时间就堆 DPS,瓶颈在血量就堆 TDO,配招则围绕\"能量循环是否跟得上、被秒了亏不亏\"来取舍。</p>"},{"title":"Pokémon GO 团战(Raid)伤害加成完全指南","html":"<h1>Pokémon GO 团战(Raid)伤害加成完全指南</h1><blockquote>本文系统拆解影响团战 DPS 与总伤害的五大加成机制:<strong>天气加成、超进化加成、组队加成(Party Power)、好友加成</strong>,并给出<strong>如何把所有加成叠满</strong>的实战配置。</blockquote><hr><h2>一、伤害的基础公式(先搞懂底层逻辑)</h2><p>在谈加成前,先理解一次攻击的伤害是怎么算出来的:</p><p>``<code> 每次伤害 = floor( 0.5 × 招式威力 × (攻击力 / 对方防御力) × 修正系数 ) + 1 </code>``</p><p>其中 <strong>攻击力(Attack)</strong> 受多个加成相乘影响,<strong>修正系数</strong> 包含属性克制(克制 ×1.6、双重克制 ×2.56、抵抗 ×0.625)与本系加成(STAB ×1.2)。</p><p>关键点:<strong>很多加成是叠乘(相乘)关系</strong>,所以同时叠满多种加成时收益是指数级放大的。下面逐一拆解。</p><hr><h2>二、天气加成(Weather Boost)</h2><h3>效果</h3><p>当现实天气与宝可梦/招式属性匹配时,触发天气加成:</p><table><thead><tr><th>加成内容</th><th>具体数值</th></tr></thead><tbody><tr><td><strong>伤害提升</strong></td><td>匹配属性的招式伤害 <strong>×1.2(+20%)</strong></td></tr><tr><td><strong>等级提升</strong></td><td>团战 Boss 与可捕捉个体的等级 <strong>+5 级</strong>(从 20 → 25)</td></tr><tr><td><strong>捕捉个体下限</strong></td><td>个体值 IV 最低保证 <strong>10/10/10</strong></td></tr><tr><td><strong>额外星尘</strong></td><td>捕捉时获得额外 Stardust</td></tr></tbody></table><h3>天气与属性对照表</h3><table><thead><tr><th>天气</th><th>加成属性</th></tr></thead><tbody><tr><td>晴天 / 大太阳</td><td>草、火、地面</td></tr><tr><td>雨天</td><td>水、电、虫</td></tr><tr><td>局部多云</td><td>普通、岩石</td></tr><tr><td>多云</td><td>妖精、格斗、毒</td></tr><tr><td>大风</td><td>飞行、超能力、龙</td></tr><tr><td>下雪</td><td>冰、钢</td></tr><tr><td>雾</td><td>恶、幽灵</td></tr></tbody></table><h3>对团战的双重影响(重要)</h3><p>天气加成对团战是<strong>双刃剑</strong>:</p><ol><li><strong>对你有利</strong>:你的招式属性若被天气加成,<strong>出招伤害 +20%</strong>。</li><li><strong>对你不利</strong>:被天气加成的 <strong>Boss 等级 +5(20→25)</strong>,意味着 Boss <strong>血量(CPM)更高、攻击更强</strong>,通关难度上升。</li></ol><blockquote>实战建议:开战前看天气图标(战斗界面右上角有天气标识)。如果天气正好加成你的输出属性,优先带该属性精灵;如果天气加成的是 Boss 自身属性,则要做好血量更厚的心理准备,多带人或带更肉的队伍。</blockquote><hr><h2>三、超进化加成(Mega / Primal Boost)</h2><p>超进化(Mega Evolution)和原始回归(Primal Reversion)是团战中<strong>最强的团队增益来源之一</strong>,因为它能给<strong>全场(包括队友)</strong>加伤害。</p><h3>3.1 对自己的攻击加成</h3><p>超进化宝可梦在场时,它自己的攻击:</p><ul><li><strong>同属性招式</strong>:伤害 <strong>+30%</strong></li><li><strong>不同属性招式</strong>:伤害 <strong>+10%</strong></li></ul><p>(原始固拉多 Primal Groudon / 原始盖欧卡 Primal Kyogre 同理)</p><h3>3.2 对队友的攻击加成(团队光环)</h3><p>只要场上有任意玩家放出了超进化,<strong>所有参战玩家</strong>(包括你自己用普通精灵)都能享受:</p><table><thead><tr><th>队友招式属性</th><th>伤害加成</th></tr></thead><tbody><tr><td>与超进化精灵<strong>同属性</strong></td><td><strong>+30%</strong></td></tr><tr><td>与超进化精灵<strong>不同属性</strong></td><td><strong>+10%</strong></td></tr></tbody></table><blockquote>这意味着:在 6 人团战里,只要有 1 个人放原始盖欧卡打火系 Boss,<strong>全场 6 个人的水系招式都 +30%</strong>。这是公开团战配合的核心技巧。</blockquote><h3>3.3 Mega 等级(Mega Levels)</h3><p>超进化有<strong>三个等级</strong>,等级越高,被动收益越好:</p><table><thead><tr><th>Mega 等级</th><th>解锁方式</th><th>主要收益</th></tr></thead><tbody><tr><td>Level 1(基础)</td><td>首次超进化</td><td>基础加成 + 捕捉同属性几率/糖果提升</td></tr><tr><td>Level 2</td><td>累计多次超进化 + 冷却时间内</td><td>更高捕捉糖果/几率,可能额外 XP</td></tr><tr><td>Level 3(最高)</td><td>继续超进化升级</td><td>最高额外 XP、捕捉糖果、超能糖几率</td></tr></tbody></table><p><strong>关键澄清</strong>:Mega 等级<strong>主要影响的是被动奖励</strong>(捕捉糖果几率、额外 XP、捕捉率加成),而 <strong>+30%/+10% 的伤害光环本身不随 Mega 等级变化</strong>——也就是说哪怕 Level 1 也能给全场提供攻击加成。升级 Mega 等级的意义在于<strong>附加奖励</strong>和<strong>缩短再次超进化的冷却 / 降低能量需求</strong>。</p><blockquote>实战建议:团战开场就放超进化,且优先放<strong>属性匹配 Boss 弱点</strong>的超进化(如打火 Boss 放原始盖欧卡/超进化暴鲤龙),让全场吃满 +30%。一场战斗只需要一个人放就能惠及全队,可在公开团里口头/默契分工。</blockquote><hr><h2>四、组队加成 —— Party Power(组队充能必杀)</h2><p>Party Power 是团队战斗中的特殊机制,需要<strong>组成队伍(Party,最多 4 人本地组队)</strong>才能触发。</p><h3>机制</h3><ul><li>队伍成员在战斗中通过普通攻击/承受伤害,共同<strong>积攒一条 Party Power 能量条</strong>。</li><li>充满后,队员可以<strong>激活 Party Power</strong>,使下一个<strong>必杀技(Charged Move)伤害大幅提升</strong>。</li><li>激活窗口内放出的充能必杀会有明显的<strong>额外伤害爆发</strong>(视觉上有特效)。</li></ul><h3>要点</h3><ul><li>需要<strong>实际组队(Be Together / Party Play 功能)</strong>,不是随便凑团就有。</li><li>多名队员可以在短时间内连续激活,形成<strong>爆发输出窗口</strong>,适合用来秒掉 Boss 的一段血或在血量临界点冲刺。</li><li>与其他加成<strong>叠乘</strong>生效。</li></ul><blockquote>实战建议:线下/固定车队团战时务必开 Party Play 组队,把 Party Power 留到<strong>必杀技充满 + 全员同步</strong>时一起放,瞬间打出超高 burst。</blockquote><hr><h2>五、好友加成(Friendship Bonus)</h2><p>与你<strong>同场参战的好友</strong>会根据好友等级提供攻击加成:</p><table><thead><tr><th>好友等级</th><th>攻击加成</th></tr></thead><tbody><tr><td>好友(Good)</td><td>+3%</td></tr><tr><td>好朋友(Great)</td><td>+5%</td></tr><tr><td>超级好友(Ultra)</td><td>+7%</td></tr><tr><td>最好的朋友(Best)</td><td>+10%</td></tr></tbody></table><h3>要点</h3><ul><li>加成基于<strong>你和参战好友之间的好友等级</strong>,等级越高加成越高(最高 +10%)。</li><li>需要<strong>同一场团战中有你的好友一起打</strong>才生效。</li><li>多个好友同场时,通常取<strong>最高好友等级</strong>对应的加成(而非简单累加每个好友)。</li></ul><blockquote>实战建议:和固定车队互刷到 <strong>Best Friend</strong>,每次团战都能稳定吃 +10% 攻击。线上远程团邀请也要尽量邀请高等级好友。</blockquote><hr><h2>六、如何把所有加成叠满(满配 Checklist)</h2><p>由于多数加成是<strong>相乘</strong>关系,叠满后总伤害提升非常可观。以下是一套\"满伤害\"配置流程:</p><h3>✅ 战前准备</h3><ul><li>[ ] <strong>查好 Boss 属性与弱点</strong>,锁定要打的输出属性。</li><li>[ ] <strong>看天气</strong>:若天气加成你的输出属性,带该属性队伍(吃 <strong>+20%</strong> 伤害)。注意被加成的 Boss 等级会 +5。</li><li>[ ] <strong>拉满好友</strong>:邀请/同场带 <strong>Best Friend</strong> 好友(<strong>+10%</strong> 攻击)。</li></ul><h3>✅ 队伍配置</h3><ul><li>[ ] <strong>带一只超进化/原始回归</strong>,且属性匹配 Boss 弱点。开场立刻放,给全队 <strong>+30%</strong> 同属性光环。</li><li>[ ] 其余 5 只精灵全部用<strong>与 Mega 同属性 + 克制 Boss</strong> 的高 DPS 精灵,同时吃 <strong>STAB ×1.2</strong>、<strong>属性克制 ×1.6</strong>、<strong>Mega 光环 +30%</strong>、<strong>天气 +20%</strong>。</li></ul><h3>✅ 战斗中</h3><ul><li>[ ] 组队开 <strong>Party Play</strong>,积攒 <strong>Party Power</strong>,在必杀技充满时全员同步激活,打出爆发窗口。</li><li>[ ] 优先放充能必杀(配合 Party Power),普攻用来攒能量。</li></ul><h3>叠满后的乘算示意</h3><p>假设一次同属性、克制、满加成的攻击,攻击侧修正大致为:</p><p>``<code> STAB(×1.2) × 属性克制(×1.6) × Mega光环同属性(×1.3) × 天气(×1.2) × 好友Best(×1.10) × Party Power(额外爆发) </code>``</p><p>仅前五项相乘 ≈ <strong>×1.2 × 1.6 × 1.3 × 1.2 × 1.1 ≈ ×3.3 倍</strong>(相对于\"无任何加成的同威力中性攻击\"),再叠加 Party Power 的必杀爆发,瞬间伤害会非常夸张。这就是高玩\"小队秒团\"的底层原因。</p><hr><h2>七、加成速查总表</h2><table><thead><tr><th>加成来源</th><th>触发条件</th><th>伤害效果</th><th>备注</th></tr></thead><tbody><tr><td><strong>天气加成</strong></td><td>现实天气匹配招式属性</td><td>招式 <strong>+20%</strong></td><td>同时 Boss 等级 +5(变强)</td></tr><tr><td><strong>超进化(自身)</strong></td><td>自己放超进化</td><td>同属性 +30% / 异属性 +10%</td><td>原始回归同理</td></tr><tr><td><strong>超进化(团队光环)</strong></td><td>场上任意人放超进化</td><td>全队同属性 +30% / 异属性 +10%</td><td>一人放惠及全队</td></tr><tr><td><strong>Mega 等级</strong></td><td>多次超进化升级</td><td>主要影响糖果/XP/捕捉率,<strong>非伤害</strong></td><td>降低冷却/能量需求</td></tr><tr><td><strong>Party Power</strong></td><td>本地组队(Party Play)充能</td><td>下一发必杀<strong>大幅爆发</strong></td><td>需实际组队</td></tr><tr><td><strong>好友加成</strong></td><td>同场参战好友</td><td>最高 <strong>+10%</strong> 攻击</td><td>取最高好友等级</td></tr><tr><td><strong>STAB(本系)</strong></td><td>招式与精灵同属性</td><td>×1.2</td><td>始终生效</td></tr><tr><td><strong>属性克制</strong></td><td>招式克制 Boss</td><td>×1.6(双重 ×2.56)</td><td>选弱点属性</td></tr></tbody></table><hr><h3>一句话总结</h3><p><strong>看天气选属性(+20%)→ 开场放属性匹配的超进化给全队光环(+30%)→ 全队用克制 Boss 的同属性高 DPS 精灵(STAB×1.2 + 克制×1.6)→ 拉满 Best Friend(+10%)→ 组队攒 Party Power 在必杀爆发窗口同步释放</strong>,这就是 Pokémon GO 团战伤害叠满的完整链路。</p><blockquote>注:Niantic 会不定期微调具体数值,部分百分比(尤其 Mega 等级附加奖励)以游戏内最新说明为准。核心机制(相乘叠加、Mega 团队光环、天气 +20% / Boss +5 级)长期稳定。</blockquote>"},{"title":"暗影宝可梦 (Shadow Pokémon) 在团战 PvE 中的完全攻略","html":"<h1>暗影宝可梦 (Shadow Pokémon) 在团战 PvE 中的完全攻略</h1><h2>一、为什么暗影宝可梦在团战 (PvE) 中通常更强</h2><p>暗影宝可梦的核心机制是一套<strong>攻防修正</strong>：</p><table><thead><tr><th>属性</th><th>修正倍率</th><th>说明</th></tr></thead><tbody><tr><td>攻击 (Attack)</td><td><strong>×1.2 (+20%)</strong></td><td>直接放大所有伤害输出</td></tr><tr><td>防御 (Defense)</td><td><strong>×0.833 (−16.7%，约 −17%)</strong></td><td>受到的伤害提高约 20%</td></tr></tbody></table><h3>1. +20% 攻击 = 显著的 DPS 提升</h3><p>宝可梦的伤害公式（简化）为：</p><p>``<code> 伤害 ∝ 攻击力 × 招式威力 × STAB × 属性克制 × ... </code>``</p><p>攻击力是一个<strong>线性乘数</strong>，直接作用于每一次出招。暗影的 ×1.2 攻击意味着：</p><ul><li><strong>每次普攻、每次大招的伤害都直接 ×1.2</strong></li><li>在 DPS（每秒伤害）维度上，暗影通常比普通版本高出 <strong>约 18%~20%</strong>（略低于 20%，因为出招动画时长不变，但伤害值整体抬高）</li><li>这是一个\"白嫖\"式的增益：不改变出招节奏，只把每一拳打得更重</li></ul><p>对追求\"<strong>最短时间打掉 Boss</strong>\"的团战（Raid）而言，输出时间窗口固定（通常 Boss 战是限时的），所以 <strong>DPS 越高 = 整场打出的总伤害越多 = 越可能在限定人数/时间内通关</strong>。</p><h3>2. −17% 防御为什么影响很小</h3><p>防御降低意味着你受到的伤害更高、更容易被打晕（faint）。但在 PvE 团战里这影响有限，原因有三：</p><ol><li><strong>团战是\"输出竞速\"，不是\"生存竞速\"</strong></li></ol><p>通关与否取决于队伍总输出是否够快，而不是某一只能撑多久。被打倒后<strong>立刻可以复活/换上后备</strong>重新进场，损失的只是几秒钟。</p><ol><li><strong>被打倒的代价 ≈ 几秒空窗</strong></li></ol><p>暗影因为输出高，往往在\"被秒\"之前已经打出了远超普通版本的伤害。用\"略短的存活时间\"换\"明显更高的 DPS\"，在团战里几乎总是划算的。</p><ol><li><strong>可以配合闪避 (dodging) 抵消脆皮问题</strong></li></ol><p>主动闪避大招能大幅减少承伤，让 −17% 防御的劣势进一步缩小（详见第三节）。</p><h3>结论</h3><blockquote>在 PvE 团战中，<strong>攻击是\"硬通货\"，防御是\"软指标\"</strong>。暗影用一个微小的、可被复活机制和闪避抵消的防御劣势，换来一个永久的、作用于全部输出的 20% 攻击加成。因此暗影宝可梦在团战中<strong>几乎总是优于其普通版本</strong>。</blockquote><hr><h2>二、暗影 vs 普通：取舍清单</h2><table><thead><tr><th>维度</th><th>暗影 (Shadow)</th><th>普通 (Normal)</th></tr></thead><tbody><tr><td>攻击</td><td>+20%，DPS 显著更高</td><td>基准</td></tr><tr><td>防御</td><td>−17%，更脆</td><td>基准，更耐打</td></tr><tr><td>团战 PvE</td><td><strong>首选</strong>（输出竞速）</td><td>次选</td></tr><tr><td>道馆/防守</td><td>不推荐（防御低，容易被快速攻破）</td><td>更合适</td></tr><tr><td>资源消耗</td><td>进化/学招需要<strong>额外的星辰碎片 + 糖果</strong>（净化前），招式较贵</td><td>标准消耗</td></tr><tr><td>第二招式解锁</td><td>成本更高</td><td>标准</td></tr><tr><td>净化 (Purify)</td><td>净化后变普通、CP/等级小幅提升、招式变便宜，但<strong>永久失去暗影加成</strong></td><td>—</td></tr></tbody></table><h3>关键取舍点</h3><ul><li><strong>想要最高输出 → 保留暗影，不要净化。</strong> 净化会永久移除 +20% 攻击。</li><li><strong>资源紧张时</strong>：暗影解锁第二招式/升级招式更贵，需要权衡星辰碎片预算。</li><li><strong>耐久敏感的场景</strong>（长时间车轮战、不方便闪避时）：普通版本的多 17% 防御可能让它少倒一两次，但这通常仍不足以抵消暗影的输出优势。</li><li><strong>道馆防守</strong>：不要用暗影（脆，且暗影通常不参与防守阵容）。</li></ul><blockquote>一句话：<strong>PvE 进攻几乎一律选暗影；防守/守馆选普通。</strong></blockquote><hr><h2>三、闪避 (Dodging) 机制与利弊</h2><h3>机制</h3><ul><li>Boss 释放招式前，屏幕会出现一道<strong>黄色闪光警告</strong>。</li><li>在警告出现时<strong>向左或向右滑动</strong>，触发闪避动作。</li><li>成功闪避可将该次招式伤害<strong>减少约 75%</strong>（仅大幅削减，并非完全免疫）。</li></ul><h3>利</h3><ol><li><strong>大幅降低承伤</strong>，直接缓解暗影 −17% 防御带来的脆皮问题。</li><li><strong>延长存活时间</strong> → 减少被打倒、复活、重新进场的空窗，等于变相提高了有效输出时间。</li><li>对<strong>高伤害 Boss / 单人或小队挑战</strong>尤其关键，是高难度内容能否通关的胜负手。</li></ol><h3>弊 / 代价</h3><ol><li><strong>打断输出节奏</strong>：闪避动作期间你无法出招，会损失 DPS。</li><li><strong>存在判定窗口</strong>，滑早或滑晚都可能失败，需要熟悉每个 Boss 的招式节奏。</li><li><strong>多人团战收益递减</strong>：人多时火力足、时间充裕，与其闪避不如<strong>站桩猛输出</strong>抢秒数；闪避反而拖慢通关。</li></ol><h3>实战建议</h3><table><thead><tr><th>场景</th><th>是否闪避</th></tr></thead><tbody><tr><td>满人头大团</td><td><strong>不闪</strong>，站桩全力输出</td></tr><tr><td>人少 / 二三人挑战高 Boss</td><td><strong>闪关键大招</strong>，保命续航</td></tr><tr><td>用脆皮暗影且容易被秒</td><td><strong>闪</strong>，把暗影的输出优势真正打出来</td></tr></tbody></table><blockquote>核心权衡：<strong>闪避 = 用 DPS 换生存</strong>。人多时生存不值钱，人少时生存就是通关的关键。</blockquote><hr><h2>四、PvE 推荐 IV（个体值）</h2><p>PvE 团战的 IV 取舍逻辑与 PvP 截然不同：<strong>PvP 看综合 (CP 上限下的均衡)，PvE 只看输出。</strong></p><h3>核心原则：追求高攻 / 满攻</h3><ul><li><strong>攻击 IV 越高越好，理想是 15 攻（满攻）。</strong></li></ul><p>攻击直接乘进伤害公式，对 DPS 的边际贡献最大。</p><ul><li>防御、HP 的 IV <strong>几乎不重要</strong>——PvE 不靠苟命，靠输出竞速。</li><li>所以 PvE 的\"完美 IV\"是 <strong>15 攻 / x 防 / x 血</strong>（防血无所谓），而不是 PvP 的 15/15/15。</li></ul><h3>现实提醒</h3><ul><li>单只宝可梦满攻与 0 攻在 DPS 上的差距其实<strong>只有几个百分点</strong>（IV 加的是固定基础值，相对总攻击占比小）。</li><li>因此：<strong>有满攻当然最好，但没有也完全能用</strong>。不要为了刷满攻 IV 而无限重抓——<strong>属性、招式、是否暗影的影响远大于 IV</strong>。</li></ul><h3>升级等级：满级 L40–L50</h3><ul><li><strong>L40</strong> 是不花 XL 糖果的传统上限，对绝大多数团战<strong>已经足够</strong>。</li><li><strong>L41–L50</strong> 需要 <strong>XL 糖果 (Candy XL)</strong>，每一级带来的属性提升<strong>边际递减</strong>且成本陡增。</li></ul><h3>是否值得用 XL 糖果升到 L50？</h3><table><thead><tr><th>情况</th><th>是否值得 XL</th></tr></thead><tbody><tr><td>普通日常打团</td><td><strong>不值得</strong>，L40（甚至更低）足矣</td></tr><tr><td>你的<strong>核心主力/版本答案级</strong>输出手（如顶级属性克制的暗影）</td><td><strong>值得</strong>，把它喂满榨干每一分 DPS</td></tr><tr><td>高难度限时挑战 / 追求最少人通关</td><td><strong>值得</strong>，多一点输出可能就是通关与否的差别</td></tr><tr><td>资源（XL 糖果）紧张</td><td><strong>优先 L40 多养几只</strong>，覆盖更多属性，比单只 L50 性价比高</td></tr></tbody></table><h3>IV / 等级 优先级排序（PvE）</h3><p>``<code> 属性克制 + 招式组合  &gt;&gt;  是否暗影 (+20%攻)  &gt;&gt;  等级 (L40→L50)  &gt;  攻击IV (→15)  &gt;  防/血 IV </code>``</p><blockquote>实操结论：<strong>先保证\"对的属性 + 暗影 + 好招式\"，再考虑拉等级，最后才纠结 IV。</strong> 追高攻是锦上添花，不是入场门槛。</blockquote><hr><h2>五、最佳搭档 (Best Buddy) 对 PvE 的作用</h2><h3>机制</h3><ul><li>把宝可梦培养到<strong>最高羁绊等级\"最佳搭档\" (Best Buddy)</strong> 后，参战时可获得 <strong>+1 等级 (CPM) 的临时加成</strong>（需保持搭档心情，激活\"激动 (Excited)\"状态等条件）。</li></ul><h3>对 PvE 的实际意义</h3><ol><li><strong>等价于额外多了 1 级的属性</strong>，相当于免费的小幅攻击/输出提升，<strong>不消耗 XL 糖果</strong>。</li><li>对一只 <strong>L40 的最佳搭档</strong>，参战时表现接近 <strong>L41</strong>；对 <strong>L50 最佳搭档</strong>，可短暂突破到等效 <strong>L51</strong> 的属性，进一步榨取 DPS。</li><li>是一种<strong>低成本的输出微增</strong>手段：相比砸大量 XL 糖果硬拉等级，把核心输出手养成最佳搭档更划算。</li></ol><h3>实战建议</h3><ul><li>把你的<strong>核心 PvE 主力</strong>（尤其是高价值暗影输出手）培养成最佳搭档。</li><li>参战前确保搭档处于可激活加成的状态（心情/激动条件满足）。</li><li>这个 +1 级加成虽小，但<strong>叠加在已经满级 + 暗影 + 满攻</strong>的输出手上时，是最后那一点\"压线通关\"的甜头。</li></ul><hr><h2>总结：PvE 团战养成优先级</h2><ol><li><strong>选对属性</strong>：针对 Boss 弱点的克制属性，影响最大。</li><li><strong>优先暗影</strong>：+20% 攻击，DPS 显著提升，−17% 防御靠复活机制 + 闪避抵消。</li><li><strong>配好招式</strong>：高 DPS 的快/蓄招组合。</li><li><strong>拉满等级</strong>：日常 L40 够用；核心主力值得用 XL 糖果上 L50。</li><li><strong>追高攻 IV</strong>：理想 15 攻，但差距小，不必强求。</li><li><strong>养最佳搭档</strong>：免费 +1 级输出加成，给核心主力锦上添花。</li><li><strong>按场景闪避</strong>：人多站桩、人少闪关键大招。</li></ol><blockquote>一句话总纲：<strong>PvE 是输出竞速。暗影 + 属性克制 + 好招式决定上限，等级与最佳搭档负责榨干每一分 DPS，IV 只是收尾，防御和生存交给复活机制与闪避去管。</strong></blockquote>"},{"title":"团战 Raid 奖励机制","html":"<h1>团战 Raid 奖励机制</h1><blockquote>团战是传说/超进化宝可梦和稀有资源的主要来源。具体数值随版本/活动调整，以游戏内为准。</blockquote><h2>一、通用奖励（击败 boss 后）</h2><ul><li><strong>奖励球 Premier Ball</strong>：用来抓 boss，<strong>球数</strong>由你的<strong>伤害贡献 + 组队人数 + 道馆控制方 + 天气/好友加成</strong>等决定——打得多、占着道馆、组队，球就多。</li><li>同时发放：</li><li><strong>稀有糖 Rare Candy</strong>（可喂给任意宝可梦）</li><li><strong>金色树莓 Golden Razz</strong>（提高捕捉率 / 满血回道馆）</li><li><strong>TM / 菁英 TM</strong>（洗招）</li><li><strong>星尘、经验 XP</strong></li></ul><h2>二、各星级大致区别</h2><table><thead><tr><th>星级</th><th>奖励特点</th></tr></thead><tbody><tr><td>1★ / 3★</td><td>少量奖励球 + 偶尔稀有糖/TM；适合日常练手、拿糖</td></tr><tr><td><strong>5★ 传说</strong></td><td>稀有糖多（约 1–10）、奖励球多，可能出<strong>菁英 TM</strong>；主力传说来源</td></tr><tr><td><strong>超进化 Mega / Primal</strong></td><td>给 <strong>Mega 能量</strong>（首通拿最多）+ 稀有糖；超进化加成靠它</td></tr><tr><td><strong>超级团战 Shadow Raid</strong></td><td>更难、boss 是暗影形态，给<strong>暗影碎片</strong>（净化用），需多人</td></tr><tr><td><strong>菁英团战 Elite Raid</strong></td><td>限定稀有 boss，奖励更丰厚</td></tr></tbody></table><h2>三、稀有 XL 糖（Rare Candy XL）</h2><ul><li><strong>团战时刻（Raid Hour，通常每周三晚）线下实体团战保底给 XL 糖</strong>——满级宝可梦的关键资源。</li><li>部分<strong>团战日付费票</strong>也提高 XL 糖掉率。</li></ul><h2>四、通行证</h2><ul><li><strong>免费团战通行证</strong>：每天转道馆光盘得 1 个（实体团战用）。</li><li><strong>高级通行证 Premium Raid Pass</strong>：商店购买，可多打实体团战。</li><li><strong>远程团战通行证 Remote Raid Pass</strong>：远程参加团战，<strong>每日有上限</strong>、商店购买——留给真正值得的 boss。</li></ul><h2>五、实用建议</h2><ul><li>传说/超进化优先<strong>线下 + Raid Hour</strong>（保底 XL 糖、Mega 能量首通最多）。</li><li>远程通行证有每日上限，别浪费在低价值 boss 上。</li><li>想要某传说<strong>练满 L50</strong>，蹭 Raid Hour 的线下场刷 XL 糖效率最高。</li></ul>"}],"types":[{"type":"Normal","typeCn":"一般","note":"Normal(一般)是 PvE 中最尴尬的攻击属性之一——一般系招式打任何属性都不会有克制加成,所以\"一般系输出\"本质上只在打纯一般系/双弱(如某些一般系团战 Boss)或当作泛用打手时才有意义。当前头牌毫无争议是 Regigigas / Shadow Regigigas:凭借全游戏顶级的攻击与超强大招 Crush Grip,巨像即便不吃克制也能挤进多数 Boss 的前排泛用打手,Shadow 版更是 S+ 级一般系王者。第二梯队是 Porygon-Z(Lock On + Hyper Beam,纯爆发但偏脆)和 Staraptor(高攻速,但通常用其飞行系招式更值)。平民/易得替代:Snorlax(超肉、糖果易得,适合长持久战)、Slaking(攻击极高但充能效率被拖累)、以及人人能练的 Meloetta/Smeargle 边角料。总体建议:除非专门打一般系弱点的 Boss,否则练一只 Regigigas 当泛用打手即可,不必为\"一般系输出\"专门囤队。","attackers":[{"name":"Regigigas","form":"Shadow","fast":"Lock On","charged":"Crush Grip","tier":"S+","note":"一般系绝对王者:全游戏顶级攻击 + 强力大招 Crush Grip,即便不吃克制也能当顶级泛用打手,Shadow 加成后伤害爆炸。","ref":"regigigas","dex":486,"cn":"雷吉奇卡斯","cc":"捏碎","tp":["Normal "},"porygonz":{"cn":"多边兽Z (多边兽乙型)","en":"Porygon-Z","dex":474,"types":["Normal"],"evo":[{"dexNumber":137,"cnName":"多边兽","enName":"Porygon"},{"dexNumber":233,"cnName":"多边兽2 (多边兽Ⅱ)","enName":"Porygon2"},{"dexNumber":474,"cnName":"多边兽Z (多边兽乙型)","enName":"Porygon-Z"}],"moveset":"PvE 最佳: 锁定 (Lock-On, 快攻) + 破坏光线 (Hyper Beam, 大招)。Lock-On 充能极快、Hyper Beam 单次伤害高, 这套是纯一般系输出的顶配 (普通体约 13.7 DPS, 暗影体约 15.8 DPS, S 级一般系攻手)。备选大招: 三重攻击 (Tri Attack) 通用性稍弱; 觉醒打特定弱点可用 暴风雪/电磁炮/日光束 (多为 PvP/特化用途)。","get":"无法野生捕捉, 必须从进化链获得。流程: 先抓 多边兽 (Porygon, 偶尔在野外/活动中刷新, 也常作为活动/调查奖励出现) → 用 升级器 (Up-Grade) + 25 糖果 进化成 多边兽2 → 再用 神奥之石 (Sinnoh Stone) + 100 糖果 进化成 多边兽Z。升级器主要靠转补给站/道馆 (约 1% 掉率, 第 7 天连续签到提高概率) 获得; 神奥之石可通过击败火箭队手下、GO 对战联盟胜场、田野调查/每周突破奖励获得。暗影 多边兽 来自击败火箭队 Giovanni/手下后获得并进化。","train":"团战定位为高攻一般系输出, 优先把糖果投在高攻个体上 (攻击 IV 尽量高, 防/血次要)。进化全程需 25 + 100 = 共 125 糖果 (外加两个进化道具), 之后强化到实战等级。普通玩家强化到 L40 已能胜任大多数团本; 追求极限 DPS 可用 XL 糖果推到 L50 (L40→L50 需大量 XL 糖果)。突击杯/团战中它是脆皮高输出, 建议堆数量 (多只 Porygon-Z) 轮换上场, 而非单只堆满防御。配招务必带 锁定 + 破坏光线。","formNote":"Porygon-Z 没有 Mega/超进化, 也没有 Primal 形态, 只存在暗影 (Shadow) 形态。团战 (Raid/PvE) 中暗影 多边兽Z 明显更优: 暗影加成使攻击 +20% (受敌 +20%), 纯输出 DPS 从约 13.7 提升到约 15.8, 在一般系攻手里跻身顶尖。因此团战推荐优先用 暗影 多边兽Z (配 锁定 + 破坏光线); 普通形态作为备选, 续航/抗压略好但输出更低。PvP 则一般用普通形态 (暗影更脆)。"},"staraptor":{"cn":"姆克鹰","en":"Staraptor","dex":398,"types":["Normal","Flying"],"evo":[{"dexNumber":396,"cnName":"姆克儿","enName":"Starly"},{"dexNumber":397,"cnName":"姆克鸟","enName":"Staravia"},{"dexNumber":398,"cnName":"姆克鹰","enName":"Staraptor"}],"moveset":"快攻: Gust(暴风/起风) 或 Wing Attack(翅膀攻击)；大招: Fly(飞翔)。通用 PvE 最优组合为 Gust + Fly(纯飞行系输出，伤害最高)；若要兼顾躲招用 Wing Attack 充能更快、出招窗口更短更易躲。Brave Bird(勇鸟猛攻) 单次爆发更高但会自损血量且充能慢，不如 Fly 实用。作为飞行系输出 Staraptor 排名很靠前(S 级附近)。","get":"主要靠野外捕捉姆克儿(Starly)后进化，姆克儿是常见的普通/飞行系小鸟，野外刷新率高、天气加成(晴天/大风)时更易出现。也可通过 2 公里蛋孵化、Field Research 调查任务奖励、以及偶尔的社区活动获得。Shadow(暗影)形态需击败 GO 火箭队手下/头目并净化前保留暗影状态获得。Mega 形态在本传游戏中不存在，因此 Pokemon GO 中也没有 Mega Staraptor。","train":"糖果通过捕捉/进化/与小伙伴散步获得，姆克儿系是常见种，糖量容易堆。团战定位要堆高攻击，建议优先做满 IV(尤其攻击)的个体；用普通(Magnetic Lure 不适用)糖果先升到高 CP，再用稀有糖果/XL 糖果推到 L40-50。满级 L50 需大量 XL 糖果(296 个 XL)，仅对核心常用输出值得投入；多数玩家把它培养到 L40 即可满足绝大多数团战需求。优先用 TM 把大招换成 Fly、快攻换成 Gust。","formNote":"推荐用 Shadow(暗影)形态。暗影形态攻击力乘 1.2，作为纯输出型(团战重攻击、本身脆皮无所谓)收益最大，DPS 明显高于普通形态(暗影 Staraptor 是 A+ 级普通系/S 级飞行系输出)。因此优先培养暗影姆克鹰、不要净化。Staraptor 没有 Mega/Primal 形态(本传无 Mega 进化)，所以无需考虑超进化。综合:暗影形态 > 普通形态，推荐暗影 + Gust/Fly。"},"snorlax":{"cn":"卡比兽","en":"Snorlax","dex":143,"types":["Normal"],"evo":[{"dexNumber":446,"cnName":"小卡比兽","enName":"Munchlax"},{"dexNumber":143,"cnName":"卡比兽","enName":"Snorlax"}],"moveset":"通用 PvE 最佳配招: 快攻 Lick(舌舔) + 大招 Hyper Beam(破坏光线), 同属性加成(STAB)。备选大招 Body Slam(泰山压顶, 充能快、单条更划算) 或 Skull Bash(火箭头锤)。不过坦白说, 卡比兽进攻面 DPS 偏低(约 10.8 DPS), 在团战进攻方几乎从不是最优解; 它真正的强项是道馆防守(330 体力, 防守仅次于 Blissey/Chansey)。","get":"1) 野外随机刷出(出现率不算高); 2) 7km 好友礼物蛋有几率孵出小卡比兽(Munchlax), 攒糖后进化; 3) 田野调查/特殊调查任务奖励偶尔给卡比兽; 4) 社区日、活动期间会大量出现并常带专属招式(如曾经的 Outrage/Yawn 等限定招); 5) 道馆/团战(过去作为团战 boss 出现过)。暗影卡比兽(Shadow)来自火箭队头目/手下战斗后捕捉。","train":"进化: 小卡比兽(Munchlax)→ 卡比兽(Snorlax) 需 50 颗卡比兽糖果。糖果来源: 捕捉/孵蛋/传送至博士/好友赠蛋, 配合 Pinap 莓增产、加成天气、活动双倍糖。XL 糖果用于把等级从 L40 推到 L50(L40+ 强化主要消耗 XL 糖果, 来源: 捕捉高级别个体、孵蛋、传送奖励、L40+ 训练师奖励)。培养建议: 若做道馆防守, 优先堆体力/防御向高 CP 个体, 拉满等级换取最大有效血量, 攻击 IV 不重要(甚至偏低更利于防守端的伤害交换节奏); 若坚持拿去打团进攻, 才需要追求高攻击 IV 并拉到 L40-50, 但性价比低, 一般不推荐为此投入大量稀有糖/星尘。","formNote":"截至 2026 年游戏内没有 Mega/超进化卡比兽, 也没有 Primal 形态(原作中只有极巨化 Gigantamax 卡比兽, 通过极巨/超极巨战斗 Max Battles 获取, 但它不属于常规团战进攻输出位)。常规形态本身进攻就弱, 团战进攻不推荐用卡比兽。若一定要比: 暗影卡比兽(Shadow Snorlax) 比普通形态进攻更强(攻击+20%, 受到伤害+20%), 是卡比兽进攻面最优选择; 但即便如此其 DPS 在 Normal 系输出里仍属下游, 真正价值仍在道馆防守(防守用普通形态即可, 暗影因易受伤反而不适合长期蹲守)。结论: 进攻硬要用就用暗影形态; 防守用普通形态。"},"slaking":{"cn":"请假王","en":"Slaking","dex":289,"types":["Normal"],"evo":[{"dexNumber":287,"cnName":"懒人獭","enName":"Slakoth"},{"dexNumber":288,"cnName":"过动猿","enName":"Vigoroth"},{"dexNumber":289,"cnName":"请假王","enName":"Slaking"}],"moveset":"通用 PvE 首选: 哈欠 (Yawn, 快攻) + 破坏死光 (Hyper Beam, 大招)。破坏死光是普通系且吃同属性加成 (STAB)，纯一速攻情况下 DPS 最高。备选大招: 重磅冲撞 (Body Slam) 充能更快、回合更短、能量利用率高，掉血时更稳。注意: 普通系无属性弱点针对，定位是\"高白板伤害但无属性优势\"的纯输出，配合系内只有哈欠这一普通系快攻可选。","get":"主要通过进化获得: 野外/田野调查/活动捕捉懒人獭 (Slakoth)，先用 25 颗糖进化成过动猿 (Vigoroth)，再用 100 颗糖进化成请假王。懒人獭也常作为团战奖励、活动 Spotlight Hour 或孵蛋产出。暗影形态需打赢搭载暗影懒人獭/请假王系列的火箭队头目战后捕捉并净化前保留。","train":"进化总需 125 颗糖 (25 + 100)。团战定位重攻击，优先把 IV 攻击拉满 (理想 15/x/x，至少 14 攻)。普通糖刷起来快 (野捕、伙伴散步、转糖)，到满级需要 XL 糖: L40 已够大多数团战，追求顶配可冲 L50 (需 296 XL 糖 + 大量普通糖)。性价比建议: 先升到 L40 即可投入团战，XL 糖留给更高优先级的版本主力，请假王不值得优先堆满 L50。","formNote":"Pokemon GO 中请假王没有超进化 (Mega) 或原始回归 (Primal) 形态，只有本体与暗影两种。团战 (PvE) 推荐用暗影请假王 (Shadow Slaking): 暗影形态攻击加成 1.2x，纯输出场景 DPS 明显高于普通体，最高 CP 约 5010，是版本里数一数二的普通系单体输出。配招暗影体推荐 哈欠 + 重磅冲撞 (充能快、伤害稳)，追求极限峰值 DPS 可上 哈欠 + 破坏死光。代价是暗影体更脆、掉血更快且需要净化才能学社区日招式，但纯刷团伤害仍以暗影体为最优；没有暗影时用普通体也完全够用。"},"meloetta":{"cn":"美洛耶塔","en":"Meloetta","dex":648,"types":["Normal","Psychic"],"evo":[{"dexNumber":648,"cnName":"美洛耶塔","enName":"Meloetta"}],"moveset":"歌声形态 (Normal/Psychic): 快攻 Confusion (异念波，超能系) + 大招 Psychic 或 Hyper Beam (超能系输出更优用 Psychic)。若作泛用超能攻击手，最佳 PvE 配招为 Confusion + Psychic。注意美洛耶塔无法学习舞步形态专属招式 Relic Song，游戏内通常以歌声形态出现。","get":"美洛耶塔是幻兽 (Mythical) 宝可梦，仅通过限时活动或付费特殊调查 (Special/Ticketed Research) 获得，不会野外刷新、不出现在团战或蛋中。历史上曾通过 GO Fest / GO Tour 等活动的特殊调查任务线发放。错过活动后通常无法补领，只能等官方再次开放相关活动或调查。","train":"幻兽宝可梦糖果稀少：完成调查任务领取时附带少量糖果，之后只能靠「神奇糖果 (Rare Candy / Rare Candy XL)」转换，或用它当伙伴 (Buddy) 散步攒糖。强化方向：作为超能系攻击手优先堆攻击，PvE 团战建议拉到接近满级 (L40，有足够星尘/糖可冲 L50 用 XL 糖果)。XL 糖果同样主要靠神奇 XL 糖果和伙伴散步获取，量很有限，建议优先把神奇糖果留给真正会上场的幻兽。由于获取和培养成本极高且自身不是顶级输出，多数玩家只培养一只用于图鉴/收藏，不必强行冲满级。","formNote":"美洛耶塔目前在 Pokemon GO 中没有 Mega/超进化，也没有 Primal 形态，更没有暗影 (Shadow) 形态——幻兽通常不会有暗影版本。因此团战不存在「换形态更优」的选择，直接用其标准歌声形态即可。它作为 Normal/Psychic 系输出并非超能系顶尖打手 (远不及 Mewtwo、超梦暗影版、Hoopa 等)，定位偏收藏，团战中可作为过渡的超能系攻击手但不建议作为主力投入大量资源。"},"charizard":{"cn":"喷火龙","en":"Charizard","dex":6,"types":["Fire","Flying"],"evo":[{"dexNumber":4,"cnName":"小火龙","enName":"Charmander"},{"dexNumber":5,"cnName":"火恐龙","enName":"Charmeleon"},{"dexNumber":6,"cnName":"喷火龙","enName":"Charizard"}],"moveset":"快攻 Fire Spin（火焰旋涡）+ 大招 Blast Burn（爆裂燃烧，社区日限定招式）。Blast Burn 是喷火龙作为火系打手的核心，伤害与能量效率远超普通大招。无法学到 Blast Burn 时退而求其次用 Overheat（过热）。若要打飞行/龙系或当通用打手，Dragon Breath（龙息）+ Dragon Claw（龙爪）可作为备选，但纯火系输出仍以 Fire Spin + Blast Burn 最优。","get":"1) 进化获取：捕捉小火龙(Charmander)，用25糖果进化为火恐龙，再用100糖果进化为喷火龙；小火龙常见于野外刷新、田野研究突破奖励、社区日(Community Day)大量刷新。2) 直接捕捉：喷火龙偶尔在野外/天气加成(晴天)下出现，亦作为团战(Raid)首领出现时可捕捉。3) 蛋孵化：小火龙曾在2km蛋池中出现。4) 火焰社区日是获取高个体值小火龙并解锁 Blast Burn 的最佳时机。Mega 能量(Mega Energy)通过完成 Mega Charizard X/Y 团战获得，用于超进化。","train":"糖果用普通糖果(Charmander Candy)逐级强化，强化到 L40 需要大量普通糖果+星尘；推到 L40-50 的「最高等级」需要 XL 糖果(Candy XL)，XL 糖果通过捕捉/孵化/转移/与好友交换喷火龙系获得，等级越高 XL 掉率越高。团战(Raid/Gym)培养建议：优先选高攻击个体值(Attack IV 高，PvE 攻击权重最大，IV 不必强求100%，14-15攻击即可)；为最大化 DPS 应配 Fire Spin + Blast Burn；星尘有限时先把一只推到 L40 即可上场，资源充裕再用 XL 糖果推向 L45-50 提升耐久与输出上限。建议养多只(轮换躲招/多人团战凑数)。","formNote":"团战首选超进化形态。Mega Charizard Y（超进化喷火龙Y，火/飞行）是目前游戏内顶级火系打手之一，纯火系输出最高，且超进化时还为同场全队火系队友提供攻击加成，配 Fire Spin + Blast Burn 是首选；Mega Charizard X（火/龙）攻防更均衡、耐久更好，作为龙系/火系两用打手很强，怕被高强度反制时更稳。普通(非Mega)喷火龙输出明显弱于这两个 Mega，仅在没攒够 Mega 能量时使用。暗影(Shadow)喷火龙攻击+20%、防御-20%，DPS 高于普通形态，适合追求极限输出且配大量躲招的高玩，但脆且需暗影碎片消除诅咒；综合最优解仍是 Mega Charizard Y(极限火系输出) 或 Mega Charizard X(均衡/龙系)。"},"blaziken":{"cn":"火焰鸡","en":"Blaziken","dex":257,"types":["Fire","Fighting"],"evo":[{"dexNumber":255,"cnName":"火稚鸡","enName":"Torchic"},{"dexNumber":256,"cnName":"力壮鸡","enName":"Combusken"},{"dexNumber":257,"cnName":"火焰鸡","enName":"Blaziken"}],"moveset":"火属性输出(主流): 快攻 火焰旋涡 (Fire Spin) + 大招 爆裂燃烧 (Blast Burn, 社区日/限定传授大招)。这是火焰鸡作为火系打手的最佳配招, 全游戏最高火系单体DPS之一。\n格斗属性输出: 快攻 真气拳/反击 (Counter) + 大招 波导弹 (Aura Sphere), 用于打冰/钢/岩/恶/普系团战。\n说明: Blast Burn 是社区日/特殊传授才有的传统大招, 平时学不到, 没有的话用 末日轰击(Overheat) 或 烈焰冲撞(Flamethrower) 替代; 一只满配建议火攻配火大招、格斗配火焰鸡可二配 Counter 走双形态利用。","get":"1) 进化获取: 抓火稚鸡(Torchic), 用 25 颗糖果进化成力壮鸡(Combusken), 再用 100 颗糖果进化成火焰鸡。火稚鸡是丰缘地区初始御三家, 平时野外较少, 主要靠活动/社区日/孵蛋/团战。\n2) 社区日: 火稚鸡曾作为社区日宝可梦登场, 期间野外大量刷新且进化可习得专属大招 爆裂燃烧(Blast Burn) —— 这是拿到最佳配招的关键途径, 关注 Niantic 是否复刻。\n3) 暗影形态: 通过击败火箭队头目 Giovanni(或相应手下) 获得并净化前的暗影火稚鸡/火焰鸡。\n4) Mega 超进化: 拥有火焰鸡后, 收集 火焰鸡能量(Mega Energy, 打 Mega 火焰鸡团战或完成相关任务获得) 即可超进化为 Mega 火焰鸡。","train":"糖果/培养路线:\n- 进化总需求约 125 颗火稚鸡糖果(25 进化到力壮鸡 + 100 进化到火焰鸡)。\n- 强化到 L40 需要总计约 250+ 糖果与对应星尘; 冲 L40-50 还需 296 颗 XL 糖果(从 L40 到 L50 每只大约 296 XL 糖)。\n- XL 糖果来源: 高等级抓捕、孵蛋、远足奖励、用普通糖果转换(Candy XL 转换)、以及好友赠送的传说级糖。\n培养建议(团战取向):\n- 团战要高攻、伤害最大化, 优先选 攻击IV高(理想 15 攻) 的个体, 防御/HP 次要。\n- 建议至少强化到 L40 满级再考虑投 XL 冲 L45-50, 因为火焰鸡防御脆, 偏向短时间高爆发输出, 而非肉盾续航。\n- 大招优先点满 爆裂燃烧(火) 一套; 若想兼顾格斗团战, 花二配技能点出 真气拳+波导弹 第二套。\n- 优先把资源砸在 暗影火焰鸡 或 Mega 火焰鸡 利用上(见 formNote), 普通体作为过渡/填充。","formNote":"团战(PvE)推荐优先级: Mega 火焰鸡 ≥ 暗影火焰鸡 > 普通火焰鸡。\n- Mega 火焰鸡(Fire Spin / Blast Burn): 火系 DPS 约 20.1、TDO 约 352, 当前火系打手 S 级/榜首梯队, 同时给全队火/格斗系队友提供 Mega 攻击加成, 是团战首选形态。打格斗系团战可用 Counter / Aura Sphere(DPS 约 21.7, 格斗 S 级第二)。每次团战只能上一只 Mega, 适合作为核心输出+团队增益。\n- 暗影火焰鸡(Shadow): 暗影加成使其单体输出极高(火系 DPS 接近甚至超过部分顶级火系), 是没有 Mega 名额或需要多只高伤打手时的最佳常规队员, 缺点是受到伤害更高、更脆。建议练一只暗影火焰鸡 + 平时用 Mega。\n- 综合建议: 资源有限优先做 1 只高攻 暗影火焰鸡 走 火焰旋涡+爆裂燃烧, 同时囤 Mega 能量在开团时超进化普通火焰鸡吃团队加成; 无 Blast Burn 时用 Overheat 顶替。"},"heatran":{"cn":"席多蓝恩","en":"Heatran","dex":485,"types":["Fire","Steel"],"evo":[{"dexNumber":485,"cnName":"席多蓝恩","enName":"Heatran"}],"moveset":"快攻: 火花/喷射火焰 Fire Spin（首选，能量充能快、DPS 高）；大招: 岩浆风暴 Magma Storm（专属招式，伤害极高且耗能便宜，是最佳大招）。备选大招: 喷射火焰 Flamethrower（无岩浆风暴时使用，耗能低、DPS 尚可）。Fire Spin + Magma Storm 是当前公认的最佳火系 PvE 配招（约 16.8 DPS，A+ 级火系输出，火系排名前 20）。","get":"传说宝可梦，无法进化或在野外捕获。主要通过五星团战（Raid）获得——席多蓝恩会周期性轮换回归五星团战池；打赢后有几率捕捉。也可能在特定活动/调查任务中作为奖励出现。岩浆风暴（专属大招）通常只能在它作为团战头目的活动期间用「专属招式学习器（Elite TM）」或活动加成学到，平时无法直接刷出，建议在它登场团战时优先获取带专属招式的个体。","train":"糖果获取: 团战捕捉、与好友交换（远距离/特殊交换）、用稀有糖果转换、设为伙伴行走赚糖（每 5km 一颗）。强化方向: 作为顶级火系输出，团战吃攻击属性，IV 优先「攻击 15」（防御/HP 可放低），并刷出/学到岩浆风暴。等级建议: 团战玩家强化到 L40 即有很强战力；追求极限可用 XL 糖果继续推到 L45-50（每提升一档都需大量普通糖果 + XL 糖果 + 星尘，性价比上 L40-45 通常足够）。XL 糖果来源: L40+ 时团战捕捉、行走、交换概率掉落，以及好友等级奖励。建议备多只满 IV 个体以应对车轮战。","formNote":"席多蓝恩没有 Mega/超级进化，也没有 Primal 形态，因此形态选择只在「普通」与「暗影（Shadow）」之间。团战纯输出优先选暗影席多蓝恩：暗影形态攻击约 +20%，DPS 明显高于普通形态，是火系最强输出选择之一，缺点是更脆、扛伤差且需用「暗影招式学习器」去掉沮丧招式（Frustration）。建议: 追求最快通关/计时挑战用暗影；想要更耐久、能多吃几下大招（减少濒死）或缺暗影学习器时用普通形态。暗影目前只能通过击败火箭队头目 GO Rocket Leader（轮换期）获得，获取难度高于普通团战版。"},"blacephalon":{"cn":"砰头小丑","en":"Blacephalon","dex":806,"types":["Fire","Ghost"],"evo":[{"dexNumber":806,"cnName":"砰头小丑","enName":"Blacephalon"}],"moveset":"快攻 Incinerate(喷烟) + 大招 Mind Blown(惊爆大头)。这是火系输出最优配招（约 19+ DPS，最高 TDO）。若想当幽灵系攻手，可改用 Astonish(惊吓) + Shadow Ball(暗影球)，但其幽灵系输出明显弱于火系，主流定位仍是顶级火系攻手。","get":"究极异兽(Ultra Beast)，仅通过特定活动期间的团战(通常为五星团战)获得，最初随 Ultra Space Wonders / 究极空间相关活动登场。野外不自然出现、无法孵蛋、不会作为火箭队暗影出现。需在活动开放团战时凑队击败后捕捉。捕捉后有概率为闪光(Shiny 已实装)。Sunny(晴)与 Fog(雾)天气下增益(等级与捕捉机会更好)。最大 CP 约 3727。","train":"究极异兽糖果只能通过捕捉同种 UB、用糖果机(伙伴步行)产糖、或转移获得，没有进化途径来攒糖，因此糖果较稀缺——优先在活动期间多打多捕来囤糖与 XL 糖果。团战定位重攻击：作为脆皮高攻火系炮台，优先把一只 IV 偏攻击(攻击接近满)的个体强化。普通玩家强化到 L40（标准糖果+星尘上限）即可胜任大多数团战；若追求顶级火系输出/参加高难度团战，用 XL 糖果继续推到 L50。建议至少养 1-2 只以便组多人火系车队（如打草/虫/钢/冰系 Boss）。先解锁第二大招意义不大，单火系配招即可，省糖把等级堆高更划算。","formNote":"砰头小丑是究极异兽，游戏内没有 Mega/超进化形态，也没有 Primal 形态，且 UB 不会作为火箭队暗影宝可梦出现，因此不存在暗影形态。结论：团战只能且就用其本体普通形态(Fire/Ghost)，无更优替代形态可选。它本身就是 PvE 中数一数二的火系攻手，本体即最优。"},"reshiram":{"cn":"莱希拉姆","en":"Reshiram","dex":643,"types":["Dragon","Fire"],"evo":[{"dexNumber":643,"cnName":"莱希拉姆","enName":"Reshiram"}],"moveset":"快攻 Fire Fang(火焰牙) + 大招 Fusion Flare(融合火焰)。这是莱希拉姆作为火系输出的最佳组合：Fire Fang 能量积累快、DPS 高；Fusion Flare 是它的招牌大招、单发伤害极高。作为龙系输出时则用 Dragon Breath(龙之吐息) + Draco Meteor(流星群)/Overheat(过热)。综合火系阵容首选 Fire Fang + Fusion Flare。","get":"传说级 5 星团体战(Raid)Boss，仅在限时活动轮换期间登场，需多名玩家组队击败后获得捕捉机会；无法通过孵蛋或野外遇见获得。也可在特定活动期间通过远程团战券参战。捕捉时为纯白色个体，活动期可能出现闪光(异色)版本。后续暗影形态需通过火箭队头目 Giovanni 的活动获取(随活动轮换)。","train":"普通糖果(莱希拉姆糖果)+ XL 糖果 + 星尘。传说宝可梦无法用普通方式刷糖，主要靠：团战捕捉(每只约 3 颗)、用神奇糖果转化、以及与好友的远征/最佳好友赠送幸运蛋等。XL 糖果通过 41 级以上玩家击败它获得、神奇 XL 糖果转化、或好友赠礼。培养建议：莱希拉姆是高攻型(基础攻击约 238)，优先拉满 IV 攻击高的个体；PvE 团战不吃血量，直接强化到 L40 即可获得高性价比 DPS，资源充裕可推到 L50(需大量 XL 糖果)以提升输出和续航。建议养 2-6 只组成火系/龙系团战阵容。","formNote":"团战首选「暗影莱希拉姆(Shadow Reshiram)」。暗影形态攻击提升约 20%，作为纯输出在限时团战中 DPS 显著高于普通形态，是当前顶级火系和龙系暴力输出之一(代价是承伤略增、需消耗紫色道具去除暗影迷雾以解锁更强招式)。莱希拉姆没有 Mega/超进化或 Primal 形态，所以无需考虑超进化。结论：能拿到暗影版就优先练暗影莱希拉姆；普通版作为补充也完全够用。"},"delphox":{"cn":"妖火红狐","en":"Delphox","dex":655,"types":["Fire","Psychic"],"evo":[{"dexNumber":653,"cnName":"火狐狸","enName":"Fennekin"},{"dexNumber":654,"cnName":"长尾火狐","enName":"Braixen"},{"dexNumber":655,"cnName":"妖火红狐","enName":"Delphox"}],"moveset":"快攻 Fire Spin（火焰旋涡，火系）+ 大招 Blast Burn（爆裂燃烧，火系，社区日/精英朱雀TM限定）。这是 PvE 纯火系最佳输出组合（约 14.4 DPS / 268 TDO，A 级火系打手，整体约第 30 位）。若无 Blast Burn，可用 Flamethrower（喷射火焰）替代。注意属性虽是火/超能，但其超能系招式与种族值不适合做超能打手，团战只当火系输出用。","get":"主要靠捕捉野生 Fennekin（火狐狸）后用糖果进化获得；Fennekin 也出现在卡洛斯地区相关活动、Egg 孵化（部分活动期间 5km/7km 蛋）以及 Field Research 任务奖励中。也可直接遇到野生/Raid 中的 Braixen、Delphox（视活动而定）。闪光版本已在游戏中开放（Fennekin / Braixen / Delphox 三阶段均有闪光）。","train":"进化路线与糖果：Fennekin →（25 糖）→ Braixen →（100 糖）→ Delphox，从头培养共需 125 颗 Fennekin 糖。糖果获取：捕捉时喂 Pinap/银色 Pinap 浆果翻倍、设为伙伴步行（每若干公里得糖）、转移多余个体、活动加成。XL 糖果：升到 L40 以上需要 Fennekin XL 糖果，主要靠 L31+ 捕捉、转移和伙伴步行少量获得。团战培养建议优先选高攻击 IV（攻击优先于防御/HP，#ATK 15 最佳，因为它是脆皮高攻输出型），满级目标 L40（缺 XL 糖时）到 L50（充足 XL 糖时全力满级）。但鉴于它只是 A 级火系，建议把宝贵的 XL 糖优先留给更强的火系（如喷火龙系、长毛巨魔系、烈焰猴等），Delphox 满级性价比一般。","formNote":"游戏内已实装 Mega Delphox（超进化妖火红狐），团战明显优于普通形态和暗影形态：Mega 用 Fire Spin / Blast Burn 约 20.37 DPS、465 TDO，最大 CP 约 5408，晴天加成；它还能为同场火系/超能系队友提供超进化加成。结论——团战首选超进化（Mega Delphox）形态；普通满级形态只作日常火系输出。暗影形态（Shadow Delphox，若开放）攻击更高、续航略差，可作为无 Mega 时的廉价高输出补位，但整体仍弱于主流火系，不建议为它专门投入资源。"},"emboar":{"cn":"炎武王","en":"Emboar","dex":500,"types":["Fire","Fighting"],"evo":[{"dexNumber":498,"cnName":"暖暖猪","enName":"Tepig"},{"dexNumber":499,"cnName":"炒炒猪","enName":"Pignite"},{"dexNumber":500,"cnName":"炎武王","enName":"Emboar"}],"moveset":"最佳火系输出: 快攻 Ember (火花) + 大招 Blast Burn (爆炎/烈焰冲撞，社区日专属招式)。若打格斗输出: Low Kick (踢倒) + Focus Blast (真气弹)，但格斗向不如纯火系定位。综合 PvE 团战首选 Ember + Blast Burn。","get":"野外较少见，主要来源: 1) 捕捉/孵化暖暖猪 (Tepig，多见于 5km 蛋及合众地区活动) 后用 25+100 糖果进化到炎武王; 2) 暖暖猪社区日 (Community Day) 期间野外大量刷新、进化可获专属大招 Blast Burn; 3) 远征 (Field Research)、活动限时调查奖励偶有出现; 4) 偶见于一星团战或活动巢穴。最稳定的高 IV 来源是社区日。","train":"团战定位重攻击: 优先选高攻个体 (Attack IV 15 最佳，DEF/HP 次要)，IV 影响在高 CP 段位才显著。糖果消耗: 暖暖猪→炒炒猪 25 糖，炒炒猪→炎武王 100 糖 (社区日进化期间窗口内进化送 Blast Burn)。强化到 L40 已够主流团战; 若要顶满推荐用 XL 糖果继续升到 L50 (40→50 每级消耗大量普通糖果+XL 糖果，总计需约 296 XL 糖果)。务必趁社区日一次性进化拿专属招式，再做强化，避免浪费招式机 (Elite TM 才能后补 Blast Burn)。建议优先做 1-2 只满级专精火系输出。","formNote":"Emboar 没有 Mega 进化，也没有 Primal/原始回归形态，因此形态选择只在「普通」与「暗影 (Shadow)」之间。团战强烈推荐暗影形态 (Shadow Emboar): 暗影宝可梦攻击力提升约 20%，作为纯输出火系 attacker 收益巨大，DPS 明显高于普通形态 (代价是承伤略增、需用紫色精华学第二招)。结论: 团战用暗影炎武王 + Blast Burn 最优; 若拿不到暗影，普通形态也可作为合格的火系/格斗输出。不过整体而言 Emboar 即使暗影也属中游火系输出，长期可优先培养胡帕、达克莱伊不可的情况下作为火系补位。"},"chandelure":{"cn":"水晶灯火灵","en":"Chandelure","dex":609,"types":["Ghost","Fire"],"evo":[{"dexNumber":607,"cnName":"烛光灵","enName":"Litwick"},{"dexNumber":608,"cnName":"灯火幽灵","enName":"Lampent"},{"dexNumber":609,"cnName":"水晶灯火灵","enName":"Chandelure"}],"moveset":"快攻：火花（Fire Spin）；大招：暗影球（Shadow Ball）。这是 Chandelure 在 PvE 中最高 DPS 的鬼系配招，使其成为顶级鬼系输出。若需火系输出则用 火花 + 过热（Overheat），但综合体系定位以鬼系暗影球为最佳通用大招。建议常备两套配招（暗影球 + 过热）以兼顾鬼系与火系团战。","get":"主要通过进化获得：野外/巢穴捕捉 烛光灵（Litwick），用 25 糖果进化为 灯火幽灵（Lampent），再用 100 糖果进化为 水晶灯火灵（Chandelure）。烛光灵也常在万圣节（Halloween）活动、相关主题日和聚焦时刻（Spotlight Hour）中大量出现并伴随糖果加成。此外可通过特定团战、活动、孵蛋以及在野外直接遇到（概率较低）。暗影形态（Shadow）需通过击败并净化火箭队头目/手下捕获的暗影烛光灵进化获得。","train":"作为脆皮高攻型攻击手，培养重点放高攻 IV（理想 15 攻击；防御/体力可妥协）。进化前先选高攻个体再喂 25+100 糖果进化。强化建议：用于高级团战和 Mega 团战时尽量推到 L40 以上，玩家等级达 40+ 后可用 XL 糖果继续强化到 L45-50 以提升伤害与续航。鬼系/火系阵容各保留一只满级 Chandelure（或一只双配招）。糖果来源：聚焦时刻配合星之碎片+魔法糖果（Pinap/Silver Pinap Berry 增产糖果）、与好友交换降低进化成本、伙伴行走赚糖、Mega Gengar/火系 Mega 助攻团战时也能加成对应属性糖果掉落。","formNote":"水晶灯火灵没有 Mega 进化也没有 Primal 形态，因此 Mega/Primal 不适用。团战首选其 暗影形态（Shadow Chandelure）：暗影宝可梦攻击加成约 1.2 倍，使本就攻击极高的 Chandelure 成为目前数一数二的鬼系输出（净打输出可与/超过顶级鬼系如暗影耿鬼相比），代价是承伤更高、更易被秒、需多备复活道具。推荐：以最大化伤害为目标的高级/Mega 团战用暗影形态（暗影球做大招）；若想节省精灵球资源或追求容错与续航，则用普通形态。综合推荐：暗影水晶灯火灵 + 火花/暗影球。"},"darmanitan":{"cn":"达摩狒狒","en":"Darmanitan","dex":555,"types":["Fire"],"evo":[{"dexNumber":554,"cnName":"达摩去离子","enName":"Darumaka"},{"dexNumber":555,"cnName":"达摩狒狒","enName":"Darmanitan"}],"moveset":"快攻：喷火/火焰牙 (Fire Fang)；大招：大字爆炎 (Overheat)。Fire Fang + Overheat 是当前 PvE 最高 DPS 组合（约 14.48 DPS）。备选大招可用 Solar Beam 应对水/岩/地面对手，但纯火 PvE 团战仍以 Overheat 为主。","get":"主要通过进化获得：捕捉达摩去离子 (Darumaka，#554) 后用 50 颗糖果进化成达摩狒狒。达摩去离子可在野外（尤其晴天天气加成）、5km 蛋孵化、以及相关活动/团战中获取。达摩狒狒本体偶尔也会作为野生稀有刷新或活动 Boss 出现。带闪光（异色）形态在部分活动期间开放。","train":"达摩狒狒为高攻脆皮火系输出（攻击约263），团战定位是\"玻璃大炮\"——优先堆攻击、追求高 DPS 而非续航。糖果：进化需 50 颗达摩去离子糖果；强化到 L40 需大量普通糖果，L41-50 需 XL 糖果（满级 L50 约需 296 颗 XL 糖果）。培养建议：优先做满 IV（尤其攻击 15）的个体；若资源有限，L40 已足够应对绝大多数火系团战，XL 满级仅为追求极限输出或 Master League 边缘用途。建议练 1-2 只精品而非批量培养。用稀有糖果/糖果妈妈集中喂这只精品个体。","formNote":"达摩狒狒目前在 Pokemon GO 中没有 Mega 超进化，也没有 Primal 形态，因此不存在\"超进化更优\"的选项。形态选择上：暗影 (Shadow) 达摩狒狒明显优于普通形态——暗影版攻击加成 (×1.2) 进一步放大其本就极高的攻击，是顶级火系输出之一（DPS 显著高于普通版），代价是更脆。团战推荐用「暗影达摩狒狒 + Fire Fang/Overheat」，并备好治疗道具应对快速阵亡。若没有暗影个体，普通满级也完全够用。注意：伽勒尔形态 (Galarian Darmanitan) 是独立的冰系本体，不在本火系本体范畴内。"},"groudon":{"cn":"固拉多","en":"Groudon","dex":383,"types":["Ground"],"evo":[{"dexNumber":383,"cnName":"固拉多","enName":"Groudon"}],"moveset":"快攻 Mud Shot(泥巴射击) + 大招 Precipice Blades(断崖之剑，固拉多专属招式)。这是地面系最强配招组合。注意 Precipice Blades 通常需要用 Elite Charged TM(高级招式学习器/精英充能机)解锁；备选大招 Earthquake(地震) 也可用但输出明显逊于断崖之剑。","get":"传说宝可梦，仅通过五星团体战(5-Star Raid)获取，团战胜利后获得捕捉机会。Groudon 会在相关活动周期(如水陆系传说轮换、Hoenn 相关活动、GO Fest/Tour 等)轮回上线。捕捉后达成条件可解锁 Primal(原始) 形态。无法野外遇到、孵蛋或交换原始捕获途径，只能靠团战。","train":"糖果来源：团战捕捉、与好友交换得糖、用 Pinap Berry(银/金 Pinap)增加捕捉糖果、Groudon 糖果可遥控伙伴行走获得(每 5km 1 颗，作为伙伴时)。XL 糖果(Candy XL)：训练师等级 40+ 后从团战捕捉、行走及交换概率获得，是冲到 Lv40-50 的关键瓶颈。培养建议：团战定位为高攻输出，优先把一只 IV 高攻(理想 15 攻)的个体强化到 Lv40，资源充足且常打高难团战(Mega/Primal/五星)再用 XL 糖果推到 Lv50 以提升 DPS 与续航。优先解锁 Precipice Blades 大招(用 Elite Charged TM)而非 Earthquake。","formNote":"团战优先用 Primal Groudon(原始固拉多)。Primal 形态攻击高达约 352，配合专属 Precipice Blades 是当前地面系 PvE 天花板(S+ 级)，且作为 Primal 形态会为全队提供团队增益：本人在场时强化全队地面/火/草系招式约 30% 伤害、并给其他训练师约 10% 增益，团战收益极高。原始化是临时形态(消耗 Primal Energy / 原始能量激活)，需先有普通 Groudon 再原始化，建议养一只满攻高级体专门用于原始化。Shadow(暗影) Groudon 目前在游戏内不可获取，无需考虑；即便未来上线，常规团战仍以 Primal 形态为最优。"},"kyogre":{"cn":"盖欧卡","en":"Kyogre","dex":382,"types":["Water"],"evo":[{"dexNumber":382,"cnName":"盖欧卡","enName":"Kyogre"}],"moveset":"普通形态 PvE：水流喷射(Waterfall, 快攻) + 水炮(Hydro Pump, 大招)；冲浪(Surf) 是更易回合输出的备选大招。Primal(原始回归) 形态 PvE 最强：水流喷射(Waterfall) + 根源波动(Origin Pulse, Primal 专属大招, 威力120/能耗100, 全游戏最高水系单体 DPS)。","get":"主要通过五星传说团战(Legendary Raid)获取，盖欧卡会周期性轮换回归团战(常见于水系/雨天主题活动或传说轮换周)。团战胜利后获得有限的捕捉球进行捕捉，捕到可获得「盖欧卡糖果」。此外社区日/团战日、研究突破(Research Breakthrough)字段调查奖励历史上也曾提供过。Primal 形态不通过捕捉获得：先拥有普通盖欧卡，再用「原始能量(Primal Energy)」在原始团战中击败 Primal Kyogre 后收集，对自己的盖欧卡执行「原始回归」。","train":"团战定位为纯输出，盖欧卡天生超高攻击(基础攻击约270)，强化方向就是堆攻击/总CP，无需考虑防御或耐久配招。糖果来源：团战捕捉(每只约3颗+金莓加成)、徒步伙伴(5km)、用稀有糖果/稀有XL糖果转换。XL糖果(L40-50)只能从团战捕捉、徒步伙伴及稀有XL糖换取，传说宝可梦获取慢，建议优先把一只IV高(尤其攻击IV高)的盖欧卡推到L40，行有余力再用XL糖冲L50榨干最后DPS。推荐：锁定一只攻击IV接近满的个体集中投资，二招解锁水流喷射+水炮(或 Primal 后换根源波动)；不要分散糖果养多只。","formNote":"团战首选 Primal Kyogre(原始盖欧卡)。原始回归后攻击进一步暴涨，并解锁专属大招「根源波动(Origin Pulse)」，使其成为全游戏最强水系单体输出，远超 Mega 巨牙鲨/Mega 巨沼怪等，且 Primal 形态在场时还为全队水/火系攻击提供加成(类似 Mega 增益)。暗影(Shadow)形态虽攻击更高理论 DPS 更猛，但当前游戏中暗影盖欧卡无法进行原始回归、拿不到根源波动，且团战中暗影的额外受伤会更快被淘汰，综合不如 Primal。结论：能做 Primal 就上 Primal；普通形态作为日常水系输出已足够，暗影形态非团战最优。"},"swampert":{"cn":"巨沼怪","en":"Swampert","dex":260,"types":["Water","Ground"],"evo":[{"dexNumber":258,"cnName":"水跃鱼","enName":"Mudkip"},{"dexNumber":259,"cnName":"沼跃鱼","enName":"Marshtomp"},{"dexNumber":260,"cnName":"巨沼怪","enName":"Swampert"}],"moveset":"快攻 Water Gun(水枪) + 大招 Hydro Cannon(加农水炮，社区日限定招式)。Hydro Cannon 充能快、DPS/DPE 俱佳，是巨沼怪作为水系输出的核心。若需地面输出可改带大招 Earthquake(地震)，但通用 PvE 团战首选 Water Gun + Hydro Cannon。","get":"1) 野外/孵蛋/团战获得初始形态水跃鱼(Mudkip)后逐级进化(水跃鱼→25糖→沼跃鱼→100糖→巨沼怪)；2) 水跃鱼曾多次作为社区日(Community Day)主角，社区日期间进化的巨沼怪可直接学会限定招式 Hydro Cannon；3) 错过社区日可用「绝招学习器(Elite TM/精英招式)」或后续社区日复刻活动补学 Hydro Cannon；4) 偶尔出现在团战奖励/调查任务。","train":"进化线总计需要 25(水跃鱼→沼跃鱼) + 100(沼跃鱼→巨沼怪) = 125 颗糖果走完进化。强化到 L40 需大量普通糖果，L40→L50 额外需要 XL 糖果(约 296 颗 XL)与星尘。团战取向应锁定高攻 IV(攻击 15 最佳，体防可放宽)，优先把一只刷满到 L40 即可胜任绝大多数团战；追求极限输出/打满 L50 再投 XL 糖果。XL 糖果来源：高 CP 捕捉、远距离换蛋好友、孵蛋、用 100 普通糖换 1 XL。务必在带 Hydro Cannon 的前提下强化。","formNote":"团战优先用「Mega 超进化(Mega Swampert)」。Mega 巨沼怪是顶级 S 级水系输出(综合排名约第二)，且因水/地双属性，对岩石系团战王几乎无解，远超普通巨沼怪；Mega 期间还给同属性队友加伤、并提升你抓 Boss 后续宝可梦的糖果/XL 收益，性价比极高。Mega 配招同为 Water Gun + Hydro Cannon。暗影(Shadow)形态在没有 Mega 能量、或一队需要多只巨沼怪刷阵容时是很好的高性价比替代(暗影加攻、输出明显高于普通体)，但单只巅峰输出仍以 Mega 最优。结论：能 Mega 就上 Mega，备队/省 Mega 能量时用 Shadow。"},"blastoise":{"cn":"水箭龟","en":"Blastoise","dex":9,"types":["Water"],"evo":[{"dexNumber":7,"cnName":"杰尼龟","enName":"Squirtle"},{"dexNumber":8,"cnName":"卡咪龟","enName":"Wartortle"},{"dexNumber":9,"cnName":"水箭龟","enName":"Blastoise"}],"moveset":"快攻 Water Gun(水枪) + 大招 Hydro Cannon(水炮)。Hydro Cannon 是社区日限定专属招式(40 能量, ~2.0 DPE),是水箭龟发挥的关键,几乎必备。普通形态 Water Gun/Hydro Cannon 约 11 DPS / 231 TDO。Mega 形态同配招约 16.2 DPS / 386 TDO,跻身顶级水系输出。","get":"1) 进化路线:野外/孵蛋/朋友赠送 7km 蛋抓杰尼龟,用糖果进化为卡咪龟再到水箭龟(也可直接捕获偶尔出现的卡咪龟/水箭龟)。2) 团体战:水箭龟会作为一星/大型团战 Boss 上线,可在团战胜利后捕捉。3) 社区日复刻:杰尼龟社区日(及其复刻活动)期间,进化即可习得专属大招 Hydro Cannon——拿到带 Hydro Cannon 的水箭龟基本只能靠社区日窗口或精英充能 TM。4) Mega 能量:在 Mega 水箭龟团战(Mega Raid)中击败可获得 Mega Energy,首次需用能量超级进化,之后冷却结束可免费再进化。","train":"糖果来源:进化链捕捉/转移、杰尼龟伙伴步行(每 3km 一颗)、Pinap/Silver Pinap 莓果加倍、7km 蛋孵化、Rinka/与该家族的 mega 进化亦给家族糖果。团战培养建议:水系本身对手以高 HP Boss 为主,优先堆高输出而非生存——IV 优先看攻击(理想 15 攻;HP/防御次要)。强化等级:萌新打团到 L30-35 即可顶用;有富余尘土/糖果可推到 L40,XL 糖果充足且想要满级则上 L50(收益边际递减,普通水箭龟不值得优先吃 XL)。务必先用社区日/精英充能 TM 解锁 Hydro Cannon 再强化,不要浪费资源在没有专属大招的个体上。","formNote":"团战首选 Mega Blastoise(超级水箭龟):同样 Water Gun + Hydro Cannon 下 DPS/TDO 几乎翻倍(约 16.2 DPS / 386 TDO),稳居 S 级水系输出,还能给同场队友提供水系/同属性伤害加成,打 Groudon/原始固拉多、Entei、Mega Camerupt 等火/地/岩 Boss 很强。普通形态属 F 级,基本不进团战首发。暗影(Shadow)水箭龟攻击加成可观、纸面 DPS 高于普通形态,但生存差且无法 Mega、需霜冻 TM 去掉回击;若没有 Mega 能量,暗影+Hydro Cannon 是次优选择。Blastoise 无 Primal 形态。综合:有 Mega 能量优先 Mega;否则用暗影;普通形态仅作过渡。"},"gyarados":{"cn":"暴鲤龙","en":"Gyarados","dex":130,"types":["Water","Flying"],"evo":[{"dexNumber":129,"cnName":"鲤鱼王","enName":"Magikarp"},{"dexNumber":130,"cnName":"暴鲤龙","enName":"Gyarados"}],"moveset":"最佳通用 PvE 配招: 快攻 Waterfall(瀑布,水系,有 STAB) + 大招 Hydro Pump(水炮,水系,有 STAB),这是水系输出的标准最优组合(约 12.3 DPS / 266 TDO)。备选大招 Aqua Tail(水流尾)伤害低于 Hydro Pump,但出招更快、回合能量利用更稳,适合需要频繁放招或墙边躲招的场景。注意:Crunch(咬碎,恶系)只在打超能/幽灵系且需要恶系覆盖时才考虑,纯论水系输出仍以 Hydro Pump 为主。","get":"获取途径: 1) 进化——抓 鲤鱼王(Magikarp),攒满 400 颗鲤鱼王糖果进化成 暴鲤龙,这是最稳定的来源(钓鱼/水边/水域活动刷新率高);2) 野外直接遭遇——暴鲤龙偶尔野生出现,在天气加成(雨天/有风)或水系活动期间更常见;3) 团战/Raid——常作为一/三星团战 Boss 出现,胜利后可捕捉,亦是捕获高 IV 个体和暗影版本(火箭队)的途径;4) 田野调查/任务奖励 偶尔提供鲤鱼王或暴鲤龙遭遇。","train":"糖果/强化建议: 进化本身要 400 颗鲤鱼王糖果,因此尽量边走边孵蛋(用伙伴鲤鱼王/暴鲤龙)、用神奇糖果与\"赶紧来\"事件加速攒糖,优先进化高攻、高 IV(理想 15/15/15,团战看重攻击项)的鲤鱼王。团战定位是水系高输出 glass cannon,强化时优先把 IV 攻击高的个体拉满:普通玩家拉到 L40 即可应付绝大多数团战;有充足星尘与 XL 糖果(40 级后强化需要 XL)的可继续推到 L50 榨干上限输出。XL 糖果获取慢,建议只对一只王牌输出个体投入到 L50,其余 L40 留作多开。配招用 TM 调成 Waterfall + Hydro Pump 即可。","formNote":"团战强烈推荐 超进化(Mega Gyarados),而非暗影或本体。Mega 暴鲤龙属性从 水/飞 变为 水/恶,输出大幅提升(约 17.9 DPS / 751 TDO,远超本体),且作为 Mega 在场可为同队水系/恶系队友提供能量与糖果加成,是当前性价比很高的水系 Mega 输出之一。若没有 Mega 能量,则用 暗影暴鲤龙(Shadow):攻击更高、输出超过普通本体,代价是更脆且需用 TM 解锁招式、强化更贵。优先级: Mega > 暗影 > 普通本体。注意 Mega 变恶系后会被妖精/格斗/虫系克制,选 Mega 还是暗影也要看对手属性克制关系。暴鲤龙没有 Primal 形态。"},"greninja":{"cn":"甲贺忍蛙","en":"Greninja","dex":658,"types":["Water","Dark"],"evo":[{"dexNumber":656,"cnName":"呱呱泡蛙","enName":"Froakie"},{"dexNumber":657,"cnName":"呱头蛙","enName":"Frogadier"},{"dexNumber":658,"cnName":"甲贺忍蛙","enName":"Greninja"}],"moveset":"快攻: 水手里剑 (Water Shuriken)；大招: 水炮 (Hydro Cannon)。水手里剑+水炮是通用 PvE 最强水系输出组合 (约 14.1 DPS / 210 TDO，水系攻击手 A+ 级)。注意：水炮是社区日限定招式，只能通过「电系/究极充能 TM (Elite Charged TM)」教会，平时无法学习。若没有水炮，退而用「冲浪 (Surf)」作为替代大招。打恶系/超能 raid 时也可考虑恶属性招式 (恶之波动 Dark Pulse) 蹭本系加成，但纯输出仍以双水招最优。","get":"无法在野外/raid 直接捕获 Frogadier 或 Greninja，唯一获取途径是进化 Froakie (呱呱泡蛙)。Froakie 在野外 (尤其水边、湖泊河流附近) 刷新，也会出现在活动、田野调查任务、卵孵化中。集齐糖果后：Froakie→Frogadier 需 25 颗糖，Frogadier→Greninja 需 100 颗糖。社区日期间 Froakie 会大量刷新且进化可习得限定招式水炮。可遇闪光 (Shiny)。","train":"糖果消耗：野外捕 Froakie 用 Pinap 莓 (Pinap Berry) 翻倍糖果，配合好友/伙伴行走、Rainy 天气加成 (水系刷新+捕捉时多糖) 高效攒糖。完整进化共需 125 颗 Froakie 糖；强化到 L40 约需额外 ~250+ 颗糖、L50 还需 296 颗 XL 糖果 (XL Candy)。Greninja 攻击高、防御与 HP 偏低，定位「玻璃大炮」，团战追求高攻输出，建议优先把 IV 选攻击高的个体强化，无需追双防。XL 糖果可通过捕捉、远距离/最佳好友交换、伙伴行走、以及普通糖果在 Lv40+ 后转换等方式获取；想冲满级 L50 需持续刷 Froakie 攒 XL。社区日是一次性攒大量糖果+XL+习得水炮的最佳时机。","formNote":"Greninja 在 Pokémon GO 中目前没有 Mega 超进化、也没有 Primal 形态 (主系列里它的「真·甲贺忍蛙/羁绊变身 Ash-Greninja」是剧情形态，GO 未实装)，所以不存在更优的 Mega/Primal 选择。暗影 (Shadow) 形态目前也尚未在 GO 上线 (无法从火箭队处获得暗影 Greninja)。因此当前团战只能用普通形态。若未来推出暗影 Greninja，凭借暗影 +20% 攻击加成会显著提升其作为玻璃大炮水系/恶系输出的 DPS，届时暗影形态会是团战首选；但需注意暗影更脆，要更注意闪避。结论：现阶段就用普通 Greninja (水手里剑+水炮)，无 Mega/Primal/Shadow 可选。"},"empoleon":{"cn":"帝王拿波","en":"Empoleon","dex":395,"types":["Water","Steel"],"evo":[{"dexNumber":393,"cnName":"波加曼","enName":"Piplup"},{"dexNumber":394,"cnName":"波皇子","enName":"Prinplup"},{"dexNumber":395,"cnName":"帝王拿波","enName":"Empoleon"}],"moveset":"最佳通用 PvE 配招：快攻 Metal Claw（金属爪，钢系）+ 大招 Hydro Cannon（加农水炮，水系，社区日限定招式）。这是它作为水系输出手的核心配招。备选大招可用 Waterfall（攀瀑，作为快攻）+ Hydro Cannon，但 Metal Claw 充能更快、整体 DPS 更高。若没有 Hydro Cannon，可用 Hydro Pump（水炮）顶替，但明显逊色。","get":"主要途径：捕捉初阶波加曼（Piplup）后用糖果进化——波加曼→波皇子（25 糖）→帝王拿波（100 糖）。波加曼常见于社区日、活动、Spotlight Hour、研究任务奖励，平时野外/孵蛋也可少量获得。Hydro Cannon 只能在波加曼社区日（或社区日 Classic）期间进化获得，错过则需用「精英充能 TM」（Elite Charged TM）教学。暗影帝王拿波需击败火箭队头目得到的暗影波加曼/波皇子进化而来。","train":"糖果与培养建议：进化全程约需 125 颗波加曼糖果（25+100）。强化到 L40 约需 250+ 糖果 + 大量星尘；冲 L50 还需额外约 296 颗 XL 糖果（仅训练师 Lv.40+ 可获得 XL 糖果）。XL 糖果来源：捕捉/孵蛋/抓波加曼系列、用普通糖果按 100:1 兑换、与好友交换、研究奖励。团战取向请优先选高个体攻击（IV 攻击 15 或接近）来最大化 DPS；普通团战拉满 L40 即足够，长期顶级输出/打高 CP 关卡才值得投资冲 L50。建议先做一只配 Metal Claw + Hydro Cannon 的高攻个体。","formNote":"Pokemon GO 中帝王拿波没有超进化（Mega）或 Primal 形态，可选的本体变体只有「普通」和「暗影（Shadow）」。团战推荐用暗影帝王拿波：暗影形态攻击加成显著拉高输出，配 Metal Claw + Hydro Cannon 时 DPS 约 16.5、TDO 约 273，属 A+ 级水系输出，在水系攻击手中排名约第 11，明显优于普通版（DPS 约 14、A 级、约第 25 名）。代价是受到伤害更高、更脆，且暗影版需用精英充能 TM 才能学会 Hydro Cannon。结论：能洗暗影就洗暗影做主力团战输出；只用于稳妥承伤或缺精英 TM 时再用普通形态。"},"samurott":{"cn":"大剑鬼","en":"Samurott","dex":503,"types":["Water"],"evo":[{"dexNumber":501,"cnName":"水水獭","enName":"Oshawott"},{"dexNumber":502,"cnName":"双刃丸","enName":"Dewott"},{"dexNumber":503,"cnName":"大剑鬼","enName":"Samurott"}],"moveset":"快攻 Fury Cutter（连斩，能量积累快）+ 大招 Hydro Cannon（加农水炮，传说级招式，伤害高、耗能低，需用一级充能 TM 学习）。备选大招 Hydro Pump（水炮）输出更高但耗能大，PvE 中 Hydro Cannon 综合最优。Razor Shell（贝壳剑）不推荐做主力。","get":"由初阶 水水獭(Oshawott) 进化而来：水水獭→双刃丸(25 糖果)→大剑鬼(100 糖果)。水水獭来源：合众地区(Unova)社区日活动、特定一星团战、地区性/季节性活动孵蛋与野外刷新、Spotlight Hour 等。大剑鬼本体一般不直接野生出现，主要靠进化获得；暗影形态需击败火箭队头目/部下后捕捉暗影 水水獭再进化。Hydro Cannon 通常只在 水水獭/大剑鬼 社区日期间进化可免费习得，平时需用一级充能TM(Elite Charged TM)。","train":"水水獭→双刃丸需 25 糖果，双刃丸→大剑鬼需 100 糖果。强化用普通糖果+星尘，L40 以上每级需 XL 糖果。团战取向(PvE)：优先满 IV 中的高攻个体(攻击 15 最佳)，性价比上推荐拉满到 L40；若资源充裕且追求最大输出可继续用 XL 糖果推到 L50。XL 糖果来源：捕捉/孵化/转移整条进化线、最好朋友赠蛋、社区日/活动加成。PvE 不必追求血防均衡，攻击属性优先。","formNote":"大剑鬼没有 Mega(超进化) 或 Primal 形态，只有普通形态与暗影(Shadow)形态可选。团战(PvE)中【暗影大剑鬼 Shadow Samurott】明显更优：暗影提供约 20% 攻击加成，配合 Fury Cutter + Hydro Cannon 是高性价比的水系输出，DPS 显著高于普通形态(伤害约高 20%，但更脆、易被秒，建议配合躲技能或多准备几只)。因此团战推荐用暗影形态；若没有暗影或打不动可用普通形态。注意它仍属二线水系输出，长期最强水系仍是 Mega 系或 Kyogre 等传说，但作为可量产的暗影攻手很值得培养。"},"feraligatr":{"cn":"大力鳄","en":"Feraligatr","dex":160,"types":["Water"],"evo":[{"dexNumber":158,"cnName":"小锯鳄","enName":"Totodile"},{"dexNumber":159,"cnName":"蓝鳄","enName":"Croconaw"},{"dexNumber":160,"cnName":"大力鳄","enName":"Feraligatr"}],"moveset":"快攻 Water Gun(水枪) + 大招 Hydro Cannon(水炮)。这是大力鳄唯一值得用的 PvE 配招:Water Gun 充能快、Hydro Cannon 是社区日专属招式(伤害高、出招快、能量消耗低),两者均吃 STAB。普通大招 Hydro Pump(水炮/高压水泵)、Blizzard(暴风雪)、Ice Beam(冰冻光束)、Crunch(咬碎)在 PvE 都不如 Hydro Cannon。冰系招式仅用于打龙/草/地/飞时补盲,不推荐作通用配招。","get":"1) 野外/孵蛋抓小锯鳄 Totodile,沿进化链进化到大力鳄;2) 进化时机要赶在它当过社区日主角的活动期间(或活动后的付费特殊招式日),否则 Hydro Cannon 需用「招式学习器(精英)」才能补上;3) 大力鳄会作为 1星团战/团战 boss、特殊调查或活动奖励出现;4) 暗影形态(Shadow)需打败火箭队头目/手下后捕捉暗影小锯鳄再进化。注:Mega 进化的「超级大力鳄」目前尚未在 GO 实装。","train":"团战定位是水系主力输出,IV 优先高攻击(理想 15 攻),HP/防御次要。糖果消耗:小锯鳄→蓝鳄 25 颗,蓝鳄→大力鳄 100 颗(共 125 颗大力鳄糖果)。强化到 L40 满足绝大多数团战;若是 MVP 主力可氪 XL 糖果推到 L50(需大量 XL 糖,适合双倍糖活动/伙伴远足/打团掉落时囤)。务必确保学到 Hydro Cannon——若错过社区日,用精英招式学习器补;暗影版本无法用普通招式学习器,需用「精英招式学习器」洗掉「挫败」(Frustration)。配双系招式时可留一只冰系(Ice Beam/Blizzard)用于针对龙/草。","formNote":"团战优先用「暗影大力鳄」(Shadow Feraligatr)。暗影加成约 +20% 攻击,Water Gun + Hydro Cannon 的暗影版 DPS≈15.2、TDO≈255,稳居 A+ 级水系输出(水系排名约第 12),明显优于普通形态。代价是更脆(受到伤害更高)、需用精英招式学习器洗掉「挫败」并补 Hydro Cannon。注意它仍被暗影甲贺忍蛙/暗影帝王拿波/暗影巨沼怪/暗影帝王拿波等更强水系压一头,属于「能用且强、但非顶尖」的档位。Mega/超级形态在 Pokemon GO 暂未上线;Primal 形态对该物种不存在。结论:有暗影版优先暗影版练满;只有普通版也完全够用于绝大多数水系团战。"},"kingler":{"cn":"巨钳蟹","en":"Kingler","dex":99,"types":["Water"],"evo":[{"dexNumber":98,"cnName":"大钳蟹","enName":"Krabby"},{"dexNumber":99,"cnName":"巨钳蟹","enName":"Kingler"}],"moveset":"快攻 Bubble(泡沫) + 大招 Crabhammer(蟹钳锤)。这是 Kingler 唯一推荐的纯水系输出配招，DPS 约 14.0、TDO 约 206。Bubble 提供高 STAB 充能与伤害，Crabhammer 是必带的最佳大招。避免使用 Metal Claw / Mud Shot(无 STAB) 与 Vice Grip / Water Pulse(大招效率低)。","get":"1) 野外捕捉本体 Krabby(大钳蟹) 再进化(50 颗糖)，Krabby 常在水边/海岸地区刷新，雨天会增加水系刷新率；2) 偶尔直接遇到野生 Kingler；3) 2 公里蛋孵化可得 Krabby；4) 团战/调查任务奖励或活动中出现。暗影 Kingler 来自打败火箭队手下后捕捉暗影 Krabby 再进化。","train":"糖果来源：捕捉/孵化/转圈 Krabby、用 Krabby 当伙伴步行(每 3 km 1 颗)、Pinap 莓加倍、转移多余个体。进化 Krabby→Kingler 需 50 普通糖；强化到 L40 需要约 250 普通糖 + 大量星尘，L40→L50 需要 296 颗 XL 糖。团战定位是“玻璃大炮”，攻击 240 很高但耐久低，IV 优先选高攻击(理想 15 攻)，其次防御/血量凑满。建议至少强到 L40；若要冲满级 L50 主要靠攒 XL 糖(野外捕捉 L31+ 个体、转移、孵化、伙伴步行均有几率产 XL)。实战务必走位躲大招以保住输出。","formNote":"Pokemon GO 中 Kingler 没有 Mega/超进化，也没有 Primal 形态(原作的是 Gigantamax 极巨化，仅限 Max Battle/Dynamax 机制，不是常规团战配置)。常规团战用普通形态即可。若拥有暗影 Kingler，则暗影形态团战更优：暗影加成使攻击再提升约 20%，DPS 明显高于普通形态，是更推荐的进攻选择(代价是更脆、需要更多走位躲招)。总结：优先用暗影 Kingler；无暗影则用普通 Kingler；不存在可用于团战的 Mega/Primal 形态。整体上 Kingler 即便满配也只是 A+ 级水系补充打手，远不及 Primal Kyogre、Mega Swampert/Blastoise 等顶级水系，建议作为过渡或凑队伍用。"},"zeraora":{"cn":"捷拉奥拉","en":"Zeraora","dex":807,"types":["Electric"],"evo":[{"dexNumber":807,"cnName":"捷拉奥拉","enName":"Zeraora"}],"moveset":"快攻 Volt Switch（伏特替换）+ 大招 Plasma Fists（等离子拳）为最佳通用 PvE 配招，约 17 DPS / 333 TDO，雨天加成。攻坚/道馆速刷可改用 Volt Switch + Wild Charge（疯狂伏特），总 DPS 更高但掉防御。注意 Plasma Fists 是 GO Fest 限定/活动招式，没有的话用 Discharge（放电）作为蓄力替代。","get":"幻之宝可梦，2026 年 GO Fest 2026 首次在 Pokemon GO 登场。通过参加 GO Fest 2026（先线下城市站、后全球线上站）完成活动专属的特殊调查（Special Research）免费获得，全球玩家均可领取。野外/团战常规刷不到，只能靠活动调查获取（通常每账号一只）。","train":"作为高攻电系输出，优先满级培养做团战 raid 主力。糖果靠完成调查任务、与伙伴同行赚糖、以及（若开放）幻之宝可梦活动获取，没有野生捕捉刷糖来源，故糖果稀缺，建议把每一颗都投在唯一这只高 IV 个体上。XL 糖果同样稀缺（只能靠等级 40+ 强化掉落和伙伴糖），优先攒满推到 L40，行有余力再冲 L50。IV 取向选满攻击（团战只看输出），防御/HP 次要；务必选最佳配招后再砸星尘强化。","formNote":"捷拉奥拉在 Pokemon GO 中目前没有暗影（Shadow）形态，也没有 Mega 超进化或 Primal 形态——它只有物种本体一种形态，因此团战直接用普通形态即可，无需在形态间取舍。本体已是顶级电系输出之一；若未来上线暗影形态，则暗影版攻击更高、团战更优，可优先用暗影。"},"mewtwo":{"cn":"超梦","en":"Mewtwo","dex":150,"types":["Psychic"],"evo":[{"dexNumber":150,"cnName":"超梦","enName":"Mewtwo"}],"moveset":"快攻 Psycho Cut(精神利刃) + 大招 Psystrike(精神击/精神冲击)。这是超梦作为超能系输出手的最强配招(普通形态约 18.4 DPS,暗影形态约 21.8 DPS,S 级)。建议解锁第二大招:对超能/幽灵系 boss 带 Shadow Ball(暗影球);对恶/普通/冰/岩/钢系可带 Focus Blast(真气弹/气合弹)做覆盖。注意 Psystrike 通常是社区日/限定招式,普通快攻可用 Confusion(念力) 但 Psycho Cut 充能更快、PvE 综合更优。","get":"五星传说团战(Legendary Raid)的轮换 boss——超梦会定期回归五星团,击败后有几率捕获。暗影超梦来自火箭队头目 Giovanni(完成 Team GO Rocket 特殊调查、集齐谜之零件后挑战获得)。Mega 形态需先拥有普通超梦,再用 Mega Energy 进行 Mega 进化(Mega Energy 通过参加 Mega 超梦团战获得)。此外历史上的 GO Fest / EX 团战等限时活动也会提供超梦及其招式。","train":"超梦无进化,只能用 超梦糖果 + 星尘 直接强化。传说宝可梦不能在野外/孵化获得糖果,主要靠:团战捕获(每只约 3 颗)、用超梦做\"最佳伙伴\"步行(每 20km 1 颗,可缩短)、以及 Rare Candy / Rare Candy XL 转换。团战取向应优先攻击 IV(尤其攻击项接近满);要打到 L40 需大量糖果与星尘,L40→L50 还需 296 颗 XL 糖果(传说 XL 糖最稀缺,靠团战捕获、远征研究、伙伴步行慢慢攒)。建议:先把一只高攻 IV 的普通超梦冲到 L40 作为通用超能输出,XL 糖优先留给暗影超梦(性价比最高)。","formNote":"团战首选看场景。纯 DPS 天花板:Mega 超梦 Y(Mega Mewtwo Y)——全游戏最强超能系输出,且比 Mega X 更肉,做超能团战首抽就选它;Mega X 则转型为最强 Mega 格斗输出(配格斗招),按需培养。非 Mega 的常驻输出里,暗影超梦(Shadow Mewtwo) 明显优于普通超梦,DPS 高出一截(约 21.8 vs 18.4),仅次于两个 Mega 形态,是日常通用超能/幽灵(带暗影球)团战的最佳选择,代价是更脆、需消耗 Charged TM 解锁招式且无法洗去暗影。结论:有条件就 Mega 超梦 Y 打超能、暗影超梦做常驻主力;普通超梦适合做不想分裂资源时的稳妥通用本。"},"raikou":{"cn":"雷公","en":"Raikou","dex":243,"types":["Electric"],"evo":[{"dexNumber":243,"cnName":"雷公","enName":"Raikou"}],"moveset":"快攻 Thunder Shock（电击）+ 大招 Wild Charge（疯狂伏特）；如需更短充能/对抗特定类型可考虑 Volt Switch（伏特替换）配 Wild Charge。Thunder Shock + Wild Charge 是目前 PvE 输出最高的电系组合。","get":"主要来自传说团战（5星 Raid）轮换上线时捕捉；过往也通过 Raid Day、GO Fest、Raid 时段等活动登场。野外不会自然出现，需关注官方公告的传说团战排期。捕捉后偶尔可遇到异色（Shiny）。暗影 Raikou 则来自击败 Team GO Rocket 的火箭队头目 Giovanni（限定排期）。","train":"Raikou 糖果通过捕捉、传说团战奖励、转圈（用 Pinap/银色 Pinap 莓增产）以及与好友交换获得；XL 糖果在训练师等级 40+ 后通过捕捉、孵蛋、交换和强化掉落获取。团战定位为高攻输出手，建议优先把已有最高 IV（尤其攻击 IV 高）的个体培养满级——免费玩家通常强化到 L40，硬核/团战主力可用 XL 糖果推到 L50 以提升 CP 与输出。学第二招（电击/疯狂伏特双带）以便快速切招应对不同 Boss。","formNote":"Raikou 目前没有超进化（Mega）或 Primal 形态，所以无需考虑这两者。形态选择上：暗影（Shadow）Raikou 明显优于普通形态——暗影增伤约 +20% 输出，是顶级电系攻击手，团战 DPS 排名靠前，推荐优先用暗影 Raikou 作为主力（代价是承受更多伤害、需更多瑞瑞蜜糖去除沮丧技能）。若没有暗影个体，普通满级 Raikou 仍是非常可靠的电系输出。综合推荐：团战首选暗影 Raikou（Thunder Shock + Wild Charge）。"},"xurkitree":{"cn":"电束木","en":"Xurkitree","dex":796,"types":["Electric"],"evo":[{"dexNumber":796,"cnName":"电束木","enName":"Xurkitree"}],"moveset":"快攻 Thunder Shock (电击) + 大招 Discharge (放电) 作为高 DPS 主力；若侧重单次爆发/低能耗循环可用 Thunder Shock + Wild Charge (疯狂伏特)。Discharge 综合输出更高、抗闪避更稳，是当前最佳通用 PvE 配招。","get":"究极异兽(Ultra Beast)，无野外刷新。仅通过限时活动获取：主要在「Pokémon GO Fest」「Ultra Beast / GO Fest 全球或地区」期间作为五星团战(Raid)登场；活动外则需通过 EX/究极团战或活动复刻入团。无法孵蛋、无法野生捕捉、不在常规研究突破中固定出现。捕捉时无法使用木莓辅助稳定球，建议存好金/银百球与圈卡精准球。","train":"究极异兽专用糖果体系：Xurkitree Candy 与 Xurkitree XL Candy，只能靠多次参加其团战获得(战斗奖励糖果 + 用星之碎片走 Trade/无传说交易折扣对它不适用)，并配合 Pinap/银 Pinap 增产、Mega(其它电系如 Mega Manectric)同属性团战加成多拿糖。培养思路：作为玻璃大炮(超高攻、低耐久)，优先把 IV 高攻个体强化；团战定位刷 L40 即可(性价比最高)，追求顶级 DPS 玩家可用 XL 糖推到 L45-50。建议养 2-3 只用于电系团战车轮(打飞行/水系 Boss)，因脆皮容易被秒、需要替补轮换。","formNote":"电束木目前在 Pokémon GO 中没有 Mega 进化(原作也无 Mega)，也没有 Primal 形态，因此团战只能用普通形态。其暗影(Shadow)形态尚未实装；若未来推出暗影形态，凭借暗影 +20% 攻击加成，作为玻璃大炮型电系打手将进一步提升 DPS，是团战(攻坚速刷)更优选择，届时建议优先培养暗影电束木并解锁霸气大招(Frustration→换其它招)。当前阶段：直接用普通形态高攻个体即可，无更优形态可选。"},"manectric":{"cn":"雷电兽","en":"Manectric","dex":310,"types":["Electric"],"evo":[{"dexNumber":309,"cnName":"落雷兽","enName":"Electrike"},{"dexNumber":310,"cnName":"雷电兽","enName":"Manectric"}],"moveset":"快攻：电击牙 (Thunder Fang，电系)；大招：伏特攻击 (Wild Charge，电系)。这是 Manectric / Mega Manectric 输出最高的纯电系组合。备选大招可考虑十万伏特 (Thunderbolt) 用于充能更稳，但 DPS 略低于伏特攻击。","get":"主要途径：野外刷出 Electrike (落雷兽) 后用糖果进化为 Manectric；落雷兽偶尔在野外、田野调查奖励、活动 (如社区日/电系主题活动) 中出现。Manectric 本体也可能直接野生出现或作为蛋孵化产物。Mega 能量通过参与 Mega Manectric 团战 (Mega Raid) 获得，集齐后即可超进化。","train":"团战定位是高攻速攻型电系输出。优先培养个体值偏攻击 (理想 15 攻击) 的个体；普通糖果强化到 L40，有 XL 糖果且作为主力时推至 L50 以提升存活与 TDO。落雷兽进化需 50 颗糖果。日常通过抓落雷兽/雷电兽、Pinap 莓加成、伙伴行走、转换其它电系糖果 (糖果转换) 积累糖果与 XL 糖果。配招用电击牙 + 伏特攻击，TM 解锁第二大招以便兼顾不同对手。","formNote":"团战首选 Mega Manectric（超进化）。它是全游戏 DPS 最高的电系 Mega，电系攻击者中排名约第 4（仅次于暗影雷公、雷电云、电束木偶），但获取与上手性远胜那几只，且超进化期间还给全队电系/同属性队友提供攻击加成，对 盖欧卡/原始盖欧卡、龙卷云、Mega 水箭龟、Mega 大比鸟 等水/飞行系 Boss 极强。暗影 Manectric（Shadow）攻击更高、纯输出 DPS 略胜普通本体，适合无法超进化或想多带几只电系手时使用，但脆皮更明显。综合建议：能超进化就上 Mega Manectric；否则用暗影 Manectric 作为高性价比补位。"},"zekrom":{"cn":"捷克罗姆","en":"Zekrom","dex":644,"types":["Dragon","Electric"],"evo":[{"dexNumber":644,"cnName":"捷克罗姆","enName":"Zekrom"}],"moveset":"快攻：电击 (Charge Beam) — 充能更快、单条曲线整体DPS更高；想吃属性一致加成可用龙之尾 (Dragon Tail)。大招：疯狂伏特 (Wild Charge) 为最佳电系输出大招（高伤、能量需求适中）；若打需要龙系覆盖的目标（如对方龙系）可带交错火焰/Crunch属性以外的龙系大招 Outrage（逆鳞）。综合PvE首推「电击 + 疯狂伏特」做纯电系炮台，「龙之尾 + 逆鳞」做龙系输出。","get":"主要通过五星传说团战（Raid Boss）获得，捕获后获得本体。常在轮换的传说团战日/活动中复刻登场。也可能通过远程团战券参与。捕获时有机会遇到异色（Shiny）。暗影版本则通过击败搭载暗影捷克罗姆的火箭队头目（如Giovanni，限定活动期）获得。","train":"捷克罗姆是高攻型传说龙/电，适合作为电系与龙系双重输出主力。糖果获取：团战捕获、与好友交换（同宝可梦交换得糖）、用「神奇糖果」直接补充、设为伙伴步行获糖（5km/糖）。强化建议：优先把一只刷满到至少L40（满级帐号可推至L50，需大量XL糖果），IV优先攻击拉满以最大化团战DPS。配双套招式（电系一套 + 龙系一套），用二次充能TM锁定疯狂伏特和逆鳞，覆盖更多团战场景。XL糖果主要靠L31+捕获/交换/孵蛋积累，建议集中资源先满一只再练第二只。","formNote":"游戏内捷克罗姆没有Mega/超进化或Primal形态，所以不存在超进化更优的选项。值得考虑的是「暗影捷克罗姆」(Shadow Zekrom)：暗影形态攻击加成约+20%、受到伤害略增，在纯输出团战（短时间内打满伤害）中DPS明显高于普通形态，是目前电系/龙系输出天花板级别的选择。因此团战推荐优先使用暗影捷克罗姆，并尽量解锁/保留Frustration之外的优质大招（活动期可花TM移除Frustration换疯狂伏特/逆鳞）；若没有暗影版本，普通满级捷克罗姆同样是顶级电系攻手。"},"zapdos":{"cn":"闪电鸟","en":"Zapdos","dex":145,"types":["Electric","Flying"],"evo":[{"dexNumber":145,"cnName":"闪电鸟","enName":"Zapdos"}],"moveset":"快攻: 电击 (Thunder Shock) / 大招: 充电光束 (Charge Beam) 不推荐——最佳输出大招用「十万伏特 (Thunderbolt)」配「电击 (Thunder Shock)」做纯电系输出;若要打飞行系大招则「钻头啄 (Drill Peck)」配「电击」。综合通用 PvE 最佳: 电击 (Thunder Shock) + 十万伏特 (Thunderbolt)。","get":"主要通过「五星传说团战 (Legendary Raid)」获取——闪电鸟会在轮换中作为团战头目出现,击败后可挑战捕捉。其他途径: 田野调查突破奖励 (Research Breakthrough) 在闪电鸟轮换期可遇到;以及部分限时活动 (如 GO Fest、周年庆) 的特殊团战。捕捉后可用稀有糖果或闪电鸟糖果强化。野外无法遇到,无法孵蛋。","train":"闪电鸟糖果靠团战捕捉、用奇异糖果(Rare Candy)转换、或设为伙伴步行(每5km一颗)积累。强化到 L40 需大量星之沙与糖果,到 L50 额外需要闪电鸟 XL 糖果(仅 Lv31+ 玩家从团战/步行获得)。团战定位为输出位,优先点满,IV 看重攻击;15攻的高攻个体优先培养。建议练 1-3 只满级用于电系/飞行系团战。先升到 L40 应对绝大多数内容,有余力再推 L50。","formNote":"暗影闪电鸟 (Shadow Zapdos) 团战输出明显更优——暗影形态攻击 ×1.2,作为纯输出怪是首选,只要能用炭/紫莓抗住即可,推荐优先培养暗影版本(暗影闪电鸟需从火箭队 Boss 处获取)。闪电鸟没有 Mega/超级进化也没有 Primal 形态,所以不存在 Mega 选项。综合: 团战用「暗影闪电鸟」最强,普通闪电鸟为退而求其次的稳定选择。"},"electivire":{"cn":"电击魔兽","en":"Electivire","dex":466,"types":["Electric"],"evo":[{"dexNumber":239,"cnName":"电击怪","enName":"Elekid"},{"dexNumber":125,"cnName":"电击兽","enName":"Electabuzz"},{"dexNumber":466,"cnName":"电击魔兽","enName":"Electivire"}],"moveset":"快攻 Thunder Shock(电击)+ 大招 Wild Charge(疯狂伏特)。这是当前公认的最佳纯输出配招;大招备选 Thunder(打雷)用于单刷/承伤少的场景,但 Wild Charge 的能量效率和 DPS 更高。Thunder Punch(雷电拳)与 Thunder 在 PvE 中均严格劣于 Wild Charge。","get":"1) 进化获取:捕捉 Electabuzz(电击兽)或孵化/捕捉 Elekid(电击怪)进化;Electabuzz → Electivire 需要 100 颗糖果 + 道具「电击子(Sinnoh Stone / 神奥之石)」。2) 野外/团战:Electivire 本体偶尔作为三星团战 Boss 出现,可直接捕捉。3) Elekid 常见于 7 公里蛋/活动蛋孵化。4) 暗影形态:由火箭队头目(如 Cliff 等)在特定阵容期掉落 Shadow Electabuzz 进化而来,或活动期间获得。","train":"团战定位是高攻脆皮电系核心,优先堆攻击,IV 看重 Attack(防御/HP 可放宽)。糖果来源:进化线共享糖,捕捉 Elekid/Electabuzz/Electivire、用 Pinap 树果加倍、与好友设为 Buddy 散步(每 5 km 一颗)、Rare Candy(神奇糖果)直接补。强化到 L40 即可胜任绝大多数团战;若要拉满输出上限,用 XL 糖果推到 L50(XL 糖果主要靠 L40+ 捕捉/孵化/交换、神奇糖果XL 转换获取)。建议优先把暗影版练到 L40+ 再考虑普通版冲 L50,性价比更高。","formNote":"Electivire 没有 Mega/超进化,也没有 Primal 形态,所以这两者不在考虑范围。团战明确推荐【暗影形态 Shadow Electivire】:它是 S 级电系输出,凭借暗影 20% 攻击加成 + 极高基础攻击 + Thunder Shock/Wild Charge 配招,稳居顶级电系 raid attacker(约电系第 6 名水平),DPS 显著高于普通版。代价是更脆、承伤更高,建议配合躲招(dodge)并多带几只组队。若没有暗影版,普通 Electivire 仍是优秀的高攻电系替代;有暗影就优先暗影。"},"magnezone":{"cn":"自爆磁怪","en":"Magnezone","dex":462,"types":["Electric","Steel"],"evo":[{"dexNumber":81,"cnName":"小磁怪","enName":"Magnemite"},{"dexNumber":82,"cnName":"三合一磁怪","enName":"Magneton"},{"dexNumber":462,"cnName":"自爆磁怪","enName":"Magnezone"}],"moveset":"最佳通用 PvE 电系配招: 快攻 Spark(火花) + 大招 Wild Charge(疯狂伏特)。这套伤害输出(DPS)最高，是团战首选。备选 Volt Switch(伏特替换) + Wild Charge，总伤害(TDO)略高、能量回充更平滑，适合多血量长时间输出。注意 Magnezone 同时是电/钢系，可作为电系输出主力。","get":"进化获取为主: 先抓 Magnemite(小磁怪，常见，野外/巢穴/天气加成下刷新)，用 25 糖果进化为 Magneton(三合一磁怪)，再在 Magnetic Lure Module(磁力诱饵模组)附近用 100 糖果进化为 Magnezone。也可直接遇到野生 Magneton。暗影形态(Shadow)需击败火箭队头目/手下后获得暗影 Magnemite/Magneton 再进化。可遇闪光(Shiny)。","train":"团战要堆攻击，建议挑 IV 攻击项高(理想 15 攻)的个体来强化。进化总需 25(→Magneton) + 100(→Magnezone) = 125 普通糖果。强化到 L40 需大量星尘+糖果，冲 L50 还要 296 颗 XL 糖果。糖果/XL 糖果可通过捕捉 Magnemite 线、用糖果伙伴(Buddy)散步、转移多余个体、Pinap/银 Pinap 浆果加倍，以及暗影版用 Rare Candy/XL 补足。优先把星尘和 XL 糖果投在你打算长期当电系主力的那一只(暗影优先，见 formNote)，没必要每只都满级。","formNote":"团战推荐暗影形态(Shadow Magnezone)。暗影版攻击加成约 +20%，DPS 显著更高，是顶级电系团战输出(S 级/S+ 级电系攻击手)，远胜普通形态(A 级)。代价是承伤更高、更脆，但团战以打输出为主，暗影更优。Magnezone 没有 Mega/超进化也没有 Primal 原始回归形态，因此团战首选就是暗影 Spark + Wild Charge；若手上没有暗影版，普通版同配招仍是可用的电系输出。"},"sceptile":{"cn":"蜥蜴王","en":"Sceptile","dex":254,"types":["Grass"],"evo":[{"dexNumber":252,"cnName":"木守宫","enName":"Treecko"},{"dexNumber":253,"cnName":"森林蜥蜴","enName":"Grovyle"},{"dexNumber":254,"cnName":"蜥蜴王","enName":"Sceptile"}],"moveset":"快攻 Bullet Seed（种子机关枪，草系）+ 大招 Frenzy Plant（疯狂植物，草系，需社区日/精英解锁技能机解锁）。Bullet Seed + Frenzy Plant 是 Sceptile 作为草系输出手的最佳通用 PvE 配招；备选大招 Leaf Blade（叶刃）能量需求低但 DPS 不如疯狂植物。Mega Sceptile 同样使用此配招。","get":"主要通过捕捉/孵化 Treecko（木守宫）后逐级进化（12 糖进 Grovyle，100 糖进 Sceptile）获得。木守宫为三丰地区初学者宝可梦，平时野外较稀有，主要来源：木守宫社区日活动（大量刷新且可解锁疯狂植物）、5km 蛋孵化、活动期间野外/团战/调查任务奖励。Mega Sceptile 通过 Mega 团本（Mega Raid）击败后获取超级能量（Mega Energy）来超进化。Shadow（暗影）Sceptile 谱系来自火箭队头目/手下战斗（视活动轮换）。","train":"草系顶级输出手，培养目标是高攻击、高 CP。糖果：进化共需约 112 糖（12+100），强化到高等级还需大量普通糖与 XL 糖。建议优先培养攻击 IV 高（理想 15 攻）个体；团战(Raid)用满级路线为 L40 起步、有充足 XL 糖时推进到 L50 以最大化 DPS/TDO。务必用精英技能机或社区日期间解锁 Frenzy Plant（疯狂植物）这一专属大招——这是它价值的核心，没有疯狂植物输出大幅缩水。建议至少养 1-2 只满疯狂植物个体用于团战和道馆进攻。","formNote":"团战(Raid)优先用 Mega Sceptile（超级蜥蜴王）：它是游戏内最强的草系超进化之一，攻击力极高，且会为同场全队的草系攻击提供伤害加成，性价比最高，推荐作为首选。其次是 Shadow Sceptile（暗影蜥蜴王）：暗影形态有约 20% 攻击加成，纯输出 DPS 高于普通形态（但更脆、需消耗护盾道具且更耗资源），适合追求极限草系输出时使用。综合推荐：有 Mega 能量时优先 Mega Sceptile；做长期草系输出主力则养一只带疯狂植物的 Shadow Sceptile。普通（非暗影/非 Mega）形态作为基础备选。注意 Sceptile 没有 Primal 形态。"},"kartana":{"cn":"纸御剑","en":"Kartana","dex":798,"types":["Grass","Steel"],"evo":[{"dexNumber":798,"cnName":"纸御剑","enName":"Kartana"}],"moveset":"快攻 Razor Leaf(飞叶快刀) + 大招 Leaf Blade(叶刃)。这是纸御剑作为草系输出的最佳 PvE 配招:快攻能量回充快、STAB 加成,叶刃 DPE 高,综合 DPS 顶级。备选 Fury Cutter(连斩) + Sacred Sword(圣剑)可作为钢系输出,但草系 Razor Leaf + Leaf Blade 是通用首选。","get":"通过五星团战(5-star Raid)击败后捕获,这是当前唯一获取途径。纸御剑是究极异兽(Ultra Beast),且为地区限定:只在北半球地区的团战中出现(对应的 Celesteela/Stakataka 等在南半球)。属于轮换型团战 Boss,需关注活动公告。可闪光(Shiny 已实装)。","train":"纸御剑攻击种族值极高(323),属典型「玻璃大炮」,适合堆攻击打团。培养建议:优先升到 L40(团战足够),有 XL 糖足够再冲 L45-50 拉满血量提升续航。糖果获取:团战捕获掉落 Kartana Candy、与好友交换、走路伙伴、以及用 Rare Candy/稀有糖果补足。XL 糖果(Candy XL)主要靠 L40+ 训练师捕获掉落、团战奖励和 Rare Candy XL 转换;由于地区限定,刷量困难,建议每次出现尽量多打多捕。IV 优先攻击拉满,打团 DPS 收益最大。","formNote":"纸御剑在 Pokemon GO 中目前没有 Mega/超进化形态,也没有 Primal 形态。暗影形态(Shadow)目前未实装(只能通过团战获得,非火箭队来源)。因此团战只能使用普通形态 Razor Leaf + Leaf Blade。理论上若未来出暗影形态,凭其超高攻击,Shadow Kartana 会成为顶级草系输出、显著优于普通形态;但截至现在以普通形态为准。"},"chesnaught":{"cn":"布里卡隆","en":"Chesnaught","dex":652,"types":["Grass","Fighting"],"evo":[{"dexNumber":650,"cnName":"哈力栗","enName":"Chespin"},{"dexNumber":651,"cnName":"胖胖哈力","enName":"Quilladin"},{"dexNumber":652,"cnName":"布里卡隆","enName":"Chesnaught"}],"moveset":"快攻：藤鞭 (Vine Whip) —— 草系 STAB、充能快；大招：终极冲击/原始之力？不，最佳为「真气弹」走双属性还是「青草搅拌器」？PvE 草系输出首选大招为 Frenzy Plant 终极攻击/「青草搅拌器」(Frenzy Plant，社区日专属/精英TM)。综合最佳 PvE 配招 = 藤鞭 + Frenzy Plant(青草搅拌器/终极攻击)，草系输出约 13.44 DPS / 300.5 TDO，草系攻击手 A+ 级。注：Frenzy Plant 是精英TM专属招式，普通TM刷不出。","get":"本体获取：1) 抓哈力栗(Chespin) 然后用糖果进化 哈力栗→胖胖哈力(25糖)→布里卡隆(100糖)；哈力栗多来自野外刷新、卡洛斯地区主题活动、5km 蛋、Spotlight Hour 等。2) 暗影布里卡隆：击败火箭队头目/Giovanni 或暗影团战(Shadow Raid)后捕捉，初始带「挫志(Frustration)」需用招式学习器替换。3) Mega 布里卡隆：通过 Mega 团战遇到(常规 2248-2339 CP、天气加成 2810-2924 CP；调查任务 1686-1754 CP)，需集齐 Mega 能量后超进化。","train":"团战要高攻：优先 IV 攻击高(理想 15攻)；非头目暗影版本因攻击 x1.2，纯输出 DPS 优于普通版，值得养。糖果需求：进化共需 125 糖(25+100)，强化到 L40 约 250+ 糖，L40→L50 需要约 296 XL 糖(布里卡隆 XL 糖主要靠走路赚糖、L31+ 捕捉、孵化/团战获得)。建议：先把一只高攻个体喂到 L40 用于日常草系团战；若要顶级输出/L50 满级，再投入 XL 糖。社区日(若有/曾有 哈力栗社区日)用进化窗口拿到专属大招 Frenzy Plant，否则需用精英招式学习器。","formNote":"团战输出强烈推荐用「暗影布里卡隆 (Shadow Chesnaught)」：攻击 x1.2 带来约 +20% 的草系 DPS，是性价比最高的草系攻击手之一，缺点是防御 x0.833、需精英TM去挫志并上 Frenzy Plant。Mega 布里卡隆草/格斗双属性、Mega 期间能给同属性队友提供攻击加成且自身面板更高，适合作为「队长」带队打草系/格斗系适用的团战；但 Mega 受能量与时长限制，单纯堆草系输出量长期仍以暗影本体更划算。结论：日常刷草系团战优先暗影版(高攻满级)；若你有 Mega 能量、想要短时爆发+全队增益，则上 Mega。普通(非暗影/非Mega)本体作为入门或缺货时的过渡即可。"},"venusaur":{"cn":"妙蛙花","en":"Venusaur","dex":3,"types":["Grass","Poison"],"evo":[{"dexNumber":1,"cnName":"妙蛙种子","enName":"Bulbasaur"},{"dexNumber":2,"cnName":"妙蛙草","enName":"Ivysaur"},{"dexNumber":3,"cnName":"妙蛙花","enName":"Venusaur"}],"moveset":"快攻: 藤鞭 (Vine Whip, 草系) — 能量积累快; 大招: 日光束 (Solar Beam, 草系) 为最高单次伤害的草系主输出。PvE 综合配招推荐「藤鞭 + 日光束」做纯草系输出 (其中超进化 Mega Venusaur 可解锁 Frenzy Plant/大地之力。原始本体没有 Frenzy Plant 时,藤鞭+日光束即最佳)。对水/地/岩/水系 Raid Boss 输出效率最高。","get":"1) 野外捕捉妙蛙种子 (Bulbasaur) 后用糖果进化两次得到妙蛙花; 2) 社区日 (Community Day) 期间妙蛙种子大量刷新, 进化可解锁专属招式 Frenzy Plant (疯狂植物) — 这是妙蛙花最佳草系大招的获取途径; 3) 孵蛋 (2km 蛋) 可孵出妙蛙种子; 4) 偶尔作为 Raid/Research/活动奖励出现; 暗影形态 (Shadow) 由火箭队头目 Giovanni 战斗后捕获暗影妙蛙种子获得。","train":"进化路径需糖果: 妙蛙种子→妙蛙草 25 颗糖, 妙蛙草→妙蛙花 100 颗糖, 共 125 颗。团战定位为草系输出, 培养思路重攻击: 优先挑选高攻 IV (尤其攻击 15) 的个体, 强化到 Lv40 (满级需要约 270 普通糖 + 296k 星尘)。若追求顶级 Raid 输出可继续用 XL 糖果强化到 Lv50 (需大量 XL 糖, 社区日刷怪期间集中积累)。社区日进化务必在活动时段或活动后限定窗口内完成, 以解锁 Frenzy Plant 专属招式 (用充值招式 TM 难以再获得)。野生/孵蛋来源多, 糖果靠捕捉、传送好友、伙伴行走与 Pinap 莓子加倍获取。","formNote":"超进化 (Mega Venusaur) 对团战明显更优, 推荐优先使用。Mega 形态大幅提升攻击与耐久, 出场时还为全队同属性 (草/毒) 攻击者提供伤害加成, 是团本中顶级的草系 Mega 助攻坦克。日常输出可用普通妙蛙花 (藤鞭 + 疯狂植物); 当你需要打水/地/岩系 Raid 且拥有 Mega 能量时, 上 Mega Venusaur 最强。暗影妙蛙花 (Shadow) 攻击更高、伤害比普通高约 20%, 但更脆且需消耗 TM 去掉拍憎 (Frustration) — 在不开 Mega 时, 暗影本体是单体最高 DPS 的草系选择。综合: 团队增益选 Mega, 极限个人输出选 Shadow, 普通本体作为经济实用的过渡。"},"tangrowth":{"cn":"巨蔓藤","en":"Tangrowth","dex":465,"types":["Grass"],"evo":[{"dexNumber":114,"cnName":"蔓藤怪","enName":"Tangela"},{"dexNumber":465,"cnName":"巨蔓藤","enName":"Tangrowth"}],"moveset":"快攻: Vine Whip(藤鞭) / 大招: Power Whip(强力鞭打)。这是当前PvE团战输出最高的草系配招（Power Whip 是草系最高能量效率与高伤大招）。备选大招 Solar Beam(日光束) 单发伤害更高但充能慢、易被打断，团战推荐 Power Whip。","get":"获取方式: 1) 由蔓藤怪(Tangela)进化而来——需 100 个蔓藤怪糖果 + 1 颗 Sinnoh Stone(神奥之石)；2) 蔓藤怪可在野外刷新、孵蛋(5km)、田野调查奖励及活动中获得；3) 部分活动/团战可能直接出现巨蔓藤。Sinnoh Stone 来源: 完成 7 天连续田野调查里程碑奖励、GO Battle League 对战奖励、训练家对战(队长/好友)等。","train":"糖果/培养建议: 进化需 100 糖果 + Sinnoh Stone。强化到 L40 约需大量普通糖果+星尘；冲到 L50(满级)需额外 296 个 XL 糖果。团战定位为纯输出，IV 优先“高攻击”(攻击 IV 接近 15)，防御/HP 次要；建议养一只攻击型用于打雷电系/水系/地面系/岩石系团战。XL 糖果来源: 喂食巨蔓藤/蔓藤怪当伙伴行走、捕捉高等级个体、转移、孵蛋等。预算有限时优先把它强化到能凑团战伤害门槛(约 L35-40)，再视需要补 XL 糖果冲 L50。","formNote":"暗影形态(Shadow Tangrowth)对团战更优——Shadow 提供约 +20% 攻击加成，配 Vine Whip + Power Whip 时 DPS 与 TDO 显著高于普通形态，是 S 级草系输出之一，团战首选。巨蔓藤没有 Mega 进化也没有 Primal 形态，因此推荐用“暗影巨蔓藤”作为团战主力；若无暗影个体，普通巨蔓藤仍是一只不错的草系攻手。暗影的缺点是更脆(受到伤害也增加)，需注意躲招与回血。"},"shaymin":{"cn":"谢米","en":"Shaymin","dex":492,"types
