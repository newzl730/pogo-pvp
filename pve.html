<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pokémon GO 团战(PvE)输出排名 · 实时计算</title><style>
:root{--bg:#0e1016;--panel:#171a23;--panel2:#1f2330;--line:#2c3142;--txt:#e9ebf2;--dim:#9aa1b4;--accent:#3b6cff;--gold:#ffcb05}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(1100px 600px at 70% -12%,#16203a,#0e1016);color:var(--txt);font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
.top{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;background:rgba(14,16,22,.94);backdrop-filter:blur(8px);z-index:20}
.top h1{margin:0;font-size:16px}.top h1 b{color:#ff7a45}
.top nav{display:flex;gap:10px;font-size:12px;flex-wrap:wrap}.top nav a{color:var(--accent);text-decoration:none;white-space:nowrap}
.main{max-width:880px;margin:0 auto;padding:12px 12px 80px}
.types{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.tb{font-size:12.5px;font-weight:700;color:#0e1016;border-radius:9px;padding:5px 11px;cursor:pointer;opacity:.55;border:2px solid transparent}
.tb.on{opacity:1;border-color:#fff}
.opt{font-size:12px;color:var(--dim);margin:4px 0 10px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.opt label{cursor:pointer}
.hd{font-size:13px;color:var(--dim);margin:14px 2px 8px;border-bottom:1px solid var(--line);padding-bottom:5px}
.r{display:flex;gap:11px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:9px 12px;margin-bottom:8px;cursor:pointer;transition:.12s}
.r:hover{border-color:#ff7a45}
.rk{font-weight:800;font-size:14px;color:var(--dim);width:26px;text-align:center;flex:none}
.r img{width:50px;height:50px;object-fit:contain;flex:none}
.rb{flex:1;min-width:0}.rn{font-weight:700;font-size:14.5px}.rn .tier{font-size:10px;font-weight:800;border-radius:6px;padding:1px 6px;margin-left:6px;color:#0e1016}
.mv{font-size:11.5px;color:var(--dim);margin-top:2px}.mv .el{color:var(--gold)}
.dps{text-align:right;flex:none}.dps .v{font-weight:800;font-size:16px;color:#ff9f6b}.dps .l{font-size:9.5px;color:var(--dim)}.dps .t{font-size:10px;color:var(--dim)}
.note{font-size:11px;color:var(--dim);text-align:center;margin-top:22px;line-height:1.7}
</style></head><body>
<div class="top"><h1>Pokémon GO <b>团战输出排名</b> · 实时计算</h1>
<nav><a href="index.html">⚔️ PvP</a><a href="dmax.html">💥 极巨</a><a href="cal.html">📅 日历</a><a href="rocket.html">🚀 火箭队</a><a href="shiny.html">✨ 异色</a><a href="search.html">🔍 搜索</a><a href="db.html">🗄️ 数据库</a></nav></div>
<div class="main">
<div class="types" id="types"></div>
<div class="opt">
  <label><input type="checkbox" id="shadow" checked onchange="render()"> 含暗影</label>
  <label><input type="checkbox" id="mega" checked onchange="render()"> 含超级进化</label>
  <span>等级 <select id="lvl" onchange="render()"><option value="40">L40</option><option value="50">L50(XL)</option></select></span>
  <span id="meta" style="margin-left:auto">加载中…</span>
</div>
<div id="out"></div>
<div class="note">DPS / TDO <b>实时由 pokemon.db 计算</b>（种族值×CPM + 招式PvE威力/能量/时长 + 本系加成；暗影×1.2攻）· 综合评分=DPS×TDO^0.5 · 点击查看完整资料<br>每个属性列出能打出该属性输出的最强打手</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script>
var DB,POK=[],MOVE={},PM={},CPM={},curType="fire";
var TYPES=[["fire","火","#ff6b3d"],["water","水","#4f9fff"],["grass","草","#5fbf52"],["electric","电","#ffd23d"],["ice","冰","#7fd6d6"],["fighting","格斗","#d3425f"],["poison","毒","#a95fc9"],["ground","地面","#d9ab55"],["flying","飞行","#92a8ff"],["psychic","超能力","#ff5f8f"],["bug","虫","#9fb336"],["rock","岩石","#c8b681"],["ghost","幽灵","#6f5b9e"],["dragon","龙","#5a78e0"],["dark","恶","#5a5468"],["steel","钢","#5a8fa0"],["fairy","妖精","#f08fc7"],["normal","一般","#9099a1"]];
var TN={};TYPES.forEach(function(t){TN[t[0]]=t[1];});
function esc(s){return (""+(s==null?"":s)).replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function rows(sql){var st=DB.prepare(sql),o=[];while(st.step())o.push(st.getAsObject());st.free();return o;}
function calc(p,T,cpm,sh){
  var types=[p.type1,p.type2].filter(Boolean);
  var eAtk=(p.atk+15)*cpm*(sh?1.2:1), eDef=(p.def+15)*cpm*(sh?0.8333:1), eHP=Math.floor((p.hp+15)*cpm);
  var Dd=180;
  function dmg(pw,mt){return 0.5*pw*(eAtk/Dd)*(types.indexOf(mt)>=0?1.2:1)+1;}
  var mv=PM[p.species_id]; if(!mv) return null;
  var fasts=mv.filter(function(m){return m.slot==="fast";}).map(function(m){return MOVE[m.move_id];}).filter(Boolean);
  var chs=mv.filter(function(m){return m.slot==="charged";}).map(function(m){return MOVE[m.move_id];}).filter(function(m){return m&&m.type===T;});
  if(!fasts.length||!chs.length) return null;
  var best=null;
  fasts.forEach(function(f){
    var Tf=(f.pve_duration_ms||500)/1000, fDPS=dmg(f.pve_power,f.type)/Tf, fEPS=(f.pve_energy||0)/Tf;
    chs.forEach(function(ch){
      var Tc=(ch.pve_duration_ms||500)/1000, cDPS=dmg(ch.pve_power,ch.type)/Tc, cEPS=Math.abs(ch.pve_energy||1)/Tc;
      var DPS=(cEPS+fEPS)?(fDPS*cEPS+cDPS*fEPS)/(cEPS+fEPS):0;
      var TDO=DPS*eHP*(eDef/Dd)/100;
      var score=DPS*Math.sqrt(TDO);
      if(!best||score>best.score) best={DPS:DPS,TDO:TDO,score:score,f:f,ch:ch};
    });
  });
  return best;
}
function render(){
  if(!DB)return;
  var T=curType, cpm=CPM[document.getElementById("lvl").value], sh=document.getElementById("shadow").checked, mega=document.getElementById("mega").checked;
  var res=[];
  POK.forEach(function(p){
    if(p.is_shadow&&!sh)return; if(p.is_mega&&!mega)return; if(!p.released&&!p.is_mega)return;
    var b=calc(p,T,cpm,sh&&p.is_shadow?true:p.is_shadow); if(b) res.push({p:p,b:b});
  });
  res.sort(function(a,b){return b.b.DPS-a.b.DPS;});
  res=res.slice(0,40);
  var top=res.length?res[0].b.DPS:1;
  function tier(s){var r=s/top;return r>=.97?["S+","#ff5b6e"]:r>=.9?["S","#ff9f43"]:r>=.82?["A","#ffd23d"]:r>=.72?["B","#46d39a"]:["C","#9099a1"];}
  document.getElementById("out").innerHTML='<div class="hd">'+TN[T]+'系 团战输出排名 · 共 '+res.length+' 只（L'+document.getElementById("lvl").value+'）</div>'+res.map(function(x,i){
    var tg=tier(x.b.DPS),f=x.b.f,ch=x.b.ch;
    return '<div class="r" onclick="location.href=\'db.html#m'+x.p.dex+'\'"><div class="rk">#'+(i+1)+'</div><img loading="lazy" src="'+esc(x.p.sprite)+'" onerror="this.style.opacity=.2"><div class="rb"><div class="rn">'+esc(x.p.name_cn)+'<span class="tier" style="background:'+tg[1]+'">'+tg[0]+'</span></div><div class="mv">⚡'+esc(f.name_cn)+' + 💥'+esc(ch.name_cn)+'</div></div><div class="dps"><div class="v">'+x.b.DPS.toFixed(1)+'</div><div class="l">DPS</div><div class="t">TDO '+Math.round(x.b.TDO)+'</div></div></div>';
  }).join("");
}
function selType(t){curType=t;document.querySelectorAll(".tb").forEach(function(b){b.classList.toggle("on",b.dataset.t===t);});render();}
window.selType=selType;window.render=render;
document.getElementById("types").innerHTML=TYPES.map(function(t){return '<span class="tb'+(t[0]==="fire"?" on":"")+'" data-t="'+t[0]+'" style="background:'+t[2]+'" onclick="selType(\''+t[0]+'\')">'+t[1]+'</span>';}).join("");
initSqlJs({locateFile:function(f){return "https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/"+f;}}).then(function(SQL){
  return fetch("pokemon.db?v=pve1").then(function(r){return r.arrayBuffer();}).then(function(buf){
    DB=new SQL.Database(new Uint8Array(buf));
    rows("SELECT level,cpm FROM cpm").forEach(function(r){CPM[r.level]=r.cpm;});
    POK=rows("SELECT species_id,dex,name_cn,type1,type2,atk,def,hp,is_shadow,is_mega,released,sprite FROM pokemon");
    rows("SELECT move_id,name_cn,type,slot,pve_power,pve_energy,pve_duration_ms FROM moves").forEach(function(m){MOVE[m.move_id]=m;});
    rows("SELECT species_id,move_id,slot,is_elite FROM pokemon_moves").forEach(function(r){(PM[r.species_id]=PM[r.species_id]||[]).push(r);});
    document.getElementById("meta").innerHTML="✅ "+POK.length+" 宝可梦 · 实时计算";
    render();
  });
}).catch(function(e){document.getElementById("meta").innerHTML='<span style="color:#ff7a8f">加载失败：'+esc(e.message)+'</span>';});
</script></body></html>
