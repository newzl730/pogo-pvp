</style></head><body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script>
var DB,MOVEID,META,curFilter=null,ALL=[],sortKey='dex',sortDir=1;
var TYPES=["normal","fire","water","electric","grass","ice","fighting","poison","ground","flying","psychic","bug","rock","ghost","dragon","dark","steel","fairy"];
var BASE={},NAME={},EN={},FLAG={},CPM={},LEVELS=[],MEGADEX={},EDGES={},SP={},PM={},MOVE={},SIDOF={};
function $(i){return document.getElementById(i);}
function rows(sql){var st=DB.prepare(sql),o=[];while(st.step())o.push(st.getAsObject());st.free();return o;}
function setStatus(t){$("status").innerHTML=t;}
// ---- load engine data ----
Promise.all([
  initSqlJs({locateFile:function(f){return "https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/"+f;}}).then(function(SQL){return fetch("pokemon.db?v=box1").then(function(r){return r.arrayBuffer();}).then(function(b){DB=new SQL.Database(new Uint8Array(b));});}),
  fetch("moveid.json").then(function(r){return r.json();}).then(function(j){MOVEID=j;}),
  fetch("metascore.json").then(function(r){return r.json();}).then(function(j){META=j;})
]).then(function(){
  rows("SELECT level,cpm FROM cpm").forEach(function(r){CPM[r.level]=r.cpm;});
  LEVELS=Object.keys(CPM).map(Number).sort(function(a,b){return a-b;});
  rows("SELECT species_id,dex,name_cn,name_en,type1,type2,atk,def,hp,is_shadow,is_mega,is_legendary,is_mythical,is_ultrabeast,is_regional,released FROM pokemon ORDER BY length(species_id)").forEach(function(p){
    SP[p.species_id]=p;
    if(!p.is_mega) if(!SIDOF[p.dex+"_"+p.is_shadow]) SIDOF[p.dex+"_"+p.is_shadow]=p.species_id;
    if(p.is_mega){MEGADEX[p.dex]=1;return;}
    if(BASE[p.dex]===undefined){BASE[p.dex]=[p.atk,p.def,p.hp];NAME[p.dex]=p.name_cn;EN[p.dex]=(p.name_en||"").toLowerCase();FLAG[p.dex]={leg:p.is_legendary,my:p.is_mythical,ub:p.is_ultrabeast,reg:p.is_regional};}
  });
  rows("SELECT move_id,type,slot,pve_power,pve_energy,pve_duration_ms FROM moves").forEach(function(m){MOVE[m.move_id]=m;});
  rows("SELECT species_id,move_id,slot FROM pokemon_moves").forEach(function(r){(PM[r.species_id]=PM[r.species_id]||[]).push(r);});
  rows("SELECT species_id,evolves_to FROM evolution").forEach(function(r){var a=SP[r.species_id],b=SP[r.evolves_to];if(a&&b){(EDGES[a.dex]=EDGES[a.dex]||[]).push(b.dex);}});
  setStatus("✅ 引擎就绪。拖入 PGStats.json 开始分析（本地处理，不上传）。");
  $("drop").style.borderColor="var(--good)";
}).catch(function(e){setStatus('<span style="color:var(--bad)">引擎加载失败：'+e.message+'</span>');});

// ---- engine ----
function cpAt(a,d,s,m){return Math.max(10,Math.floor(a*Math.sqrt(d)*Math.sqrt(s)*m*m/10));}
function spOf(base,iv,cap){var a=base[0]+iv[0],d=base[1]+iv[1],s=base[2]+iv[2],bL=0;for(var i=LEVELS.length-1;i>=0;i--){var L=LEVELS[i];if(cpAt(a,d,s,CPM[L])<=cap){bL=L;break;}}if(!bL)return 0;var m=CPM[bL];return a*m*(d*m)*Math.floor(s*m);}
var _rk={};
function rankOf(dex,iv,cap){var base=BASE[dex];if(!base)return null;var k=dex+"_"+cap;if(!_rk[k]){var v=[];for(var a=0;a<16;a++)for(var d=0;d<16;d++)for(var s=0;s<16;s++)v.push(spOf(base,[a,d,s],cap));v.sort(function(x,y){return x-y;});_rk[k]=v;}var asc=_rk[k],mine=spOf(base,iv,cap);var lo=0,hi=asc.length;while(lo<hi){var mid=(lo+hi)>>1;if(asc[mid]<=mine)lo=mid+1;else hi=mid;}return asc.length-lo+1;}
function descendants(dex){var seen={},st=[dex];while(st.length){var c=st.pop();(EDGES[c]||[]).forEach(function(n){if(!seen[n]){seen[n]=1;st.push(n);}});}return seen;}
function bestMoveset(sid,T){var fa=[],ch=[];(PM[sid]||[]).forEach(function(r){var mv=MOVE[r.move_id];if(!mv||mv.type!==T||!mv.pve_duration_ms||mv.pve_duration_ms<=0)return;if(r.slot==="fast"&&mv.pve_energy>0)fa.push(mv);else if(r.slot==="charged"&&mv.pve_energy<0)ch.push(mv);});return [fa,ch];}
function pveScore(eA,eD,eH,types,fa,ch,T){function dm(pw,mt){return 0.5*pw*(eA/180)*(types.indexOf(mt)>=0?1.2:1)+1;}var best=0;for(var i=0;i<fa.length;i++){var f=fa[i],Tf=f.pve_duration_ms/1000,fd=dm(f.pve_power,f.type)/Tf,fe=f.pve_energy/Tf;for(var j=0;j<ch.length;j++){var cc=ch[j],Tc=cc.pve_duration_ms/1000,cd=dm(cc.pve_power,cc.type)/Tc,ce=Math.abs(cc.pve_energy)/Tc;var DPS=(fd*ce+cd*fe)/(ce+fe),TDO=DPS*eH*(eD/180)/100,sc=DPS*Math.sqrt(TDO);if(sc>best)best=sc;}}return best;}
function pveRelevant(dex,PVEset){if(PVEset[dex])return 'final';var f=FLAG[dex]||{};if(f.leg||f.my||f.ub)return 'final';var desc=descendants(dex);for(var dd in desc){if(PVEset[dd])return 'fodder';var f2=FLAG[dd]||{};if(f2.leg||f2.my||f2.ub)return 'fodder';}return null;}
// best raw PvE DPS over the mon's STAB types at a given cpm
function pveBest(sp,iv,cpm,sh){
  var types=[sp.type1,sp.type2].filter(Boolean);
  var eA=(sp.atk+iv[0])*cpm*(sh?1.2:1),eD=(sp.def+iv[1])*cpm*(sh?0.8333:1),eH=Math.floor((sp.hp+iv[2])*cpm);
  var bd=0,bt=null,btdo=0,bf=null,bc=null;
  types.forEach(function(T){
    var ms=bestMoveset(sp.species_id,T);if(!ms[0].length||!ms[1].length)return;
    function dm(pw,mt){return 0.5*pw*(eA/180)*(types.indexOf(mt)>=0?1.2:1)+1;}
    ms[0].forEach(function(f){var Tf=f.pve_duration_ms/1000,fd=dm(f.pve_power,f.type)/Tf,fe=f.pve_energy/Tf;
      ms[1].forEach(function(cc){var Tc=cc.pve_duration_ms/1000,cd=dm(cc.pve_power,cc.type)/Tc,ce=Math.abs(cc.pve_energy)/Tc;
        var DPS=(fd*ce+cd*fe)/(ce+fe);if(DPS>bd){bd=DPS;bt=T;btdo=DPS*eH*(eD/180)/100;bf=f;bc=cc;}});});
  });
  return {dps:bd,type:bt,tdo:btdo,f:bf,c:bc};
}

function analyze(mons){
  // annotate
  mons.forEach(function(x,_i){
    x._i=_i;
    var pd=x.pokemonDisplay||{};
    x._dex=x.pokemonId;x._sh=pd.alignment===1?1:0;
    x._iv=[x.individualAttack||0,x.individualDefense||0,x.individualStamina||0];x._ivs=x._iv[0]+x._iv[1]+x._iv[2];
    x._cp=x.cp||0;x._ecpm=(x.cpMultiplier||0)+(x.additionalCpMultiplier||0);
    x._gl=rankOf(x._dex,x._iv,1500);x._ul=rankOf(x._dex,x._iv,2500);x._ml=rankOf(x._dex,x._iv,1000000);
    var ms=META[x._dex]||{gl:0,ul:0};x._glv=ms.gl;x._ulv=ms.ul;
    var f=FLAG[x._dex]||{};x._rare=f.leg?'legendary':f.my?'mythical':f.ub?'ultrabeast':f.reg?'regional':'common';
    x._card=!!(pd.locationCard);x._cost=pd.costume||0;x._shiny=!!pd.shiny;x._lucky=!!x.isLucky;x._fav=!!x.favorite;
    x._dyn=!!(x.breadMoves&&x.breadMoves.length)||(pd.breadModeEnum||0)>0;
    x._collect=x._fav||x._shiny||x._lucky||!!x._cost||x._ivs===45||x._card;
    x._event=(x.originEvents||[])[0]||"";x._size=x.size;
    // moves decode + legacy
    var sid=SIDOF[x._dex+"_"+x._sh]||SIDOF[x._dex+"_0"];x._sid=sid;
    var legal={};(PM[sid]||[]).forEach(function(r){legal[r.move_id]=1;});
    var mv=[],leg=false;
    [x.move1,x.move2,x.move3].forEach(function(mi){if(!mi)return;var info=MOVEID[mi];if(!info)return;var sp=!legal[info.id];if(sp)leg=true;mv.push((sp?'🔑':'')+info.cn);});
    x._moves=mv.join("/");x._legacy=leg;x._2c=(x.move3||0)!==0;
    // PvE 最佳DPS：当前等级 & L40基准
    var spp=SP[sid];
    if(spp){var pbN=pveBest(spp,x._iv,x._ecpm||CPM[40],x._sh);var pb40=pveBest(spp,x._iv,CPM[40],x._sh);
      x._pdps=Math.round((pbN.dps||0)*10)/10;x._pdps40=Math.round((pb40.dps||0)*10)/10;x._ptype=pbN.type;x._ptdo=Math.round(pbN.tdo||0);}
    else{x._pdps=0;x._pdps40=0;x._ptype=null;}
  });
  // PvE top-20 per type by actual power
  var PVEset={},perT={};
  mons.forEach(function(x){
    var sid=x._sid;if(!sid||!SP[sid])return;var sp=SP[sid];var types=[sp.type1,sp.type2].filter(Boolean);
    var m=x._ecpm||CPM[20];var eA=(sp.atk+x._iv[0])*m*(x._sh?1.2:1),eD=(sp.def+x._iv[1])*m*(x._sh?0.8333:1),eH=Math.floor((sp.hp+x._iv[2])*m);
    types.forEach(function(T){var ms=bestMoveset(sid,T);if(!ms[0].length||!ms[1].length)return;var s=pveScore(eA,eD,eH,types,ms[0],ms[1],T);if(s>0)(perT[T]=perT[T]||[]).push([s,x]);});
  });
  TYPES.forEach(function(T){(perT[T]||[]).sort(function(a,b){return b[0]-a[0];});(perT[T]||[]).slice(0,20).forEach(function(p){p[1]._pve=1;});});

  // classify, grouped by (dex,shadow)
  var by={};mons.forEach(function(x){(by[x._dex+"_"+x._sh]=by[x._dex+"_"+x._sh]||[]).push(x);});
  function cval(x){return x._fav*100+x._lucky*40+x._card*30+(x._ivs===45)*25+(x._size===5?8:0)+Math.max(x._gl||999>500?0:0,0)+x._cp/2000+x._legacy*15+x._2c*5+(1000-(Math.min(x._gl||999,x._ul||999)))/200;}
  Object.keys(by).forEach(function(key){
    var lst=by[key];lst.sort(function(a,b){return b._cp-a._cp;});
    var dex=lst[0]._dex,f=FLAG[dex]||{};
    var rel=pveRelevant(dex,PVEset);
    var fodderN=rel==='fodder'?2:0,fodderKept=0;
    var col={},dyn=[];
    lst.forEach(function(x){
      var r=null;
      if(x._pve) r='pve-type';
      else if(x._dyn){ if(x._collect){x._act='KEEP';x._reason='dynamax';} else dyn.push(x); return; }
      else if(x._collect){ var sig=x._shiny+"_"+x._cost; (col[sig]=col[sig]||[]).push(x); return; }
      else if((x._gl&&x._gl<=10)||(x._ul&&x._ul<=10)) r=((x._glv>=80||x._ulv>=80)?'pvp':'pvp-future');
      else if(rel==='fodder'&&fodderKept<fodderN){r='evolve-fodder';fodderKept++;}
      else if(x._legacy&&(x._rare!=='common'||x._glv>=80||x._ulv>=80)) r='legacy';
      if(r){x._act='KEEP';x._reason=r;}
      else if(x._sh){x._act='TRANSFER';x._reason='shadow-junk';}
      else if(x._rare!=='common'){x._act='TRADE';x._reason='rare-spare';}
      else {x._act='TRANSFER';x._reason='junk';}
    });
    Object.keys(col).forEach(function(sig){var g=col[sig];g.sort(function(a,b){return cval(b)-cval(a);});g[0]._act='KEEP';g[0]._reason='collect';g.slice(1).forEach(function(x){x._act='HESITATE';x._reason='collect-dup';});});
    dyn.sort(function(a,b){return (b._ivs-a._ivs)||(b._cp-a._cp);});dyn.forEach(function(x,i){if(i===0){x._act='KEEP';x._reason='dynamax';}else{x._act='HESITATE';x._reason='dynamax-dup';}});
  });
  return mons;
}

// ---- file handling ----
function handleFile(file){
  setStatus("读取中…");
  var fr=new FileReader();
  fr.onload=function(){
    try{
      var d=JSON.parse(fr.result);
      var mons=(d.pokemons||[]).filter(function(x){return x.pokemonDisplay&&!x.isEgg;});
      if(!mons.length){setStatus('<span style="color:var(--bad)">没找到宝可梦数据（需要 PGStats 账号导出的 JSON）</span>');return;}
      setStatus("分析 "+mons.length+" 只中…（PvP 排名枚举约 15-20 秒，请稍候）");
      setTimeout(function(){
        ALL=analyze(mons);
        $("results").classList.remove("hide");
        renderSummary();render();
        setStatus("✅ 完成。导出时间："+(d.time||"?")+" · 共 "+mons.length+" 只");
        $("results").scrollIntoView({behavior:"smooth",block:"start"});
      },30);
    }catch(e){setStatus('<span style="color:var(--bad)">解析失败：'+e.message+'</span>');}
  };
  fr.readAsText(file);
}
var dz=$("drop");
dz.onclick=function(){$("file").click();};
$("file").onchange=function(e){if(e.target.files[0])handleFile(e.target.files[0]);};
dz.ondragover=function(e){e.preventDefault();dz.classList.add("over");};
dz.ondragleave=function(){dz.classList.remove("over");};
dz.ondrop=function(e){e.preventDefault();dz.classList.remove("over");if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};

// ---- render ----
var ACTMETA={KEEP:['保留','kc'],HESITATE:['犹豫','hc'],TRADE:['交换','tc'],TRANSFER:['分解','xc']};
function renderSummary(){
  var cnt={KEEP:0,HESITATE:0,TRADE:0,TRANSFER:0},rs={};
  ALL.forEach(function(x){cnt[x._act]++;rs[x._act]=rs[x._act]||{};rs[x._act][x._reason]=(rs[x._act][x._reason]||0)+1;});
  var order=['KEEP','HESITATE','TRADE','TRANSFER'];
  $("sum").innerHTML=order.map(function(a){
    var m=ACTMETA[a],sub=Object.keys(rs[a]||{}).map(function(k){return k+" "+rs[a][k];}).join(" · ");
    return '<div class="scard'+(curFilter===a?' on':'')+'" onclick="toggleFilter(\''+a+'\')"><div class="v '+m[1]+'">'+cnt[a]+'</div><div class="l">'+m[0]+'</div><div class="d">'+sub+'</div></div>';
  }).join("");
}
function toggleFilter(a){curFilter=curFilter===a?null:a;renderSummary();render();}
var TCN={normal:"一般",fire:"火",water:"水",electric:"电",grass:"草",ice:"冰",fighting:"格斗",poison:"毒",ground:"地面",flying:"飞行",psychic:"超能力",bug:"虫",rock:"岩石",ghost:"幽灵",dragon:"龙",dark:"恶",steel:"钢",fairy:"妖精"};
var COLS=[['name','名字'],['dex','图鉴'],['_sh','暗影'],['_dyn','极巨'],['cp','CP'],['ivp','iv%'],['iva','攻'],['ivd','防'],['ivs','体'],['gl','GL名次'],['ul','UL名次'],['ml','ML名次'],['pdps','PvE打团'],['rare','稀有'],['act','处理'],['reason','原因'],['flags','标记'],['moves','招式']];
function rowData(x){return {__i:x._i,name:NAME[x._dex]||x._dex,dex:x._dex,_sh:x._sh?'暗':'',_dyn:x._dyn?'极':'',cp:x._cp,ivp:Math.round(x._ivs/45*100),iva:x._iv[0],ivd:x._iv[1],ivs:x._iv[2],gl:x._gl,ul:x._ul,ml:x._ml,pdps:x._pdps40?(x._pdps40+(x._ptype?' '+TCN[x._ptype]:'')):'-',rare:x._rare,act:x._act,reason:x._reason,flags:(x._shiny?'✨':'')+(x._lucky?'🍀':'')+(x._cost?'🎩':'')+(x._card?'🖼':'')+(x._legacy?'🔑':''),moves:x._moves};}
function render(){
  if(!ALL.length)return;
  var q=($("q").value||"").toLowerCase().trim(),fsh=$("fsh").checked,fdyn=$("fdyn").checked,frar=$("frar").value;
  var data=ALL.filter(function(x){
    if(curFilter&&x._act!==curFilter)return false;
    if(fsh&&!x._sh)return false;if(fdyn&&!x._dyn)return false;if(frar&&x._rare!==frar)return false;
    if(q){var nm=(NAME[x._dex]||"").toLowerCase(),en=(EN[x._dex]||"");if(nm.indexOf(q)<0&&en.indexOf(q)<0&&(""+x._dex)!==q)return false;}
    return true;
  }).map(rowData);
  data.sort(function(a,b){var va=a[sortKey],vb=b[sortKey];if(typeof va==='number')return (va-vb)*sortDir;return (''+va).localeCompare(''+vb)*sortDir;});
  $("tbl").tHead.innerHTML="<tr>"+COLS.map(function(c){return '<th onclick="setSort(\''+c[0]+'\')">'+c[1]+(sortKey===c[0]?(sortDir>0?' ▲':' ▼'):'')+'</th>';}).join("")+"</tr>";
  var tb=$("tbl").tBodies[0];
  tb.innerHTML=data.map(function(r){return '<tr onclick="advise('+r.__i+')" style="cursor:pointer">'+COLS.map(function(c){var v=r[c[0]];if(c[0]==='act')return '<td><span class="act a-'+v+'">'+ACTMETA[v][0]+'</span></td>';if(c[0]==='gl'||c[0]==='ul'||c[0]==='ml')return '<td'+(v&&v<=10?' style="color:var(--accent2);font-weight:700"':'')+'>'+(v==null?'-':'#'+v)+'</td>';return '<td>'+(v==null?'':v)+'</td>';}).join("")+"</tr>";}).join("");
  renderSearch();
}
function setSort(k){if(sortKey===k)sortDir=-sortDir;else{sortKey=k;sortDir=1;}render();}
function renderSearch(){
  // per-species swap/transfer instructions for current view
  var bySp={};ALL.forEach(function(x){var k=x._dex+"_"+x._sh;(bySp[k]=bySp[k]||{KEEP:0,pve:0,TRADE:0,TRANSFER:0,HESITATE:0})[x._act]++;if(x._reason==='pve-type')bySp[k].pve++;});
  var swap=[],tr=[];
  Object.keys(bySp).forEach(function(k){var v=bySp[k];var p=k.split("_"),dex=+p[0],sh=p[1]==='1';var nm=NAME[dex]||dex,en=EN[dex]||dex;var pre=sh?'shadow ':'';
    if(v.TRADE>=2)swap.push('<code>'+pre+en+'&!favorite</code> '+(NAME[dex]||'')+' 留CP最高'+v.pve+',换'+v.TRADE);
    if(v.TRANSFER>=3&&(v.KEEP||v.HESITATE))tr.push('<code>'+pre+en+'&!favorite</code> '+(NAME[dex]||'')+' 留'+v.pve+',清'+v.TRANSFER);
  });
  swap.sort();tr.sort();
  $("searchbox").innerHTML='<h3>🎮 游戏内搜索串（先把 shiny/lucky/costume/4* 打★保护）</h3>'+
    '<div><b style="color:#7ea2ff">🔁 交换</b>（搜名字→按CP→留前N→其余打Swap）：<br>'+(swap.slice(0,12).join('<br>')||'无')+'</div>'+
    '<div style="margin-top:8px"><b style="color:var(--bad)">🗑️ 分解</b>（&!favorite 后剩下全清）：<br>'+(tr.slice(0,12).join('<br>')||'无')+'</div>'+
    '<div style="margin-top:8px;color:var(--dim)">暗影不能交易；垃圾整种：<code>shadow&!favorite&!4*&!shiny</code></div>';
}
function exportCSV(){
  var hdr=['处理','原因','名字','图鉴','暗影','极巨','CP','iv%','iv攻','iv防','iv体','GL名次','UL名次','ML名次','PvE_L40','PvE属性','稀有','闪光','幸运','造型','卡背','传承','招式','搜索串'];
  var data=ALL.slice().sort(function(a,b){return (a._dex-b._dex)||(b._cp-a._cp);});
  var lines=[hdr.join(",")];
  data.forEach(function(x){var nm=NAME[x._dex]||x._dex,en=EN[x._dex]||x._dex;var srch=(x._sh?'shadow ':'')+en+(x._act==='TRADE'?'&!shiny&!lucky&!4*':'');
    lines.push([ACTMETA[x._act][0],x._reason,nm,x._dex,x._sh,x._dyn?'极':'',x._cp,Math.round(x._ivs/45*100),x._iv[0],x._iv[1],x._iv[2],x._gl||'',x._ul||'',x._ml||'',x._pdps40||'',x._ptype?TCN[x._ptype]:'',x._rare,x._shiny?1:'',x._lucky?1:'',x._cost||'',x._card?1:'',x._legacy?1:'','"'+x._moves+'"',srch].join(","));});
  var blob=new Blob(["﻿"+lines.join("\n")],{type:"text/csv;charset=utf-8"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="盒子整理.csv";a.click();
}
// ---- 发展建议弹窗 ----
function buildRec(x,p40,p50){
  var r=[];
  var bestPvpRank=Math.min(x._gl||9999,x._ul||9999,x._ml||9999);
  if(x._reason==='collect'){r.push('🏅 收藏品（闪光/幸运/造型/卡背/满IV），保留不动。');}
  if(x._act==='TRANSFER'){r.push('🗑️ 无保留价值，可<b>分解换糖</b>'+(x._sh?'（暗影不能交易，只能分解）':'')+'。');}
  if(x._act==='TRADE'){r.push('🔁 稀有但多余，建议<b>换幸运</b>(降IV地板+省升级星尘)或送朋友。');}
  if(x._reason==='pve-type'||x._reason==='evolve-fodder'){
    r.push('🏟 团战'+(x._ptype?TCN[x._ptype]+'系':'')+'打手：练到 <b>L40</b>（团战标准，DPS '+p40+'），愿投入冲 <b>L50</b>（DPS '+p50+'）。'+(x._reason==='evolve-fodder'?'（先进化）':''));
    if(x._sh)r.push('🌑 暗影攻击+20%，打团别净化（净化会失去加成）。');
  }
  if(x._reason==='pvp'||x._reason==='pvp-future'){
    var lg=bestPvpRank===x._gl?'超级(1500)':bestPvpRank===x._ul?'高级(2500)':'大师';
    r.push('🥊 PvP 神 IV（rank≤10）：练到 <b>'+lg+'联赛</b>CP上限。');
    if(!x._2c)r.push('⚠️ 还没解锁<b>第二大招</b>，PvP 强烈建议解锁。');
  }
  if(x._reason==='dynamax')r.push('💥 极巨化（获取受限），打极巨战用，保留。');
  if(!r.length)r.push('按其最佳用途保留。');
  return r;
}
function advise(i){
  var x=ALL[i];if(!x)return;var sp=SP[x._sid];
  var nm=NAME[x._dex]||x._dex,iv=x._iv,ivp=Math.round(x._ivs/45*100);
  var p40=x._pdps40||0,pNow=x._pdps||0,p50=sp?Math.round(pveBest(sp,iv,CPM[50],x._sh).dps*10)/10:0;
  function lf(rank,score,name){if(!rank)return '';var q=rank<=10?'<b>神级</b>':rank<=100?'好':rank<=500?'中等':'偏差';var meta=score>=85?' · 该种T0-T1':score>=75?' · 该种可用':score>0?' · 该种冷门':'';return name+' <b'+(rank<=10?' style="color:var(--accent2)"':'')+'>#'+rank+'</b> '+q+meta;}
  var pvp=[lf(x._gl,x._glv,'超级GL'),lf(x._ul,x._ulv,'高级UL'),lf(x._ml,0,'大师ML')].filter(Boolean);
  var types=sp?[sp.type1,sp.type2].filter(Boolean).map(function(t){return TCN[t];}).join('/'):'';
  $("mcard").innerHTML='<span id="mx" onclick="closeM()">×</span>'+
    '<h3>'+nm+(x._sh?' 🌑暗影':'')+(x._dyn?' 💥极巨':'')+'</h3>'+
    '<div class="adv">CP '+x._cp+' · IV '+iv.join('/')+' ('+ivp+'%) · '+types+'<br>招式：'+x._moves+(x._legacy?' <b style="color:var(--accent2)">含传承招🔑</b>':'')+'</div>'+
    '<div class="advsec"><b>📋 处理</b>：'+ACTMETA[x._act][0]+'（'+x._reason+'）</div>'+
    '<div class="advsec"><b>🥊 PvP IV 排名</b><br>'+(pvp.join('<br>')||'无数据')+'</div>'+
    '<div class="advsec"><b>🏟 PvE 打团</b><br>最佳：'+(x._ptype?TCN[x._ptype]+'系':'-')+' · 当前 L 约 DPS '+pNow+' · L40 '+p40+' · L50 '+p50+(x._pve?'<br><b style="color:var(--good)">★ 当前该系前 20 强打手</b>':'')+'</div>'+
    '<div class="advsec"><b>💡 培养建议</b><br>'+buildRec(x,p40,p50).join('<br>')+'</div>';
  $("mov").style.display="flex";$("mov").scrollTop=0;
}
function closeM(){$("mov").style.display="none";}
$("mov").addEventListener("click",function(e){if(e.target===$("mov"))closeM();});
window.advise=advise;window.closeM=closeM;
window.toggleFilter=toggleFilter;window.setSort=setSort;window.render=render;window.exportCSV=exportCSV;
</script>
