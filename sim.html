<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon GO PvP 对战模拟器</title>
<style>
  :root{--bg:#0e1016;--panel:#171a23;--panel2:#1f2330;--panel3:#272c3b;--line:#2c3142;--txt:#e9ebf2;--dim:#9aa1b4;--accent:#3b6cff;--accent2:#ffcb05;--good:#27c08a;--warn:#ff9f43;--bad:#ff5c72;--a:#4aa3ff;--b:#ff7a59}
  *{box-sizing:border-box}html{overflow-x:hidden}
  body{margin:0;background:radial-gradient(1200px 700px at 75% -15%,#15203a,#0e1016);color:var(--txt);font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .top{padding:13px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;background:rgba(14,16,22,.92);backdrop-filter:blur(8px);z-index:20}
  .top h1{margin:0;font-size:18px}.top h1 span{color:var(--accent2)}
  .top a{color:var(--accent);font-size:12px;text-decoration:none}
  .top .sub{color:var(--dim);font-size:11px;flex:1;min-width:200px}
  .main{max-width:880px;margin:0 auto;padding:18px 16px 80px}
  .arena{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:start}
  @media(max-width:680px){.arena{grid-template-columns:1fr;gap:10px}.vs{justify-self:center}}
  .side{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px}
  .side.A{border-top:3px solid var(--a)}.side.B{border-top:3px solid var(--b)}
  .vs{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:var(--dim);padding-top:30px}
  .pick{display:flex;align-items:center;gap:9px;margin-bottom:8px}
  .pick img{width:52px;height:52px;object-fit:contain;background:var(--panel2);border-radius:10px;border:1px solid var(--line)}
  .pick .nm{font-size:15px;font-weight:700}.pick .nm small{display:block;color:var(--dim);font-size:10px;font-weight:400}
  input,select{background:var(--panel3);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:6px 9px;font-size:12.5px;width:100%}
  .row{display:flex;gap:6px;margin:6px 0;align-items:center}
  .row label{font-size:11px;color:var(--dim);width:42px;flex:none}
  .sug{position:relative}
  .suglist{position:absolute;z-index:30;left:0;right:0;background:var(--panel2);border:1px solid var(--line);border-radius:8px;margin-top:2px;max-height:220px;overflow-y:auto}
  .sugitem{padding:6px 9px;cursor:pointer;font-size:12.5px;display:flex;gap:7px;align-items:center}
  .sugitem:hover{background:var(--panel3)}.sugitem img{width:26px;height:26px;object-fit:contain}
  .ivg{display:flex;gap:5px}.ivg input{width:100%;text-align:center}
  .shields{display:flex;gap:4px}.shbtn{flex:1;text-align:center;padding:5px;border:1px solid var(--line);border-radius:7px;cursor:pointer;font-size:12px;background:var(--panel3)}.shbtn.on{border-color:var(--accent2);background:rgba(255,203,5,.15);color:var(--accent2)}
  .go{display:block;width:100%;margin:16px 0;padding:13px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit}
  .go:active{transform:scale(.99)}
  .result{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:6px}
  .winner{font-size:20px;font-weight:800;text-align:center;margin-bottom:12px}
  .bars{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .bar .lbl{font-size:12px;margin-bottom:4px;display:flex;justify-content:space-between}
  .hpbar{height:14px;background:var(--panel3);border-radius:7px;overflow:hidden}.hpbar>i{display:block;height:100%;border-radius:7px;transition:.4s}
  .hpA{background:linear-gradient(90deg,var(--a),#7cc4ff)}.hpB{background:linear-gradient(90deg,var(--b),#ffb199)}
  .timeline{max-height:300px;overflow-y:auto;font-size:12px;line-height:1.7;background:var(--panel2);border-radius:9px;padding:9px 11px}
  .ev{display:flex;gap:8px}.ev .t{color:var(--dim);width:42px;flex:none;font-variant-numeric:tabular-nums}
  .evA{color:#bfe0ff}.evB{color:#ffc59c}.evKO{color:var(--bad);font-weight:700}.evSh{color:var(--accent2)}
  .muted{color:var(--dim);font-size:11.5px;line-height:1.6;margin-top:10px}
  .chip{font-size:11px;padding:2px 8px;border-radius:11px;background:var(--panel3);color:var(--dim)}
</style>
</head>

// ---- battle engine ----
function buffMult(st){return st>=0?(4+st)/4:4/(4-st);}
function build(s){
  const p=pmon(s.id);const iv={a:s.iv[0],d:s.iv[1],h:s.iv[2]};
  const cap=CAPS[s.cap];const L=bestLevel(p.base,iv,cap);const m=CPM[L];
  const atk=(p.base.a+iv.a)*m, def=(p.base.d+iv.d)*m, hp=Math.floor((p.base.h+iv.h)*m);
  const charged=[s.c1,s.c2].filter((v,i,a)=>v&&a.indexOf(v)===i).map(id=>MOVES[id]).filter(Boolean);
  return {p,name:nameOf(p),types:p.types,atk,def,hp,maxhp:hp,energy:0,atkS:0,defS:0,shields:s.sh,
    fast:MOVES[s.fast],charged,ft:0,L,cp:cpOf(p.base.a+iv.a,p.base.d+iv.d,p.base.h+iv.h,m)};

function dmg(at,df,mv){const ae=at.atk*buffMult(at.atkS),de=df.def*buffMult(df.defS);const stab=at.types.includes(mv.t)?1.2:1;let te=1;for(const t of df.types)te*=(EFF[mv.t]&&EFF[mv.t][t])||1;return Math.floor(0.5*1.3*mv.p*(ae/de)*stab*te)+1;}

function sim(){
  const A=build(S.A),B=build(S.B),log=[];let turn=0;const MAX=600;
  A.ft=A.fast.turns;B.ft=B.fast.turns;
  function ev(side,kind,txt){log.push({turn,side,kind,txt});}
  function tryCharged(at,df,side){
    const opts=at.charged.filter(c=>at.energy>=c.e).sort((a,b)=>a.e-b.e);if(!opts.length)return;
    let mv=opts[0];for(const o of opts){if(df.shields<=0&&dmg(at,df,o)>=df.hp){mv=o;break;}}
    at.energy-=mv.e;let d=dmg(at,df,mv),sh=false;
    if(df.shields>0&&(d>=df.hp||d>=df.maxhp*0.2)){df.shields--;sh=true;d=0;}
    df.hp-=d;applyBuff(mv,at,df);
    ev(side,'charged',`💥${mv.n} ${sh?'被护盾挡下':'-'+d}${at.atkS||df.defS?` (buff)`:''}`);
    if(df.hp<=0)ev(side==='A'?'A':'B','ko',`${df.name} 倒下！`);
  }
  while(turn<MAX&&A.hp>0&&B.hp>0){
    turn++;A.ft--;B.ft--;let aF=false,bF=false;
    if(A.ft<=0){B.hp-=dmg(A,B,A.fast);A.energy=Math.min(100,A.energy+A.fast.eg);A.ft=A.fast.turns;aF=true;}
    if(B.ft<=0){A.hp-=dmg(B,A,B.fast);B.energy=Math.min(100,B.energy+B.fast.eg);B.ft=B.fast.turns;bF=true;}
    if(A.hp<=0||B.hp<=0)break;
    const aC=aF&&A.charged.some(c=>A.energy>=c.e), bC=bF&&B.charged.some(c=>B.energy>=c.e);

    <div class="winner" style="color:${wcolor}">${wtext}${r.timeout?' <span class="chip">超时·比血量</span>':''}</div>
    <div class="bars">
     <div class="bar"><div class="lbl"><b style="color:var(--a)">${A.name}</b><span>${Math.max(0,Math.ceil(A.hp))}/${A.maxhp} · ${A.shields}盾</span></div><div class="hpbar"><i class="hpA" style="width:${hpp(A)}%"></i></div><div class="muted" style="margin-top:3px">L${A.L} CP${A.cp} · 攻${A.atk.toFixed(0)}</div></div>
     <div class="bar"><div class="lbl"><b style="color:var(--b)">${B.name}</b><span>${Math.max(0,Math.ceil(B.hp))}/${B.maxhp} · ${B.shields}盾</span></div><div class="hpbar"><i class="hpB" style="width:${hpp(B)}%"></i></div><div class="muted" style="margin-top:3px">L${B.L} CP${B.cp} · 攻${B.atk.toFixed(0)}</div></div>
    </div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:4px">⏱ 战斗时间线（${(r.turn*0.5).toFixed(1)}s，仅大招/KO）</div>
    <div class="timeline">${tl||'<div class="muted">无大招事件（纯快攻磨）</div>'}</div>
  </div>`;
  $('result').scrollIntoView({behavior:'smooth',block:'nearest'});
}
renderSide('A');renderSide('B');
</script>
<script src="pokedex-modal.js?v=2"></script><script src="site-nav.js?v=2"></script></body>
</html>
